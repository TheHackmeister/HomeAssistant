views:
  - type: sections
    max_columns: 4
    title: Overview
    path: overview
    icon: ''
    sections:
      - type: grid
        cards:
          - type: custom:auto-entities
            card:
              type: entities
            filter:
              include:
                - domain: input_select
                  name: '*Water*'
              exclude: []
          - type: custom:auto-entities
            card:
              type: entities
              title: Sensors
            filter:
              template: |
                {% set selected_zone = states('input_select.water_supplies') %}
                {% set nutrient_entities = labels() 
                   | select('match', 'nutrient_.*_sensor') 
                   | map('label_entities') 
                   | sum(start=[]) %}
                {% if selected_zone == 'All' %}
                  {% set all_options = state_attr('input_select.water_supplies', 'options') | reject('eq', 'All') | list %}
                  {% set ns = namespace(all_area_entities=[]) %}
                  {% for area in all_options %}
                    {% set ns.all_area_entities = ns.all_area_entities + area_entities(area) %}
                  {% endfor %}
                  {% set filtered_entities = nutrient_entities | select('in', ns.all_area_entities) | list %}
                {% else %}
                  {% set filtered_entities = nutrient_entities | select('in', area_entities(selected_zone)) | list %}
                {% endif %}
                {% set ns2 = namespace(result=[]) %}
                {% for entity in filtered_entities %}
                  {% for label_id in labels() | select('match', 'nutrient_.*_sensor') %}
                    {% if entity in label_entities(label_id) %}
                      {% set ns2.result = ns2.result + [{'entity': entity, 'secondary_info': label_name(label_id)}] %}
                      {% break %}
                    {% endif %}
                  {% endfor %}
                {% endfor %}
                {{ ns2.result }}
              exclude: []
            sort:
              method: entity_id
          - type: custom:auto-entities
            card:
              type: entities
              title: Calibrated Value
            filter:
              template: |
                {% set selected_zone = states('input_select.water_supplies') %}
                {% set nutrient_entities = labels() 
                   | select('match', 'calibrated_value(?!.*_2_point)') 
                   | map('label_entities') 
                   | sum(start=[]) %}
                {% if selected_zone == 'All' %}
                  {% set all_options = state_attr('input_select.water_supplies', 'options') | reject('eq', 'All') | list %}
                  {% set ns = namespace(all_area_entities=[]) %}
                  {% for area in all_options %}
                    {% set ns.all_area_entities = ns.all_area_entities + area_entities(area) %}
                  {% endfor %}
                  {% set filtered_entities = nutrient_entities | select('in', ns.all_area_entities) | list %}
                {% else %}
                  {% set filtered_entities = nutrient_entities | select('in', area_entities(selected_zone)) | list %}
                {% endif %}
                {% set ns2 = namespace(result=[]) %}
                {% for entity in filtered_entities %}
                  {% for label_id in labels() | select('match', 'calibrated_value(?!.*_2_point)') %}
                    {% if entity in label_entities(label_id) %}
                      {% set dose_entity = entity | regex_replace('sensor\.(.*)$', 'sensor.\\1_calibrated_value') %}
                      {% set ns2.result = ns2.result + [{'entity': dose_entity, 'secondary_info': label_name(label_id)}] %}
                      {% break %}
                    {% endif %}
                  {% endfor %}
                {% endfor %}
                {{ ns2.result }}
              exclude: []
            sort:
              method: entity_id
          - show_name: true
            show_icon: true
            type: button
            entity: script.dose_nutrient_v2
          - show_name: true
            show_icon: true
            type: button
            entity: script.water_supply_by_volume_cancel_job
          - show_name: true
            show_icon: true
            type: button
            entity: script.dose_pressurize_electrolytes
          - show_name: true
            show_icon: true
            type: button
            entity: script.water_supply_by_volume_plant_mix
