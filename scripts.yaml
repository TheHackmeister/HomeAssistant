          payload: "{{ {\n  'location_id': location_id,\n  'root_zone': root_zone
            | default(''),\n  'shoot_zone': shoot_zone | default(''),\n  'water_supply':
            water_supply | default('')\n} | to_json }}\n"
        action: mqtt.publish
      - data:
          topic: '{{ counter_topic }}'
          retain: true
          payload: '{{ location_id | int + 1 }}'
        action: mqtt.publish
      - delay:
          milliseconds: 200
  - data:
      title: Location Sensors Created
      message: 'Created {{ locations_to_create }} location sensor(s). Starting ID:
        {{ current_id }} Ending ID: {{ current_id | int + locations_to_create | int
        - 1 }}'
    action: persistent_notification.create
  alias: 'Sensors: Create Locations'
  description: Dynamically create location monitoring sensors via MQTT discovery
  mode: queued
  max: 10
  fields:
    locations_to_create:
      name: Number of Locations
      description: How many location sensors to create
      default: 1
      selector:
        number:
          min: 1
          max: 100
      required: true
    root_zone:
      name: Root Zone
      description: Root zone identifier
      default:
      selector:
        area:
          entity:
            device_class: pressure
      required: true
    shoot_zone:
      name: Shoot Zone
      description: Shoot zone identifier
      default:
      selector:
        area:
          entity:
            device_class: pressure
      required: true
    water_supply:
      name: Water Supply
      description: Water supply identifier
      default: water_supply_01
      selector:
        area:
          entity:
            device_class: pressure
      required: true
    location_area:
      name: Location Area
      description: Area to put the location in if not the root_zone
      selector:
        area:
    starting_id:
      name: Starting ID Override
      description: Optional override for the starting location ID number
      selector:
        number:
          min: 0
          max: 10000
sensors_area_manifests:
  alias: 'Sensors: Area Manifests'
  description: Updates a single area manifest sensor via MQTT discovery
  mode: queued
  max: 10
  fields:
    area_id:
      name: Area ID
      description: The area ID to update
      required: true
      selector:
        text:
    area_name:
      name: Area Name
      description: The area name
      required: true
      selector:
        text:
    entity_ids:
      name: Entity IDs
      description: List of entity IDs in the area
      required: false
    device_ids:
      name: Device IDs
      description: List of device IDs in the area
      required: false
  sequence:
  - variables:
      ha_topic: homeassistant
      safe_area_id: '{{ area_id | replace('' '', ''_'') | replace(''-'', ''_'') |
        lower }}'
      sensor_entity_id: sensor.area_manifest_{{ safe_area_id }}
      sensor_topic: area_manifests/{{ safe_area_id }}
      entity_count: '{{ entity_ids | length }}'
      device_count: '{{ device_ids | length }}'
      area_type: '{% set type_labels = labels(area_id) | select(''match'', ''^type_'')
        | list %} {{ type_labels[0].replace(''type_'', '''') if type_labels | length
        > 0 else '''' }}

        '
      label_map: "{% set ns = namespace(data={}) %} {% for lbl_id in labels() %}\n
        \ {% set matching_entities = label_entities(lbl_id) | select('in', entity_ids)
        | list %}\n  {% if matching_entities | length > 0 %}\n    {% set ns.data =
        dict(ns.data, **{lbl_id: matching_entities}) %}\n  {% endif %}\n{% endfor
        %} {{ ns.data }}\n"
  - data:
      topic: '{{ ha_topic }}/sensor/area_manifest_{{ safe_area_id }}/config'
      retain: true
      payload: "{{ {\n  \"name\": area_name ~ \" Area Manifest\",\n  \"object_id\":
        \"area_manifest_\" ~ safe_area_id,\n  \"unique_id\": \"area_manifest_\" ~
        safe_area_id,\n  \"state_topic\": sensor_topic ~ \"/state\",\n  \"json_attributes_topic\":
        sensor_topic ~ \"/attributes\",\n  \"icon\": \"mdi:format-list-bulleted-square\",\n
        \ \"device\": {\n    \"identifiers\": [\"area_manifest_\" ~ safe_area_id],\n
        \   \"name\": area_name ~ \" Area\",\n    \"manufacturer\": \"Home Assistant\",\n
        \   \"model\": \"Area Manifest\"\n  }\n} | to_json }}\n"
    action: mqtt.publish
  - data:
      topic: '{{ sensor_topic }}/state'
      retain: true
      payload: '{{ entity_count }}'
    action: mqtt.publish
  - data:
      topic: '{{ sensor_topic }}/attributes'
      retain: true
      payload: "{% set ns = namespace(label_data={}) %}\n{% for lbl_id in labels()
        %}\n  {% set matching_entities = label_entities(lbl_id) | select('in', entity_ids)
        | list %}\n  {% if matching_entities | length > 0 %}\n    {% set ns.label_data
        = dict(ns.label_data, **{lbl_id: matching_entities}) %}\n  {% endif %}\n{%
        endfor %}\n{{ {\n  'area_id': area_id,\n  'area_name': area_name,\n  'area_type':
        area_type,\n  'entity_ids': entity_ids,\n  'device_ids': device_ids,\n  'entity_count':
        entity_count,\n  'device_count': device_count,\n  'labels': ns.label_data\n}
        | to_json }}\n"
    action: mqtt.publish
labeled_feature_follower:
  alias: Labeled Feature Follower
  mode: parallel
  max: 50
  fields:
    follower_entity_id:
      name: Follower Entity ID
      description: The follower entity to act on
      required: true
      selector:
        entity: {}
    feature:
      name: Feature
      description: The feature name (e.g. 'night', 'screen')
      required: true
      selector:
        text: {}
    leader_entity_id:
      name: Leader Entity ID
      description: The leader that triggered this (optional, for reference)
      required: false
      default: ''
      selector:
        entity: {}
    leader_enabled:
      name: Leader Enabled
      description: Post-evaluated leader enabled boolean, passed from the automation
      required: true
      selector:
        boolean: {}
    error_mode:
      name: Error Mode
      description: >
        Default error mode when the follower entity has no `<feature> Error Mode:`
        label. Passed in by the leader automation from its per-feature evaluation.
        Priority: follower entity label → this field → 'log'.
        Tiers: silent | log | alert | stop.
      required: false
      default: ''
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
    toggle:
      name: Toggle
      description: >
        When true, the follower will toggle its current state instead of setting
        it to a specific value. Invert is ignored in toggle mode. Direct-value
        labels are skipped; Enable/Disable/Default scripts still run with toggle
        passed as an additional field. For domains without toggle support, Error
        Mode handling applies.
      required: false
      default: false
      selector:
        boolean: {}
    scope:
      name: Scope
      description: Scope of the feature (area, floor, or none).
      required: false
      selector:
        select:
          options:
            - area
            - floor
            - none
    scope_id:
      name: Scope ID
      description: The area_id or floor_id that corresponds to the resolved scope.
      required: false
      default: ''
      selector:
        text: {}
  sequence:
  - variables:
      feature_name: '{{ feature }}'
      follower_labels: "{{ labels(follower_entity_id)\n   | map('label_name')\n
        \  | reject('none')\n   | list }}\n"
      follower_domain: '{{ follower_entity_id.split(''.'')[0] }}'
  - variables:
      # scoped_feature: the label prefix used for all optional labels on this follower.
      # It prepends the scope ("Area " / "Floor ") to the bare feature name so that
      # optional labels like "Area Fan: Toggle", "Area Fan Only: Enable", etc. are
      # matched correctly.  The bare feature name is still passed to scripts via the
      # `feature` std field so scripts don't need to know about scope.
      scoped_feature: >-
        {{ (scope | default('') | capitalize + ' ') if scope | default('') in ['area', 'floor'] else '' }}{{ feature_name }}
      follower_error_mode: >-
        {% set em_pfx = scoped_feature + ' Error Mode: ' %}
        {% set match = follower_labels
            | select('match', '^' + em_pfx + '(silent|log|alert|stop)$')
            | first | default('') %}
        {% set from_label = match | regex_replace('^.+: ', '') | lower %}
        {% if from_label != '' %}{{ from_label }}
        {% elif (error_mode | default('') | lower) != '' %}{{ error_mode | lower }}
        {% else %}log{% endif %}
      follower_inverted: '{{ (scoped_feature + '' Invert: True'') in follower_labels }}'
      follower_enabled: '{{ (not leader_enabled) if follower_inverted else leader_enabled }}'
  - variables:
      follower_only: "{% set only_label = scoped_feature + ' Only: ' %} {% set match
        = follower_labels\n               | select('match', '^' + only_label
        + '(Enable|Disable)$')\n               | first | default('') %}\n{{ match
        | regex_replace('^.+: ', '') }}\n"
      follower_between: "{{ follower_labels\n   | select('match', '^'
        + scoped_feature + ' Between: .+')\n   | map('regex_replace', '^.+: ', '')\n
        \  | list }}\n"
      follower_not_between: "{{ follower_labels\n   | select('match',
        '^' + scoped_feature + ' Not Between: .+')\n   | map('regex_replace', '^.+:
        ', '')\n   | list }}\n"
      follower_time_ok: "{% set now_time = now().strftime('%H:%M') %} {% set ns =
        namespace(ok=true, any_b=false) %} {% for val in follower_between %} {% set
        p = val.split(':') %} {% set s = p[0]+':'+p[1] if (p|length==4 or (p|length==3
        and p[2]=='-')) and p[0]!='-' else '-' %} {% set e = p[2]+':'+p[3] if p|length==4
        else (p[1]+':'+p[2] if p|length==3 and p[0]=='-' else '-') %} {% set in_r
        = ((s=='-' or now_time>=s) and (e=='-' or now_time<=e)) if (s=='-' or e=='-'
        or s<=e) else (now_time>=s or now_time<=e) %} {% if in_r %}{% set ns.any_b
        = true %}{% endif %} {% endfor %} {% if follower_between|length > 0 %}{%
        set ns.ok = ns.any_b %}{% endif %} {% for val in follower_not_between %} {%
        set p = val.split(':') %} {% set s = p[0]+':'+p[1] if (p|length==4 or (p|length==3
        and p[2]=='-')) and p[0]!='-' else '-' %} {% set e = p[2]+':'+p[3] if p|length==4
        else (p[1]+':'+p[2] if p|length==3 and p[0]=='-' else '-') %} {% set in_r
        = ((s=='-' or now_time>=s) and (e=='-' or now_time<=e)) if (s=='-' or e=='-'
        or s<=e) else (now_time>=s or now_time<=e) %} {% if in_r %}{% set ns.ok =
        false %}{% endif %} {% endfor %} {{ ns.ok }}\n"
      follower_should_act: >-
        {%- set only = follower_only | trim | lower -%}
        {%- if only == 'enable' and not leader_enabled -%}false
        {%- elif only == 'disable' and leader_enabled -%}false
        {%- elif only != '' and only not in ['enable', 'disable'] -%}false
        {%- elif not follower_time_ok -%}false
        {%- else -%}true
        {%- endif -%}
  - condition: template
    value_template: '{{ follower_should_act }}'
  - variables:
      follower_target_value: "{% set pfx = scoped_feature + (' Enable: ' if follower_enabled\n
        \       else ' Disable: ') %} {% set match = follower_labels\n
        \              |\n        select('match', '^' + pfx + '.+')\n               |
        first | default('')\n        %} {% if match == '' %} {% set pfx2 = scoped_feature
        + ': ' %} {% set match\n        = follower_labels | select('match',
        '^' + pfx2 + '.+')\n        | first | default('') %} {% endif %} {{ match
        | regex_replace('^.+: ',\n        '') | trim }}\n"
      follower_enable_script: "{% set pfx = scoped_feature + ' Enable Script: ' %} {{
        follower_labels\n   | select('match', '^' + pfx + '.+')\n  |
        first | default('')\n   | regex_replace('^.+: ', '') }}\n"
      follower_disable_script: "{% set pfx = scoped_feature + ' Disable Script: ' %}
        {{ follower_labels\n   | select('match', '^' + pfx + '.+')\n
        \  | first | default('')\n   | regex_replace('^.+: ', '') }}\n"
      follower_default_script: "{% set pfx = scoped_feature + ' Script: ' %} {{ follower_labels\n
        \  | select('match', '^' + pfx + '.+')\n   | first | default('')\n   | regex_replace('^.+:
        ', '') }}\n"
  # === Dynamic Arg Label System + Argument Substitutions ===
  # Collects FEATURE (Enable|Disable) Arg FIELD: value labels from the follower entity.
  # Values matching [root].[key].[field] are substituted from sensor.labeled_features_state.
  # Without Arg labels the original synchronous call path (with error propagation) runs.
  # With Arg labels scripts are called asynchronously via script.turn_on with variables
  # (the only HA-native way to pass dynamic key names to a script at runtime).
  - variables:
      _enable_script_args: >-
        {% set ns = namespace(d={}) %}
        {% set lf_leaders = state_attr('sensor.labeled_features_state', 'leaders') | default({}) %}
        {% set lf_features = state_attr('sensor.labeled_features_state', 'features') | default({}) %}
        {% for lbl in follower_labels %}
        {% if lbl | regex_search('^' + feature_name + ' Enable Arg [^:]+:') %}
        {% set field = lbl | regex_replace('^.+ Enable Arg ([^:]+): .*$', '\\1') | trim %}
        {% set raw = lbl | regex_replace('^[^:]*: ', '') | trim %}
        {% if raw | regex_search('^\[[^\]]+\]\.\[[^\]]+\]\.\[[^\]]+\]$') %}
        {% set root = raw | regex_replace('^\[([^\]]+)\].*$', '\\1') %}
        {% set key = raw | regex_replace('^\[[^\]]+\]\.\[([^\]]+)\].*$', '\\1') %}
        {% set fld = raw | regex_replace('^.*\.\[([^\]]+)\]$', '\\1') %}
        {% if root == 'features' %}{% set ns.d = dict(ns.d, **{field: lf_features.get(key, {}).get(fld, raw) | string}) %}
        {% elif root == 'leaders' %}{% set ns.d = dict(ns.d, **{field: lf_leaders.get(key, {}).get(fld, raw) | string}) %}
        {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif %}
        {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif %}
        {% endif %}{% endfor %}
        {{ ns.d }}
      _disable_script_args: >-
        {% set ns = namespace(d={}) %}
        {% set lf_leaders = state_attr('sensor.labeled_features_state', 'leaders') | default({}) %}
        {% set lf_features = state_attr('sensor.labeled_features_state', 'features') | default({}) %}
        {% for lbl in follower_labels %}
        {% if lbl | regex_search('^' + feature_name + ' Disable Arg [^:]+:') %}
        {% set field = lbl | regex_replace('^.+ Disable Arg ([^:]+): .*$', '\\1') | trim %}
        {% set raw = lbl | regex_replace('^[^:]*: ', '') | trim %}
        {% if raw | regex_search('^\[[^\]]+\]\.\[[^\]]+\]\.\[[^\]]+\]$') %}
        {% set root = raw | regex_replace('^\[([^\]]+)\].*$', '\\1') %}
        {% set key = raw | regex_replace('^\[[^\]]+\]\.\[([^\]]+)\].*$', '\\1') %}
        {% set fld = raw | regex_replace('^.*\.\[([^\]]+)\]$', '\\1') %}
        {% if root == 'features' %}{% set ns.d = dict(ns.d, **{field: lf_features.get(key, {}).get(fld, raw) | string}) %}
        {% elif root == 'leaders' %}{% set ns.d = dict(ns.d, **{field: lf_leaders.get(key, {}).get(fld, raw) | string}) %}
        {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif %}
        {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif %}
        {% endif %}{% endfor %}
        {{ ns.d }}
      _default_script_args: >-
        {% set ns = namespace(d={}) %}
        {% set lf_leaders = state_attr('sensor.labeled_features_state', 'leaders') | default({}) %}
        {% set lf_features = state_attr('sensor.labeled_features_state', 'features') | default({}) %}
        {% for lbl in follower_labels %}
        {% if lbl | regex_search('^' + feature_name + ' Arg [^:]+:')
        and not lbl | regex_search('^' + feature_name + ' (Enable|Disable) Arg ') %}
        {% set field = lbl | regex_replace('^.+ Arg ([^:]+): .*$', '\\1') | trim %}
        {% set raw = lbl | regex_replace('^[^:]*: ', '') | trim %}
        {% if raw | regex_search('^\[[^\]]+\]\.\[[^\]]+\]\.\[[^\]]+\]$') %}
        {% set root = raw | regex_replace('^\[([^\]]+)\].*$', '\\1') %}
        {% set key = raw | regex_replace('^\[[^\]]+\]\.\[([^\]]+)\].*$', '\\1') %}
        {% set fld = raw | regex_replace('^.*\.\[([^\]]+)\]$', '\\1') %}
        {% if root == 'features' %}{% set ns.d = dict(ns.d, **{field: lf_features.get(key, {}).get(fld, raw) | string}) %}
        {% elif root == 'leaders' %}{% set ns.d = dict(ns.d, **{field: lf_leaders.get(key, {}).get(fld, raw) | string}) %}
        {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif %}
        {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif %}
        {% endif %}{% endfor %}
        {{ ns.d }}
  # === 3.1/3.2: Field-inspection helpers — validate Arg names + conditionally include std fields ===
  # follower_toggle: true when toggle was passed in OR the follower has the Toggle label.
  # When in toggle mode, Invert is ignored (we read the raw current state).
  - variables:
      follower_toggle: >-
        {{ (toggle | default(false) | bool) or ((scoped_feature + ' Toggle: True') in follower_labels) }}
      _std_fields_base: >-
        {{ {'follower_entity_id': follower_entity_id, 'feature': feature, 'leader_entity_id': leader_entity_id, 'leader_enabled': leader_enabled, 'scope': scope, 'scope_id': scope_id, 'toggle': follower_toggle, 'error_mode': follower_error_mode} }}
      _enable_script_fields: >-
        {% if follower_enable_script | trim != "" %}{{ state_attr(follower_enable_script | trim, 'fields') | default({}) }}{% else %}{{ {} }}{% endif %}
      _enable_script_std_fields: >-
        {% set sf = _enable_script_fields %}{% set ns = namespace(d={}) %}{% for k, v in _std_fields_base.items() %}{% if k in sf %}{% set ns.d = dict(ns.d, **{k: v}) %}{% endif %}{% endfor %}{{ ns.d }}
      _enable_script_invalid_args: >-
        {% set sf = _enable_script_fields %}{% set ns = namespace(inv=[]) %}{% for k in _enable_script_args.keys() %}{% if k not in sf %}{% set ns.inv = ns.inv + [k] %}{% endif %}{% endfor %}{{ ns.inv }}
      _enable_script_valid_args: >-
        {% set sf = _enable_script_fields %}{% set ns = namespace(d={}) %}{% for k, v in _enable_script_args.items() %}{% if k in sf %}{% set ns.d = dict(ns.d, **{k: v}) %}{% endif %}{% endfor %}{{ ns.d }}
      _disable_script_fields: >-
        {% if follower_disable_script | trim != "" %}{{ state_attr(follower_disable_script | trim, 'fields') | default({}) }}{% else %}{{ {} }}{% endif %}
      _disable_script_std_fields: >-
        {% set sf = _disable_script_fields %}{% set ns = namespace(d={}) %}{% for k, v in _std_fields_base.items() %}{% if k in sf %}{% set ns.d = dict(ns.d, **{k: v}) %}{% endif %}{% endfor %}{{ ns.d }}
      _disable_script_invalid_args: >-
        {% set sf = _disable_script_fields %}{% set ns = namespace(inv=[]) %}{% for k in _disable_script_args.keys() %}{% if k not in sf %}{% set ns.inv = ns.inv + [k] %}{% endif %}{% endfor %}{{ ns.inv }}
      _disable_script_valid_args: >-
        {% set sf = _disable_script_fields %}{% set ns = namespace(d={}) %}{% for k, v in _disable_script_args.items() %}{% if k in sf %}{% set ns.d = dict(ns.d, **{k: v}) %}{% endif %}{% endfor %}{{ ns.d }}
      _default_script_fields: >-
        {% if follower_default_script | trim != "" %}{{ state_attr(follower_default_script | trim, 'fields') | default({}) }}{% else %}{{ {} }}{% endif %}
      _default_script_std_fields: >-
        {% set sf = _default_script_fields %}{% set ns = namespace(d={}) %}{% for k, v in _std_fields_base.items() %}{% if k in sf %}{% set ns.d = dict(ns.d, **{k: v}) %}{% endif %}{% endfor %}{{ ns.d }}
      _default_script_invalid_args: >-
        {% set sf = _default_script_fields %}{% set ns = namespace(inv=[]) %}{% for k in _default_script_args.keys() %}{% if k not in sf %}{% set ns.inv = ns.inv + [k] %}{% endif %}{% endfor %}{{ ns.inv }}
      _default_script_valid_args: >-
        {% set sf = _default_script_fields %}{% set ns = namespace(d={}) %}{% for k, v in _default_script_args.items() %}{% if k in sf %}{% set ns.d = dict(ns.d, **{k: v}) %}{% endif %}{% endfor %}{{ ns.d }}
  # 1. Explicit Enable Script — runs when leader_enabled is true, regardless of value labels
  - if:
    - condition: template
      value_template: '{{ follower_enable_script | trim != "" and leader_enabled |
        bool }}'
    then:
    - if:
      - condition: template
        value_template: '{{ follower_enable_script.startswith(''automation.'') or
          follower_enable_script.startswith(''scene.'') }}'
      then:
      - action: '{{ follower_enable_script | trim }}'
        data: {}
      else:
      - choose:
        # No Arg labels: synchronous call preserving continue_on_error / error propagation
        - conditions:
          - condition: template
            value_template: '{{ _enable_script_args | length == 0 }}'
          sequence:
          - if:
            - condition: template
              value_template: '{{ follower_error_mode != ''stop'' }}'
            then:
            - action: '{{ follower_enable_script | trim }}'
              data: >
                {{ _enable_script_std_fields }}
              continue_on_error: true
            - if:
              - condition: template
                value_template: '{{ error is defined }}'
              then:
              - if:
                - condition: template
                  value_template: '{{ follower_error_mode == ''log'' }}'
                then:
                - action: system_log.write
                  data:
                    level: error
                    message: 'Labeled Feature Follower: error calling enable script {{
                      follower_enable_script }} for {{ follower_entity_id }} (feature:
                      {{ feature_name }}): {{ error }}'
              - if:
                - condition: template
                  value_template: '{{ follower_error_mode == ''alert'' }}'
                then:
                - action: script.send_alert
                  data:
                    alert_severity: high
                    alert_title: Labeled Feature Script Error
                    alert_message: 'Error calling enable script for {{ follower_entity_id
                      }} (feature: {{ feature_name }}): {{ error }}'
            else:
            - action: '{{ follower_enable_script | trim }}'
              data: >
                {{ _enable_script_std_fields }}
        # Arg labels present: async call — 3.1 validate, 3.2 pass std+valid args
        default:
        - if:
          - condition: template
            value_template: '{{ _enable_script_invalid_args | length > 0 and follower_error_mode == "stop" }}'
          then:
          - stop: 'Labeled Feature Follower: Arg field(s) {{ _enable_script_invalid_args }} not declared by {{ follower_enable_script }} (feature: {{ feature }})'
            error: true
        - if:
          - condition: template
            value_template: '{{ _enable_script_invalid_args | length > 0 and follower_error_mode == "log" }}'
          then:
          - action: system_log.write
            data:
              level: warning
              message: 'Labeled Feature Follower: Arg field(s) {{ _enable_script_invalid_args }} not declared by {{ follower_enable_script }} for {{ follower_entity_id }}. Proceeding with valid args only.'
        - if:
          - condition: template
            value_template: '{{ _enable_script_invalid_args | length > 0 and follower_error_mode == "alert" }}'
          then:
          - action: script.send_alert
            data:
              alert_severity: high
              alert_title: Labeled Feature Script Arg Error
              alert_message: 'Arg field(s) {{ _enable_script_invalid_args }} not declared by {{ follower_enable_script }} for {{ follower_entity_id }} (feature: {{ feature }})'
        - action: script.turn_on
          target:
            entity_id: '{{ follower_enable_script | trim }}'
          data:
            variables: >
              {{ _enable_script_std_fields | combine(_enable_script_valid_args) }}
  # 2. Explicit Disable Script — runs when leader_enabled is false, regardless of value labels
  - if:
    - condition: template
      value_template: '{{ follower_disable_script | trim != "" and not (leader_enabled
        | bool) }}'
    then:
    - if:
      - condition: template
        value_template: '{{ follower_disable_script.startswith(''automation.'') or
          follower_disable_script.startswith(''scene.'') }}'
      then:
      - action: '{{ follower_disable_script | trim }}'
        data: {}
      else:
      - choose:
        # No Arg labels: synchronous call preserving continue_on_error / error propagation
        - conditions:
          - condition: template
            value_template: '{{ _disable_script_args | length == 0 }}'
          sequence:
          - if:
            - condition: template
              value_template: '{{ follower_error_mode != ''stop'' }}'
            then:
            - action: '{{ follower_disable_script | trim }}'
              data: >
                {{ _disable_script_std_fields }}
              continue_on_error: true
            - if:
              - condition: template
                value_template: '{{ error is defined }}'
              then:
              - if:
                - condition: template
                  value_template: '{{ follower_error_mode == ''log'' }}'
                then:
                - action: system_log.write
                  data:
                    level: error
                    message: 'Labeled Feature Follower: error calling disable script {{
                      follower_disable_script }} for {{ follower_entity_id }} (feature:
                      {{ feature_name }}): {{ error }}'
              - if:
                - condition: template
                  value_template: '{{ follower_error_mode == ''alert'' }}'
                then:
                - action: script.send_alert
                  data:
                    alert_severity: high
                    alert_title: Labeled Feature Script Error
                    alert_message: 'Error calling disable script for {{ follower_entity_id
                      }} (feature: {{ feature_name }}): {{ error }}'
            else:
            - action: '{{ follower_disable_script | trim }}'
              data: >
                {{ _disable_script_std_fields }}
        # Arg labels present: async call — 3.1 validate, 3.2 pass std+valid args
        default:
        - if:
          - condition: template
            value_template: '{{ _disable_script_invalid_args | length > 0 and follower_error_mode == "stop" }}'
          then:
          - stop: 'Labeled Feature Follower: Arg field(s) {{ _disable_script_invalid_args }} not declared by {{ follower_disable_script }} (feature: {{ feature }})'
            error: true
        - if:
          - condition: template
            value_template: '{{ _disable_script_invalid_args | length > 0 and follower_error_mode == "log" }}'
          then:
          - action: system_log.write
            data:
              level: warning
              message: 'Labeled Feature Follower: Arg field(s) {{ _disable_script_invalid_args }} not declared by {{ follower_disable_script }} for {{ follower_entity_id }}. Proceeding with valid args only.'
        - if:
          - condition: template
            value_template: '{{ _disable_script_invalid_args | length > 0 and follower_error_mode == "alert" }}'
          then:
          - action: script.send_alert
            data:
              alert_severity: high
              alert_title: Labeled Feature Script Arg Error
              alert_message: 'Arg field(s) {{ _disable_script_invalid_args }} not declared by {{ follower_disable_script }} for {{ follower_entity_id }} (feature: {{ feature }})'
        - action: script.turn_on
          target:
            entity_id: '{{ follower_disable_script | trim }}'
          data:
            variables: >
              {{ _disable_script_std_fields | combine(_disable_script_valid_args) }}
  # 3. Direct value — only when a value label was found AND not in toggle mode
  - if:
    - condition: template
      value_template: '{{ follower_target_value != "" and not follower_toggle }}'
    then:
    - condition: template
      value_template: '{{ states(follower_entity_id) != follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''select'' }}'
      then:
      - action: select.select_option
        target:
          entity_id: '{{ follower_entity_id }}'
        data:
          option: '{{ follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''input_select'' }}'
      then:
      - action: input_select.select_option
        target:
          entity_id: '{{ follower_entity_id }}'
        data:
          option: '{{ follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''number'' }}'
      then:
      - action: number.set_value
        target:
          entity_id: '{{ follower_entity_id }}'
        data:
          value: '{{ follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''input_number'' }}'
      then:
      - action: input_number.set_value
        target:
          entity_id: '{{ follower_entity_id }}'
        data:
          value: '{{ follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''text'' }}'
      then:
      - action: text.set_value
        target:
          entity_id: '{{ follower_entity_id }}'
        data:
          value: '{{ follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''input_text'' }}'
      then:
      - action: input_text.set_value
        target:
          entity_id: '{{ follower_entity_id }}'
        data:
          value: '{{ follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''light'' }}'
      then:
      - if:
        - condition: template
          value_template: '{{ follower_target_value | int(-1) >= 0 }}'
        then:
        - action: light.turn_on
          target:
            entity_id: '{{ follower_entity_id }}'
          data:
            brightness_pct: '{{ [follower_target_value | int(0), 100] | min }}'
  # 4. Default Script — only when no direct value label was found and not in toggle mode
  - if:
    - condition: template
      value_template: '{{ follower_target_value == "" and not follower_toggle and follower_default_script | trim != "" }}'
    then:
    - if:
      - condition: template
        value_template: '{{ follower_default_script.startswith(''automation.'')
          or follower_default_script.startswith(''scene.'') }}'
      then:
      - action: '{{ follower_default_script | trim }}'
        data: {}
      else:
      - choose:
        # No Arg labels: synchronous call preserving continue_on_error / error propagation
        - conditions:
          - condition: template
            value_template: '{{ _default_script_args | length == 0 }}'
          sequence:
          - if:
            - condition: template
              value_template: '{{ follower_error_mode != ''stop'' }}'
            then:
            - action: '{{ follower_default_script | trim }}'
              data: >
                {{ _default_script_std_fields }}
              continue_on_error: true
            - if:
              - condition: template
                value_template: '{{ error is defined }}'
              then:
              - if:
                - condition: template
                  value_template: '{{ follower_error_mode == ''log'' }}'
                then:
                - action: system_log.write
                  data:
                    level: error
                    message: 'Labeled Feature Follower: error calling default script
                      {{ follower_default_script }} for {{ follower_entity_id }} (feature:
                      {{ feature_name }}): {{ error }}'
              - if:
                - condition: template
                  value_template: '{{ follower_error_mode == ''alert'' }}'
                then:
                - action: script.send_alert
                  data:
                    alert_severity: high
                    alert_title: Labeled Feature Script Error
                    alert_message: 'Error calling default script for {{ follower_entity_id
                      }} (feature: {{ feature_name }}): {{ error }}'
            else:
            - action: '{{ follower_default_script | trim }}'
              data: >
                {{ _default_script_std_fields }}
        # Arg labels present: async call — 3.1 validate, 3.2 pass std+valid args
        default:
        - if:
          - condition: template
            value_template: '{{ _default_script_invalid_args | length > 0 and follower_error_mode == "stop" }}'
          then:
          - stop: 'Labeled Feature Follower: Arg field(s) {{ _default_script_invalid_args }} not declared by {{ follower_default_script }} (feature: {{ feature }})'
            error: true
        - if:
          - condition: template
            value_template: '{{ _default_script_invalid_args | length > 0 and follower_error_mode == "log" }}'
          then:
          - action: system_log.write
            data:
              level: warning
              message: 'Labeled Feature Follower: Arg field(s) {{ _default_script_invalid_args }} not declared by {{ follower_default_script }} for {{ follower_entity_id }}. Proceeding with valid args only.'
        - if:
          - condition: template
            value_template: '{{ _default_script_invalid_args | length > 0 and follower_error_mode == "alert" }}'
          then:
          - action: script.send_alert
            data:
              alert_severity: high
              alert_title: Labeled Feature Script Arg Error
              alert_message: 'Arg field(s) {{ _default_script_invalid_args }} not declared by {{ follower_default_script }} for {{ follower_entity_id }} (feature: {{ feature }})'
        - action: script.turn_on
          target:
            entity_id: '{{ follower_default_script | trim }}'
          data:
            variables: >
              {{ _default_script_std_fields | combine(_default_script_valid_args) }}
  # 5. Toggle path — when follower_toggle is true (direct-value labels are skipped above)
  - if:
    - condition: template
      value_template: '{{ follower_toggle }}'
    then:
    - variables:
        _toggle_current_on: >-
          {{ states(follower_entity_id) | lower in
             ['on', 'true', 'home', 'open', 'detected', 'active', 'unlocked'] }}
        _toggle_supported_domains: >-
          {{ ['light', 'switch', 'input_boolean', 'fan', 'cover',
              'media_player', 'climate', 'humidifier', 'siren', 'remote',
              'automation', 'script', 'lock'] }}
        _toggle_unsupported_domains: >-
          {{ ['select', 'input_select', 'number', 'input_number', 'text',
              'input_text', 'scene', 'button', 'event', 'sensor',
              'binary_sensor', 'vacuum'] }}
    - if:
      - condition: template
        value_template: '{{ follower_domain in _toggle_unsupported_domains }}'
      then:
      - if:
        - condition: template
          value_template: '{{ follower_error_mode == "stop" }}'
        then:
        - stop: 'Labeled Feature Follower: toggle not supported for domain {{ follower_domain }} on {{ follower_entity_id }} (feature: {{ feature }})'
          error: true
      - if:
        - condition: template
          value_template: '{{ follower_error_mode == "log" }}'
        then:
        - action: system_log.write
          data:
            level: error
            message: 'Labeled Feature Follower: toggle not supported for domain {{ follower_domain }} on {{ follower_entity_id }} (feature: {{ feature }})'
      - if:
        - condition: template
          value_template: '{{ follower_error_mode == "alert" }}'
        then:
        - action: script.send_alert
          data:
            alert_severity: high
            alert_title: Labeled Feature Toggle Error
            alert_message: 'Toggle not supported for domain {{ follower_domain }} on {{ follower_entity_id }} (feature: {{ feature }})'
    - if:
      - condition: template
        value_template: '{{ follower_domain == "lock" }}'
      then:
      - action: '{{ "lock.unlock" if _toggle_current_on else "lock.lock" }}'
        target:
          entity_id: '{{ follower_entity_id }}'
    - if:
      - condition: template
        value_template: >-
          {{ follower_domain == 'media_player' and
             follower_domain not in _toggle_unsupported_domains }}
      then:
      - variables:
          _mp_supported: '{{ state_attr(follower_entity_id, "supported_features") | int(0) }}'
          _mp_supports_on_off: '{{ _mp_supported | bitwise_and(128) > 0 }}'
          _mp_supports_mute: '{{ _mp_supported | bitwise_and(4) > 0 }}'
      - if:
        - condition: template
          value_template: '{{ _mp_supports_on_off }}'
        then:
        - action: media_player.toggle
          target:
            entity_id: '{{ follower_entity_id }}'
        else:
        - if:
          - condition: template
            value_template: '{{ _mp_supports_mute }}'
          then:
          - action: media_player.volume_mute
            target:
              entity_id: '{{ follower_entity_id }}'
            data:
              is_volume_muted: '{{ not (state_attr(follower_entity_id, "is_volume_muted") | bool(false)) }}'
          else:
          - if:
            - condition: template
              value_template: '{{ follower_error_mode == "stop" }}'
            then:
            - stop: 'Labeled Feature Follower: media_player {{ follower_entity_id }} supports neither on/off nor mute toggle (feature: {{ feature }})'
              error: true
          - if:
            - condition: template
              value_template: '{{ follower_error_mode == "log" }}'
            then:
            - action: system_log.write
              data:
                level: error
                message: 'Labeled Feature Follower: media_player {{ follower_entity_id }} supports neither on/off nor mute toggle (feature: {{ feature }})'
          - if:
            - condition: template
              value_template: '{{ follower_error_mode == "alert" }}'
            then:
            - action: script.send_alert
              data:
                alert_severity: high
                alert_title: Labeled Feature Toggle Error
                alert_message: 'media_player {{ follower_entity_id }} supports neither on/off nor mute toggle (feature: {{ feature }})'
    - if:
      - condition: template
        value_template: >-
          {{ follower_domain in _toggle_supported_domains and
             follower_domain not in ['lock', 'media_player'] }}
      then:
      - action: homeassistant.toggle
        target:
          entity_id: '{{ follower_entity_id }}'
  # 6. Fallback: turn_on/turn_off based on follower_enabled (post-invert)
  #    Only runs when no direct value, no toggle, and no default script handled it.
  - if:
    - condition: template
      value_template: '{{ follower_target_value == "" and not follower_toggle and follower_domain == ''light'' }}'
    then:
    - condition: template
      value_template: "{{ states(follower_entity_id) | lower not in\n   (['on']
        if follower_enabled else ['off']) }}\n"
    - action: 'light.turn_{{ ''on'' if follower_enabled else ''off'' }}

        '
      target:
        entity_id: '{{ follower_entity_id }}'
  - if:
    - condition: template
      value_template: '{{ follower_target_value == "" and not follower_toggle and follower_domain in [''switch'', ''input_boolean''] }}

        '
    then:
    - condition: template
      value_template: "{{ states(follower_entity_id) | lower not in\n   (['on']
        if follower_enabled else ['off']) }}\n"
    - action: '{{ follower_domain }}.turn_{{ ''on'' if follower_enabled else ''off''
        }}

        '
      target:
        entity_id: '{{ follower_entity_id }}'
  - if:
    - condition: template
      value_template: '{{ follower_target_value == "" and not follower_toggle and follower_domain == ''media_player'' }}'
    then:
    - variables:
        mp_supported: '{{ state_attr(follower_entity_id, ''supported_features'')
          | int(0) }}

          '
        mp_supports_on_off: '{{ mp_supported | bitwise_and(128) > 0 }}

          '
        mp_supports_mute: '{{ mp_supported | bitwise_and(4) > 0 }}

          '
    - if:
      - condition: template
        value_template: '{{ mp_supports_on_off }}'
      then:
      - condition: template
        value_template: "{{ states(follower_entity_id) | lower not in\n   (['on',
          'playing', 'idle', 'paused', 'buffering']\n    if follower_enabled else
          ['off', 'unavailable', 'standby']) }}\n"
      - action: 'media_player.turn_{{ ''on'' if follower_enabled else ''off''
          }}

          '
        target:
          entity_id: '{{ follower_entity_id }}'
      else:
      - if:
        - condition: template
          value_template: '{{ mp_supports_mute }}'
        then:
        - condition: template
          value_template: "{{ state_attr(follower_entity_id, 'is_volume_muted')\n
            \  != (not follower_enabled) }}\n"
        - action: media_player.volume_mute
          target:
            entity_id: '{{ follower_entity_id }}'
          data:
            is_volume_muted: '{{ not follower_enabled }}'
  - if:
    - condition: template
      value_template: "{{ follower_target_value == '' and not follower_toggle and follower_domain not in ['light', 'switch', 'input_boolean',\n
        \  'media_player', 'number', 'input_number', 'text',\n   'input_text',
        'select', 'input_select'] }}\n"
    then:
    - condition: template
      value_template: "{{ states(follower_entity_id) | lower not in\n   (['on',
        'true', 'home', 'open', 'detected', 'active', 'unlocked']\n    if follower_enabled
        else\n    ['off', 'false', 'away', 'closed', 'clear', 'inactive', 'locked'])
        }}\n"
    - action: 'homeassistant.turn_{{ ''on'' if follower_enabled else ''off'' }}

        '
      target:
        entity_id: '{{ follower_entity_id }}'

labeled_feature_sleep_timeout:
  alias: Labeled Feature Sleep Timeout
  description: >
    Single-run sleep-timeout script for the Labeled Feature Button system.
    Uses mode: restart so that calling it again (e.g. after any media interaction
    in night mode) resets the full countdown from the beginning.

    Sequence (per the Label Based Features documentation):
      1. Wait sleep_timeout_minutes (default 15 min)
      2. Halve the volume on each area media player
      3. Wait 1 minute
      4. Mute volume
      5. Seek back 30 s every 30 s × 20 iterations (≈ 10 min) — keeps the
         playback position from advancing so the content is still "live" on unmute
      6. Unmute volume
      7. Restore each player to its original volume level

    Call script.turn_on (or homeassistant.turn_on) to start/restart the timer.
    Call homeassistant.turn_off targeting this script to cancel and restore.

    Note: Because mode is restart only one countdown runs at a time per HA instance.
    Create separate label/blueprint configurations for each user who needs
    independent sleep-timeout behaviour.
  mode: restart
  variables:
    # Declared at script top-level so original_volumes is a persistent entity
    # attribute while the script runs.  The Cancel Restore automation reads it
    # from trigger.from_state.attributes.original_volumes on script turn-off.
    original_volumes: {}
  fields:
    area_media_players:
      name: Area Media Players
      description: >
        List of media player entity IDs in the resolved area to fade and mute.
        Passed automatically by labeled_feature_button.
      required: true
      selector:
        object: {}
    sleep_timeout_minutes:
      name: Sleep Timeout Minutes
      description: How long to wait before beginning the fade-out sequence (default 15).
      required: false
      default: 15
      selector:
        number:
          min: 1
          max: 120
  sequence:
    # ── Step 1: Capture original volumes ────────────────────────────────────
    - variables:
        original_volumes: >-
          {% set ns = namespace(d={}) %}
          {% for mp in area_media_players %}
            {% set vol = state_attr(mp, 'volume_level') | float(0.5) %}
            {% set ns.d = dict(ns.d, **{mp: vol}) %}
          {% endfor %}
          {{ ns.d }}

    # ── Step 2: Wait the configured timeout ─────────────────────────────────
    - delay:
        minutes: '{{ sleep_timeout_minutes | default(15) | int }}'

    # ── Step 3: Halve volume on every area media player ─────────────────────
    - repeat:
        for_each: '{{ area_media_players }}'
        sequence:
          - action: media_player.volume_set
            target:
              entity_id: '{{ repeat.item }}'
            data:
              volume_level: >-
                {{ (original_volumes.get(repeat.item, 0.5) / 2) | round(2) }}

    # ── Step 4: Wait 1 minute ────────────────────────────────────────────────
    - delay:
        minutes: 1

    # ── Step 5: Mute ─────────────────────────────────────────────────────────
    - action: media_player.volume_mute
      target:
        entity_id: '{{ area_media_players }}'
      data:
        is_volume_muted: true

    - delay:
        minutes: 1

    # ── Step 6: Seek back 30 s every 30 s × 20 iterations (≈ 10 minutes) ───
    # Keeps the playback position from advancing while muted so the content
    # is still near where it was when the user unmutes / restores.
    - repeat:
        count: 20
        sequence:
          - delay:
              seconds: 30
          - if:
              - condition: template
                value_template: '{{ area_media_players | length > 0 }}'
            then:
              - action: media_player.media_seek
                target:
                  entity_id: '{{ area_media_players | first }}'
                data:
                  seek_position: >-
                    {{ [state_attr(area_media_players | first,
                        'media_position') | float(0) - 30, 0] | max }}

    # ── Step 7: Unmute ────────────────────────────────────────────────────────
    - action: media_player.volume_mute
      target:
        entity_id: '{{ area_media_players }}'
      data:
        is_volume_muted: false

    # ── Step 8: Restore original volumes ─────────────────────────────────────
    - repeat:
        for_each: '{{ area_media_players }}'
        sequence:
          - action: media_player.volume_set
            target:
              entity_id: '{{ repeat.item }}'
            data:
              volume_level: '{{ original_volumes.get(repeat.item, 0.5) }}'


labeled_feature_error_mode:
  alias: Labeled Feature Error Mode
  description: >
    Shared helper for the Labeled Feature system's Error Mode dispatch.
    Handles the silent / log / alert tiers. The `stop` tier is intentionally
    left to the caller: a `stop:` inside this script would only halt this
    helper, not the parent — so callers should follow this call with their
    own `stop: error: true` when `error_mode == "stop"`.
  mode: parallel
  max: 50
  fields:
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
    message:
      name: Message
      description: Human-readable error message describing what went wrong.
      required: true
      selector:
        text:
          multiline: true
    source:
      name: Source
      description: >
        Short label for the calling script, used as a prefix in logs/alerts.
        Examples: 'Labeled Feature Generics', 'Labeled Feature Somrig'.
      required: false
      default: Labeled Feature
      selector:
        text: {}
    severity:
      name: Severity
      description: Severity for the alert tier (low | medium | high).
      required: false
      default: medium
      selector:
        select:
          custom_value: true
          options:
            - low
            - medium
            - high
  sequence:
    - variables:
        _mode: '{{ (error_mode | default("log") | lower) }}'
        _source: '{{ source | default("Labeled Feature") }}'
        _severity: '{{ severity | default("medium") }}'
    - choose:
        - conditions:
            - condition: template
              value_template: '{{ _mode == "silent" }}'
          sequence: []
        - conditions:
            - condition: template
              value_template: '{{ _mode == "log" }}'
          sequence:
            - action: system_log.write
              data:
                level: warning
                message: '{{ _source }}: {{ message }}'
        - conditions:
            - condition: template
              value_template: '{{ _mode == "alert" }}'
          sequence:
            - action: script.send_alert
              data:
                alert_severity: '{{ _severity }}'
                alert_title: '{{ _source }}'
                alert_message: '{{ message }}'
        - conditions:
            - condition: template
              value_template: '{{ _mode == "stop" }}'
          sequence:
            # Log the message as well so there's a record before the parent
            # aborts. The caller is expected to follow up with its own
            # `stop: error: true` to actually halt parent execution.
            - action: system_log.write
              data:
                level: error
                message: '{{ _source }}: {{ message }}'


labeled_feature_generics:
  alias: Labeled Feature Generics
  description: >
    Generic feature dispatcher for the Labeled Feature system. Maps a generic
    feature name (Lights Off, Volume Up, Fan On, Night, …) to a domain-specific
    service call against an entity set resolved by label first, then by the
    feature's domain fallback. Honors `<scope-prefix><Feature> Exclude: True`
    labels on candidate entities to opt them out. Supports a `toggle` modifier
    that swaps the action for a domain toggle where it makes sense.

    Per-feature resolution algorithm:
      1. Build scope_entity_set from scope/scope_id (area/floor) or fall back
         to follower_entity_id / leader_entity_id area lookup.
      2. label_targets = entities labeled `(Area |Floor |)Follower: <Feature>`
         that are in scope_entity_set.
      3. excluded = entities labeled `<scope-prefix><Feature> Exclude: True`.
      4. If (label_targets - excluded) is non-empty → use it.
      5. Else fallback to entities in scope_entity_set whose domain matches
         the feature's default domain, minus excluded.
      6. If still empty and feature has no domain fallback → Error Mode.
      7. Run feature action against final target set.

    See `Label Based Features.md` → "Labeled Feature Generics" for the full
    catalog of supported features.
  mode: parallel
  max: 50
  fields:
    feature:
      name: Feature
      description: >
        Generic feature name (case-sensitive). Examples: 'Lights Off',
        'Volume Up', 'Media Pause', 'Fan On', 'Night'. See Labeled Feature
        Generics docs for the full catalog.
      required: true
      selector:
        select:
          custom_value: true
          options:
            - Media Toggle
            - Media Play
            - Media Pause
            - Media Next
            - Media Previous
            - Media Seek Back
            - Media Seek Forward
            - Volume Up
            - Volume Down
            - Lights On
            - Lights Off
            - Lights Up
            - Lights Down
            - Fan On
            - Fan Off
            - Fan Up
            - Fan Down
            - Ads
            - Night
    scope:
      name: Scope
      description: Scope of the feature (area, floor, or none).
      required: false
      default: area
      selector:
        select:
          options:
            - area
            - floor
            - none
    scope_id:
      name: Scope ID
      description: The resolved area_id or floor_id. Falls back to follower/leader entity area.
      required: false
      default: ''
      selector:
        text: {}
    follower_entity_id:
      name: Follower Entity ID
      description: Used for area fallback when scope_id is empty.
      required: false
      default: ''
      selector:
        entity: {}
    leader_entity_id:
      name: Leader Entity ID
      description: Used for area fallback when follower_entity_id is also empty.
      required: false
      default: ''
      selector:
        entity: {}
    leader_enabled:
      name: Leader Enabled
      description: Pass-through from the leader. Not used directly by generics.
      required: false
      default: true
      selector:
        boolean: {}
    toggle:
      name: Toggle
      description: >
        When true, swap the per-feature action for a domain toggle where it
        makes sense (light/fan/media toggle). For features where toggle is
        not meaningful (Media Next, Volume Up, Seek, …) this triggers Error
        Mode handling.
      required: false
      default: false
      selector:
        boolean: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
    exclude_feature:
      name: Exclude Feature Name
      description: >
        Optional. The feature name used to build the Exclude label
        (`(Area |Floor |)<exclude_feature> Exclude: True`). When not supplied,
        defaults to `feature`. Used by mapping scripts (e.g. labeled_feature_somrig)
        to thread the leader's feature name through dispatched generic calls
        so Exclude is keyed on the leader, not the generic action.
      required: false
      default: ''
      selector:
        text: {}
  sequence:
    # ── Step 1: Resolve scope ids and scope entity set ──────────────────────
    - variables:
        _feature: '{{ feature | trim }}'
        _exclude_feature: >-
          {%- set ef = exclude_feature | default('') | trim -%}
          {{ ef if ef != '' else (feature | trim) }}
        _scope: '{{ (scope | default("area") | lower) }}'
        _toggle: '{{ (toggle | default(false)) | bool(false) }}'
        _err_mode: '{{ (error_mode | default("log") | lower) }}'
        _resolved_area_id: >-
          {%- if _scope == 'area' and scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- elif follower_entity_id is defined and follower_entity_id != '' -%}
            {{ area_id(follower_entity_id) | default('') }}
          {%- elif leader_entity_id is defined and leader_entity_id != '' -%}
            {{ area_id(leader_entity_id) | default('') }}
          {%- else -%}{{ '' }}{%- endif -%}
        _resolved_floor_id: >-
          {%- if _scope == 'floor' and scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- elif _scope == 'floor' and follower_entity_id is defined and follower_entity_id != '' -%}
            {%- set aid = area_id(follower_entity_id) -%}
            {%- set ns = namespace(found='') -%}
            {%- for fid in floors() -%}
              {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
            {%- endfor -%}{{ ns.found }}
          {%- else -%}{{ '' }}{%- endif -%}
    - variables:
        scope_entity_set: >-
          {% if _scope == 'area' and _resolved_area_id != '' %}
            {% set area_ents = area_entities(_resolved_area_id) | list %}
            {% set area_devs = area_devices(_resolved_area_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% elif _scope == 'floor' and _resolved_floor_id != '' %}
            {% set ns = namespace(ents=[]) %}
            {% for a in floor_areas(_resolved_floor_id) %}
              {% set ns.ents = ns.ents + area_entities(a) | list %}
              {% for d in area_devices(a) %}
                {% set ns.ents = ns.ents + device_entities(d) | list %}
              {% endfor %}
            {% endfor %}
            {{ ns.ents | unique | list }}
          {% else %}
            {{ [] }}
          {% endif %}
        scope_prefix: >-
          {{ 'Area ' if _scope == 'area' else ('Floor ' if _scope == 'floor' else '') }}
        follower_label: >-
          {{ ('Area Follower: ' if _scope == 'area' else
              ('Floor Follower: ' if _scope == 'floor' else 'Follower: ')) ~ _feature }}
        exclude_label: '{{ _exclude_feature ~ " Exclude: True" }}'
        scoped_exclude_label: >-
          {{ (('Area ' if _scope == 'area' else
               ('Floor ' if _scope == 'floor' else '')) ~ _exclude_feature) ~ " Exclude: True" }}

    # ── Step 2: Label-based + Exclude resolution ────────────────────────────
    - variables:
        _label_targets_raw: >-
          {% set all_f = label_entities(follower_label) | list %}
          {% if scope_entity_set | length > 0 %}
            {{ all_f | select('in', scope_entity_set) | list }}
          {% else %}
            {{ all_f }}
          {% endif %}
        _excluded: >-
          {% set unscoped = label_entities(exclude_label) | list %}
          {% set scoped = label_entities(scoped_exclude_label) | list %}
          {{ (unscoped + scoped) | unique | list }}
        label_targets: >-
          {{ _label_targets_raw | reject('in', _excluded) | list }}

    # ── Step 3: Feature metadata (domain fallback + selected action) ────────
    - variables:
        feature_meta: >-
          {% set m = {
            'Media Toggle':         {'domain': 'media_player', 'kind': 'media_toggle'},
            'Media Play':           {'domain': 'media_player', 'kind': 'media_play'},
            'Media Pause':          {'domain': 'media_player', 'kind': 'media_pause'},
            'Media Next':           {'domain': 'media_player', 'kind': 'media_next'},
            'Media Previous':       {'domain': 'media_player', 'kind': 'media_previous'},
            'Media Seek Back':      {'domain': 'media_player', 'kind': 'media_seek_back'},
            'Media Seek Forward':   {'domain': 'media_player', 'kind': 'media_seek_forward'},
            'Volume Up':            {'domain': 'media_player', 'kind': 'volume_up'},
            'Volume Down':          {'domain': 'media_player', 'kind': 'volume_down'},
            'Lights On':            {'domain': 'light',        'kind': 'light_on'},
            'Lights Off':           {'domain': 'light',        'kind': 'light_off'},
            'Lights Up':            {'domain': 'light',        'kind': 'light_up'},
            'Lights Down':          {'domain': 'light',        'kind': 'light_down'},
            'Fan On':               {'domain': 'fan',          'kind': 'fan_on'},
            'Fan Off':              {'domain': 'fan',          'kind': 'fan_off'},
            'Fan Up':               {'domain': 'fan',          'kind': 'fan_up'},
            'Fan Down':             {'domain': 'fan',          'kind': 'fan_down'},
            'Ads':                  {'domain': '',             'kind': 'ads'},
            'Night':                {'domain': '',             'kind': 'night'}
          } %}
          {{ m.get(_feature, {'domain': '', 'kind': 'unknown'}) }}

    # ── Step 4: Resolve final target set (label-first, then domain fallback) ─
    - variables:
        _domain_fallback_raw: >-
          {% set dom = feature_meta.domain %}
          {% if dom != '' and scope_entity_set | length > 0 %}
            {{ scope_entity_set
               | select('match', '^' + dom + '\\.')
               | reject('in', _excluded)
               | list }}
          {% else %}
            {{ [] }}
          {% endif %}
        final_targets: >-
          {% if label_targets | length > 0 %}
            {{ label_targets }}
          {% else %}
            {{ _domain_fallback_raw }}
          {% endif %}

    # ── Step 5: Validate target set ─────────────────────────────────────────
    - if:
        - condition: template
          value_template: '{{ final_targets | length == 0 }}'
      then:
        - action: script.labeled_feature_error_mode
          data:
            error_mode: '{{ _err_mode }}'
            source: Labeled Feature Generics
            message: >-
              No target entities resolved for feature '{{ _feature }}' in
              scope '{{ _scope }}' (scope_id={{ scope_id | default('') }}).
        - if:
            - condition: template
              value_template: '{{ _err_mode == "stop" }}'
          then:
            - stop: >-
                Labeled Feature Generics: no targets for '{{ _feature }}'.
              error: true
        - stop: 'No targets resolved (handled per error_mode).'

    # ── Step 6: Toggle modifier — short-circuit per-domain ──────────────────
    - if:
        - condition: template
          value_template: '{{ _toggle }}'
      then:
        - choose:
            # Light domain → light.toggle
            - conditions:
                - condition: template
                  value_template: '{{ feature_meta.domain == "light" }}'
              sequence:
                - action: light.toggle
                  target:
                    entity_id: '{{ final_targets }}'
            # Fan domain → fan.toggle
            - conditions:
                - condition: template
                  value_template: '{{ feature_meta.domain == "fan" }}'
              sequence:
                - action: fan.toggle
                  target:
                    entity_id: '{{ final_targets }}'
            # Media play/pause family → media_player.media_play_pause
            - conditions:
                - condition: template
                  value_template: >-
                    {{ feature_meta.kind in ['media_toggle','media_play','media_pause'] }}
              sequence:
                - action: media_player.media_play_pause
                  target:
                    entity_id: '{{ final_targets }}'
            # Ads / Night → homeassistant.toggle (toggle flag is a no-op)
            - conditions:
                - condition: template
                  value_template: '{{ feature_meta.kind in ["ads","night"] }}'
              sequence:
                - action: homeassistant.toggle
                  target:
                    entity_id: '{{ final_targets }}'
          default:
            - action: script.labeled_feature_error_mode
              data:
                error_mode: '{{ _err_mode }}'
                source: Labeled Feature Generics
                message: >-
                  Feature '{{ _feature }}' does not support the toggle modifier.
            - if:
                - condition: template
                  value_template: '{{ _err_mode == "stop" }}'
              then:
                - stop: >-
                    Labeled Feature Generics: invalid toggle for '{{ _feature }}'.
                  error: true
        - stop: 'Toggle path complete.'

    # ── Step 7: Non-toggle dispatch by feature kind ─────────────────────────
    - choose:
        # ── Media: simple service-call features ─────────────────────────────
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_toggle" }}'
          sequence:
            - action: media_player.media_play_pause
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_play" }}'
          sequence:
            - action: media_player.media_play
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_pause" }}'
          sequence:
            - action: media_player.media_pause
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_next" }}'
          sequence:
            - action: media_player.media_next_track
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_previous" }}'
          sequence:
            - action: media_player.media_previous_track
              target:
                entity_id: '{{ final_targets }}'

        # ── Media: seek (operates on first entity only) ─────────────────────
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_seek_back" }}'
          sequence:
            - action: media_player.media_seek
              target:
                entity_id: '{{ final_targets | first }}'
              data:
                seek_position: >-
                  {{ [state_attr(final_targets | first, 'media_position')
                      | float(0) - 30, 0] | max }}
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_seek_forward" }}'
          sequence:
            - action: media_player.media_seek
              target:
                entity_id: '{{ final_targets | first }}'
              data:
                seek_position: >-
                  {{ state_attr(final_targets | first, 'media_position')
                     | float(0) + 30 }}

        # ── Volume ──────────────────────────────────────────────────────────
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "volume_up" }}'
          sequence:
            - action: media_player.volume_up
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "volume_down" }}'
          sequence:
            - action: media_player.volume_down
              target:
                entity_id: '{{ final_targets }}'

        # ── Lights ──────────────────────────────────────────────────────────
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "light_on" }}'
          sequence:
            - action: light.turn_on
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "light_off" }}'
          sequence:
            - action: light.turn_off
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "light_up" }}'
          sequence:
            - action: light.turn_on
              target:
                entity_id: '{{ final_targets }}'
              data:
                brightness_step_pct: 10
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "light_down" }}'
          sequence:
            - action: light.turn_on
              target:
                entity_id: '{{ final_targets }}'
              data:
                brightness_step_pct: -10

        # ── Fan ─────────────────────────────────────────────────────────────
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "fan_on" }}'
          sequence:
            - action: fan.turn_on
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "fan_off" }}'
          sequence:
            - action: fan.turn_off
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "fan_up" }}'
          sequence:
            - action: fan.increase_speed
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "fan_down" }}'
          sequence:
            - action: fan.decrease_speed
              target:
                entity_id: '{{ final_targets }}'

        # ── Ads / Night ─────────────────────────────────────────────────────
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind in ["ads","night"] }}'
          sequence:
            - action: homeassistant.toggle
              target:
                entity_id: '{{ final_targets }}'

      default:
        # Unknown feature kind → helper + optional stop
        - action: script.labeled_feature_error_mode
          data:
            error_mode: '{{ _err_mode }}'
            source: Labeled Feature Generics
            message: "Unknown feature '{{ _feature }}'."
        - if:
            - condition: template
              value_template: '{{ _err_mode == "stop" }}'
          then:
            - stop: "Labeled Feature Generics: unknown feature '{{ _feature }}'."
              error: true


labeled_feature_somrig:
  alias: Labeled Feature Somrig
  description: >
    Maps IKEA Somrig (and other 2-button) device events into one or more calls
    to `script.labeled_feature_generics`. Reads the raw button event from the
    `feature` field (e.g. '1_short_release', '2_double_press'); also accepts
    `dots_N_*` (IKEA E2123) variants by stripping the 'dots_' prefix.

    Only canonical "user did the thing" events are tracked:
      *_short_release, *_double_press, *_long_press
    All other events (initial_press, long_release, etc.) are ignored.

    Contextual state: only `media_playing` (computed by inspecting
    media_player entities in the resolved area) is used to pick between the
    Playing and Not-Playing branches of the mapping table. Night-mode and
    sleep-timeout behavior live as their own generic features (`Night`).

    Event → generic-feature mapping:
      1_short_release  Playing: Lights Off + Media Pause   Not Playing: Lights Off
      2_short_release  Playing: Media Pause                Not Playing: Media Play
      1_double_press   Playing: Media Seek Back            Not Playing: Fan On (toggle:true)
      2_double_press   Playing: Media Seek Forward         Not Playing: Night
      1_long_press     Playing: Volume Up                  Not Playing: Lights Up
      2_long_press     Playing: Volume Down                Not Playing: Ads
  mode: parallel
  max: 50
  fields:
    feature:
      name: Feature (Button Event)
      description: >
        The raw button event string from the button entity, e.g.
        '1_short_release', '2_double_press', '1_long_press', or the
        'dots_'-prefixed variants for IKEA E2123.
      required: true
      selector:
        select:
          custom_value: true
          options:
            - 1_short_release
            - 1_double_press
            - 1_long_press
            - 2_short_release
            - 2_double_press
            - 2_long_press
            - dots_1_short_release
            - dots_1_double_press
            - dots_1_long_press
            - dots_2_short_release
            - dots_2_double_press
            - dots_2_long_press
    follower_entity_id:
      name: Follower Entity ID
      description: Used for area lookup. Passed automatically by labeled_feature_follower.
      required: false
      default: ''
      selector:
        entity: {}
    leader_entity_id:
      name: Leader Entity ID (the button)
      description: Used as fallback for area lookup.
      required: false
      default: ''
      selector:
        entity: {}
    leader_enabled:
      name: Leader Enabled
      description: Pass-through from the leader. Not used directly by the somrig mapping.
      required: false
      default: true
      selector:
        boolean: {}
    leader_feature:
      name: Leader Feature Name
      description: >
        The leader's labeled feature name (e.g. 'Night Buttons'), passed by the
        leader automation alongside `feature`. Used for Exclude resolution:
        entities labeled `(Area |Floor |)<leader_feature> Exclude: True` are
        excluded from both the `media_playing` evaluation and every downstream
        labeled_feature_generics call dispatched from here.
      required: false
      default: ''
      selector:
        text: {}
    toggle:
      name: Toggle
      description: >
        Pass-through toggle flag from the leader. Forwarded to every
        labeled_feature_generics call. The 1_double_press Not-Playing
        branch always overrides this with toggle:true (fan toggle).
      required: false
      default: false
      selector:
        boolean: {}
    scope:
      name: Scope
      description: Scope of the feature (area, floor, or none).
      required: false
      default: area
      selector:
        select:
          options:
            - area
            - floor
            - none
    scope_id:
      name: Scope ID
      description: The resolved area_id or floor_id passed by the automation.
      required: false
      default: ''
      selector:
        text: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
  sequence:
    # ── Step 1: Resolve scope + scope entity set + Exclude set ──────────────
    - variables:
        _scope: '{{ (scope | default("area") | lower) }}'
        _toggle_in: '{{ (toggle | default(false)) | bool(false) }}'
        _err_mode: '{{ (error_mode | default("log") | lower) }}'
        _leader_feature: '{{ leader_feature | default("") | trim }}'
        _resolved_area_id: >-
          {%- if _scope == 'area' and scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- elif follower_entity_id is defined and follower_entity_id != '' -%}
            {{ area_id(follower_entity_id) | default('') }}
          {%- elif leader_entity_id is defined and leader_entity_id != '' -%}
            {{ area_id(leader_entity_id) | default('') }}
          {%- else -%}{{ '' }}{%- endif -%}
        _resolved_floor_id: >-
          {%- if _scope == 'floor' and scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- elif _scope == 'floor' and follower_entity_id is defined and follower_entity_id != '' -%}
            {%- set aid = area_id(follower_entity_id) -%}
            {%- set ns = namespace(found='') -%}
            {%- for fid in floors() -%}
              {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
            {%- endfor -%}{{ ns.found }}
          {%- elif _scope == 'floor' and leader_entity_id is defined and leader_entity_id != '' -%}
            {%- set aid = area_id(leader_entity_id) -%}
            {%- set ns = namespace(found='') -%}
            {%- for fid in floors() -%}
              {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
            {%- endfor -%}{{ ns.found }}
          {%- else -%}{{ '' }}{%- endif -%}
    - variables:
        # Scope entity set (mirrors labeled_feature_generics) — for both the
        # media_playing signal and informational use. We compute it for area
        # and floor; for `none` we fall back to the leader's area.
        scope_entity_set: >-
          {% if _scope == 'area' and _resolved_area_id != '' %}
            {% set area_ents = area_entities(_resolved_area_id) | list %}
            {% set area_devs = area_devices(_resolved_area_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% elif _scope == 'floor' and _resolved_floor_id != '' %}
            {% set ns = namespace(ents=[]) %}
            {% for a in floor_areas(_resolved_floor_id) %}
              {% set ns.ents = ns.ents + area_entities(a) | list %}
              {% for d in area_devices(a) %}
                {% set ns.ents = ns.ents + device_entities(d) | list %}
              {% endfor %}
            {% endfor %}
            {{ ns.ents | unique | list }}
          {% elif _resolved_area_id != '' %}
            {% set area_ents = area_entities(_resolved_area_id) | list %}
            {% set area_devs = area_devices(_resolved_area_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% else %}
            {{ [] }}
          {% endif %}
        # Exclude labels keyed on the leader's feature name. Same shape as in
        # labeled_feature_generics: bare `<feature> Exclude: True` and scoped
        # `(Area |Floor |)<feature> Exclude: True`.
        _exclude_unscoped_label: '{{ _leader_feature ~ " Exclude: True" }}'
        _exclude_scoped_label: >-
          {{ (('Area ' if _scope == 'area' else
               ('Floor ' if _scope == 'floor' else '')) ~ _leader_feature) ~ " Exclude: True" }}
    - variables:
        excluded_entities: >-
          {% if _leader_feature == '' %}
            {{ [] }}
          {% else %}
            {% set unscoped = label_entities(_exclude_unscoped_label) | list %}
            {% set scoped = label_entities(_exclude_scoped_label) | list %}
            {% set all_excl = (unscoped + scoped) | unique | list %}
            {% if scope_entity_set | length > 0 %}
              {{ all_excl | select('in', scope_entity_set) | list }}
            {% else %}
              {{ all_excl }}
            {% endif %}
          {% endif %}
        media_playing: >-
          {% set mp_in_scope = states.media_player
               | rejectattr('entity_id', 'in', excluded_entities)
               | list %}
          {% if scope_entity_set | length > 0 %}
            {{ mp_in_scope
               | selectattr('entity_id', 'in', scope_entity_set)
               | selectattr('state', 'in', ['playing', 'buffering'])
               | list | count > 0 }}
          {% elif _resolved_area_id != '' %}
            {{ mp_in_scope
               | selectattr('entity_id', 'in', area_entities(_resolved_area_id))
               | selectattr('state', 'in', ['playing', 'buffering'])
               | list | count > 0 }}
          {% else %}
            false
          {% endif %}
        # Strip the dots_ prefix so both device families share the same
        # branches below.
        mapped_event: >-
          {{ (feature | trim) | regex_replace('^dots_', '') }}

    # ── Step 2: Branch by event + media_playing ─────────────────────────────
    - choose:
        # ────────────── 1_short_release ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "1_short_release" }}'
          sequence:
            - if:
                - condition: template
                  value_template: '{{ media_playing }}'
              then:
                - action: script.labeled_feature_generics
                  data:
                    feature: Lights Off
                    exclude_feature: '{{ _leader_feature }}'
                    scope: '{{ _scope }}'
                    scope_id: '{{ scope_id | default("") }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: '{{ _toggle_in }}'
                    error_mode: '{{ _err_mode }}'
                - action: script.labeled_feature_generics
                  data:
                    feature: Media Pause
                    exclude_feature: '{{ _leader_feature }}'
                    scope: '{{ _scope }}'
                    scope_id: '{{ scope_id | default("") }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: '{{ _toggle_in }}'
                    error_mode: '{{ _err_mode }}'
              else:
                - action: script.labeled_feature_generics
                  data:
                    feature: Lights Off
                    exclude_feature: '{{ _leader_feature }}'
                    scope: '{{ _scope }}'
                    scope_id: '{{ scope_id | default("") }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: '{{ _toggle_in }}'
                    error_mode: '{{ _err_mode }}'

        # ────────────── 2_short_release ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "2_short_release" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: '{{ "Media Pause" if media_playing else "Media Play" }}'
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── 1_double_press ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "1_double_press" }}'
          sequence:
            - if:
                - condition: template
                  value_template: '{{ media_playing }}'
              then:
                - action: script.labeled_feature_generics
                  data:
                    feature: Media Seek Back
                    exclude_feature: '{{ _leader_feature }}'
                    scope: '{{ _scope }}'
                    scope_id: '{{ scope_id | default("") }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: '{{ _toggle_in }}'
                    error_mode: '{{ _err_mode }}'
              else:
                # Fan toggle: force toggle:true regardless of caller-passed value
                - action: script.labeled_feature_generics
                  data:
                    feature: Fan On
                    exclude_feature: '{{ _leader_feature }}'
                    scope: '{{ _scope }}'
                    scope_id: '{{ scope_id | default("") }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: true
                    error_mode: '{{ _err_mode }}'

        # ────────────── 2_double_press ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "2_double_press" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: '{{ "Media Seek Forward" if media_playing else "Night" }}'
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── 1_long_press ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "1_long_press" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: '{{ "Volume Up" if media_playing else "Lights Up" }}'
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── 2_long_press ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "2_long_press" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: '{{ "Volume Down" if media_playing else "Ads" }}'
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'
