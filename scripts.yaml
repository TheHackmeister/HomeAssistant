boards_update_recurring_tasks:
  sequence:
  - action: rest_command.get_board_swimlanes
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_swimlanes
  - variables:
      today_swimlane_match: '{{ all_swimlanes.content | selectattr(''title'', ''eq'',
        swimlane_name) | list }}

        '
      today_swimlaneId: '{{ today_swimlane_match[0]._id if today_swimlane_match |
        length > 0 else '''' }}

        '
  - if:
    - condition: template
      value_template: '{{ today_swimlaneId == "" }}'
    then:
    - action: system_log.write
      metadata: {}
      data:
        level: error
        message: 'Could not find swimlane: {{ swimlane_name }}'
    - stop: ''
  - action: rest_command.get_board_lists
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_lists
  - action: rest_command.get_board_labels
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_labels
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ today_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: today_cards
  - if:
    - condition: template
      value_template: '{{ today_cards.content | count == 0 }}'
    then:
    - action: persistent_notification.create
      metadata: {}
      data:
        message: No cards found in {{ swimlane_name }} swimlane
    - stop: ''
  - repeat:
      sequence:
      - variables:
          card_list_match: '{{ all_lists.content | selectattr(''_id'', ''eq'', repeat.item.listId)
            | list }}

            '
          card_list_title: '{{ card_list_match[0].title if card_list_match | length
            > 0 else '''' }}

            '
      - if:
        - condition: template
          value_template: '{{ card_list_title == "Inbox/Reset" }}'
        then:
        - if:
          - condition: template
            value_template: '{{ repeat.item.labelIds is defined and repeat.item.labelIds
              | length > 0 }}'
          then:
          - variables:
              card_labels: "{% set label_names = [] %} {% for label_id in repeat.item.labelIds
                %}\n  {% set label = all_labels.content | selectattr('_id', 'eq',
                label_id) | list %}\n  {% if label | length > 0 %}\n    {% set _ =
                label_names.append(label[0].name | lower) %}\n  {% endif %}\n{% endfor
                %} {{ label_names }}\n"
              has_weekly: '{{ ''weekly'' in card_labels }}

                '
              has_bi_weekly: '{{ ''bi-weekly'' in card_labels }}

                '
              has_monthly: '{{ ''monthly'' in card_labels }}

                '
              has_quarterly: '{{ ''quarterly'' in card_labels }}

                '
              has_bi_quarterly: '{{ ''bi-quarterly'' in card_labels }}

                '
              has_yearly: '{{ ''yearly'' in card_labels }}

                '
              has_bi_yearly: '{{ ''bi-yearly'' in card_labels }}

                '
              has_annually: '{{ ''annually'' in card_labels }}

                '
          - variables:
              new_due_date: "{% if has_weekly %}\n  {{ (now() + timedelta(weeks=1)).isoformat()
                }}\n{% elif has_bi_weekly %}\n  {{ (now() + timedelta(weeks=2)).isoformat()
                }}\n{% elif has_monthly %}\n  {{ (now() + timedelta(days=30)).isoformat()
                }}\n{% elif has_quarterly %}\n  {{ (now() + timedelta(days=90)).isoformat()
                }}\n{% elif has_yearly %}\n  {{ (now() + timedelta(days=365)).isoformat()
                }}\n{% elif has_bi_monthly %}\n  {{ (now() + timedelta(days=60)).isoformat()
                }}\n{% elif has_bi_quarterly %}\n  {{ (now() + timedelta(days=180)).isoformat()
                }}\n{% elif has_bi_yearly %}\n  {{ (now() + timedelta(days=365)).isoformat()
                }}\n{% elif has_annually %}\n  {% if repeat.item.dueAt is defined
                and repeat.item.dueAt != None %}\n    {{ (as_datetime(repeat.item.dueAt)
                + timedelta(days=365)).isoformat() }}\n  {% else %}\n    {{ (now()
                + timedelta(days=365)).isoformat() }}\n  {% endif %}\n{% else %}\n
                \ \n{% endif %}\n"
              recurrence_type: "{% if has_weekly %}\n  weekly\n{% elif has_monthly
                %}\n  monthly\n{% elif has_quarterly %}\n  quarterly\n{% elif has_yearly
                %}\n  yearly\n{% elif has_bi_weekly %}\n  bi-weekly\n{% elif has_bi_monthly
                %}\n  bi-monthly\n{% elif has_bi_quarterly %}\n  bi-quarterly\n{%
                elif has_bi_yearly %}\n  bi-yearly\n{% elif has_annually %}\n  annually\n{%
                else %}\n  none\n{% endif %}\n"
          - if:
            - condition: template
              value_template: '{{ recurrence_type != "none" }}'
            then:
            - action: system_log.write
              metadata: {}
              data:
                level: info
                message: 'Updating {{ recurrence_type }} recurring task "{{ repeat.item.title
                  }}" with new due date: {{ new_due_date }}'
            - action: rest_command.update_card_due_date
              metadata: {}
              data:
                cardId: '{{ repeat.item._id }}'
                listId: '{{ repeat.item.listId }}'
                boardId: '{{ boardId }}'
                dueAt: '{{ new_due_date }}'
              response_variable: update_result
      for_each: '{{ today_cards.content }}'
  alias: 'Boards: Update Recurring Tasks'
  description: Updates due dates for recurring tasks based on their labels
  fields:
    boardId:
      selector:
        text:
      name: boardId
      description: Board ID
      default: TrfngHQf8PWj9mnqC
      required: false
    swimlane_name:
      selector:
        text:
      name: Swimlane Name
      description: Name of the swimlane to check
      default: Today
      required: true
