            |  map(attribute=''state'') | list | first == "Timed" }}'
          enabled: true
      then:
      - action: script.dose_house_plants
        metadata: {}
        data:
          area_id: water_supply_01
          units: 1
        enabled: true
      enabled: true
    - if:
      - condition: or
        conditions:
        - condition: and
          conditions:
          - condition: template
            value_template: '{{ dose_timed_out }}'
            enabled: true
          - condition: template
            value_template: '{{ states | selectattr("entity_id", ''in'', area_entities(
