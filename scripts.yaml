boards_move_future_cards_to_default:
  sequence:
  # Get all swimlanes to find the specified swimlanes by name
  - action: rest_command.get_board_swimlanes
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_swimlanes
  
  # Find the swimlane IDs by name
  - variables:
      from_swimlane_match: >
        {{ all_swimlanes.content | selectattr('title', 'eq', from_swimlane_name) | list }}
      from_swimlaneId: >
        {{ from_swimlane_match[0]._id if from_swimlane_match | length > 0 else '' }}
      to_swimlane_match: >
        {{ all_swimlanes.content | selectattr('title', 'eq', to_swimlane_name) | list }}
      to_swimlaneId: >
        {{ to_swimlane_match[0]._id if to_swimlane_match | length > 0 else '' }}
  
  # Validate we found both swimlanes
  - if:
    - condition: template
      value_template: '{{ from_swimlaneId == "" or to_swimlaneId == "" }}'
    then:
    - action: system_log.write
      metadata: {}
      data:
        level: error
        message: 'Could not find required swimlanes. {{ from_swimlane_name }}: {{ from_swimlaneId }}, {{ to_swimlane_name }}: {{ to_swimlaneId }}'
    - stop: ''
  
  # Get all lists to have title lookup
  - action: rest_command.get_board_lists
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_lists
  
  # Get cards from source swimlane
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ from_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: from_cards
  
  # Get cards from target swimlane to discover which list IDs exist there
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ to_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: to_cards
  
  - if:
    - condition: template
      value_template: '{{ from_cards.content | count == 0 }}'
    then:
    - action: persistent_notification.create
      metadata: {}
      data:
        message: 'No cards found in {{ from_swimlane_name }} swimlane'
  
  - repeat:
      sequence:
      # First check if this card is in the "Inbox/Reset" list
      - variables:
          card_list_match: >
            {{ all_lists.content | selectattr('_id', 'eq', repeat.item.listId) | list }}
          card_list_title: >
            {{ card_list_match[0].title if card_list_match | length > 0 else '' }}
      
      # Only process cards in "Inbox/Reset" list with future dates
      - if:
        - condition: template
          value_template: '{{ card_list_title == "Inbox/Reset" }}'
        then:
        - if:
          # Check if card has a future start date OR future due date
          - condition: template
            value_template: >
              {{ (repeat.item.startAt is defined and as_datetime(repeat.item.startAt) > now()) or
                 (repeat.item.dueAt is defined and repeat.item.dueAt != None and as_datetime(repeat.item.dueAt) > now()) }}
          then:
          - action: system_log.write
            metadata: {}
            data:
              level: warning
              message: 'Moving future card to {{ to_swimlane_name }}: {{ repeat.item.title }}'
            enabled: true
          
          # Find the "Inbox/Reset" list in the target swimlane
          - variables:
              to_list_ids_in_swimlane: >
                {{ to_cards.content | map(attribute='listId') | unique | list }}
              target_inbox_match: >
                {{ all_lists.content | selectattr('_id', 'in', to_list_ids_in_swimlane) | selectattr('title', 'eq', 'Inbox/Reset') | list }}
              target_inbox_id: >
                {{ target_inbox_match[0]._id if target_inbox_match | length > 0 else '' }}
          
          - if:
            - condition: template
              value_template: '{{ target_inbox_id != "" }}'
            then:
            - action: rest_command.move_card_to_swimlane
              metadata: {}
              data:
                cardId: '{{ repeat.item._id }}'
                listId: '{{ repeat.item.listId }}'
                boardId: '{{ boardId }}'
                swimlaneId: '{{ to_swimlaneId }}'
                newListId: '{{ target_inbox_id }}'
              response_variable: move_result
            else:
            - action: system_log.write
              metadata: {}
              data:
                level: error
                message: 'Cannot move card "{{ repeat.item.title }}": No Inbox/Reset list found in {{ to_swimlane_name }} swimlane'
      for_each: '{{ from_cards.content }}'
  
  alias: 'Boards: Move Future Cards to Default Inbox'
  description: 'Moves cards with future dates from one swimlane Inbox to another'
  fields:
    boardId:
      selector:
        text:
      name: boardId
      description: Board ID
      default: TrfngHQf8PWj9mnqC
      required: false
    from_swimlane_name:
      selector:
        text:
      name: From Swimlane Name
      description: Name of the source swimlane (e.g., "Today")
      default: Today
      required: true
    to_swimlane_name:
      selector:
        text:
      name: To Swimlane Name
      description: Name of the destination swimlane (e.g., "Default")
      default: Default
      required: true
boards_archive_past_unlabeled_tasks:
  sequence:
  - action: rest_command.get_board_swimlanes
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_swimlanes
  - variables:
      today_swimlane_match: '{{ all_swimlanes.content | selectattr(''title'', ''eq'',
        swimlane_name) | list }}

