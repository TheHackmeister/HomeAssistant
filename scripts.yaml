              retain: true
              payload: "{ \"~\": \"{{ device_topic }}\",\n  \"dev\": {\n    \"ids\":
                [\"{{ device_name }}\"],\n    \"name\": \"{{ friendly_name }}\",\n
                \   \"manufacturer\": \"Calibration Step\",\n    \"suggested_area\":
                \"{{ area_id }}\"\n  },\n  \"name\": \"Calibration Step\",\n  \"uniq_id\":
                \"{{ device_name }}_calibration_step\",\n  \"object_id\": \"{{ device_name
                }}_calibration_step\",\n  \"mode\": \"box\",\n  \"min\": \"0\",\n
                \ \"max\": \"10000000\",      \n  \"cmd_t\": \"~/calibration_step\",
                \     \n  \"stat_t\": \"~/calibration_step\",\n  \"retain\": true\n}\n"
            enabled: false
