  alias: 'Boards: Archive Past Unlabeled Tasks'
  description: Archives cards with no labels and past due dates from Today Inbox
  fields:
    boardId:
      selector:
        text:
      name: boardId
      description: Board ID
      default: TrfngHQf8PWj9mnqC
      required: false
    swimlane_name:
