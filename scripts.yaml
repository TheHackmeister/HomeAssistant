  # === Dynamic Arg Label System + Argument Substitutions ===
  # Collects FEATURE (Enable|Disable) Arg FIELD: value labels from the follower entity.
  # Values matching [root].[key].[field] are substituted from sensor.labeled_features_state.
  # Without Arg labels the original synchronous call path (with error propagation) runs.
  # With Arg labels scripts are called asynchronously via script.turn_on with variables
  # (the only HA-native way to pass dynamic key names to a script at runtime).
  - variables:
      _enable_script_args: >-
        {% set ns = namespace(d={}) %}
        {% set lf_leaders = state_attr('sensor.labeled_features_state', 'leaders') | default({}) %}
        {% set lf_features = state_attr('sensor.labeled_features_state', 'features') | default({}) %}
        {% for lbl in follower_label_names_original %}
        {% if lbl | lower | regex_search('^' + feature_name + ' enable arg [^:]+:') %}
        {% set field = lbl | regex_replace('(?i)^.+ enable arg ([^:]+): .*$', '\\1') | trim %}
        {% set raw = lbl | regex_replace('^[^:]*: ', '') | trim %}
        {% if raw | regex_search('^\[[^\]]+\]\.\[[^\]]+\]\.\[[^\]]+\]$') %}
        {% set root = raw | regex_replace('^\[([^\]]+)\].*$', '\\1') %}
        {% set key = raw | regex_replace('^\[[^\]]+\]\.\[([^\]]+)\].*$', '\\1') %}
        {% set fld = raw | regex_replace('^.*\.\[([^\]]+)\]$', '\\1') %}
        {% if root == 'features' %}{% set ns.d = dict(ns.d, **{field: lf_features.get(key, {}).get(fld, raw) | string}) %}
        {% elif root == 'leaders' %}{% set ns.d = dict(ns.d, **{field: lf_leaders.get(key, {}).get(fld, raw) | string}) %}
        {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif %}
        {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif %}
        {% endif %}{% endfor %}
        {{ ns.d }}
      _disable_script_args: >-
        {% set ns = namespace(d={}) %}
        {% set lf_leaders = state_attr('sensor.labeled_features_state', 'leaders') | default({}) %}
        {% set lf_features = state_attr('sensor.labeled_features_state', 'features') | default({}) %}
        {% for lbl in follower_label_names_original %}
        {% if lbl | lower | regex_search('^' + feature_name + ' disable arg [^:]+:') %}
        {% set field = lbl | regex_replace('(?i)^.+ disable arg ([^:]+): .*$', '\\1') | trim %}
        {% set raw = lbl | regex_replace('^[^:]*: ', '') | trim %}
        {% if raw | regex_search('^\[[^\]]+\]\.\[[^\]]+\]\.\[[^\]]+\]$') %}
        {% set root = raw | regex_replace('^\[([^\]]+)\].*$', '\\1') %}
        {% set key = raw | regex_replace('^\[[^\]]+\]\.\[([^\]]+)\].*$', '\\1') %}
        {% set fld = raw | regex_replace('^.*\.\[([^\]]+)\]$', '\\1') %}
        {% if root == 'features' %}{% set ns.d = dict(ns.d, **{field: lf_features.get(key, {}).get(fld, raw) | string}) %}
        {% elif root == 'leaders' %}{% set ns.d = dict(ns.d, **{field: lf_leaders.get(key, {}).get(fld, raw) | string}) %}
        {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif %}
        {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif %}
        {% endif %}{% endfor %}
        {{ ns.d }}
      _default_script_args: >-
        {% set ns = namespace(d={}) %}
        {% set lf_leaders = state_attr('sensor.labeled_features_state', 'leaders') | default({}) %}
        {% set lf_features = state_attr('sensor.labeled_features_state', 'features') | default({}) %}
        {% for lbl in follower_label_names_original %}
        {% set lbl_lower = lbl | lower %}
        {% if lbl_lower | regex_search('^' + feature_name + ' arg [^:]+:')
        and not lbl_lower | regex_search('^' + feature_name + ' (enable|disable) arg ') %}
        {% set field = lbl | regex_replace('(?i)^.+ arg ([^:]+): .*$', '\\1') | trim %}
        {% set raw = lbl | regex_replace('^[^:]*: ', '') | trim %}
        {% if raw | regex_search('^\[[^\]]+\]\.\[[^\]]+\]\.\[[^\]]+\]$') %}
        {% set root = raw | regex_replace('^\[([^\]]+)\].*$', '\\1') %}
        {% set key = raw | regex_replace('^\[[^\]]+\]\.\[([^\]]+)\].*$', '\\1') %}
        {% set fld = raw | regex_replace('^.*\.\[([^\]]+)\]$', '\\1') %}
        {% if root == 'features' %}{% set ns.d = dict(ns.d, **{field: lf_features.get(key, {}).get(fld, raw) | string}) %}
        {% elif root == 'leaders' %}{% set ns.d = dict(ns.d, **{field: lf_leaders.get(key, {}).get(fld, raw) | string}) %}
        {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif %}
        {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif %}
        {% endif %}{% endfor %}
        {{ ns.d }}
  # === 3.1/3.2: Field-inspection helpers — validate Arg names + conditionally include std fields ===
  - variables:
      _enable_script_fields: >-
        {% if follower_enable_script | trim != "" %}{{ state_attr(follower_enable_script | trim, 'fields') | default({}) }}{% else %}{{ {} }}{% endif %}
      _enable_script_std_fields: >-
        {% set sf = _enable_script_fields %}{% set ns = namespace(d={}) %}{% for k, v in {'follower_entity_id': follower_entity_id, 'feature': feature, 'leader_entity_id': leader_entity_id, 'leader_enabled': leader_enabled, 'scope': scope, 'scope_id': scope_id}.items() %}{% if k in sf %}{% set ns.d = dict(ns.d, **{k: v}) %}{% endif %}{% endfor %}{{ ns.d }}
      _enable_script_invalid_args: >-
        {% set sf = _enable_script_fields %}{% set ns = namespace(inv=[]) %}{% for k in _enable_script_args.keys() %}{% if k not in sf %}{% set ns.inv = ns.inv + [k] %}{% endif %}{% endfor %}{{ ns.inv }}
      _enable_script_valid_args: >-
        {% set sf = _enable_script_fields %}{% set ns = namespace(d={}) %}{% for k, v in _enable_script_args.items() %}{% if k in sf %}{% set ns.d = dict(ns.d, **{k: v}) %}{% endif %}{% endfor %}{{ ns.d }}
      _disable_script_fields: >-
        {% if follower_disable_script | trim != "" %}{{ state_attr(follower_disable_script | trim, 'fields') | default({}) }}{% else %}{{ {} }}{% endif %}
      _disable_script_std_fields: >-
        {% set sf = _disable_script_fields %}{% set ns = namespace(d={}) %}{% for k, v in {'follower_entity_id': follower_entity_id, 'feature': feature, 'leader_entity_id': leader_entity_id, 'leader_enabled': leader_enabled, 'scope': scope, 'scope_id': scope_id}.items() %}{% if k in sf %}{% set ns.d = dict(ns.d, **{k: v}) %}{% endif %}{% endfor %}{{ ns.d }}
      _disable_script_invalid_args: >-
        {% set sf = _disable_script_fields %}{% set ns = namespace(inv=[]) %}{% for k in _disable_script_args.keys() %}{% if k not in sf %}{% set ns.inv = ns.inv + [k] %}{% endif %}{% endfor %}{{ ns.inv }}
      _disable_script_valid_args: >-
        {% set sf = _disable_script_fields %}{% set ns = namespace(d={}) %}{% for k, v in _disable_script_args.items() %}{% if k in sf %}{% set ns.d = dict(ns.d, **{k: v}) %}{% endif %}{% endfor %}{{ ns.d }}
      _default_script_fields: >-
        {% if follower_default_script | trim != "" %}{{ state_attr(follower_default_script | trim, 'fields') | default({}) }}{% else %}{{ {} }}{% endif %}
      _default_script_std_fields: >-
        {% set sf = _default_script_fields %}{% set ns = namespace(d={}) %}{% for k, v in {'follower_entity_id': follower_entity_id, 'feature': feature, 'leader_entity_id': leader_entity_id, 'leader_enabled': leader_enabled, 'scope': scope, 'scope_id': scope_id}.items() %}{% if k in sf %}{% set ns.d = dict(ns.d, **{k: v}) %}{% endif %}{% endfor %}{{ ns.d }}
      _default_script_invalid_args: >-
        {% set sf = _default_script_fields %}{% set ns = namespace(inv=[]) %}{% for k in _default_script_args.keys() %}{% if k not in sf %}{% set ns.inv = ns.inv + [k] %}{% endif %}{% endfor %}{{ ns.inv }}
      _default_script_valid_args: >-
        {% set sf = _default_script_fields %}{% set ns = namespace(d={}) %}{% for k, v in _default_script_args.items() %}{% if k in sf %}{% set ns.d = dict(ns.d, **{k: v}) %}{% endif %}{% endfor %}{{ ns.d }}
  # 1. Explicit Enable Script — runs when leader_enabled is true, regardless of value labels
  - if:
    - condition: template
      value_template: '{{ follower_enable_script | trim != "" and leader_enabled |
        bool }}'
    then:
    - if:
      - condition: template
        value_template: '{{ follower_enable_script.startswith(''automation.'') or
          follower_enable_script.startswith(''scene.'') }}'
      then:
      - action: '{{ follower_enable_script | trim }}'
        data: {}
      else:
      - choose:
        # No Arg labels: synchronous call preserving continue_on_error / error propagation
        - conditions:
          - condition: template
            value_template: '{{ _enable_script_args | length == 0 }}'
          sequence:
          - if:
            - condition: template
              value_template: '{{ follower_error_mode != ''stop'' }}'
            then:
            - action: '{{ follower_enable_script | trim }}'
              data: >
                {{ _enable_script_std_fields }}
              continue_on_error: true
            - if:
              - condition: template
                value_template: '{{ error is defined }}'
              then:
              - if:
                - condition: template
                  value_template: '{{ follower_error_mode == ''log'' }}'
                then:
                - action: system_log.write
                  data:
                    level: error
                    message: 'Labeled Feature Follower: error calling enable script {{
                      follower_enable_script }} for {{ follower_entity_id }} (feature:
                      {{ feature_name }}): {{ error }}'
              - if:
                - condition: template
                  value_template: '{{ follower_error_mode == ''alert'' }}'
                then:
                - action: script.send_alert
                  data:
                    alert_severity: high
                    alert_title: Labeled Feature Script Error
                    alert_message: 'Error calling enable script for {{ follower_entity_id
                      }} (feature: {{ feature_name }}): {{ error }}'
            else:
            - action: '{{ follower_enable_script | trim }}'
              data: >
                {{ _enable_script_std_fields }}
        # Arg labels present: async call — 3.1 validate, 3.2 pass std+valid args
        default:
        - if:
          - condition: template
            value_template: '{{ _enable_script_invalid_args | length > 0 and follower_error_mode == "stop" }}'
          then:
          - stop: 'Labeled Feature Follower: Arg field(s) {{ _enable_script_invalid_args }} not declared by {{ follower_enable_script }} (feature: {{ feature }})'
            error: true
        - if:
          - condition: template
            value_template: '{{ _enable_script_invalid_args | length > 0 and follower_error_mode == "log" }}'
          then:
          - action: system_log.write
            data:
              level: warning
              message: 'Labeled Feature Follower: Arg field(s) {{ _enable_script_invalid_args }} not declared by {{ follower_enable_script }} for {{ follower_entity_id }}. Proceeding with valid args only.'
        - if:
          - condition: template
            value_template: '{{ _enable_script_invalid_args | length > 0 and follower_error_mode == "alert" }}'
          then:
          - action: script.send_alert
            data:
              alert_severity: high
              alert_title: Labeled Feature Script Arg Error
              alert_message: 'Arg field(s) {{ _enable_script_invalid_args }} not declared by {{ follower_enable_script }} for {{ follower_entity_id }} (feature: {{ feature }})'
        - action: script.turn_on
          target:
            entity_id: '{{ follower_enable_script | trim }}'
          data:
            variables: >
              {{ _enable_script_std_fields | combine(_enable_script_valid_args) }}
  # 2. Explicit Disable Script — runs when leader_enabled is false, regardless of value labels
  - if:
