          'home', 'open', 'detected', 'active', 'unlocked'] }}"
        _toggle_supported_domains: "{{ ['light', 'switch', 'input_boolean', 'fan',
          'cover',\n    'media_player', 'climate', 'humidifier', 'siren', 'remote',\n
          \   'automation', 'script', 'lock'] }}"
        _toggle_unsupported_domains: "{{ ['select', 'input_select', 'number', 'input_number',
          'text',\n    'input_text', 'scene', 'button', 'event', 'sensor',\n    'binary_sensor',
          'vacuum'] }}"
    - if:
      - condition: template
        value_template: '{{ follower_domain in _toggle_unsupported_domains }}'
      then:
      - if:
        - condition: template
          value_template: '{{ follower_error_mode == "stop" }}'
        then:
        - stop: 'Labeled Feature Follower: toggle not supported for domain {{ follower_domain
            }} on {{ follower_entity_id }} (feature: {{ feature }})'
          error: true
      - if:
        - condition: template
          value_template: '{{ follower_error_mode == "log" }}'
        then:
        - action: system_log.write
          data:
            level: error
            message: 'Labeled Feature Follower: toggle not supported for domain {{
              follower_domain }} on {{ follower_entity_id }} (feature: {{ feature
              }})'
      - if:
        - condition: template
          value_template: '{{ follower_error_mode == "alert" }}'
        then:
        - action: script.send_alert
          data:
            alert_severity: high
            alert_title: Labeled Feature Toggle Error
            alert_message: 'Toggle not supported for domain {{ follower_domain }}
              on {{ follower_entity_id }} (feature: {{ feature }})'
    - if:
      - condition: template
        value_template: '{{ follower_domain == "lock" }}'
      then:
      - action: '{{ "lock.unlock" if _toggle_current_on else "lock.lock" }}'
        target:
          entity_id: '{{ follower_entity_id }}'
    - if:
      - condition: template
        value_template: "{{ follower_domain == 'media_player' and\n   follower_domain
          not in _toggle_unsupported_domains }}"
      then:
      - variables:
          _mp_supported: '{{ state_attr(follower_entity_id, "supported_features")
            | int(0) }}'
          _mp_supports_on_off: '{{ _mp_supported | bitwise_and(128) > 0 }}'
          _mp_supports_mute: '{{ _mp_supported | bitwise_and(4) > 0 }}'
      - if:
        - condition: template
          value_template: '{{ _mp_supports_on_off }}'
        then:
        - action: media_player.toggle
          target:
            entity_id: '{{ follower_entity_id }}'
        else:
        - if:
          - condition: template
            value_template: '{{ _mp_supports_mute }}'
          then:
          - action: media_player.volume_mute
            target:
              entity_id: '{{ follower_entity_id }}'
            data:
              is_volume_muted: '{{ not (state_attr(follower_entity_id, "is_volume_muted")
                | bool(false)) }}'
          else:
          - if:
            - condition: template
              value_template: '{{ follower_error_mode == "stop" }}'
            then:
            - stop: 'Labeled Feature Follower: media_player {{ follower_entity_id
                }} supports neither on/off nor mute toggle (feature: {{ feature }})'
              error: true
          - if:
            - condition: template
              value_template: '{{ follower_error_mode == "log" }}'
            then:
            - action: system_log.write
              data:
                level: error
                message: 'Labeled Feature Follower: media_player {{ follower_entity_id
                  }} supports neither on/off nor mute toggle (feature: {{ feature
                  }})'
          - if:
            - condition: template
              value_template: '{{ follower_error_mode == "alert" }}'
            then:
            - action: script.send_alert
              data:
                alert_severity: high
                alert_title: Labeled Feature Toggle Error
                alert_message: 'media_player {{ follower_entity_id }} supports neither
                  on/off nor mute toggle (feature: {{ feature }})'
    - if:
      - condition: template
        value_template: "{{ follower_domain in _toggle_supported_domains and\n   follower_domain
          not in ['lock', 'media_player'] }}"
      then:
      - action: homeassistant.toggle
        target:
          entity_id: '{{ follower_entity_id }}'
  - if:
    - condition: template
      value_template: '{{ follower_target_value == "" and not follower_toggle and
        follower_domain == ''light'' }}'
    then:
    - condition: template
      value_template: "{{ states(follower_entity_id) | lower not in\n   (['on'] if
        follower_enabled else ['off']) }}\n"
    - action: 'light.turn_{{ ''on'' if follower_enabled else ''off'' }}

        '
      target:
        entity_id: '{{ follower_entity_id }}'
  - if:
    - condition: template
      value_template: '{{ follower_target_value == "" and not follower_toggle and
        follower_domain in [''switch'', ''input_boolean''] }}

        '
    then:
    - condition: template
      value_template: "{{ states(follower_entity_id) | lower not in\n   (['on'] if
        follower_enabled else ['off']) }}\n"
    - action: '{{ follower_domain }}.turn_{{ ''on'' if follower_enabled else ''off''
        }}

        '
      target:
        entity_id: '{{ follower_entity_id }}'
  - if:
    - condition: template
      value_template: '{{ follower_target_value == "" and not follower_toggle and
        follower_domain == ''media_player'' }}'
    then:
    - variables:
        mp_supported: '{{ state_attr(follower_entity_id, ''supported_features'') |
          int(0) }}

          '
        mp_supports_on_off: '{{ mp_supported | bitwise_and(128) > 0 }}

          '
        mp_supports_mute: '{{ mp_supported | bitwise_and(4) > 0 }}

          '
    - if:
      - condition: template
        value_template: '{{ mp_supports_on_off }}'
      then:
      - condition: template
        value_template: "{{ states(follower_entity_id) | lower not in\n   (['on',
          'playing', 'idle', 'paused', 'buffering']\n    if follower_enabled else
          ['off', 'unavailable', 'standby']) }}\n"
      - action: 'media_player.turn_{{ ''on'' if follower_enabled else ''off'' }}

          '
        target:
          entity_id: '{{ follower_entity_id }}'
      else:
      - if:
        - condition: template
          value_template: '{{ mp_supports_mute }}'
        then:
        - condition: template
          value_template: "{{ state_attr(follower_entity_id, 'is_volume_muted')\n
            \  != (not follower_enabled) }}\n"
        - action: media_player.volume_mute
          target:
            entity_id: '{{ follower_entity_id }}'
          data:
            is_volume_muted: '{{ not follower_enabled }}'
  - if:
    - condition: template
      value_template: "{{ follower_target_value == '' and not follower_toggle and
        follower_domain not in ['light', 'switch', 'input_boolean',\n   'media_player',
        'number', 'input_number', 'text',\n   'input_text', 'select', 'input_select']
        }}\n"
    then:
    - condition: template
      value_template: "{{ states(follower_entity_id) | lower not in\n   (['on', 'true',
        'home', 'open', 'detected', 'active', 'unlocked']\n    if follower_enabled
        else\n    ['off', 'false', 'away', 'closed', 'clear', 'inactive', 'locked'])
        }}\n"
    - action: 'homeassistant.turn_{{ ''on'' if follower_enabled else ''off'' }}

        '
      target:
        entity_id: '{{ follower_entity_id }}'
  # ── Post Script chain dispatch (Follower) ──────────────────────────
  # Runs after the main flow. Skipped if Pre Script halted with
  # follower_error_mode == 'stop' (consistent with leader sequencing).
  - if:
    - condition: template
      value_template: '{{ not _phase_pre_failed }}'
    then:
    - repeat:
        for_each: '{{ post_script_chain }}'
        sequence:
        - variables:
            _ps_ref: '{{ repeat.item }}'
            _ps_idx: '{{ repeat.index }}'
            _ps_std: '{{ _follower_std_fields_base | combine({"phase": "post"}) }}'
        - if:
          - condition: template
            value_template: '{{ _ps_ref.startswith("automation.") or _ps_ref.startswith("scene.") }}'
          then:
          - action: '{{ _ps_ref }}'
            data: {}
            continue_on_error: true
          else:
          - action: '{{ _ps_ref }}'
            data: '{{ _ps_std }}'
            continue_on_error: true
        - if:
          - condition: template
            value_template: '{{ error is defined }}'
          then:
          - if:
            - condition: template
              value_template: '{{ follower_error_mode == "log" }}'
            then:
            - action: system_log.write
              data:
                level: error
                message: 'Labeled Feature Follower: Post Script error {{ _ps_ref }} ({{ follower_entity_id }}, feature: {{ feature_name }}, idx: {{ _ps_idx }}): {{ error }}'
          - if:
            - condition: template
              value_template: '{{ follower_error_mode == "alert" }}'
            then:
            - action: script.send_alert
              data:
                alert_severity: high
                alert_title: Labeled Feature Follower Post Script Error
                alert_message: 'Post Script {{ _ps_ref }} (idx {{ _ps_idx }}) error for {{ follower_entity_id }} (feature: {{ feature_name }}): {{ error }}'
          - if:
            - condition: template
              value_template: '{{ follower_error_mode == "stop" }}'
            then:
            - stop: 'Labeled Feature Follower: Post Script halted on {{ _ps_ref }} (feature: {{ feature_name }})'
              error: true
labeled_feature_sleep_timeout:
  alias: Labeled Feature Sleep Timeout
  description: "Single-run sleep-timeout script for the Labeled Feature Button system.
    Uses mode: restart so that calling it again (e.g. after any media interaction
    in night mode) resets the full countdown from the beginning.\nSequence (per the
    Label Based Features documentation):\n  1. Wait sleep_timeout_minutes (default
    15 min)\n  2. Halve the volume on each area media player\n  3. Wait 1 minute\n
    \ 4. Mute volume\n  5. Seek back 30 s every 30 s × 20 iterations (≈ 10 min) —
    keeps the\n     playback position from advancing so the content is still \"live\"
    on unmute\n  6. Unmute volume\n  7. Restore each player to its original volume
    level\n\nCall script.turn_on (or homeassistant.turn_on) to start/restart the timer.
    Call homeassistant.turn_off targeting this script to cancel and restore.\nNote:
    Because mode is restart only one countdown runs at a time per HA instance. Create
    separate label/blueprint configurations for each user who needs independent sleep-timeout
    behaviour.\n"
  mode: restart
  variables:
    original_volumes: {}
  fields:
    area_media_players:
      name: Area Media Players
      description: 'List of media player entity IDs in the resolved area to fade and
        mute. Passed automatically by labeled_feature_button.

        '
      required: true
      selector:
        object: {}
    sleep_timeout_minutes:
      name: Sleep Timeout Minutes
      description: How long to wait before beginning the fade-out sequence (default
        15).
      required: false
      default: 15
      selector:
        number:
          min: 1
          max: 120
  sequence:
  - variables:
      original_volumes: "{% set ns = namespace(d={}) %} {% for mp in area_media_players
        %}\n  {% set vol = state_attr(mp, 'volume_level') | float(0.5) %}\n  {% set
        ns.d = dict(ns.d, **{mp: vol}) %}\n{% endfor %} {{ ns.d }}"
  - delay:
      minutes: '{{ sleep_timeout_minutes | default(15) | int }}'
  - repeat:
      for_each: '{{ area_media_players }}'
      sequence:
      - action: media_player.volume_set
        target:
          entity_id: '{{ repeat.item }}'
        data:
          volume_level: '{{ (original_volumes.get(repeat.item, 0.5) / 2) | round(2)
            }}'
  - delay:
      minutes: 1
  - action: media_player.volume_mute
    target:
      entity_id: '{{ area_media_players }}'
    data:
      is_volume_muted: true
  - delay:
      minutes: 1
  - repeat:
      count: 20
      sequence:
      - delay:
          seconds: 30
      - if:
        - condition: template
          value_template: '{{ area_media_players | length > 0 }}'
        then:
        - action: media_player.media_seek
          target:
            entity_id: '{{ area_media_players | first }}'
          data:
            seek_position: "{{ [state_attr(area_media_players | first,\n    'media_position')
              | float(0) - 30, 0] | max }}"
  - action: media_player.volume_mute
    target:
      entity_id: '{{ area_media_players }}'
    data:
      is_volume_muted: false
  - repeat:
      for_each: '{{ area_media_players }}'
      sequence:
      - action: media_player.volume_set
        target:
          entity_id: '{{ repeat.item }}'
        data:
          volume_level: '{{ original_volumes.get(repeat.item, 0.5) }}'
labeled_feature_error_mode:
  alias: Labeled Feature Error Mode
  description: 'Shared helper for the Labeled Feature system''s Error Mode dispatch.
    Handles the silent / log / alert tiers. The `stop` tier is intentionally left
    to the caller: a `stop:` inside this script would only halt this helper, not the
    parent — so callers should follow this call with their own `stop: error: true`
    when `error_mode == "stop"`.

    '
  mode: parallel
  max: 50
  fields:
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
          - silent
          - log
          - alert
          - stop
    message:
      name: Message
      description: Human-readable error message describing what went wrong.
      required: true
      selector:
        text:
          multiline: true
    source:
      name: Source
      description: 'Short label for the calling script, used as a prefix in logs/alerts.
        Examples: ''Labeled Feature Generics'', ''Labeled Feature Somrig''.

        '
      required: false
      default: Labeled Feature
      selector:
        text: {}
    severity:
      name: Severity
      description: Severity for the alert tier (low | medium | high).
      required: false
      default: medium
      selector:
        select:
          custom_value: true
          options:
          - low
          - medium
          - high
  sequence:
  - variables:
      _mode: '{{ (error_mode | default("log") | lower) }}'
      _source: '{{ source | default("Labeled Feature") }}'
      _severity: '{{ severity | default("medium") }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ _mode == "silent" }}'
      sequence: []
    - conditions:
      - condition: template
        value_template: '{{ _mode == "log" }}'
      sequence:
      - action: system_log.write
        data:
          level: warning
          message: '{{ _source }}: {{ message }}'
    - conditions:
      - condition: template
        value_template: '{{ _mode == "alert" }}'
      sequence:
      - action: script.send_alert
        data:
          alert_severity: '{{ _severity }}'
          alert_title: '{{ _source }}'
          alert_message: '{{ message }}'
    - conditions:
      - condition: template
        value_template: '{{ _mode == "stop" }}'
      sequence:
      - action: system_log.write
        data:
          level: error
          message: '{{ _source }}: {{ message }}'
labeled_feature_generics:
  alias: Labeled Feature Generics
  description: >
    Generic feature dispatcher for the Labeled Feature system. Maps a generic
    feature name (Lights Off, Volume Up, Fan On, Night, …) to a domain-specific
    service call against an entity set resolved by label first, then by the
    feature's domain fallback. Honors `<scope-prefix><Feature> Exclude: True`
    labels on candidate entities to opt them out. Supports a `toggle` modifier
    that swaps the action for a domain toggle where it makes sense.

    Per-feature resolution algorithm:
      1. Build scope_entity_set from scope/scope_id (area/floor) or fall back
         to follower_entity_id / leader_entity_id area lookup.
      2. label_targets is the union of two `resolve_provides()` calls
         intersected with scope_entity_set:
           (a) resolve_provides(<Feature>, scope_prefix)
           (b) resolve_provides(<domain_label>, scope_prefix) when the
               feature has a `domain_label` in feature_meta (e.g.
               `Media Player` for media_player-domain features, `Light` for
               light, `Fan` for fan). This is what makes
               `Area Provides: Media Player` opt every player in the area
               into all media-player features without per-feature labels.
         resolve_provides(label, scope_prefix) tries 4 candidates in order
         and returns the first non-empty result:
           1. label                                  (exact, global)
           2. <scope_prefix>Provides: <label>        (scoped if prefixed)
           3. <scope_prefix>Follower: <label>        (scoped if prefixed)
           4. <scope_prefix>Leader: <label>          (scoped if prefixed)
         The exact (step 1) match is never scope-filtered. The scoped
         candidates (2-4) are filtered to scope_entity_set when
         scope_prefix is non-empty.
      3. excluded = entities labeled `<Feature> Exclude: True` OR
         `<scope-prefix><Feature> Exclude: True` (and the same pair for
         <domain_label> if defined).
      4. If (label_targets - excluded) is non-empty → use it.
      5. Else fallback to entities in scope_entity_set whose domain matches
         the feature's default domain, minus excluded.
      6. If still empty and feature has no domain fallback → Error Mode.
      7. Run feature action against final target set.

    See `Label Based Features.md` → "Labeled Feature Generics" for the full
    catalog of supported features.
  mode: parallel
  max: 50
  fields:
    feature:
      name: Feature
      description: 'Generic feature name (case-sensitive). Examples: ''Lights Off'',
        ''Volume Up'', ''Media Pause'', ''Fan On'', ''Night''. See Labeled Feature
        Generics docs for the full catalog.

        '
      required: true
      selector:
        select:
          custom_value: true
          options:
          - Media Toggle
          - Media Play
          - Media Pause
          - Media Next
          - Media Previous
          - Media Seek Back
          - Media Seek Forward
          - Volume Up
          - Volume Down
          - Lights On
          - Lights Off
          - Lights Up
          - Lights Down
          - Fan On
          - Fan Off
          - Fan Up
          - Fan Down
          - Ads
          - Night
    scope:
      name: Scope
      description: Scope of the feature (area, floor, or none).
      required: false
      default: area
      selector:
        select:
          options:
          - area
          - floor
          - none
    scope_id:
      name: Scope ID
      description: The resolved area_id or floor_id. Falls back to follower/leader
        entity area.
      required: false
      default: ''
      selector:
        text: {}
    follower_entity_id:
      name: Follower Entity ID
      description: Used for area fallback when scope_id is empty.
      required: false
      default: ''
      selector:
        entity: {}
    leader_entity_id:
      name: Leader Entity ID
      description: Used for area fallback when follower_entity_id is also empty.
      required: false
      default: ''
      selector:
        entity: {}
    leader_enabled:
      name: Leader Enabled
      description: Pass-through from the leader. Not used directly by generics.
      required: false
      default: true
      selector:
        boolean: {}
    toggle:
      name: Toggle
      description: 'When true, swap the per-feature action for a domain toggle where
        it makes sense (light/fan/media toggle). For features where toggle is not
        meaningful (Media Next, Volume Up, Seek, …) this triggers Error Mode handling.

        '
      required: false
      default: false
      selector:
        boolean: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
          - silent
          - log
          - alert
          - stop
    exclude_feature:
      name: Exclude Feature Name
      description: 'Optional. The feature name used to build the Exclude label (`(Area
        |Floor |)<exclude_feature> Exclude: True`). When not supplied, defaults to
        `feature`. Used by mapping scripts (e.g. labeled_feature_somrig) to thread
        the leader''s feature name through dispatched generic calls so Exclude is
        keyed on the leader, not the generic action.

        '
      required: false
      default: ''
      selector:
        text: {}
  sequence:
    # ── Step 1: Resolve scope ids and scope entity set ──────────────────────
    - variables:
        _feature: '{{ feature | trim }}'
        _exclude_feature: >-
          {%- set ef = exclude_feature | default('') | trim -%}
          {{ ef if ef != '' else (feature | trim) }}
        _scope: '{{ (scope | default("area") | lower) }}'
        _toggle: '{{ (toggle | default(false)) | bool(false) }}'
        _err_mode: '{{ (error_mode | default("log") | lower) }}'
        _resolved_area_id: >-
          {%- if _scope == 'area' and scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- elif follower_entity_id is defined and follower_entity_id != '' -%}
            {{ area_id(follower_entity_id) | default('') }}
          {%- elif leader_entity_id is defined and leader_entity_id != '' -%}
            {{ area_id(leader_entity_id) | default('') }}
          {%- else -%}{{ '' }}{%- endif -%}
        _resolved_floor_id: >-
          {%- if _scope != 'floor' -%}{{ '' }}
          {%- elif scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- else -%}
            {%- set aid = '' -%}
            {%- if follower_entity_id is defined and follower_entity_id != '' -%}
              {%- set aid = area_id(follower_entity_id) | default('') -%}
            {%- endif -%}
            {%- if aid == '' and leader_entity_id is defined and leader_entity_id != '' -%}
              {%- set aid = area_id(leader_entity_id) | default('') -%}
            {%- endif -%}
            {%- if aid == '' -%}
              {%- set aid = _resolved_area_id -%}
            {%- endif -%}
            {%- set ns = namespace(found='') -%}
            {%- if aid != '' -%}
              {%- for fid in floors() -%}
                {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
              {%- endfor -%}
            {%- endif -%}
            {{ ns.found }}
          {%- endif -%}
    - variables:
        scope_entity_set: >-
          {% if _scope == 'area' and _resolved_area_id != '' %}
            {% set area_ents = area_entities(_resolved_area_id) | list %}
            {% set area_devs = area_devices(_resolved_area_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% elif _scope == 'floor' and _resolved_floor_id != '' %}
            {% set ns = namespace(ents=[]) %}
            {% for a in floor_areas(_resolved_floor_id) %}
              {% set ns.ents = ns.ents + area_entities(a) | list %}
              {% for d in area_devices(a) %}
                {% set ns.ents = ns.ents + device_entities(d) | list %}
              {% endfor %}
            {% endfor %}
            {{ ns.ents | unique | list }}
          {% else %}
            {{ [] }}
          {% endif %}
        scope_prefix: >-
          {{ 'Area ' if _scope == 'area' else ('Floor ' if _scope == 'floor' else '') }}
        exclude_label: '{{ _exclude_feature ~ " Exclude: True" }}'
        scoped_exclude_label: >-
          {{ (('Area ' if _scope == 'area' else
               ('Floor ' if _scope == 'floor' else '')) ~ _exclude_feature) ~ " Exclude: True" }}

    # ── Step 3: Feature metadata (domain fallback + selected action) ────────
    # Pulled from `sensor.labeled_features_state.feature_meta` — the single
    # source of truth for the generic-feature catalog. See the comment block
    # on that attribute in configuration.yaml for the schema. `domain_label`
    # is the human-readable provider grouping; the resolver below unions in
    # `(scope_prefix)Provides: <domain_label>`-style declarations so a single
    # area-level label opts every domain-matching entity in the scope into
    # every feature for that domain.
    - variables:
        feature_meta: >-
          {% set catalog = state_attr('sensor.labeled_features_state', 'feature_meta') | default({}) %}
          {{ catalog.get(_feature, {'domain': '', 'kind': 'unknown', 'domain_label': ''}) }}


    # ── Step 2 (post-meta): Provides resolver — label-based target union ────
    # For each label name (the feature itself, plus the feature's
    # domain_label when defined) we try four candidates in order and use
    # the first non-empty result:
    #   1. <label>                              (exact, never scope-filtered)
    #   2. <scope_prefix>Provides: <label>      (scope-filtered when prefixed)
    #   3. <scope_prefix>Follower: <label>      (scope-filtered when prefixed)
    #   4. <scope_prefix>Leader: <label>        (scope-filtered when prefixed)
    # The results from the two resolver calls are unioned and de-excluded.
    - variables:
        _feature_resolved: >-
          {% set ns = namespace(out=[]) %}
          {% set candidates = [
            _feature,
            scope_prefix ~ 'Provides: ' ~ _feature,
            scope_prefix ~ 'Follower: ' ~ _feature,
            scope_prefix ~ 'Leader: '   ~ _feature
          ] %}
          {% for c in candidates %}
            {% if ns.out | length == 0 %}
              {% set ents = label_entities(c) | list %}
              {% if scope_prefix != '' and c != _feature and scope_entity_set | length > 0 %}
                {% set ents = ents | select('in', scope_entity_set) | list %}
              {% endif %}
              {% if ents | length > 0 %}{% set ns.out = ents %}{% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.out }}
        _domain_label_resolved: >-
          {% set dl = feature_meta.domain_label | default('') %}
          {% if dl == '' %}
            {{ [] }}
          {% else %}
            {% set ns = namespace(out=[]) %}
            {% set candidates = [
              dl,
              scope_prefix ~ 'Provides: ' ~ dl,
              scope_prefix ~ 'Follower: ' ~ dl,
              scope_prefix ~ 'Leader: '   ~ dl
            ] %}
            {% for c in candidates %}
              {% if ns.out | length == 0 %}
                {% set ents = label_entities(c) | list %}
                {% if scope_prefix != '' and c != dl and scope_entity_set | length > 0 %}
                  {% set ents = ents | select('in', scope_entity_set) | list %}
                {% endif %}
                {% if ents | length > 0 %}{% set ns.out = ents %}{% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.out }}
          {% endif %}
        _excluded: >-
          {% set dl = feature_meta.domain_label | default('') %}
          {% set unscoped_f = label_entities(exclude_label) | list %}
          {% set scoped_f = label_entities(scoped_exclude_label) | list %}
          {% set dl_excl = [] %}
          {% if dl != '' %}
            {% set bare_dl = dl ~ ' Exclude: True' %}
            {% set scoped_dl = scope_prefix ~ dl ~ ' Exclude: True' %}
            {% set dl_excl = (label_entities(bare_dl) | list) + (label_entities(scoped_dl) | list) %}
          {% endif %}
          {{ (unscoped_f + scoped_f + dl_excl) | unique | list }}
        label_targets: >-
          {{ (_feature_resolved + _domain_label_resolved)
             | unique
             | reject('in', _excluded)
             | list }}

    # ── Step 4: Resolve final target set (label-first, then domain fallback) ─
    - variables:
        _domain_fallback_raw: >-
          {% set dom = feature_meta.domain %}
          {% if dom != '' and scope_entity_set | length > 0 %}
            {{ scope_entity_set
               | select('match', '^' + dom + '\\.')
               | reject('in', _excluded)
               | list }}
          {% else %}
            {{ [] }}
          {% endif %}
        final_targets: >-
          {% if label_targets | length > 0 %}
            {{ label_targets }}
          {% else %}
            {{ _domain_fallback_raw }}
          {% endif %}

    # ── Step 5: Validate target set ─────────────────────────────────────────
    - if:
        - condition: template
          value_template: '{{ final_targets | length == 0 }}'
      then:
        - action: script.labeled_feature_error_mode
          data:
            error_mode: '{{ _err_mode }}'
            source: Labeled Feature Generics
            message: >-
              No target entities resolved for feature '{{ _feature }}' in
              scope '{{ _scope }}' (scope_id={{ scope_id | default('') }}).
        - if:
            - condition: template
              value_template: '{{ _err_mode == "stop" }}'
          then:
            - stop: >-
                Labeled Feature Generics: no targets for '{{ _feature }}'.
              error: true
        - stop: 'No targets resolved (handled per error_mode).'

    # ── Step 6: Toggle modifier — short-circuit per-domain ──────────────────
    - if:
        - condition: template
          value_template: '{{ _toggle }}'
      then:
        - choose:
            - conditions:
                - condition: template
                  value_template: '{{ feature_meta.domain == "light" }}'
              sequence:
                - action: light.toggle
                  target:
                    entity_id: '{{ final_targets }}'
            - conditions:
                - condition: template
                  value_template: '{{ feature_meta.domain == "fan" }}'
              sequence:
                - action: fan.toggle
                  target:
                    entity_id: '{{ final_targets }}'
            - conditions:
                - condition: template
                  value_template: >-
                    {{ feature_meta.kind in ['media_toggle','media_play','media_pause'] }}
              sequence:
                - action: media_player.media_play_pause
                  target:
                    entity_id: '{{ final_targets }}'
            - conditions:
                - condition: template
                  value_template: '{{ feature_meta.kind in ["ads","night"] }}'
              sequence:
                - action: homeassistant.toggle
                  target:
                    entity_id: '{{ final_targets }}'
          default:
            - action: script.labeled_feature_error_mode
              data:
                error_mode: '{{ _err_mode }}'
                source: Labeled Feature Generics
                message: >-
                  Feature '{{ _feature }}' does not support the toggle modifier.
            - if:
                - condition: template
                  value_template: '{{ _err_mode == "stop" }}'
              then:
                - stop: >-
                    Labeled Feature Generics: invalid toggle for '{{ _feature }}'.
                  error: true
        - stop: 'Toggle path complete.'

    # ── Step 7: Non-toggle dispatch by feature kind ─────────────────────────
    - choose:
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_toggle" }}'
          sequence:
            - action: media_player.media_play_pause
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_play" }}'
          sequence:
            - action: media_player.media_play
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_pause" }}'
          sequence:
            - action: media_player.media_pause
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_next" }}'
          sequence:
            - action: media_player.media_next_track
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_previous" }}'
          sequence:
            - action: media_player.media_previous_track
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_seek_back" }}'
          sequence:
            - action: media_player.media_seek
              target:
                entity_id: '{{ final_targets | first }}'
              data:
                seek_position: >-
                  {{ [state_attr(final_targets | first, 'media_position')
                       | float(0) - 30, 0] | max }}
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_seek_forward" }}'
          sequence:
            - action: media_player.media_seek
              target:
                entity_id: '{{ final_targets | first }}'
              data:
                seek_position: >-
                  {{ state_attr(final_targets | first, 'media_position')
                       | float(0) + 30 }}
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "volume_up" }}'
          sequence:
            - repeat:
                for_each: '{{ final_targets }}'
                sequence:
                  - action: media_player.volume_set
                    target:
                      entity_id: '{{ repeat.item }}'
                    data:
                      volume_level: >-
                        {{ [(state_attr(repeat.item, 'volume_level') | float(0))
                            + 0.07, 1.0] | min }}
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "volume_down" }}'
          sequence:
            - repeat:
                for_each: '{{ final_targets }}'
                sequence:
                  - action: media_player.volume_set
                    target:
                      entity_id: '{{ repeat.item }}'
                    data:
                      volume_level: >-
                        {{ [(state_attr(repeat.item, 'volume_level') | float(0))
                            - 0.07, 0.0] | max }}
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "light_on" }}'
          sequence:
            - action: light.turn_on
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "light_off" }}'
          sequence:
            - action: light.turn_off
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "light_up" }}'
          sequence:
            - action: light.turn_on
              target:
                entity_id: '{{ final_targets }}'
              data:
                brightness_step_pct: 10
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "light_down" }}'
          sequence:
            - action: light.turn_on
              target:
                entity_id: '{{ final_targets }}'
              data:
                brightness_step_pct: -10
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "fan_on" }}'
          sequence:
            - action: fan.turn_on
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "fan_off" }}'
          sequence:
            - action: fan.turn_off
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "fan_up" }}'
          sequence:
            - action: fan.increase_speed
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "fan_down" }}'
          sequence:
            - action: fan.decrease_speed
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind in ["ads","night"] }}'
          sequence:
            - action: homeassistant.toggle
              target:
                entity_id: '{{ final_targets }}'
      default:
        - action: script.labeled_feature_error_mode
          data:
            error_mode: '{{ _err_mode }}'
            source: Labeled Feature Generics
            message: "Unknown feature '{{ _feature }}'."
        - if:
            - condition: template
              value_template: '{{ _err_mode == "stop" }}'
          then:
            - stop: "Labeled Feature Generics: unknown feature '{{ _feature }}'."
              error: true
labeled_feature_somrig:
  alias: Labeled Feature Somrig
  description: >
    Maps IKEA Somrig (and other 2-button) device events into one or more calls
    to `script.labeled_feature_generics`. Reads the raw button event from the
    `feature` field (e.g. '1_short_release', '2_double_press'); also accepts
    `dots_N_*` (IKEA E2123) variants by stripping the 'dots_' prefix.

    Only canonical "user did the thing" events are tracked:
      *_short_release, *_double_press, *_long_press
    All other events (initial_press, long_release, etc.) are ignored.

    Contextual state: only `media_playing` (computed by inspecting
    media_player entities in the resolved area) is used to pick between the
    Playing and Not-Playing branches of the mapping table. Night-mode and
    sleep-timeout behavior live as their own generic features (`Night`).

    Event → generic-feature mapping:
      1_short_release  Playing: Lights Off + Media Pause   Not Playing: Lights Off
      2_short_release  Playing: Media Pause                Not Playing: Media Play
      1_double_press   Playing: Media Seek Back            Not Playing: Fan On (toggle:true)
      2_double_press   Playing: Media Seek Forward         Not Playing: Night
      1_long_press     Playing: Volume Up                  Not Playing: Lights Up
      2_long_press     Playing: Volume Down                Not Playing: Ads
  mode: parallel
  max: 50
  fields:
    feature:
      name: Feature (Button Event)
      description: >
        The raw button event string from the button entity, e.g.
        '1_short_release', '2_double_press', '1_long_press', or the
        'dots_'-prefixed variants for IKEA E2123.
      required: true
      selector:
        select:
          custom_value: true
          options:
            - 1_short_release
            - 1_double_press
            - 1_long_press
            - 2_short_release
            - 2_double_press
            - 2_long_press
            - dots_1_short_release
            - dots_1_double_press
            - dots_1_long_press
            - dots_2_short_release
            - dots_2_double_press
            - dots_2_long_press
    follower_entity_id:
      name: Follower Entity ID
      description: Used for area lookup. Passed automatically by labeled_feature_follower.
      required: false
      default: ''
      selector:
        entity: {}
    leader_entity_id:
      name: Leader Entity ID (the button)
      description: Used as fallback for area lookup.
      required: false
      default: ''
      selector:
        entity: {}
    leader_enabled:
      name: Leader Enabled
      description: Pass-through from the leader. Not used directly by the somrig mapping.
      required: false
      default: true
      selector:
        boolean: {}
    leader_feature:
      name: Leader Feature Name
      description: >
        The leader's labeled feature name (e.g. 'Night Buttons'), passed by the
        leader automation alongside `feature`. Used for Exclude resolution:
        entities labeled `(Area |Floor |)<leader_feature> Exclude: True` are
        excluded from both the `media_playing` evaluation and every downstream
        labeled_feature_generics call dispatched from here.
      required: false
      default: ''
      selector:
        text: {}
    toggle:
      name: Toggle
      description: >
        Pass-through toggle flag from the leader. Forwarded to every
        labeled_feature_generics call. The 1_double_press Not-Playing
        branch always overrides this with toggle:true (fan toggle).
      required: false
      default: false
      selector:
        boolean: {}
    scope:
      name: Scope
      description: Scope of the feature (area, floor, or none).
      required: false
      default: area
      selector:
        select:
          options:
            - area
            - floor
            - none
    scope_id:
      name: Scope ID
      description: The resolved area_id or floor_id passed by the automation.
      required: false
      default: ''
      selector:
        text: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
  sequence:
    # ── Step 1: Resolve scope + scope entity set + Exclude set ──────────────
    - variables:
        _scope: '{{ (scope | default("area") | lower) }}'
        _toggle_in: '{{ (toggle | default(false)) | bool(false) }}'
        _err_mode: '{{ (error_mode | default("log") | lower) }}'
        _leader_feature: '{{ leader_feature | default("") | trim }}'
        _resolved_area_id: >-
          {%- if _scope == 'area' and scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- elif follower_entity_id is defined and follower_entity_id != '' -%}
            {{ area_id(follower_entity_id) | default('') }}
          {%- elif leader_entity_id is defined and leader_entity_id != '' -%}
            {{ area_id(leader_entity_id) | default('') }}
          {%- else -%}{{ '' }}{%- endif -%}
        _resolved_floor_id: >-
          {%- if _scope == 'floor' and scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- elif _scope == 'floor' and follower_entity_id is defined and follower_entity_id != '' -%}
            {%- set aid = area_id(follower_entity_id) -%}
            {%- set ns = namespace(found='') -%}
            {%- for fid in floors() -%}
              {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
            {%- endfor -%}{{ ns.found }}
          {%- elif _scope == 'floor' and leader_entity_id is defined and leader_entity_id != '' -%}
            {%- set aid = area_id(leader_entity_id) -%}
            {%- set ns = namespace(found='') -%}
            {%- for fid in floors() -%}
              {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
            {%- endfor -%}{{ ns.found }}
          {%- else -%}{{ '' }}{%- endif -%}
    - variables:
        # Scope entity set (mirrors labeled_feature_generics) — for both the
        # media_playing signal and informational use. We compute it for area
        # and floor; for `none` we fall back to the leader's area.
        scope_entity_set: >-
          {% if _scope == 'area' and _resolved_area_id != '' %}
            {% set area_ents = area_entities(_resolved_area_id) | list %}
            {% set area_devs = area_devices(_resolved_area_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% elif _scope == 'floor' and _resolved_floor_id != '' %}
            {% set ns = namespace(ents=[]) %}
            {% for a in floor_areas(_resolved_floor_id) %}
              {% set ns.ents = ns.ents + area_entities(a) | list %}
              {% for d in area_devices(a) %}
                {% set ns.ents = ns.ents + device_entities(d) | list %}
              {% endfor %}
            {% endfor %}
            {{ ns.ents | unique | list }}
          {% elif _resolved_area_id != '' %}
            {% set area_ents = area_entities(_resolved_area_id) | list %}
            {% set area_devs = area_devices(_resolved_area_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% else %}
            {{ [] }}
          {% endif %}
        # Exclude labels keyed on the leader's feature name. Same shape as in
        # labeled_feature_generics: bare `<feature> Exclude: True` and scoped
        # `(Area |Floor |)<feature> Exclude: True`.
        _exclude_unscoped_label: '{{ _leader_feature ~ " Exclude: True" }}'
        _exclude_scoped_label: >-
          {{ (('Area ' if _scope == 'area' else
               ('Floor ' if _scope == 'floor' else '')) ~ _leader_feature) ~ " Exclude: True" }}
    - variables:
        excluded_entities: >-
          {% if _leader_feature == '' %}
            {{ [] }}
          {% else %}
            {% set unscoped = label_entities(_exclude_unscoped_label) | list %}
            {% set scoped = label_entities(_exclude_scoped_label) | list %}
            {% set all_excl = (unscoped + scoped) | unique | list %}
            {% if scope_entity_set | length > 0 %}
              {{ all_excl | select('in', scope_entity_set) | list }}
            {% else %}
              {{ all_excl }}
            {% endif %}
          {% endif %}
        # Media-player candidates for the `media_playing` evaluation. Uses
        # the same 4-step Provides resolver as labeled_feature_generics with
        # the literal label `Media Player`:
        #   1. exact `Media Player` (global, no scope filter)
        #   2. `<scope_prefix>Provides: Media Player` (scoped)
        #   3. `<scope_prefix>Follower: Media Player` (scoped)
        #   4. `<scope_prefix>Leader: Media Player`   (scoped)
        # First non-empty result is used.  Then unioned with media_player-
        # domain entities in scope_entity_set, minus excluded_entities, to
        # form the final candidate set the playing-state check runs over.
        _scope_prefix_str: >-
          {{ 'Area ' if _scope == 'area' else ('Floor ' if _scope == 'floor' else '') }}
        _media_provider_resolved: >-
          {% set _label = 'Media Player' %}
          {% set ns = namespace(out=[]) %}
          {% set candidates = [
            _label,
            _scope_prefix_str ~ 'Provides: ' ~ _label,
            _scope_prefix_str ~ 'Follower: ' ~ _label,
            _scope_prefix_str ~ 'Leader: '   ~ _label
          ] %}
          {% for c in candidates %}
            {% if ns.out | length == 0 %}
              {% set ents = label_entities(c) | list %}
              {% if _scope_prefix_str != '' and c != _label and scope_entity_set | length > 0 %}
                {% set ents = ents | select('in', scope_entity_set) | list %}
              {% endif %}
              {% if ents | length > 0 %}{% set ns.out = ents %}{% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.out }}
        media_playing: >-
          {% set mp_in_scope = states.media_player
               | rejectattr('entity_id', 'in', excluded_entities)
               | list %}
          {% set mp_in_scope_ids = mp_in_scope | map(attribute='entity_id') | list %}
          {% if scope_entity_set | length > 0 %}
            {% set candidate_ids = (mp_in_scope_ids | select('in', scope_entity_set) | list)
                                   + (_media_provider_resolved | select('in', scope_entity_set) | list) %}
            {{ mp_in_scope
               | selectattr('entity_id', 'in', candidate_ids | unique | list)
               | selectattr('state', 'in', ['playing', 'buffering'])
               | list | count > 0 }}
          {% elif _resolved_area_id != '' %}
            {% set area_ids = area_entities(_resolved_area_id) %}
            {% set candidate_ids = (mp_in_scope_ids | select('in', area_ids) | list)
                                   + (_media_provider_resolved | select('in', area_ids) | list) %}
            {{ mp_in_scope
               | selectattr('entity_id', 'in', candidate_ids | unique | list)
               | selectattr('state', 'in', ['playing', 'buffering'])
               | list | count > 0 }}
          {% else %}
            false
          {% endif %}
        # Strip the dots_ prefix so both device families share the same
        # branches below.
        mapped_event: >-
          {{ (feature | trim) | regex_replace('^dots_', '') }}

    # ── Step 2: Branch by event + media_playing ─────────────────────────────
    - choose:
        # ────────────── 1_short_release ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "1_short_release" }}'
          sequence:
            - if:
                - condition: template
                  value_template: '{{ media_playing }}'
              then:
                - action: script.labeled_feature_generics
                  data:
                    feature: Lights Off
                    exclude_feature: '{{ _leader_feature }}'
                    # Lights Off is intentionally forced to the leader's floor
                    # so a single button press clears every light on the floor,
                    # regardless of which area the button itself lives in.
                    scope: floor
                    scope_id: '{{ _resolved_floor_id }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: '{{ _toggle_in }}'
                    error_mode: '{{ _err_mode }}'
                - action: script.labeled_feature_generics
                  data:
                    feature: Media Pause
                    exclude_feature: '{{ _leader_feature }}'
                    scope: '{{ _scope }}'
                    scope_id: '{{ scope_id | default("") }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: '{{ _toggle_in }}'
                    error_mode: '{{ _err_mode }}'
              else:
                - action: script.labeled_feature_generics
                  data:
                    feature: Lights Off
                    exclude_feature: '{{ _leader_feature }}'
                    # See note above: Lights Off always operates at the floor scope.
                    scope: floor
                    scope_id: '{{ _resolved_floor_id }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: '{{ _toggle_in }}'
                    error_mode: '{{ _err_mode }}'

        # ────────────── 2_short_release ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "2_short_release" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: '{{ "Media Pause" if media_playing else "Media Play" }}'
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── 1_double_press ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "1_double_press" }}'
          sequence:
            - if:
                - condition: template
                  value_template: '{{ media_playing }}'
              then:
                - action: script.labeled_feature_generics
                  data:
                    feature: Media Seek Back
                    exclude_feature: '{{ _leader_feature }}'
                    scope: '{{ _scope }}'
                    scope_id: '{{ scope_id | default("") }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: '{{ _toggle_in }}'
                    error_mode: '{{ _err_mode }}'
              else:
                # Fan toggle: force toggle:true regardless of caller-passed value
                - action: script.labeled_feature_generics
                  data:
                    feature: Fan On
                    exclude_feature: '{{ _leader_feature }}'
                    scope: '{{ _scope }}'
                    scope_id: '{{ scope_id | default("") }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: true
                    error_mode: '{{ _err_mode }}'

        # ────────────── 2_double_press ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "2_double_press" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: '{{ "Media Seek Forward" if media_playing else "Night" }}'
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── 1_long_press ──────────────
        # Repeats the stepping action every 300ms until the leader entity's
        # state changes (i.e. user releases or presses something else), with a
        # safety cap. If leader_entity_id is missing we fall back to a single
        # dispatch so this still does something when called manually.
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "1_long_press" }}'
          sequence:
            - variables:
                _long_press_feature: '{{ "Volume Up" if media_playing else "Lights Up" }}'
                _leader_initial_state: >-
                  {{ states(leader_entity_id) if (leader_entity_id is defined and leader_entity_id != "") else "" }}
            - if:
                - condition: template
                  value_template: '{{ leader_entity_id is defined and leader_entity_id != "" }}'
              then:
                - repeat:
                    # Safety cap: ~60s of held button at 300ms cadence.
                    while:
                      - condition: template
                        value_template: '{{ states(leader_entity_id) == _leader_initial_state }}'
                      - condition: template
                        value_template: '{{ repeat.index <= 200 }}'
                    sequence:
                      # Self-correcting tick: budget 500ms wall-clock per
                      # iteration. We measure how long the dispatch took and
                      # subtract that from the delay (with a 50ms floor so the
                      # while: still gets a real yield to re-check the leader
                      # state). This makes the visible step cadence consistent
                      # even when the underlying media_player / light service
                      # call latency varies.
                      # Fire-and-forget dispatch via script.turn_on: returns
                      # immediately so the loop's wall-clock cadence is
                      # independent of how long the underlying media_player /
                      # light service call takes. Inner error handling inside
                      # labeled_feature_generics (Error Mode logging/alerts)
                      # still applies; only error *propagation* back to this
                      # loop is dropped.
                      - variables:
                          _tick_start: '{{ as_timestamp(now()) }}'
                      - action: script.turn_on
                        target:
                          entity_id: script.labeled_feature_generics
                        data:
                          variables:
                            feature: '{{ _long_press_feature }}'
                            exclude_feature: '{{ _leader_feature }}'
                            scope: '{{ _scope }}'
                            scope_id: '{{ scope_id | default("") }}'
                            follower_entity_id: '{{ follower_entity_id | default("") }}'
                            leader_entity_id: '{{ leader_entity_id | default("") }}'
                            leader_enabled: '{{ leader_enabled | default(true) }}'
                            toggle: '{{ _toggle_in }}'
                            error_mode: '{{ _err_mode }}'
                      - delay:
                          milliseconds: >-
                            {{ [(500 - ((as_timestamp(now()) - _tick_start) * 1000)) | int, 50] | max }}
              else:
                - action: script.labeled_feature_generics
                  data:
                    feature: '{{ _long_press_feature }}'
                    exclude_feature: '{{ _leader_feature }}'
                    scope: '{{ _scope }}'
                    scope_id: '{{ scope_id | default("") }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: '{{ _toggle_in }}'
                    error_mode: '{{ _err_mode }}'

        # ────────────── 2_long_press ──────────────
        # Playing (Volume Down) repeats every 300ms with the same safety guard
        # described above. Not-Playing (Ads) is a toggle, fires once.
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "2_long_press" }}'
          sequence:
            - if:
                - condition: template
                  value_template: '{{ media_playing }}'
              then:
                - variables:
                    _leader_initial_state: >-
                      {{ states(leader_entity_id) if (leader_entity_id is defined and leader_entity_id != "") else "" }}
                - if:
                    - condition: template
                      value_template: '{{ leader_entity_id is defined and leader_entity_id != "" }}'
                  then:
                    - repeat:
                        while:
                          - condition: template
                            value_template: '{{ states(leader_entity_id) == _leader_initial_state }}'
                          - condition: template
                            value_template: '{{ repeat.index <= 200 }}'
                        sequence:
                          # Fire-and-forget dispatch — see note in 1_long_press
                          # branch. Targets 500ms wall-clock per step.
                          - variables:
                              _tick_start: '{{ as_timestamp(now()) }}'
                          - action: script.turn_on
                            target:
                              entity_id: script.labeled_feature_generics
                            data:
                              variables:
                                feature: Volume Down
                                exclude_feature: '{{ _leader_feature }}'
                                scope: '{{ _scope }}'
                                scope_id: '{{ scope_id | default("") }}'
                                follower_entity_id: '{{ follower_entity_id | default("") }}'
                                leader_entity_id: '{{ leader_entity_id | default("") }}'
                                leader_enabled: '{{ leader_enabled | default(true) }}'
                                toggle: '{{ _toggle_in }}'
                                error_mode: '{{ _err_mode }}'
                          - delay:
                              milliseconds: >-
                                {{ [(500 - ((as_timestamp(now()) - _tick_start) * 1000)) | int, 50] | max }}
                  else:
                    - action: script.labeled_feature_generics
                      data:
                        feature: Volume Down
                        exclude_feature: '{{ _leader_feature }}'
                        scope: '{{ _scope }}'
                        scope_id: '{{ scope_id | default("") }}'
                        follower_entity_id: '{{ follower_entity_id | default("") }}'
                        leader_entity_id: '{{ leader_entity_id | default("") }}'
                        leader_enabled: '{{ leader_enabled | default(true) }}'
                        toggle: '{{ _toggle_in }}'
                        error_mode: '{{ _err_mode }}'
              else:
                # Ads — toggle, fires once
                - action: script.labeled_feature_generics
                  data:
                    feature: Ads
                    exclude_feature: '{{ _leader_feature }}'
                    scope: '{{ _scope }}'
                    scope_id: '{{ scope_id | default("") }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: '{{ _toggle_in }}'
                    error_mode: '{{ _err_mode }}'
labeled_feature_entities:
  alias: Labeled Feature Entities
  description: >
    Generic MQTT-discovery entity creator and retract helper for the Labeled
    Feature Areas stack. Publishes (or, with `delete: true`, retracts) a
    Home Assistant MQTT discovery payload for a single entity, with optional
    state and attributes seeding controlled by `initialize_mode` /
    `attributes_mode` and a `create_mode` enum.
  mode: parallel
  max: 100
  fields:
    component:
      name: Component
      description: >
        MQTT discovery component. Limited to the set supported by HA's MQTT
        discovery integration; see
        https://www.home-assistant.io/integrations/mqtt/#discovery-topic.
      required: true
      selector:
        select:
          mode: dropdown
          custom_value: false
          options:
            - alarm_control_panel
            - binary_sensor
            - button
            - camera
            - climate
            - cover
            - device_automation
            - device_tracker
            - event
            - fan
            - humidifier
            - image
            - lawn_mower
            - light
            - lock
            - notify
            - number
            - scene
            - select
            - sensor
            - siren
            - switch
            - tag
            - text
            - update
            - vacuum
            - valve
            - water_heater
    object_id:
      name: Object ID
      description: >
        Unique object_id used to build the discovery topic and the entity's
        unique_id (when one isn't supplied explicitly). The resulting HA
        entity_id will be `<component>.<object_id>` unless overridden by the
        device or user.
      required: true
      selector:
        text: {}
    delete:
      name: Delete
      description: >
        When true, publish an empty retained payload to the discovery topic to
        retract the entity. All other fields are ignored when delete is true.
      required: false
      default: false
      selector:
        boolean: {}
    create_mode:
      name: Create Mode
      description: >
        Controls when the discovery config is (re)published.
        `always` (default) publishes every call — safe because retained MQTT
        topics deduplicate. `if_missing` only publishes when the entity does
        not already exist (resolved as `<component>.<object_id>` having a
        state not in unknown/unavailable/none). `never` skips the discovery
        publish entirely — useful for state/attribute-only top-ups against an
        entity that was created on a previous call.
      required: false
      default: always
      selector:
        select:
          mode: dropdown
          options:
            - always
            - if_missing
            - never
    initialize_mode:
      name: Initialize Mode
      description: >
        How to publish the optional `initial_state`. `set_if_missing` (default)
        only publishes when the current state is unknown/unavailable/none.
        `always` publishes every call. `never` skips state publishing.
      required: false
      default: set_if_missing
      selector:
        select:
          mode: dropdown
          options:
            - set_if_missing
            - always
            - never
    attributes_mode:
      name: Attributes Mode
      description: Same semantics as initialize_mode but for `initial_attributes`.
      required: false
      default: set_if_missing
      selector:
        select:
          options:
            - set_if_missing
            - always
            - never
    initial_state:
      name: Initial State
      description: Optional. Payload to publish to the state topic on create.
      required: false
      default: ''
      selector:
        text:
          multiline: true
    initial_attributes:
      name: Initial Attributes
      description: Optional. Dict to publish as JSON to the attributes topic.
      required: false
      default: {}
      selector:
        object: {}
    ha_topic:
      name: HA Discovery Topic Prefix
      description: Defaults to `homeassistant` (matches MQTT's discovery_prefix).
      required: false
      default: homeassistant
      selector:
        text: {}
    device_topic:
      name: Device Topic Base
      description: >
        Optional base topic the entity's state/command topics live under.
        If empty, defaults to `<component>/<object_id>`.
      required: false
      default: ''
      selector:
        text: {}
    name:
      name: Display Name
      description: Friendly entity name (required when delete is false).
      required: false
      default: ''
      selector:
        text: {}
    unique_id:
      name: Unique ID
      description: Overrides the default unique_id (= object_id).
      required: false
      default: ''
      selector:
        text: {}
    device:
      name: Device Block
      description: >
        Dict with at least `identifiers` plus any of `name`, `manufacturer`,
        `model`, `suggested_area`. Combined into the discovery payload's
        `device` field. Required when delete is false.
      required: false
      default: {}
      selector:
        object: {}
    state_topic:
      name: State Topic
      description: Override; defaults to `<device_topic>/state`.
      required: false
      default: ''
      selector:
        text: {}
    command_topic:
      name: Command Topic
      description: Override; defaults to `<device_topic>/set`.
      required: false
      default: ''
      selector:
        text: {}
    availability_topic:
      name: Availability Topic
      required: false
      default: ''
      selector:
        text: {}
    value_template:
      name: Value Template
      required: false
      default: ''
      selector:
        text:
          multiline: true
    command_template:
      name: Command Template
      required: false
      default: ''
      selector:
        text:
          multiline: true
    json_attributes_topic:
      name: JSON Attributes Topic
      required: false
      default: ''
      selector:
        text: {}
    json_attributes_template:
      name: JSON Attributes Template
      required: false
      default: ''
      selector:
        text:
          multiline: true
    payload_on:
      required: false
      default: ''
      selector:
        text: {}
    payload_off:
      required: false
      default: ''
      selector:
        text: {}
    state_on:
      required: false
      default: ''
      selector:
        text: {}
    state_off:
      required: false
      default: ''
      selector:
        text: {}
    payload_press:
      required: false
      default: ''
      selector:
        text: {}
    device_class:
      required: false
      default: ''
      selector:
        text: {}
    unit_of_measurement:
      required: false
      default: ''
      selector:
        text: {}
    state_class:
      required: false
      default: ''
      selector:
        text: {}
    icon:
      required: false
      default: ''
      selector:
        text: {}
    entity_category:
      required: false
      default: ''
      selector:
        text: {}
    suggested_display_precision:
      required: false
      default: ''
      selector:
        text: {}
    expire_after:
      required: false
      default: ''
      selector:
        text: {}
    optimistic:
      required: false
      default: ''
      selector:
        text: {}
    min:
      required: false
      default: ''
      selector:
        text: {}
    max:
      required: false
      default: ''
      selector:
        text: {}
    step:
      required: false
      default: ''
      selector:
        text: {}
    mode:
      required: false
      default: ''
      selector:
        text: {}
    options:
      name: Options
      description: List of strings for select components.
      required: false
      default: []
      selector:
        object: {}
    extra:
      name: Extra Config Fields
      description: >
        Free-form dict merged into the final discovery payload. Use for fields
        not enumerated above (e.g. `name_template`, `qos`, custom keys).
      required: false
      default: {}
      selector:
        object: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
  sequence:
    # ── Step 0: Normalize inputs ────────────────────────────────────────────
    - variables:
        _component: '{{ component | trim }}'
        _object_id: '{{ object_id | trim }}'
        _delete: '{{ (delete | default(false)) | bool(false) }}'
        _err_mode: '{{ (error_mode | default("log") | lower) }}'
        _ha_topic: '{{ (ha_topic | default("homeassistant")) | trim or "homeassistant" }}'
        _device_topic: >-
          {%- set dt = device_topic | default("") | trim -%}
          {{ dt if dt != "" else (_component ~ "/" ~ _object_id) }}
        _initialize_mode: '{{ (initialize_mode | default("set_if_missing") | lower) }}'
        _attributes_mode: '{{ (attributes_mode | default("set_if_missing") | lower) }}'
        _ha_entity_id: '{{ _component ~ "." ~ _object_id }}'
        _discovery_topic: '{{ _ha_topic ~ "/" ~ _component ~ "/" ~ _object_id ~ "/config" }}'

    # ── Step 1: Delete path (publish empty retained payload, return) ────────
    - if:
        - condition: template
          value_template: '{{ _delete }}'
      then:
        - action: mqtt.publish
          data:
            topic: '{{ _discovery_topic }}'
            retain: true
            payload: ''
        - stop: 'labeled_feature_entities: delete dispatched.'

    # ── Step 2: create_mode handling ────────────────────────────────────────
    - variables:
        _create_mode: '{{ (create_mode | default("always") | lower) }}'
        _entity_exists: >-
          {{ states(_ha_entity_id) not in ['unknown', 'unavailable', 'none', None] }}
        _should_publish_config: >-
          {%- if _create_mode == 'never' -%}false
          {%- elif _create_mode == 'if_missing' -%}{{ not _entity_exists }}
          {%- else -%}true
          {%- endif -%}

    # ── Step 3: Validate required fields for non-delete path ───────────────
    - if:
        - condition: template
          value_template: '{{ (name | default("") | trim) == "" or (device | default({}) | length) == 0 }}'
      then:
        - action: script.labeled_feature_error_mode
          data:
            error_mode: '{{ _err_mode }}'
            source: Labeled Feature Entities
            message: >-
              Missing required field(s) for {{ _component }}.{{ _object_id }}:
              name={{ name | default('') }}, device={{ device | default({}) }}.
        - if:
            - condition: template
              value_template: '{{ _err_mode == "stop" }}'
          then:
            - stop: 'labeled_feature_entities: missing required fields.'
              error: true
        - stop: 'labeled_feature_entities: validation failed (handled per error_mode).'

    # ── Step 4: Build the discovery payload ─────────────────────────────────
    - variables:
        _payload_base: >-
          {% set d = {} %}
          {% set d = dict(d, **{'name': name}) %}
          {% set d = dict(d, **{'unique_id': (unique_id | default('') | trim) or _object_id}) %}
          {% set d = dict(d, **{'object_id': _object_id}) %}
          {% set _st = (state_topic | default('') | trim) %}
          {% set _ct = (command_topic | default('') | trim) %}
          {% if _st != '' %}{% set d = dict(d, **{'state_topic': _st}) %}{% endif %}
          {% if _ct != '' %}{% set d = dict(d, **{'command_topic': _ct}) %}{% endif %}
          {% if availability_topic | default('') | trim != '' %}{% set d = dict(d, **{'availability_topic': availability_topic | trim}) %}{% endif %}
          {% if value_template | default('') | trim != '' %}{% set d = dict(d, **{'value_template': value_template}) %}{% endif %}
          {% if command_template | default('') | trim != '' %}{% set d = dict(d, **{'command_template': command_template}) %}{% endif %}
          {% if json_attributes_topic | default('') | trim != '' %}{% set d = dict(d, **{'json_attributes_topic': json_attributes_topic | trim}) %}{% endif %}
          {% if json_attributes_template | default('') | trim != '' %}{% set d = dict(d, **{'json_attributes_template': json_attributes_template}) %}{% endif %}
          {% if payload_on | default('') | trim != '' %}{% set d = dict(d, **{'payload_on': payload_on}) %}{% endif %}
          {% if payload_off | default('') | trim != '' %}{% set d = dict(d, **{'payload_off': payload_off}) %}{% endif %}
          {% if state_on | default('') | trim != '' %}{% set d = dict(d, **{'state_on': state_on}) %}{% endif %}
          {% if state_off | default('') | trim != '' %}{% set d = dict(d, **{'state_off': state_off}) %}{% endif %}
          {% if payload_press | default('') | trim != '' %}{% set d = dict(d, **{'payload_press': payload_press}) %}{% endif %}
          {% if device_class | default('') | trim != '' %}{% set d = dict(d, **{'device_class': device_class | trim}) %}{% endif %}
          {% if unit_of_measurement | default('') | trim != '' %}{% set d = dict(d, **{'unit_of_measurement': unit_of_measurement | trim}) %}{% endif %}
          {% if state_class | default('') | trim != '' %}{% set d = dict(d, **{'state_class': state_class | trim}) %}{% endif %}
          {% if icon | default('') | trim != '' %}{% set d = dict(d, **{'icon': icon | trim}) %}{% endif %}
          {% if entity_category | default('') | trim != '' %}{% set d = dict(d, **{'entity_category': entity_category | trim}) %}{% endif %}
          {% if suggested_display_precision | default('') | trim != '' %}{% set d = dict(d, **{'suggested_display_precision': suggested_display_precision | int(0)}) %}{% endif %}
          {% if expire_after | default('') | trim != '' %}{% set d = dict(d, **{'expire_after': expire_after | int(0)}) %}{% endif %}
          {% if optimistic | default('') | trim != '' %}{% set d = dict(d, **{'optimistic': (optimistic | lower in ['true', '1', 'yes'])}) %}{% endif %}
          {% if min | default('') | trim != '' %}{% set d = dict(d, **{'min': min | float(0)}) %}{% endif %}
          {% if max | default('') | trim != '' %}{% set d = dict(d, **{'max': max | float(0)}) %}{% endif %}
          {% if step | default('') | trim != '' %}{% set d = dict(d, **{'step': step | float(1)}) %}{% endif %}
          {% if mode | default('') | trim != '' %}{% set d = dict(d, **{'mode': mode | trim}) %}{% endif %}
          {% set _opts = options | default([]) %}
          {% if _opts | length > 0 %}{% set d = dict(d, **{'options': _opts}) %}{% endif %}
          {% set d = dict(d, **{'retain': true}) %}
          {% set d = dict(d, **{'device': device}) %}
          {% set _extra = extra | default({}) %}
          {% if _extra | length > 0 %}{% set d = dict(d, **_extra) %}{% endif %}
          {{ d }}

    # ── Step 5: Publish discovery config (gated by create_mode) ─────────────
    - if:
        - condition: template
          value_template: '{{ _should_publish_config }}'
      then:
        - action: mqtt.publish
          data:
            topic: '{{ _discovery_topic }}'
            retain: true
            payload: '{{ _payload_base | to_json }}'

    # ── Step 6: Seed state per initialize_mode ──────────────────────────────
    - variables:
        _has_initial_state: '{{ (initial_state | default("") | string | trim) != "" }}'
        _should_publish_state: >-
          {% if not _has_initial_state %}false
          {% elif _initialize_mode == 'never' %}false
          {% elif _initialize_mode == 'always' %}true
          {% else %}{{ not _entity_exists }}{% endif %}
        _resolved_state_topic: >-
          {{ (state_topic | default('') | trim) or (_device_topic ~ '/state') }}
    - if:
        - condition: template
          value_template: '{{ _should_publish_state }}'
      then:
        - action: mqtt.publish
          data:
            topic: '{{ _resolved_state_topic }}'
            retain: true
            payload: '{{ initial_state }}'

    # ── Step 7: Seed attributes per attributes_mode ────────────────────────
    - variables:
        _has_initial_attrs: '{{ (initial_attributes | default({}) | length) > 0 }}'
        _attrs_existing: >-
          {% set jat = state_attr(_ha_entity_id, 'attribution') %}
          {{ state_attr(_ha_entity_id, 'friendly_name') is not none }}
        _should_publish_attrs: >-
          {% if not _has_initial_attrs %}false
          {% elif _attributes_mode == 'never' %}false
          {% elif _attributes_mode == 'always' %}true
          {% else %}{{ not _entity_exists }}{% endif %}
        _resolved_attrs_topic: >-
          {{ (json_attributes_topic | default('') | trim) or (_device_topic ~ '/attributes') }}
    - if:
        - condition: template
          value_template: '{{ _should_publish_attrs }}'
      then:
        - action: mqtt.publish
          data:
            topic: '{{ _resolved_attrs_topic }}'
            retain: true
            payload: '{{ initial_attributes | to_json }}'


# ============================================================================
# Labeled Feature Area — per-feature dispatcher
# ============================================================================
# Single-feature dispatcher for the Labeled Feature Areas stack. Shaped like
# `labeled_feature_somrig` / `labeled_feature_generics`: a big `choose:` block
# that branches on `feature` and dispatches one or more `labeled_feature_entities`
# calls to create the underlying MQTT discovery entities.
#
# Built-in branches:
#   - Manifest    → sensor.area_manifest_<area_id>
#   - Shoot Zone  → sensor.<scope_id>_vpd  (Antoine-equation VPD value_template)
#   - Root Zone   → number.<scope_id>_tracked_psi
#
# Generic branch (any other Gen: <FeatureName>):
#   - select.<scope_id>_<slug(F)>  with options resolved from:
#       * static_options (already pre-computed in feature_data from
#         `(scope-prefix)Gen Options: <F>: a|b|c` labels)
#       * dynamic entity pool from `(scope-prefix)Gen Option: <F>` labels in scope
#       * minus `(scope-prefix)Gen <F> Exclude: True` labels
labeled_feature_area:
  alias: Labeled Feature Area
  description: >
    Per-feature dispatcher for the Labeled Feature Areas stack. Resolves
    scope, computes the canonical `object_id` for the feature (the
    sensor no longer carries one), builds the appropriate MQTT discovery
    payload (or payloads) and delegates publishing — or retraction, when
    `delete: true` — to `script.labeled_feature_entities`.

    Single source of truth for "feature → component + object_id"
    mapping. Adding a new built-in feature is a one-line edit to the
    matching branch's `_obj` / `_component` defaults; arbitrary features
    fall through to the generic select / component-override branches.
  mode: parallel
  max: 100
  fields:
    feature:
      name: Feature
      description: >
        Feature name as it appears in the
        `(Area |Floor |)Provides: <FeatureName>` label. Examples:
        'Manifest', 'Shoot Zone', 'Root Zone', or any user-declared
        name like 'Audio Mode' / 'Media Player'.
      required: true
      selector:
        text: {}
    scope_id:
      name: Scope ID
      description: The resolved area_id or floor_id for this feature.
      required: true
      selector:
        text: {}
    scope:
      name: Scope
      description: Scope of the feature (area, floor, or none).
      required: false
      default: area
      selector:
        select:
          options:
            - area
            - floor
            - none
    feature_data:
      name: Feature Data
      description: >
        Pre-computed label_data dict from
        `sensor.labeled_feature_areas_state.label_map[<scope_id>||<feature>].label_data`.
        Currently carries `scope`, `scope_id`, `declaring_area_id` and
        `component` (the optional override from
        `Provides <Feature> Component: <comp>` labels, default
        `select`). Object_id, defaults (min/max/step/icon/etc) are
        owned by this script's per-feature branches.
      required: false
      default: {}
      selector:
        object: {}
    delete:
      name: Delete
      description: >
        When true, retract the MQTT discovery topic(s) for this
        feature instead of publishing them. The script computes the
        same canonical `object_id` it would have published, then
        passes it to `script.labeled_feature_entities` with
        `delete: true`. This is how
        `automation.labeled_feature_areas` cleans up after a label
        removal or a `Component:` swap — the sensor no longer carries
        the object_id, so the only place that knows the canonical
        name for retraction is this script.
      required: false
      default: false
      selector:
        boolean: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
  sequence:
    # ── Step 1: Normalize inputs ────────────────────────────────────────────
    - variables:
        _feature: '{{ feature | trim }}'
        _scope: '{{ (scope | default("area") | lower) }}'
        _scope_id: '{{ scope_id | trim }}'
        _fd: '{{ feature_data | default({}) }}'
        _err_mode: '{{ (error_mode | default("log") | lower) }}'
        _safe_scope_id: '{{ _scope_id | replace(" ", "_") | replace("-", "_") | lower }}'
        _delete: '{{ delete | default(false) | bool(false) }}'
        _scope_prefix: >-

          {{ 'Area ' if _scope == 'area' else ('Floor ' if _scope == 'floor' else '') }}
        _declared_area_id: '{{ _fd.get("declared_area_id", "") }}'
        _scope_name: >-
          {%- if _scope == 'area' -%}{{ area_name(_scope_id) | default(_scope_id, true) }}
          {%- elif _scope == 'floor' -%}{{ _scope_id }}
          {%- else -%}{{ area_name(_declared_area_id) | default(_declared_area_id, true) }}
          {%- endif -%}

    # ── Step 2: Resolve scope entity set ────────────────────────────────────
    - variables:
        scope_entity_set: >-
          {% if _scope == 'area' and _scope_id != '' %}
            {% set area_ents = area_entities(_scope_id) | list %}
            {% set area_devs = area_devices(_scope_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% elif _scope == 'floor' and _scope_id != '' %}
            {% set ns = namespace(ents=[]) %}
            {% for a in floor_areas(_scope_id) %}
              {% set ns.ents = ns.ents + area_entities(a) | list %}
              {% for d in area_devices(a) %}
                {% set ns.ents = ns.ents + device_entities(d) | list %}
              {% endfor %}
            {% endfor %}
            {{ ns.ents | unique | list }}
          {% else %}
            {#- scope == 'none' → entire entity pool, no scope filter applied -#}
            {{ states | map(attribute='entity_id') | list }}
          {% endif %}

    # ── Step 3: Branch by feature ───────────────────────────────────────────
    - choose:
        # ────────────────────── Manifest ─────────────────────────────────────
        # Canonical object_id (owned here, not by the sensor):
        #   sensor.area_manifest_<safe_scope_id>
        - conditions:
            - condition: template
              value_template: '{{ _feature == "Manifest" }}'
          sequence:
            - variables:
                _aid: '{{ _scope_id }}'
                _safe_aid: '{{ _safe_scope_id }}'
            - if:
                - condition: template
                  value_template: '{{ _delete }}'
              then:
                - action: script.labeled_feature_entities
                  data:
                    component: sensor
                    object_id: 'area_manifest_{{ _safe_aid }}'
                    delete: true
                    error_mode: '{{ _err_mode }}'
                - stop: 'Manifest retracted.'
            - variables:
                _ent_ids: '{{ area_entities(_aid) | list }}'
                _dev_ids: '{{ area_devices(_aid) | list }}'
                _ent_count: '{{ _ent_ids | length }}'
                _dev_count: '{{ _dev_ids | length }}'
                _aname: '{{ area_name(_aid) | default(_aid, true) }}'
                _label_map: >-
                  {% set ns = namespace(data={}) %}
                  {% for lbl_id in labels() %}
                    {% set match_ents = label_entities(lbl_id) | select('in', _ent_ids) | list %}
                    {% if match_ents | length > 0 %}
                      {% set ns.data = dict(ns.data, **{lbl_id: match_ents}) %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.data }}
            - action: script.labeled_feature_entities
              data:
                component: sensor
                object_id: 'area_manifest_{{ _safe_aid }}'
                name: '{{ _aname }} Area Manifest'
                icon: mdi:format-list-bulleted-square
                device:
                  identifiers: ['area_manifest_{{ _safe_aid }}']
                  name: '{{ _aname }} Area'
                  manufacturer: Home Assistant
                  model: Area Manifest
                  # `suggested_area` accepts area_id (preferred — survives renames)
                  # or area_name. We pass the id. Only honored on first creation.
                  suggested_area: '{{ _aid }}'
                state_topic: 'area_manifests/{{ _safe_aid }}/state'
                json_attributes_topic: 'area_manifests/{{ _safe_aid }}/attributes'
                initialize_mode: always
                attributes_mode: always
                initial_state: '{{ _ent_count }}'
                initial_attributes:
                  area_id: '{{ _aid }}'
                  area_name: '{{ _aname }}'
                  entity_ids: '{{ _ent_ids }}'
                  device_ids: '{{ _dev_ids }}'
                  entity_count: '{{ _ent_count }}'
                  device_count: '{{ _dev_count }}'
                  labels: '{{ _label_map }}'
                error_mode: '{{ _err_mode }}'

        # ────────────────────── Shoot Zone (VPD) ─────────────────────────────
        - conditions:
            - condition: template
              value_template: '{{ _feature == "Shoot Zone" }}'
          sequence:
            - variables:
                _obj: '{{ _safe_scope_id ~ "_vpd" }}'
            - if:
                - condition: template
                  value_template: '{{ _delete }}'
              then:
                - action: script.labeled_feature_entities
                  data:
                    component: sensor
                    object_id: '{{ _obj }}'
                    delete: true
                    error_mode: '{{ _err_mode }}'
                - stop: 'Shoot Zone retracted.'
            - action: script.labeled_feature_entities
              data:
                component: sensor
                object_id: '{{ _obj }}'
                # Friendly name prefixed with scope name so the entity is
                # globally identifiable in pickers / voice / history.
                name: '{{ _scope_name }} VPD'
                icon: '{{ _fd.get("icon", "") }}'
                device_class: '{{ _fd.get("device_class", "pressure") }}'
                unit_of_measurement: '{{ _fd.get("unit_of_measurement", "kPa") }}'
                state_class: measurement
                device:
                  identifiers: ['{{ _safe_scope_id }}']
                  name: '{{ _scope_name }}'
                  manufacturer: Labeled Feature Area
                  model: Shoot Zone
                  # id-keyed (preferred — survives renames). Floor / none
                  # scopes have no area_id of their own; fall back to the
                  # declaring area's id, then to _scope_name as last resort.
                  suggested_area: >-
                    {{ _scope_id if _scope == 'area'
                       else (_declared_area_id if _declared_area_id else _scope_name) }}
                state_topic: 'tracked_area/{{ _safe_scope_id }}/vpd'
                expire_after: '300'
                suggested_display_precision: '2'
                value_template: >-
                  {% set temp_sensors = states.sensor
                       | selectattr('entity_id', 'in', scope_entity_set)
                       | selectattr('attributes.device_class', 'defined')
                       | selectattr('attributes.device_class', 'match', 'temperature')
                       | list %}
                  {% set humidity_sensors = states.sensor
                       | selectattr('entity_id', 'in', scope_entity_set)
                       | selectattr('attributes.device_class', 'defined')
                       | selectattr('attributes.device_class', 'match', 'humidity')
                       | list %}
                  {% if temp_sensors | length > 0 and humidity_sensors | length > 0 %}
                    {% set ns = namespace(celsius_temps=[]) %}
                    {% for sensor in temp_sensors %}
                      {% set temp = sensor.state | float %}
                      {% set unit = sensor.attributes.unit_of_measurement %}
                      {% if unit == '°F' %}{% set celsius_temp = (temp - 32) * 5/9 %}
                      {% else %}{% set celsius_temp = temp %}{% endif %}
                      {% set ns.celsius_temps = ns.celsius_temps + [celsius_temp] %}
                    {% endfor %}
                    {% set avg_temp = ns.celsius_temps | average %}
                    {% set avg_humidity = humidity_sensors
                         | map(attribute='state')
                         | map('float', 0)
                         | average %}
                    {% set svp = 0.61078 * (10 ** ((7.5 * avg_temp) / (237.3 + avg_temp))) %}
                    {% set avp = svp * (avg_humidity / 100) %}
                    {{ (svp - avp) | round(2) }}
                  {% else %}unavailable{% endif %}
                error_mode: '{{ _err_mode }}'

        # ────────────────────── Root Zone (Tracked PSI) ──────────────────────
        - conditions:
            - condition: template
              value_template: '{{ _feature == "Root Zone" }}'
          sequence:
            - variables:
                _obj: '{{ _safe_scope_id ~ "_tracked_psi" }}'
            - if:
                - condition: template
                  value_template: '{{ _delete }}'
              then:
                - action: script.labeled_feature_entities
                  data:
                    component: number
                    object_id: '{{ _obj }}'
                    delete: true
                    error_mode: '{{ _err_mode }}'
                - stop: 'Root Zone retracted.'
            - variables:
                _initial: '{{ _fd.get("initial", "0") | default("0", true) }}'
                _min: '{{ _fd.get("min", "0") | default("0", true) }}'
                _max: '{{ _fd.get("max", "2000") | default("2000", true) }}'
                _step: '{{ _fd.get("step", "0.1") | default("0.1", true) }}'
            - action: script.labeled_feature_entities
              data:
                component: number
                object_id: '{{ _obj }}'
                # Scope-prefixed friendly name for global identifiability.
                name: '{{ _scope_name }} Tracked PSI'
                icon: '{{ _fd.get("icon", "") }}'
                device_class: '{{ _fd.get("device_class", "pressure") }}'
                unit_of_measurement: '{{ _fd.get("unit_of_measurement", "PSI") }}'
                state_class: total_increasing
                device:
                  identifiers: ['{{ _safe_scope_id }}']
                  name: '{{ _scope_name }}'
                  manufacturer: Labeled Feature Area
                  model: Root Zone
                  # id-keyed (preferred — survives renames).
                  suggested_area: >-
                    {{ _scope_id if _scope == 'area'
                       else (_declared_area_id if _declared_area_id else _scope_name) }}
                state_topic: 'tracked_area/{{ _safe_scope_id }}/tracked_psi'
                command_topic: 'tracked_area/{{ _safe_scope_id }}/tracked_psi'
                min: '{{ _min }}'
                max: '{{ _max }}'
                step: '{{ _step }}'
                mode: box
                optimistic: 'true'
                expire_after: '0'
                suggested_display_precision: '2'
                initial_state: '{{ _initial }}'
                initialize_mode: set_if_missing
                error_mode: '{{ _err_mode }}'

        # ────────────────────── Generic Provides: <F> (default → select) ─────
        # Pool resolution uses the same 4-step Provides resolver as
        # labeled_feature_generics:
        #   1. <_feature>                                  (exact, global)
        #   2. <scope_prefix>Provides: <_feature>          (scoped)
        #   3. <scope_prefix>Follower: <_feature>          (scoped)
        #   4. <scope_prefix>Leader: <_feature>            (scoped)
        # First non-empty candidate wins.  Excludes are `<_feature> Exclude: True`
        # and `<scope_prefix><_feature> Exclude: True`.  Per-entity display-label
        # override is `<scope_prefix>Provides Option <_feature>: <Custom>`.
        - conditions:
            - condition: template
              value_template: '{{ _fd.get("component", "select") == "select" }}'
          sequence:
            - variables:
                _fslug: '{{ _feature | lower | replace(" ", "_") | replace("-", "_") }}'
                _obj: '{{ _safe_scope_id ~ "_" ~ _fslug }}'
            - if:
                - condition: template
                  value_template: '{{ _delete }}'
              then:
                - action: script.labeled_feature_entities
                  data:
                    component: select
                    object_id: '{{ _obj }}'
                    delete: true
                    error_mode: '{{ _err_mode }}'
                - stop: 'Generic select retracted.'
            - variables:
                _exclude_label_bare:   '{{ _feature ~ " Exclude: True" }}'
                _exclude_label_scoped: '{{ _scope_prefix ~ _feature ~ " Exclude: True" }}'
                _excluded_ents: >-
                  {{ (label_entities(_exclude_label_bare) | list
                      + label_entities(_exclude_label_scoped) | list)
                     | unique | list }}
                _resolved_pool: >-
                  {% set ns = namespace(out=[]) %}
                  {% set candidates = [
                    _feature,
                    _scope_prefix ~ 'Provides: ' ~ _feature,
                    _scope_prefix ~ 'Follower: ' ~ _feature,
                    _scope_prefix ~ 'Leader: '   ~ _feature
                  ] %}
                  {% for c in candidates %}
                    {% if ns.out | length == 0 %}
                      {% set ents = label_entities(c) | list %}
                      {% if _scope_prefix != '' and c != _feature and scope_entity_set | length > 0 and _scope != 'none' %}
                        {% set ents = ents | select('in', scope_entity_set) | list %}
                      {% endif %}
                      {% if ents | length > 0 %}{% set ns.out = ents %}{% endif %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.out }}
                _opt_ents_in_scope: '{{ _resolved_pool | reject("in", _excluded_ents) | list }}'
            - variables:
                _dynamic_options: >-
                  {% set ns = namespace(items=[]) %}
                  {% for ent in _opt_ents_in_scope %}
                    {% set lbls = labels(ent) | map('label_name') | reject('none') | list %}
                    {#- Per-entity custom dropdown label:
                        `<scope_prefix>Provides Option <_feature>: <Custom>`
                        (with bare unscoped fallback). -#}
                    {% set scoped_pfx = _scope_prefix ~ 'Provides Option ' ~ _feature ~ ': ' %}
                    {% set bare_pfx   = 'Provides Option ' ~ _feature ~ ': ' %}
                    {% set custom_scoped = lbls | select('match', '^' ~ scoped_pfx ~ '.+$') | first | default('') %}
                    {% set custom_bare   = lbls | select('match', '^' ~ bare_pfx ~ '.+$') | first | default('') %}
                    {% set custom = custom_scoped if custom_scoped != '' else custom_bare %}
                    {% set display_label = (custom | regex_replace('^.+: ', '') | trim) if custom != '' else (state_attr(ent, 'friendly_name') or ent) %}
                    {% set ns.items = ns.items + [{'value': ent, 'label': display_label}] %}
                  {% endfor %}
                  {{ ns.items }}
                _static_options: '{{ _fd.get("static_options", []) }}'
                _combined_options: '{{ (_static_options + _dynamic_options) | list }}'
                _options_only_values: '{{ _combined_options | map(attribute="value") | list }}'
                _initial: '{{ _fd.get("initial", "") | default("", true) }}'
            - if:
                - condition: template
                  value_template: '{{ _options_only_values | length == 0 }}'
              then:
                - action: script.labeled_feature_error_mode
                  data:
                    error_mode: '{{ _err_mode }}'
                    source: Labeled Feature Area
                    message: >-
                      No options resolved for select '{{ _feature }}' in scope
                      '{{ _scope }}' (scope_id={{ _scope_id }}).
                - if:
                    - condition: template
                      value_template: '{{ _err_mode == "stop" }}'
                  then:
                    - stop: 'No options resolved.'
                      error: true
                - stop: 'No options resolved (handled per error_mode).'
            - action: script.labeled_feature_entities
              data:
                component: select
                object_id: '{{ _obj }}'
                # Scope-prefixed friendly name for global identifiability.
                name: '{{ _scope_name }} {{ _feature }}'
                icon: '{{ _fd.get("icon", "") }}'
                device:
                  identifiers: ['{{ _safe_scope_id }}_{{ _fslug }}']
                  name: '{{ _scope_name }} {{ _feature }}'
                  manufacturer: Labeled Feature Area
                  model: Generated Select
                  # id-keyed (preferred — survives renames).
                  suggested_area: >-
                    {{ _scope_id if _scope == 'area'
                       else (_declared_area_id if _declared_area_id else _scope_name) }}
                state_topic: 'labeled_feature/areas/{{ _safe_scope_id }}/{{ _fslug }}/state'
                command_topic: 'labeled_feature/areas/{{ _safe_scope_id }}/{{ _fslug }}/set'
                options: '{{ _options_only_values }}'
                initial_state: '{{ _initial if _initial != "" else _options_only_values[0] }}'
                initialize_mode: set_if_missing
                error_mode: '{{ _err_mode }}'

        # ────────────────────── Generic Gen: <F> with Component override ────
        # (e.g. Component: number, Component: switch, Component: sensor)
        - conditions:
            - condition: template
              value_template: '{{ _fd.get("component", "") not in ["", "select"] }}'
          sequence:
            - variables:
                _fslug: '{{ _feature | lower | replace(" ", "_") | replace("-", "_") }}'
                _comp: '{{ _fd.get("component") }}'
                _obj: '{{ _safe_scope_id ~ "_" ~ _fslug }}'
            - if:
                - condition: template
                  value_template: '{{ _delete }}'
              then:
                - action: script.labeled_feature_entities
                  data:
                    component: '{{ _comp }}'
                    object_id: '{{ _obj }}'
                    delete: true
                    error_mode: '{{ _err_mode }}'
                - stop: 'Generic component-override retracted.'
            - variables:
                _initial: '{{ _fd.get("initial", "") | default("", true) }}'
                _min: '{{ _fd.get("min", "0") | default("0", true) }}'
                _max: '{{ _fd.get("max", "100") | default("100", true) }}'
                _step: '{{ _fd.get("step", "1") | default("1", true) }}'
                _unit: '{{ _fd.get("unit_of_measurement", "") }}'
                _dc: '{{ _fd.get("device_class", "") }}'
                _icon: '{{ _fd.get("icon", "") }}'
            - action: script.labeled_feature_entities
              data:
                component: '{{ _comp }}'
                object_id: '{{ _obj }}'
                # Scope-prefixed friendly name for global identifiability.
                name: '{{ _scope_name }} {{ _feature }}'
                icon: '{{ _icon }}'
                device_class: '{{ _dc }}'
                unit_of_measurement: '{{ _unit }}'
                device:
                  identifiers: ['{{ _safe_scope_id }}_{{ _fslug }}']
                  name: '{{ _scope_name }} {{ _feature }}'
                  manufacturer: Labeled Feature Area
                  model: 'Generated {{ _comp }}'
                  # id-keyed (preferred — survives renames).
                  suggested_area: >-
                    {{ _scope_id if _scope == 'area'
                       else (_declared_area_id if _declared_area_id else _scope_name) }}
                state_topic: 'labeled_feature/areas/{{ _safe_scope_id }}/{{ _fslug }}/state'
                command_topic: 'labeled_feature/areas/{{ _safe_scope_id }}/{{ _fslug }}/set'
                min: '{{ _min if _comp == "number" else "" }}'
                max: '{{ _max if _comp == "number" else "" }}'
                step: '{{ _step if _comp == "number" else "" }}'
                mode: '{{ "box" if _comp == "number" else "" }}'
                optimistic: 'true'
                initial_state: '{{ _initial }}'
                initialize_mode: set_if_missing
                error_mode: '{{ _err_mode }}'

      default:
        - action: script.labeled_feature_error_mode
          data:
            error_mode: '{{ _err_mode }}'
            source: Labeled Feature Area
            message: "Unknown feature '{{ _feature }}' in scope '{{ _scope }}' (scope_id={{ _scope_id }})."
        - if:
            - condition: template
              value_template: '{{ _err_mode == "stop" }}'
          then:
            - stop: "Labeled Feature Area: unknown feature '{{ _feature }}'."
              error: true
