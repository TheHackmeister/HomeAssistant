  - variables:
      list_ids_in_swimlane: '{{ swimlane_cards.content | map(attribute=''listId'')
        | unique | list }}'
      lists_in_swimlane: '{{ all_lists.content | selectattr(''_id'', ''in'', list_ids_in_swimlane)
        | list }}'
  - repeat:
      sequence:
      - action: rest_command.get_card
        metadata: {}
        data:
          boardId: '{{ boardId }}'
          listId: '{{ repeat.item.listId }}'
          cardId: '{{ repeat.item._id }}'
        response_variable: full_card_details
      - variables:
          card_label_ids: '{{ full_card_details.content.get(''labelIds'', []) if full_card_details.content.get(''labelIds'')
            is not none else [] }}'
      - if:
        - condition: template
          value_template: '{{ card_label_ids | length > 0 }}'
        then:
        - variables:
            current_list_match: '{{ all_lists.content | selectattr(''_id'', ''eq'',
              full_card_details.content.listId) | list }}

              '
            current_list_title: '{{ current_list_match[0].title if current_list_match
              | length > 0 else '''' }}

              '
        - repeat:
            sequence:
            - variables:
                label_match: '{{ all_labels | selectattr(''_id'', ''eq'', repeat.item)
                  | list }}

                  '
                label_name: '{{ label_match[0].name if label_match | length > 0 else
                  '''' }}

                  '
            - if:
              - condition: template
                value_template: '{{ label_name != "" }}'
              then:
              - variables:
                  matching_list: '{{ lists_in_swimlane | selectattr(''title'', ''eq'',
                    label_name) | list }}

                    '
                  target_list_id: '{{ matching_list[0]._id if matching_list | length
                    > 0 else '''' }}

                    '
              - if:
                - condition: template
                  value_template: '{{ target_list_id != "" and target_list_id != full_card_details.content.listId
                    }}'
                then:
                - action: system_log.write
                  metadata: {}
                  data:
                    level: info
                    message: Moving card "{{ full_card_details.content.title }}" from
                      "{{ current_list_title }}" to "{{ label_name }}" based on label
                - action: rest_command.move_card_to_swimlane
                  metadata: {}
                  data:
                    cardId: '{{ full_card_details.content._id }}'
                    listId: '{{ full_card_details.content.listId }}'
                    boardId: '{{ boardId }}'
                    swimlaneId: '{{ swimlaneId }}'
                    newListId: '{{ target_list_id }}'
                  response_variable: move_result
            for_each: '{{ card_label_ids }}'
      for_each: '{{ swimlane_cards.content }}'
  alias: 'Boards: Organize Cards by Labels'
  description: Moves cards to lists that match their label names (FIXED - fetches
    full card details)
  fields:
    boardId:
      selector:
        text:
      name: boardId
      description: Board ID
      default: TrfngHQf8PWj9mnqC
      required: false
    swimlane_name:
      selector:
        text:
      name: Swimlane Name
      description: Name of the swimlane to organize
      default: Default
      required: true
boards_update_recurring_tasks:
  sequence:
  - action: rest_command.get_board_swimlanes
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_swimlanes
  - variables:
      from_swimlane_match: '{{ all_swimlanes.content | selectattr(''title'', ''eq'',
        from_swimlane_name) | list }}

        '
      from_swimlaneId: '{{ from_swimlane_match[0]._id if from_swimlane_match | length
        > 0 else '''' }}

        '
  - if:
    - condition: template
      value_template: '{{ from_swimlaneId == "" }}'
    then:
    - action: system_log.write
      metadata: {}
      data:
        level: error
        message: 'Could not find swimlane: {{ from_swimlane_name }}'
    - stop: ''
      enabled: false
  - action: rest_command.get_board_lists
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_lists
  - action: rest_command.get_board
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: board_data
  - variables:
      all_labels: '{{ board_data.content.labels if board_data.content.labels is defined
        else [] }}'
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ from_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: from_cards
  - if:
    - condition: template
      value_template: '{{ from_cards.content | count == 0 }}'
    then:
    - action: persistent_notification.create
      metadata: {}
      data:
        message: No cards found in {{ from_swimlane_name }} swimlane
    - stop: ''
      enabled: false
  - repeat:
      sequence:
      - variables:
          card_list_match: '{{ all_lists.content | selectattr(''_id'', ''eq'', repeat.item.listId)
            | list }}

            '
          card_list_title: '{{ card_list_match[0].title if card_list_match | length
            > 0 else '''' }}

            '
      - if:
        - condition: template
          value_template: '{{ card_list_title == from_list_name }}'
        then:
        - action: rest_command.get_card
          metadata: {}
          data:
            boardId: '{{ boardId }}'
            listId: '{{ repeat.item.listId }}'
            cardId: '{{ repeat.item._id }}'
          response_variable: full_card_details
        - variables:
            card_label_ids: '{{ full_card_details.content.get(''labelIds'', []) if
              full_card_details.content.get(''labelIds'') is not none else [] }}'
        - if:
          - condition: template
            value_template: '{{ card_label_ids | length > 0 }}'
          then:
          - variables:
              card_label_names: "{% set names = namespace(items=[]) %} {% for label_id
                in card_label_ids %}\n  {% set matching = all_labels | selectattr('_id',
                'eq', label_id) | list %}\n  {% if matching | length > 0 %}\n    {%
                set names.items = names.items + [matching[0].name | lower] %}\n  {%
                endif %}\n{% endfor %} {{ names.items }}"
              has_weekly: '{{ ''weekly'' in card_label_names }}'
              has_bi_weekly: '{{ ''bi-weekly'' in card_label_names }}'
              has_monthly: '{{ ''monthly'' in card_label_names }}'
              has_bi_monthly: '{{ ''bi-monthly'' in card_label_names }}'
              has_quarterly: '{{ ''quarterly'' in card_label_names }}'
              has_bi_quarterly: '{{ ''bi-quarterly'' in card_label_names }}'
              has_yearly: '{{ ''yearly'' in card_label_names }}'
              has_bi_yearly: '{{ ''bi-yearly'' in card_label_names }}'
              has_annually: '{{ ''annually'' in card_label_names }}'
          - variables:
              new_due_date: "{% if has_weekly %}\n  {{ (now() + timedelta(weeks=1)).isoformat()
                }}\n{% elif has_bi_weekly %}\n  {{ (now() + timedelta(weeks=2)).isoformat()
                }}\n{% elif has_monthly %}\n  {{ (now() + timedelta(days=30)).isoformat()
                }}\n{% elif has_quarterly %}\n  {{ (now() + timedelta(days=90)).isoformat()
                }}\n{% elif has_yearly %}\n  {{ (now() + timedelta(days=365)).isoformat()
                }}\n{% elif has_bi_monthly %}\n  {{ (now() + timedelta(days=60)).isoformat()
                }}\n{% elif has_bi_quarterly %}\n  {{ (now() + timedelta(days=180)).isoformat()
                }}\n{% elif has_bi_yearly %}\n  {{ (now() + timedelta(days=730)).isoformat()
                }}\n{% elif has_annually %}\n  {% if full_card_details.content.dueAt
                is defined and full_card_details.content.dueAt != None %}\n    {{
                (as_datetime(full_card_details.content.dueAt) + timedelta(days=365)).isoformat()
                }}\n  {% else %}\n    {{ (now() + timedelta(days=365)).isoformat()
                }}\n  {% endif %}\n{% else %}\n  \n{% endif %}\n"
              recurrence_type: "{% if has_weekly %}\n  weekly\n{% elif has_monthly
                %}\n  monthly\n{% elif has_quarterly %}\n  quarterly\n{% elif has_yearly
                %}\n  yearly\n{% elif has_bi_weekly %}\n  bi-weekly\n{% elif has_bi_monthly
                %}\n  bi-monthly\n{% elif has_bi_quarterly %}\n  bi-quarterly\n{%
                elif has_bi_yearly %}\n  bi-yearly\n{% elif has_annually %}\n  annually\n{%
                else %}\n  none\n{% endif %}\n"
          - if:
            - condition: template
              value_template: '{{ recurrence_type != "none" }}'
            then:
            - variables:
                current_due_date: '{{ full_card_details.content.dueAt if full_card_details.content.dueAt
                  is defined else none }}'
                is_past_due: '{{ current_due_date is none or (current_due_date | as_datetime)
                  < now() }}'
            - if:
              - condition: template
                value_template: '{{ is_past_due }}'
              then:
              - action: system_log.write
                metadata: {}
                data:
                  level: info
                  message: 'Updating {{ recurrence_type }} recurring task "{{ repeat.item.title
                    }}" with new due date: {{ new_due_date }}'
              - action: rest_command.update_card_due_date
                metadata: {}
                data:
                  cardId: '{{ full_card_details.content._id }}'
                  listId: '{{ full_card_details.content.listId }}'
                  boardId: '{{ boardId }}'
                  dueAt: '{{ new_due_date }}'
                response_variable: update_result
              else:
              - action: system_log.write
                metadata: {}
                data:
                  level: debug
                  message: Skipping "{{ repeat.item.title }}" - due date {{ current_due_date
                    }} is in the future
      for_each: '{{ from_cards.content }}'
  alias: 'Boards: Update Recurring Tasks'
  description: Updates due dates for recurring tasks based on their labels (FIXED
    - fetches full card details)
  fields:
    boardId:
      selector:
        text:
      name: boardId
      description: Board ID
      default: TrfngHQf8PWj9mnqC
      required: false
    from_swimlane_name:
      selector:
        text:
      name: From Swimlane Name
      description: Swimlane to check for recurring tasks
      default: Today
      required: true
    from_list_name:
      selector:
        text:
      name: From List Name
      description: List to check for recurring tasks
      default: Inbox/Reset
      required: true
audio_area_based_media_actions:
  alias: 'Audio: Area Based Media Actions'
  fields:
    remote_entity_id:
      description: The entity ID of the remote device
      example: sensor.living_room_remote
    action:
      description: The media action to perform (play_pause, volume_up, etc.)
      example: media_play_pause
  sequence:
  - target:
      area_id: '{{ area_id( remote_entity_id ) }}'
    action: 'media_player.{{ action }}

      '
  description: ''
dose_pressurize_electrolytes:
  sequence:
  - variables:
      pump: '{{ states.switch  | selectattr(''entity_id'', ''in'', area_entities(area_id))  |
        selectattr(''entity_id'', ''in'', label_entities(nutrient)) | map(attribute=''entity_id'')
        | list  | first }}

        '
      sensor: '{{ states.sensor  | selectattr(''entity_id'', ''in'', area_entities(area_id))  |
        selectattr(''entity_id'', ''in'', label_entities(nutrient~'' Sensor'')) |
        map(attribute=''entity_id'') | list | first }}

        '
  - variables:
      dose_under: '{{ states(''number.''~pump.split(''.'')[1]~''_dose_under'')  }}'
  - if:
    - condition: template
      value_template: '{{ override_dose_under or (states(sensor) | float < dose_under
        | float) and (states | selectattr("entity_id", ''in'', area_entities( area_id
        )) | selectattr("entity_id", ''in'', label_entities(''water_supply_mode''))
        |  map(attribute=''state'') | list | first in [ "Volume", "Timed", "Idle"
        ])}}'
    then:
    - action: script.dose_nutrient_v2
      metadata: {}
      data:
        nutrient: 'Nutrient: Electrolytes'
        units: '{{ units }}'
        area_id: '{{ area_id }}'
        tracked: 25
    - variables:
        dose_timed_out: "{{ now() - as_local(state_attr('script.dose_pressurize_electrolytes',
          'last_triggered')) >= timedelta(0, states('number.'~pump.split('.')[1]~'_dose_seconds')
          | float) }} \n"
    - if:
      - condition: and
        conditions:
        - condition: template
          value_template: '{{ dose_timed_out }}'
          enabled: true
        - condition: template
          value_template: '{{ states | selectattr("entity_id", ''in'', area_entities(
            area_id )) | selectattr("entity_id", ''in'', label_entities(''water_supply_mode''))
            |  map(attribute=''state'') | list | first == "Timed" }}'
          enabled: true
      then:
      - action: script.dose_house_plants
        metadata: {}
        data:
          area_id: water_supply_01
          units: 1
        enabled: true
      enabled: true
    - if:
      - condition: or
        conditions:
        - condition: and
          conditions:
          - condition: template
            value_template: '{{ dose_timed_out }}'
            enabled: true
          - condition: template
            value_template: '{{ states | selectattr("entity_id", ''in'', area_entities(
              area_id )) | selectattr("entity_id", ''in'', label_entities(''water_supply_mode''))
              |  map(attribute=''state'') | list | first == "Volume" }}'
            enabled: true
        - condition: and
          conditions:
          - condition: template
            value_template: '{{ states | selectattr("entity_id", ''in'', area_entities(
              area_id )) | selectattr("entity_id", ''in'', label_entities(''nutrient_water_supply_sensor''))
              |  map(attribute=''state'') | list | first | float < 2.0 }}'
            enabled: true
          - condition: template
            value_template: '{{ states | selectattr("entity_id", ''in'', area_entities(
              area_id )) | selectattr("entity_id", ''in'', label_entities(''water_supply_mode''))
              |  map(attribute=''state'') | list | first == "Volume" }}'
            enabled: true
      then:
      - action: script.water_supply_by_volume_plant_mix
        metadata: {}
        data:
          area_id: water_supply_01
          units: 2
          target_ph: 6.75
      enabled: true
  fields:
    nutrient:
      selector:
        text:
      name: Nutrient
      default: 'Nutrient: Electrolytes'
    area_id:
      selector:
        text:
      name: area_id
      default: water_supply_01
    units:
      selector:
        number:
          min: 1
          max: 100
      name: Units
      default: 1
    override_dose_under:
      selector:
        boolean: {}
      name: Override Dose Under
      description: 'This allows the script to run even if the PSI level is above the
        typical cutoff. '
  alias: 'Dose: Pressurize Electrolytes'
  description: ''
water_supply_by_volume_plant_mix:
  sequence:
  - variables:
      nutrients:
      - 'Nutrient: Part A'
      - 'Nutrient: Part B'
      - 'Nutrient: H2O2'
      - 'Nutrient: pH Up'
      shake_start_button: '{{ states  | selectattr(''entity_id'', ''in'', area_entities(area_id))  |
        selectattr(''entity_id'', ''in'', label_entities("Nutrient: Shake")) | map(attribute=''entity_id'')
        | list }}

        '
      shake_stop_button: '{{ states  | selectattr(''entity_id'', ''in'', area_entities(area_id))  |
        selectattr(''entity_id'', ''in'', label_entities("Stop Nutrient: Shake"))
        | map(attribute=''entity_id'') | list }}

        '
      expected_ro_dose_time: 666
  - parallel:
    - action: script.dose_nutrient_v2
      metadata: {}
      data:
        nutrient: 'Nutrient: RO Water'
        area_id: water_supply_01
        units: '{{ units | float }}'
        tracked: 25
      enabled: true
    - repeat:
        sequence:
        - delay: '{{ (units | float) * (expected_ro_dose_time | float) / ((nutrients
            | length) + 1) }}'
          enabled: true
        - action: script.dose_nutrient_v2
          metadata: {}
          data:
            nutrient: '{{ repeat.item }}'
            area_id: '{{ area_id }}'
            units: '{{ (units | float) if '' pH '' not in (repeat.item | string) else
              1 }}'
        for_each: '{{ nutrients }}'
      enabled: true
  - parallel:
    - action: script.dose_nutrient_v2
      metadata: {}
      data:
        nutrient: 'Nutrient: Electrolytes'
        area_id: water_supply_01
        units: 1
      enabled: true
    - action: script.dose_nutrient_v2
      metadata: {}
      data:
        nutrient: 'Nutrient: Water Supply Outlet'
        area_id: water_supply_01
        units: 1
      enabled: true
  - repeat:
      sequence:
      - if:
        - condition: template
          value_template: "{{ target_ph - 0.75 >= (states  | selectattr('entity_id',
            'in', area_entities('water_supply_01'))  |\n    selectattr('entity_id',
            'in', label_entities('Water Supply: pH')) | list \n    | first\n    ).state
            | float }}"
        then:
        - action: script.dose_nutrient_v2
          metadata: {}
          data:
            nutrient: '{{ ph_up }}'
            area_id: '{{ area_id }}'
            units: '{{ units*0 + 1.0 | float }}'
        - action: script.dose_nutrient_v2
          metadata: {}
          data:
            nutrient: 'Nutrient: Shake'
            area_id: water_supply_01
            units: 15
          enabled: true
      count: 1
    enabled: false
  fields:
    area_id:
      selector:
        text:
      name: area_id
      default: water_supply_01
    units:
      selector:
        number:
          min: 1
          max: 100
      name: Units
      default: 1
    target_ph:
      selector:
        number:
          min: 0
          max: 14
          step: 0.01
      name: target_ph
      default: 6.5
  alias: 'Water Supply by Volume: Plant Mix'
  description: ''
  icon: mdi:flower
water_supply_by_volume_cancel_job:
  sequence:
  - action: homeassistant.turn_off
    metadata: {}
    data:
      entity_id: "{{ labels() \n   | select('match', 'nutrient') \n   | map('label_entities')
        \n   | sum(start=[]) \n   | list }}\n"
  alias: 'Water Supply by Volume: Cancel Job'
  description: ''
  fields:
    area:
      selector:
        text:
      name: Area
      default: water_supply_01
calibrated_values_initalize_helpers_v2:
  sequence:
  - variables:
      calibrated_labels: "{{ labels() \n    | select('match', 'calibrated_value(?!_2_point)')\n
        \   | list\n}}\n"
      calibrated_sensors_all: "{{ labels() \n    | select('match', 'calibrated_value(?!_2_point)')\n
        \   | map('label_entities')\n    | sum(start=[])\n    | list\n}}\n"
      leaders: "{% set leader_entities = namespace(list=[]) %} {% for leader in label_entities('Calibrated
        Value (2 Point)') %}\n  {% set leader_entities.list = leader_entities.list
        + [leader] %}\n{% endfor %} {{ leader_entities.list }}\n"
      l2:
      - test
      - another
  - repeat:
      sequence:
      - variables:
          calibrated_sensors: "{{ \n  label_entities(repeat.item)\n  | list\n}}\n"
          device_class: "{{ label_name(repeat.item)\n  | regex_replace('^[^:]*:\\s*([^:]*?)(?:\\s*:.*)?$',
            '\\\\1')\n}}\n"
          units: "{% set raw_units = label_name(repeat.item)\n  | regex_replace('^[^:]*:\\s*[^:]*:\\s*(.*)$|^.*$',
            '\\\\1') | trim %}\n{{ none if (raw_units == '') else raw_units }}\n"
      - repeat:
          for_each: '{{ calibrated_sensors }}'
          sequence:
          - variables:
              device_id: '{{ repeat.item }}'
              device_name: '{{ device_id.split(''.'')[1] }}'
              friendly_name: '{{ state_attr(repeat.item, ''friendly_name'') or states[repeat.item].name
                }}'
              area_id: '{{ area_name(repeat.item) }}'
              ha_topic: homeassistant
              device_topic: calibrated_value/{{ device_name }}
          - action: mqtt.publish
            data:
              topic: '{{ ha_topic }}/button/{{ device_name }}_clear/config'
              retain: true
              payload: "{ \"~\": \"{{ device_topic }}\",\n  \"dev\": {\n    \"ids\":
                [\"{{ device_name }}\"],\n    \"name\": \"{{ friendly_name }}\",\n
                \   \"manufacturer\": \"Calibrated Value\",\n    \"suggested_area\":
                \"{{ area_id }}\"\n  },\n  \"name\": \"Clear Calibrations\",\n  \"uniq_id\":
                \"{{ device_name }}_clear\",\n  \"object_id\": \"{{ device_name }}_clear\",\n
                \ \"cmd_t\": \"~/calibration_data\",\n  \"pl_prs\": \"{}\"\n}\n"
            enabled: true
          - action: mqtt.publish
            data:
              topic: '{{ ha_topic }}/button/{{ device_name }}_record/config'
              retain: true
              payload: "{ \"~\": \"{{ device_topic }}\",\n  \"dev\": {\n    \"ids\":
                [\"{{ device_name }}\"],\n    \"name\": \"{{ friendly_name}}\",\n
                \   \"manufacturer\": \"Calibrated Value\",\n    \"suggested_area\":
                \"{{ area_id }}\"\n  },\n  \"name\": \"Record Current Calibration
                Values\",\n  \"uniq_id\": \"{{ device_name }}_record\",\n  \"object_id\":
                \"{{ device_name }}_record\",\n  \"cmd_t\": \"~/calibration_data\",\n
                \ \"retain\": true,\n  \"command_template\": \"{{ '{{' \n      }}
                {states('number.{{ device_name }}_known_value'): states('{{ device_id
                }}')} {{ '' \n      }} | combine( state_attr('sensor.{{ device_name
                }}_calibrated_value', 'raw') | from_json ) {{ ''\n      }} | to_json
                {{ \n    '}}' }}\"\n}\n"
            enabled: true
          - action: mqtt.publish
            data:
              topic: '{{ ha_topic }}/number/{{ device_name }}_known_value/config'
              retain: true
              payload: "{ \"~\": \"{{ device_topic }}\",\n  \"dev\": {\n    \"ids\":
                [\"{{ device_name }}\"],\n    \"name\": \"{{ friendly_name }}\",\n
                \   \"manufacturer\": \"Calibrated Value\",\n    \"suggested_area\":
                \"{{ area_id }}\"\n  },\n  \"name\": \"Known Calibration Value\",\n
                \ \"uniq_id\": \"{{ device_name }}_known_value\",\n  \"object_id\":
                \"{{ device_name }}_known_value\",\n  \"mode\": \"box\",\n  \"min\":
                \"0\",\n  \"max\": \"10000000\",      \n  \"cmd_t\": \"~/known_value\",
                \     \n  \"stat_t\": \"~/known_value\",\n  \"retain\": true\n}\n"
            enabled: true
          - action: mqtt.publish
            data:
              topic: '{{ ha_topic }}/sensor/{{ device_name }}_calibrated_value/config'
              retain: true
              payload: "{{ \n  { \"~\": device_topic,\n    \"dev\": {\n      \"ids\":
                [ device_name ],\n      \"name\": friendly_name ,\n      \"manufacturer\":
                \"Calibrated Value\",\n      \"suggested_area\": \"{{ area_id }}\"\n
                \   },\n    \"name\": \"Calibrated Value\",\n    \"device_class\":
                device_class,\n    \"unit_of_measurement\": units,\n    \"uniq_id\":
                device_name~\"_calibrated_value\",\n    \"object_id\": device_name~\"_calibrated_value\",\n
                \   \"cmd_t\": \"~/calibrated_value\",\n    \"stat_t\": \"calibrated_value/update_every_second\",\n
                \   \"retain\": true,\n    \"expire_after\": 60,\n    \"state_class\":
                \"measurement\",\n    \"suggested_display_precision\": \"2\",\n    \"value_template\":
                \"{{ \n      (states( '\"~device_id~\"' ) | float) * ( state_attr('\"~device_id~\"_calibrated_value',
                'poly[1]')  \n      | float(1)) + ( state_attr('\"~device_id~\"_calibrated_value',
                'poly[0]')  \n      | float(0)) }}\",\n    \"json_attributes_topic\":
                \"~/calibration_data\",\n    \"json_attributes_template\": \"{% set
                cal_data = value | from_json %}\n      {% set ns = namespace(sx=0,
                sy=0, sxy=0, sxx=0) %}\n      {% set n = cal_data.keys()|list|length
                %}\n      {% for y, x in cal_data.items() %}\n        {% set x = x|float
