  sequence:
  - action: rest_command.get_board_lists
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_lists
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ from_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: source_cards
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ to_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: target_cards
  - if:
    - condition: template
      value_template: '{{ source_cards.content | count == 0 }}'
    then:
    - action: persistent_notification.create
      metadata: {}
      data:
        message: No board cards found to move. Consider refreshing the credentials
  - repeat:
      sequence:
      - if:
        - condition: template
          value_template: '{{ repeat.item.dueAt is not defined and repeat.item.startAt
            is not defined }}'
        then: []
        else:
        - if:
          - condition: template
            value_template: '{{ repeat.item.startAt is defined and as_datetime(repeat.item.startAt)
              - timedelta(days=1) < (now() + timedelta(days=timeDelta)) }}'
          then:
          - action: system_log.write
            metadata: {}
            data:
              level: warning
              message: 'Processing card: {{ repeat.item.title }}'
            enabled: true
          - variables:
              current_list_match: '{{ all_lists.content | selectattr(''_id'', ''eq'',
                repeat.item.listId) | list }}

                '
              current_list_title: '{{ current_list_match[0].title if current_list_match
                | length > 0 else '''' }}

                '
              target_list_ids_in_swimlane: '{{ target_cards.content | map(attribute=''listId'')
                | unique | list }}

                '
              target_list_match: '{{ all_lists.content | selectattr(''_id'', ''in'',
                target_list_ids_in_swimlane) | selectattr(''title'', ''eq'', current_list_title)
                | list }}

                '
              target_list_id: '{{ target_list_match[0]._id if target_list_match |
                length > 0 else '''' }}

                '
          - if:
            - condition: template
              value_template: '{{ target_list_id != "" }}'
            then:
            - action: rest_command.move_card_to_swimlane
              metadata: {}
              data:
                cardId: '{{ repeat.item._id }}'
