              topic: '{{ ha_topic }}/number/{{ device_name }}_alert_on_for_seconds/config'
              retain: true
              payload: "{ \"~\": \"{{ device_topic }}\",\n  \"dev\": {\n    \"ids\":
                [\"{{ device_name }}\"],\n    \"name\": \"{{ friendly_name }}\",\n
                \   \"manufacturer\": \"Alert On For Seconds\",\n    \"suggested_area\":
                \"{{ area_id }}\"\n  },\n  \"name\": \"Alert On For Seconds\",\n  \"uniq_id\":
                \"{{ device_name }}_alert_on_for_seconds\",\n  \"object_id\": \"{{
                device_name }}_alert_on_for_seconds\",\n  \"mode\": \"box\",\n  \"min\":
                \"0\",\n  \"max\": \"10000000\",      \n  \"cmd_t\": \"~/alert_on_for_seconds\",
                \     \n  \"stat_t\": \"~/alert_on_for_seconds\",\n  \"retain\": true\n}\n"
