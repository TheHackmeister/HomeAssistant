boards_move_future_cards_to_default:
  sequence:
  - action: rest_command.get_board_swimlanes
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_swimlanes
  - variables:
      from_swimlane_match: '{{ all_swimlanes.content | selectattr(''title'', ''eq'',
        from_swimlane_name) | list }}

        '
      from_swimlaneId: '{{ from_swimlane_match[0]._id if from_swimlane_match | length
        > 0 else '''' }}

        '
      to_swimlane_match: '{{ all_swimlanes.content | selectattr(''title'', ''eq'',
        to_swimlane_name) | list }}

        '
      to_swimlaneId: '{{ to_swimlane_match[0]._id if to_swimlane_match | length >
        0 else '''' }}

        '
  - if:
    - condition: template
      value_template: '{{ from_swimlaneId == "" or to_swimlaneId == "" }}'
    then:
    - action: system_log.write
      metadata: {}
      data:
        level: error
        message: 'Could not find required swimlanes. {{ from_swimlane_name }}: {{
          from_swimlaneId }}, {{ to_swimlane_name }}: {{ to_swimlaneId }}'
    - stop: ''
  - action: rest_command.get_board_lists
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_lists
  - action: system_log.write
    metadata: {}
    data:
      level: debug
      message: 'Sample list structure: {{ all_lists.content[0] if all_lists.content
        | length > 0 else "no lists" }}'
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ from_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: from_cards
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ to_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: to_cards
  - if:
    - condition: template
      value_template: '{{ from_cards.content | count == 0 }}'
    then:
    - action: persistent_notification.create
      metadata: {}
      data:
        message: No cards found in {{ from_swimlane_name }} swimlane
  - repeat:
      sequence:
      - variables:
          card_list_match: '{{ all_lists.content | selectattr(''_id'', ''eq'', repeat.item.listId)
            | list }}

            '
          card_list_title: '{{ card_list_match[0].title if card_list_match | length
            > 0 else '''' }}

            '
      - if:
        - condition: template
          value_template: '{{ card_list_title == "Inbox/Reset" }}'
        then:
        - action: rest_command.get_card
          metadata: {}
          data:
            boardId: '{{ boardId }}'
            listId: '{{ repeat.item.listId }}'
            cardId: '{{ repeat.item._id }}'
          response_variable: full_card_details
        - if:
          - condition: template
            value_template: "{{ (full_card_details.content.startAt is defined and
              as_datetime(full_card_details.content.startAt) > now()) or\n   (full_card_details.content.dueAt
              is defined and full_card_details.content.dueAt != None and as_datetime(full_card_details.content.dueAt)
              > now()) }}\n"
          then:
          - action: system_log.write
            metadata: {}
            data:
              level: warning
              message: 'Moving future card to {{ to_swimlane_name }}: {{ repeat.item.title
                }}'
            enabled: true
          - variables:
              to_list_ids_in_swimlane: '{{ to_cards.content | map(attribute=''listId'')
                | unique | list }}

                '
              target_inbox_match: '{{ all_lists.content | selectattr(''_id'', ''in'',
                to_list_ids_in_swimlane) | selectattr(''title'', ''eq'', ''Inbox/Reset'')
                | list }}

                '
              target_inbox_id_from_cards: '{{ target_inbox_match[0]._id if target_inbox_match
                | length > 0 else '''' }}

                '
          - if:
            - condition: template
              value_template: '{{ target_inbox_id_from_cards == "" }}'
            then:
            - action: system_log.write
              metadata: {}
              data:
                level: warning
                message: Inbox/Reset list in {{ to_swimlane_name }} appears empty.
                  Finding it by process of elimination...
            - variables:
                all_inbox_lists: '{{ all_lists.content | selectattr(''title'', ''eq'',
                  ''Inbox/Reset'') | list }}

                  '
                other_swimlane_list_ids: '{{ from_cards.content | map(attribute=''listId'')
                  | unique | list }}

                  '
                candidate_inboxes: '{{ all_inbox_lists | rejectattr(''_id'', ''in'',
                  other_swimlane_list_ids) | list }}

                  '
                target_inbox_id: '{{ candidate_inboxes[0]._id if candidate_inboxes
                  | length > 0 else all_inbox_lists[0]._id }}

                  '
            else:
            - variables:
                target_inbox_id: '{{ target_inbox_id_from_cards }}

                  '
          - if:
            - condition: template
              value_template: '{{ target_inbox_id != "" }}'
            then:
            - action: rest_command.move_card_to_swimlane
              metadata: {}
              data:
                cardId: '{{ repeat.item._id }}'
                listId: '{{ full_card_details.content.listId }}'
                boardId: '{{ boardId }}'
                swimlaneId: '{{ to_swimlaneId }}'
                newListId: '{{ target_inbox_id }}'
              response_variable: move_result
            else:
            - action: system_log.write
              metadata: {}
              data:
                level: error
                message: 'Cannot move card "{{ repeat.item.title }}": No Inbox/Reset
                  list found in {{ to_swimlane_name }} swimlane'
      for_each: '{{ from_cards.content }}'
  alias: 'Boards: Move Future Cards to Default Inbox'
  description: Moves cards with future dates from one swimlane Inbox to another (FIXED
    - fetches full card details)
  fields:
    boardId:
      selector:
        text:
      name: boardId
      description: Board ID
      default: TrfngHQf8PWj9mnqC
      required: false
    from_swimlane_name:
      selector:
        text:
      name: From Swimlane Name
      description: Name of the source swimlane (e.g., "Today")
      default: Today
      required: true
    to_swimlane_name:
      selector:
        text:
      name: To Swimlane Name
      description: Name of the destination swimlane (e.g., "Default")
      default: Default
      required: true
boards_archive_past_unlabeled_tasks:
  sequence:
  - action: rest_command.get_board_swimlanes
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_swimlanes
  - variables:
      today_swimlane_match: '{{ all_swimlanes.content | selectattr(''title'', ''eq'',
        swimlane_name) | list }}

        '
      today_swimlaneId: '{{ today_swimlane_match[0]._id if today_swimlane_match |
        length > 0 else '''' }}

        '
  - if:
    - condition: template
      value_template: '{{ today_swimlaneId == "" }}'
    then:
    - action: system_log.write
      metadata: {}
      data:
        level: error
        message: 'Could not find swimlane: {{ swimlane_name }}'
    - stop: ''
  - action: rest_command.get_board_lists
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_lists
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ today_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: today_cards
  - if:
    - condition: template
      value_template: '{{ today_cards.content | count == 0 }}'
    then:
    - action: persistent_notification.create
      metadata: {}
      data:
        message: No cards found in {{ swimlane_name }} swimlane
    - stop: ''
  - repeat:
      sequence:
      - variables:
          card_list_match: '{{ all_lists.content | selectattr(''_id'', ''eq'', repeat.item.listId)
            | list }}

            '
          card_list_title: '{{ card_list_match[0].title if card_list_match | length
            > 0 else '''' }}

            '
      - if:
        - condition: template
          value_template: '{{ card_list_title == "Inbox/Reset" }}'
        then:
        - action: rest_command.get_card
          metadata: {}
          data:
            boardId: '{{ boardId }}'
            listId: '{{ repeat.item.listId }}'
            cardId: '{{ repeat.item._id }}'
          response_variable: full_card_details
        - action: system_log.write
          metadata: {}
          data:
            level: info
            message: 'get_card response status: {{ full_card_details.status }}, has
              content: {{ full_card_details.content is defined }}'
        - action: system_log.write
          metadata: {}
          data:
            level: debug
            message: 'Full card response: {{ full_card_details }}'
        - variables:
            card_label_ids: '{{ full_card_details.content.get(''labelIds'', []) if
              full_card_details.content.get(''labelIds'') is not none else [] }}'
        - if:
          - condition: template
            value_template: "{{ card_label_ids | length == 0 and\n   (full_card_details.content.dueAt
              is defined and full_card_details.content.dueAt != None and as_datetime(full_card_details.content.dueAt)
              < now()) }}\n"
          then:
          - action: system_log.write
            metadata: {}
            data:
              level: info
              message: 'Archiving past-due unlabeled card: {{ repeat.item.title }}'
          - action: system_log.write
            metadata: {}
            data:
              level: info
              message: 'Attempting to archive: cardId={{ repeat.item._id }}, listId={{
                repeat.item.listId }}, title={{ repeat.item.title }}'
          - action: system_log.write
            metadata: {}
            data:
              level: info
              message: Full card details - cardId={{ full_card_details.content._id
                }}, listId={{ full_card_details.content.listId }}, swimlaneId={{ full_card_details.content.swimlaneId
                }}
          - action: system_log.write
            metadata: {}
            data:
              level: info
              message: 'Archive URL will be: https://wekan.spencerslab.com/api/boards/{{
                boardId }}/lists/{{ full_card_details.content.listId }}/cards/{{ repeat.item._id
                }}'
          - action: rest_command.archive_card
            metadata: {}
            data:
              cardId: '{{ repeat.item._id }}'
              listId: '{{ full_card_details.content.listId }}'
              boardId: '{{ boardId }}'
            response_variable: archive_result
          - action: system_log.write
            metadata: {}
            data:
              level: info
              message: 'Archive result (with listId in payload): {{ archive_result
                }}'
          else:
          - action: system_log.write
            metadata: {}
            data:
              level: debug
              message: 'Skipping card "{{ repeat.item.title }}": has {{ card_label_ids
                | length }} labels or not past due'
      for_each: '{{ today_cards.content }}'
  alias: 'Boards: Archive Past Unlabeled Tasks'
  description: Archives cards with no labels and past due dates from Today Inbox (FIXED
    - fetches full card details)
  fields:
    boardId:
      selector:
        text:
      name: boardId
      description: Board ID
      default: TrfngHQf8PWj9mnqC
      required: false
    swimlane_name:
      selector:
        text:
      name: Swimlane Name
      description: Name of the swimlane to check
      default: Today
      required: true
boards_next_week_s_tasks:
  sequence:
  - action: rest_command.get_board_lists
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_lists
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ from_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: source_cards
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ to_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: target_cards
  - if:
    - condition: template
      value_template: '{{ source_cards.content | count == 0 }}'
    then:
    - action: persistent_notification.create
      metadata: {}
      data:
        message: No board cards found to move. Consider refreshing the credentials
  - repeat:
      sequence:
      - if:
        - condition: template
          value_template: '{{ repeat.item.dueAt is not defined and repeat.item.startAt
            is not defined }}'
        then: []
        else:
        - if:
          - condition: template
            value_template: '{{ repeat.item.startAt is defined and as_datetime(repeat.item.startAt)
              - timedelta(days=1) < (now() + timedelta(days=timeDelta)) }}'
          then:
          - action: system_log.write
            metadata: {}
            data:
              level: warning
              message: 'Processing card: {{ repeat.item.title }}'
            enabled: true
          - variables:
              current_list_match: '{{ all_lists.content | selectattr(''_id'', ''eq'',
                repeat.item.listId) | list }}

                '
              current_list_title: '{{ current_list_match[0].title if current_list_match
                | length > 0 else '''' }}

                '
              target_list_ids_in_swimlane: '{{ target_cards.content | map(attribute=''listId'')
                | unique | list }}

                '
              target_list_match: '{{ all_lists.content | selectattr(''_id'', ''in'',
                target_list_ids_in_swimlane) | selectattr(''title'', ''eq'', current_list_title)
                | list }}

                '
              target_list_id: '{{ target_list_match[0]._id if target_list_match |
                length > 0 else '''' }}

                '
          - if:
            - condition: template
              value_template: '{{ target_list_id != "" }}'
            then:
            - action: rest_command.move_card_to_swimlane
              metadata: {}
              data:
                cardId: '{{ repeat.item._id }}'
                listId: '{{ repeat.item.listId }}'
                boardId: '{{ boardId }}'
                swimlaneId: '{{ to_swimlaneId }}'
                newListId: '{{ target_list_id }}'
              response_variable: move_result
            else:
            - action: system_log.write
              metadata: {}
              data:
                level: error
                message: 'Cannot move card "{{ repeat.item.title }}": No list named
                  "{{ current_list_title }}" found in target swimlane'
          enabled: true
          else:
          - if:
            - condition: template
              value_template: '{{ repeat.item.dueAt is defined and repeat.item.dueAt
                != None and as_datetime(repeat.item.dueAt) - timedelta(days=1) < (now()
                + timedelta(days=timeDelta)) }}'
            then:
            - action: system_log.write
              metadata: {}
              data:
                level: warning
                message: 'Processing card: {{ repeat.item.title }}'
              enabled: true
            - variables:
                current_list_match: '{{ all_lists.content | selectattr(''_id'', ''eq'',
                  repeat.item.listId) | list }}

                  '
                current_list_title: '{{ current_list_match[0].title if current_list_match
                  | length > 0 else '''' }}

                  '
                target_list_ids_in_swimlane: '{{ target_cards.content | map(attribute=''listId'')
                  | unique | list }}

                  '
                target_list_match: '{{ all_lists.content | selectattr(''_id'', ''in'',
                  target_list_ids_in_swimlane) | selectattr(''title'', ''eq'', current_list_title)
                  | list }}

                  '
                target_list_id: '{{ target_list_match[0]._id if target_list_match
                  | length > 0 else '''' }}

                  '
            - if:
              - condition: template
                value_template: '{{ target_list_id != "" }}'
              then:
              - action: rest_command.move_card_to_swimlane
                metadata: {}
                data:
                  cardId: '{{ repeat.item._id }}'
                  listId: '{{ repeat.item.listId }}'
                  boardId: '{{ boardId }}'
                  swimlaneId: '{{ to_swimlaneId }}'
                  newListId: '{{ target_list_id }}'
                response_variable: move_result
              else:
              - action: system_log.write
                metadata: {}
                data:
                  level: error
                  message: 'Cannot move card "{{ repeat.item.title }}": No list named
                    "{{ current_list_title }}" found in target swimlane'
            enabled: true
      for_each: '{{ source_cards.content }}'
  alias: 'Boards: Move Cards To Swimlane By Date'
  description: ''
  fields:
    boardId:
      selector:
        text:
      name: boardId
      description: Board ID
      default: TrfngHQf8PWj9mnqC
      required: false
    from_swimlaneId:
      selector:
        text:
      name: From Swimlane ID
      required: true
    to_swimlaneId:
      selector:
        text:
      required: true
      name: To Swimlane ID
    timeDelta:
      selector:
        number:
          min: 1
          max: 100
      name: timeDelta
      required: true
