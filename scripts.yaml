                    alert_title: Labeled Feature Script Error
                    alert_message: 'Error calling enable script for {{ follower_entity_id
                      }} (feature: {{ feature_name }}): {{ error }}'
            else:
            - action: '{{ follower_enable_script | trim }}'
              data: '{{ _enable_script_std_fields }}

                '
        default:
        - if:
          - condition: template
            value_template: '{{ _enable_script_invalid_args | length > 0 and follower_error_mode
              == "stop" }}'
          then:
          - stop: 'Labeled Feature Follower: Arg field(s) {{ _enable_script_invalid_args
              }} not declared by {{ follower_enable_script }} (feature: {{ feature
              }})'
            error: true
        - if:
