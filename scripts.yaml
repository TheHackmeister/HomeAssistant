                [ device_name ],\n      \"name\": friendly_name ,\n      \"manufacturer\":
                \"Calibrated Value\",\n      \"suggested_area\": \"{{ area_id }}\"\n
                \   },\n    \"name\": \"Calibrated Value\",\n    \"device_class\":
                device_class,\n    \"unit_of_measurement\": units,\n    \"uniq_id\":
