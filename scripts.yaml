            device_class: pressure
    starting_id:
      name: Starting ID Override
      description: Optional override for the starting plant ID number
      selector:
        number:
          min: 0
          max: 10000
    location_id:
      selector:
        number:
          min: 1
          max: 1000
          step: 1
      name: Location ID
      description: Starting Location ID to use
  sequence:
  - variables:
      ha_topic: homeassistant
      counter_topic: plants/next_plant_id
      current_id: "{% if starting_id is defined and starting_id is not none %}\n  {{
        starting_id | int }}\n{% elif states('number.next_plant_id') not in ['unknown',
        'unavailable', 'none'] %}\n  {{ states('number.next_plant_id') | int }}\n{%
        else %}\n  0\n{% endif %}\n"
      needs_counter_creation: "{{ states('number.next_plant_id') in ['unknown', 'unavailable',
        'none'] \n    and (starting_id is not defined or starting_id is none) }}\n"
      started_at: '{{ started_at if (started_at is defined and started_at is not none)
        else now().isoformat() }}'
  - if:
    - condition: template
      value_template: '{{ needs_counter_creation }}'
    then:
    - data:
        topic: '{{ ha_topic }}/number/plant_tracking/next_plant_id/config'
        retain: true
        payload: "{\n  \"name\": \"Next Plant ID\",\n  \"unique_id\": \"next_plant_id_counter\",\n
          \ \"object_id\": \"next_plant_id\",\n  \"state_topic\": \"{{ counter_topic
          }}\",\n  \"command_topic\": \"{{ counter_topic }}\",\n  \"min\": 0,\n  \"max\":
          100000,\n  \"step\": 1,\n  \"mode\": \"box\",\n  \"retain\": true,\n  \"device\":
          {\n    \"identifiers\": [\"plant_tracking\"],\n    \"name\": \"Plant Tracking\",\n
          \   \"manufacturer\": \"Curated Forest\"\n  }\n}\n"
      action: mqtt.publish
    - data:
        topic: '{{ counter_topic }}'
        retain: true
        payload: '0'
      action: mqtt.publish
    - delay:
        milliseconds: 500
  - repeat:
      count: '{{ plants_to_create | int }}'
      sequence:
      - variables:
          plant_number: '{{ current_id | int + repeat.index - 1 }}'
          plant_id: '{{ variety | default(''plant'') | lower | replace('' '', ''_'')
            }}_{{ plant_number }}'
          device_name: plant_id_{{ plant_id }}
          plant_topic: plants/{{ plant_id }}
      - data:
          topic: '{{ ha_topic }}/sensor/{{ device_name }}/status/config'
          retain: true
          payload: "{{ {\n  \"name\": \"Growing For\",\n  \"unique_id\": device_name
            ~ \"_grow_days\",\n  \"default_entity_id\": \"sensor.\" ~ device_name,\n
            \ \"state_topic\": \"plants/update_every_hour\",\n  \"value_template\":
            \"{{ ((as_timestamp(now()) - as_timestamp(state_attr('sensor.\" ~ device_name
            ~ \"', 'started_at') | default(now(), true))) / 3600 / 24) | round(1)
            }}\",\n  \"unit_of_measurement\": \"d\",\n  \"device_class\": \"duration\",\n
            \ \"state_class\": \"measurement\",\n  \"json_attributes_topic\": plant_topic
            ~ \"/attributes\",\n  \"device\": {\n    \"identifiers\": [device_name],\n
            \   \"name\": (variety | default('Plant') | replace('_', ' ') | title)
            ~ ' #' ~ plant_number,\n    \"manufacturer\": \"Curated Forest\",\n    \"suggested_area\":
            area_name(plant_area),\n    \"model\": \"Plant Tracking\"\n  }\n} | to_json
            }}\n"
        action: mqtt.publish
      - data:
          topic: '{{ plant_topic }}/attributes'
          retain: true
          payload: "{{ {\n  'location_entity_id': (\"switch.location_id_\" ~ ((location_id
            + repeat.index -1) | string)) if (location_id is defined and location_id)
            else '',\n  'plant_id': plant_id,\n  'variety': variety | default(''),\n
            \ 'source': source | default(''),\n  'started_at': started_at\n} | to_json
            }}\n"
        action: mqtt.publish
      - data:
          topic: '{{ ha_topic }}/sensor/{{ device_name }}_records/status/config'
          retain: true
          payload: "{{ {\n  \"name\": \"Records\",\n  \"unique_id\": \"plant_records_\"
            ~ plant_id,\n  \"default_entity_id\": \"sensor.plant_records_\" ~ plant_id,\n
            \ \"state_topic\": plant_topic ~ \"/records_count\",\n  \"command_topic\":
            plant_topic ~ \"/records_count\",\n  \"state_class\": \"measurement\",\n
            \ \"json_attributes_topic\": plant_topic ~ \"/records_attributes\",\n
            \ \"values_template\": \"{{ value | float(0) }}\",\n  \"device\": {\n
            \   \"identifiers\": [device_name],\n    \"name\": variety | default('Plant')
            ~ ' #' ~ plant_number,\n    \"manufacturer\": \"Curated Forest\",\n    \"model\":
            \"Plant Tracking Records\",\n    \"suggested_area\": area_name(plant_area),\n
            \ }\n} | to_json }}\n"
        action: mqtt.publish
      - delay:
          milliseconds: 500
      - if:
        - condition: template
          value_template: '{{ states(''sensor.'' ~ plant_id ~ ''_records'') in [''unknown'',
            ''unavailable'',

            ''none''] }}

            '
        then:
        - data:
            topic: '{{ plant_topic }}/records_attributes'
            retain: true
            payload: "{{ {\n  'record_id': 1,\n  'timestamp': started_at,\n  'quantity':
              1.0,\n  'type': 'Planted',\n  'notes': variety\n} | to_json }}\n"
          action: mqtt.publish
        - data:
            topic: '{{ plant_topic }}/records_count'
            retain: true
            payload: 1
          action: mqtt.publish
      - data:
          topic: '{{ counter_topic }}'
          retain: true
          payload: '{{ plant_number | int + 1 }}'
        action: mqtt.publish
      - delay:
          milliseconds: 200
  - data:
      topic: plants/update_every_hour
      retain: true
      payload: '{{ plants_to_create }}'
    action: mqtt.publish
  - data:
      title: Plant Sensors Created
      message: 'Created {{ plants_to_create }} plant sensor(s). Variety: {{ variety
        | default(''N/A'') }} Starting ID: {{ current_id }} Ending ID: {{ current_id
        | int + plants_to_create | int - 1 }}'
    action: persistent_notification.create
sensors_create_locations:
  sequence:
  - variables:
      ha_topic: homeassistant
      counter_topic: locations/next_location_id
      current_id: "{% if starting_id is defined and starting_id is not none %}\n  {{
        starting_id | int }}\n{% elif states('number.next_location_id') not in ['unknown',
        'unavailable', 'none'] %}\n  {{ states('number.next_location_id') | int }}\n{%
        else %}\n  0\n{% endif %}\n"
      needs_counter_creation: "{{ states('number.next_location_id') in ['unknown',
        'unavailable', 'none'] \n    and (starting_id is not defined or starting_id
        is none) }}\n"
  - if:
    - condition: template
      value_template: '{{ needs_counter_creation }}'
    then:
    - data:
        topic: '{{ ha_topic }}/number/location_tracking/next_location_id/config'
        retain: true
        payload: "{\n  \"name\": \"Next Location ID\",\n  \"unique_id\": \"next_location_id_counter\",\n
          \ \"default_entity_id\": \"sensor.next_location_id\",\n  \"state_topic\":
          \"{{ counter_topic }}\",\n  \"command_topic\": \"{{ counter_topic }}\",\n
          \ \"min\": 0,\n  \"max\": 100000,\n  \"step\": 1,\n  \"mode\": \"box\",\n
          \ \"retain\": true,\n  \"device\": {\n    \"identifiers\": [\"location_tracking\"],\n
          \   \"name\": \"Location Tracking\",\n    \"manufacturer\": \"Curated Forest\"\n
          \ }\n}\n"
      action: mqtt.publish
    - data:
        topic: '{{ counter_topic }}'
        retain: true
        payload: '0'
      action: mqtt.publish
    - delay:
        milliseconds: 500
  - repeat:
      count: '{{ locations_to_create | int }}'
      sequence:
      - variables:
          location_id: '{{ current_id | int + repeat.index - 1 }}'
          location_name: location_{{ location_id }}
          device_name: location_id_{{ location_id }}
          location_topic: locations/{{ location_name }}
      - data:
          topic: '{{ ha_topic }}/switch/{{ device_name }}/active/config'
          retain: true
          payload: "{{ {\n  \"name\": \"Active\",\n  \"unique_id\": device_name ~
            \"_active\",\n  \"default_entity_id\": 'sensor.' ~ device_name,\n  \"state_topic\":
            location_topic ~ \"/active\",\n  \"command_topic\": location_topic ~ \"/active/set\",\n
            \ \"payload_on\": \"true\",\n  \"payload_off\": \"false\",\n  \"state_on\":
            \"true\",\n  \"state_off\": \"false\",\n  \"retain\": true,\n  \"json_attributes_topic\":
            location_topic ~ \"/attributes\",\n  \"device\": {\n    \"identifiers\":
            [device_name],\n    \"name\": 'Location' ~ ' #' ~ location_id,\n    \"manufacturer\":
            \"Curated Forest\",\n    \"suggested_area\": area_name(location_area |
            default(root_zone)),\n    \"model\": \"Location Tracking\"\n  }\n} | to_json
            }}\n"
        action: mqtt.publish
      - data:
          topic: '{{ location_topic }}/active'
          retain: true
          payload: 'true'
        action: mqtt.publish
      - data:
          topic: '{{ location_topic }}/attributes'
          retain: true
          payload: "{{ {\n  'location_id': location_id,\n  'root_zone': root_zone
            | default(''),\n  'shoot_zone': shoot_zone | default(''),\n  'water_supply':
            water_supply | default('')\n} | to_json }}\n"
        action: mqtt.publish
      - data:
          topic: '{{ counter_topic }}'
          retain: true
          payload: '{{ location_id | int + 1 }}'
        action: mqtt.publish
      - delay:
          milliseconds: 200
  - data:
      title: Location Sensors Created
      message: 'Created {{ locations_to_create }} location sensor(s). Starting ID:
        {{ current_id }} Ending ID: {{ current_id | int + locations_to_create | int
        - 1 }}'
    action: persistent_notification.create
  alias: 'Sensors: Create Locations'
  description: Dynamically create location monitoring sensors via MQTT discovery
  mode: queued
  max: 10
  fields:
    locations_to_create:
      name: Number of Locations
      description: How many location sensors to create
      default: 1
      selector:
        number:
          min: 1
          max: 100
      required: true
    root_zone:
      name: Root Zone
      description: Root zone identifier
      default:
      selector:
        area:
          entity:
            device_class: pressure
      required: true
    shoot_zone:
      name: Shoot Zone
      description: Shoot zone identifier
      default:
      selector:
        area:
          entity:
            device_class: pressure
      required: true
    water_supply:
      name: Water Supply
      description: Water supply identifier
      default: water_supply_01
      selector:
        area:
          entity:
            device_class: pressure
      required: true
    location_area:
      name: Location Area
      description: Area to put the location in if not the root_zone
      selector:
        area:
    starting_id:
      name: Starting ID Override
      description: Optional override for the starting location ID number
      selector:
        number:
          min: 0
          max: 10000
sensors_area_manifests:
  alias: 'Sensors: Area Manifests'
  description: Updates a single area manifest sensor via MQTT discovery
  mode: queued
  max: 10
  fields:
    area_id:
      name: Area ID
      description: The area ID to update
      required: true
      selector:
        text:
    area_name:
      name: Area Name
      description: The area name
      required: true
      selector:
        text:
    entity_ids:
      name: Entity IDs
      description: List of entity IDs in the area
      required: false
    device_ids:
      name: Device IDs
      description: List of device IDs in the area
      required: false
  sequence:
  - variables:
      ha_topic: homeassistant
      safe_area_id: '{{ area_id | replace('' '', ''_'') | replace(''-'', ''_'') |
        lower }}'
      sensor_entity_id: sensor.area_manifest_{{ safe_area_id }}
      sensor_topic: area_manifests/{{ safe_area_id }}
      entity_count: '{{ entity_ids | length }}'
      device_count: '{{ device_ids | length }}'
      area_type: '{% set type_labels = labels(area_id) | select(''match'', ''^type_'')
        | list %} {{ type_labels[0].replace(''type_'', '''') if type_labels | length
        > 0 else '''' }}

        '
      label_map: "{% set ns = namespace(data={}) %} {% for lbl_id in labels() %}\n
        \ {% set matching_entities = label_entities(lbl_id) | select('in', entity_ids)
        | list %}\n  {% if matching_entities | length > 0 %}\n    {% set ns.data =
        dict(ns.data, **{lbl_id: matching_entities}) %}\n  {% endif %}\n{% endfor
        %} {{ ns.data }}\n"
  - data:
      topic: '{{ ha_topic }}/sensor/area_manifest_{{ safe_area_id }}/config'
      retain: true
      payload: "{{ {\n  \"name\": area_name ~ \" Area Manifest\",\n  \"object_id\":
        \"area_manifest_\" ~ safe_area_id,\n  \"unique_id\": \"area_manifest_\" ~
        safe_area_id,\n  \"state_topic\": sensor_topic ~ \"/state\",\n  \"json_attributes_topic\":
        sensor_topic ~ \"/attributes\",\n  \"icon\": \"mdi:format-list-bulleted-square\",\n
        \ \"device\": {\n    \"identifiers\": [\"area_manifest_\" ~ safe_area_id],\n
        \   \"name\": area_name ~ \" Area\",\n    \"manufacturer\": \"Home Assistant\",\n
        \   \"model\": \"Area Manifest\"\n  }\n} | to_json }}\n"
    action: mqtt.publish
  - data:
      topic: '{{ sensor_topic }}/state'
      retain: true
      payload: '{{ entity_count }}'
    action: mqtt.publish
  - data:
      topic: '{{ sensor_topic }}/attributes'
      retain: true
      payload: "{% set ns = namespace(label_data={}) %}\n{% for lbl_id in labels()
        %}\n  {% set matching_entities = label_entities(lbl_id) | select('in', entity_ids)
        | list %}\n  {% if matching_entities | length > 0 %}\n    {% set ns.label_data
        = dict(ns.label_data, **{lbl_id: matching_entities}) %}\n  {% endif %}\n{%
        endfor %}\n{{ {\n  'area_id': area_id,\n  'area_name': area_name,\n  'area_type':
        area_type,\n  'entity_ids': entity_ids,\n  'device_ids': device_ids,\n  'entity_count':
        entity_count,\n  'device_count': device_count,\n  'labels': ns.label_data\n}
        | to_json }}\n"
    action: mqtt.publish
labeled_feature_follower:
  alias: Labeled Feature Follower
  description: >
    Implements The Dispatch Loop (see Label Based Features.md) against the
    follower entity's labels for the named feature. Builds a single ordered
    list of action items from labels, sorts by (tag, variant), filters by
    follower_enabled, and walks the list in one repeat:. For each item:
      - kind=script: dispatches script/automation/scene with resolved args.
      - kind=feature (self+implicit): runs the direct entity action (light/
        switch/media_player/select/number/text/toggle/etc).
      - kind=feature (cross-feature): routes through labeled_feature_generics.
      - kind=feature (self+non-implicit): documented no-op.
  mode: parallel
  max: 50
  fields:
    follower_entity_id:
      name: Follower Entity ID
      description: The follower entity to act on
      required: true
      selector:
        entity: {}
    feature:
      name: Feature
      description: The feature name (e.g. 'night', 'screen')
      required: true
      selector:
        text: {}
    leader_entity_id:
      name: Leader Entity ID
      description: The leader that triggered this (optional, for reference)
      required: false
      default: ''
      selector:
        entity: {}
    leader_enabled:
      name: Leader Enabled
      description: Post-evaluated leader enabled boolean, passed from the automation
      required: true
      selector:
        boolean: {}
    error_mode:
      name: Error Mode
      description: 'Default error mode when the follower entity has no `<feature>
        Error Mode:` label. Passed in by the leader automation from its per-feature
        evaluation. Priority: follower entity label → this field → ''log''. Tiers:
        silent | log | alert | stop.

        '
      required: false
      default: ''
      selector:
        select:
          custom_value: true
          options:
          - silent
          - log
          - alert
          - stop
    toggle:
      name: Toggle
      description: 'When true, the follower will toggle its current state instead
        of setting it to a specific value. Invert is ignored in toggle mode. Direct-value
        labels are skipped; Script and Extra Script items still run with toggle passed
        as an additional field. For domains without toggle support, Error Mode handling
        applies.

        '
      required: false
      default: false
      selector:
        boolean: {}
    scope:
      name: Scope
      description: Scope of the feature (area, floor, or none).
      required: false
      selector:
        select:
          options:
          - area
          - floor
          - none
    scope_id:
      name: Scope ID
      description: The area_id or floor_id that corresponds to the resolved scope.
      required: false
      default: ''
      selector:
        text: {}
  sequence:
  # ─────────────────────────────────────────────────────────────────────
  # Step 0 — Setup
  # ─────────────────────────────────────────────────────────────────────
  - variables:
      feature_name: '{{ feature }}'
      follower_labels: >-
        {{ labels(follower_entity_id) | map('label_name') | reject('none') | list }}
      follower_domain: '{{ follower_entity_id.split(".")[0] }}'
  - variables:
      scoped_feature: >-
        {{ (scope | default('') | capitalize + ' ') if scope | default('') in ['area', 'floor'] else '' }}{{ feature_name }}
      follower_error_mode: >-
        {% set em_pfx = scoped_feature + ' Error Mode: ' %}
        {% set match = follower_labels | select('match', '^' + em_pfx + '(silent|log|alert|stop)$') | first | default('') %}
        {% set from_label = match | regex_replace('^.+: ', '') | lower %}
        {% if from_label != '' %}{{ from_label }}
        {% elif (error_mode | default('') | lower) != '' %}{{ error_mode | lower }}
        {% else %}log{% endif %}
      follower_inverted: '{{ (scoped_feature + " Invert: True") in follower_labels }}'
      follower_enabled: '{{ (not leader_enabled) if follower_inverted else leader_enabled }}'
      follower_toggle: '{{ (toggle | default(false) | bool) or ((scoped_feature + " Toggle: True") in follower_labels) }}'
  - variables:
      follower_only: >-
        {% set only_label = scoped_feature + ' Only: ' %}
        {% set match = follower_labels | select('match', '^' + only_label + '(Enable|Disable)$') | first | default('') %}
        {{ match | regex_replace('^.+: ', '') }}
      follower_between: >-
        {{ follower_labels | select('match', '^' + scoped_feature + ' Between: .+')
           | map('regex_replace', '^.+: ', '') | list }}
      follower_not_between: >-
        {{ follower_labels | select('match', '^' + scoped_feature + ' Not Between: .+')
           | map('regex_replace', '^.+: ', '') | list }}
      follower_time_ok: >-
        {% set now_time = now().strftime('%H:%M') %}
        {% set ns = namespace(ok=true, any_b=false) %}
        {% for val in follower_between %}
          {% set p = val.split(':') %}
          {% set s = p[0]+':'+p[1] if (p|length==4 or (p|length==3 and p[2]=='-')) and p[0]!='-' else '-' %}
          {% set e = p[2]+':'+p[3] if p|length==4 else (p[1]+':'+p[2] if p|length==3 and p[0]=='-' else '-') %}
          {% set in_r = ((s=='-' or now_time>=s) and (e=='-' or now_time<=e)) if (s=='-' or e=='-' or s<=e) else (now_time>=s or now_time<=e) %}
          {% if in_r %}{% set ns.any_b = true %}{% endif %}
        {% endfor %}
        {% if follower_between|length > 0 %}{% set ns.ok = ns.any_b %}{% endif %}
        {% for val in follower_not_between %}
          {% set p = val.split(':') %}
          {% set s = p[0]+':'+p[1] if (p|length==4 or (p|length==3 and p[2]=='-')) and p[0]!='-' else '-' %}
          {% set e = p[2]+':'+p[3] if p|length==4 else (p[1]+':'+p[2] if p|length==3 and p[0]=='-' else '-') %}
          {% set in_r = ((s=='-' or now_time>=s) and (e=='-' or now_time<=e)) if (s=='-' or e=='-' or s<=e) else (now_time>=s or now_time<=e) %}
          {% if in_r %}{% set ns.ok = false %}{% endif %}
        {% endfor %}
        {{ ns.ok }}
      follower_should_act: >-
        {%- set only = follower_only | trim | lower -%}
        {%- if only == 'enable' and not leader_enabled -%}false
        {%- elif only == 'disable' and leader_enabled -%}false
        {%- elif only != '' and only not in ['enable', 'disable'] -%}false
        {%- elif not follower_time_ok -%}false
        {%- else -%}true
        {%- endif -%}
  - condition: template
    value_template: '{{ follower_should_act }}'

  # ─────────────────────────────────────────────────────────────────────
  # Step 2 — Build the action list from labels
  #
  # Per-label parsing uses regex_search + regex_replace to extract each
  # field one at a time — same pattern used elsewhere in this codebase
  # (Pre/Main/Post Script blocks, Arg blocks, etc.). This is more
  # verbose than regex_findall + tuple indexing but matches the rest of
  # the codebase and is known to work in HA's Jinja sandbox.
  #
  # Recognized label shapes (anchored to the scoped feature prefix):
  #   <sf> (Enable |Disable )?(Extra )?Script( <tag>)?: <ref>
  #   <sf> (Enable |Disable )?(Extra )?Feature( <tag>)?: <ref>
  #
  # _label_actions items:
  #   {kind, replaces_implicit, variant, tag, ref}
  #     kind: 'script' | 'feature'
  #     variant: 'enable' | 'disable' | 'normal'
  #     tag: string (empty when no tag)
  #     ref: target script/automation/scene ref or referenced feature name
  # ─────────────────────────────────────────────────────────────────────
  - variables:
      _label_actions: >-
        {% set ns = namespace(items=[]) %}
        {% set sf = scoped_feature %}
        {# Anchored shape: <sf> [Enable|Disable ][Extra ]<Script|Feature>[ <tag>]: <ref> #}
        {% set base_re = '^' ~ sf ~ ' (Enable |Disable )?(Extra )?(Script|Feature)( \\S+)?: .+$' %}
        {% for lbl in follower_labels %}
          {% if lbl | regex_search(base_re) %}
            {# Variant qualifier (optional). #}
            {% set var_match = lbl | regex_search('^' ~ sf ~ ' (Enable|Disable) ') %}
            {% set variant = 'enable' if (lbl | regex_search('^' ~ sf ~ ' Enable '))
                             else ('disable' if (lbl | regex_search('^' ~ sf ~ ' Disable '))
                                   else 'normal') %}
            {# Replacement vs additive. #}
            {% set extra = lbl | regex_search('^' ~ sf ~ ' (Enable |Disable )?Extra ') %}
            {# Kind (Script vs Feature). The keyword sits immediately
               after the variant + optional 'Extra '. #}
            {% set kind_word = ('script'
              if (lbl | regex_search('^' ~ sf ~ ' (Enable |Disable )?(Extra )?Script( |:)'))
              else 'feature') %}
            {# Tag: optional whitespace-delimited token between the
               keyword and the colon. Capture by stripping prefix + suffix. #}
            {% set kw = 'Script' if kind_word == 'script' else 'Feature' %}
            {% set tag_pat = '^' ~ sf ~ ' (Enable |Disable )?(Extra )?' ~ kw ~ ' (\\S+): ' %}
            {% set tag_match = lbl | regex_findall(tag_pat) %}
            {% set tag = '' %}
            {% if tag_match | length > 0 %}
              {# regex_findall with capture groups returns tuples;
                 the tag is the last (third) capture. Some HA versions
                 return strings instead — handle both shapes. #}
              {% set first = tag_match[0] %}
              {% if first is string %}{% set tag = first | trim %}
              {% else %}{% set tag = first[-1] | trim %}{% endif %}
            {% endif %}
            {# Ref: everything after the ': '. #}
            {% set ref = lbl | regex_replace('^[^:]+: ', '') | trim %}
            {% set ns.items = ns.items + [{
              'kind': kind_word,
              'replaces_implicit': (not extra),
              'variant': variant,
              'tag': tag,
              'ref': ref
            }] %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}
      _arg_pools: >-
        {# Arg pool keyed by (variant, tag).
           Label shape: ^<sf> (Enable |Disable )?Arg( <tag>)? <field>: <value>$
           Substitution syntax on values:
             <attribute>.<dotted.path>
           - must match ^[A-Za-z_][A-Za-z0-9_]*\.
           - first segment is a top-level attribute on
             sensor.labeled_features_state.
           - remaining segments walk into nested dicts.
           - empty segment ('..') is a literal '' key.
           - special case: `leaders.<rest>` with non-eid first path
             segment splices the leader_entity_id in. #}
        {% set _sensor_attrs = states['sensor.labeled_features_state'].attributes
                               if states['sensor.labeled_features_state'] is not none else {} %}
        {% set sf = scoped_feature %}
        {% set arg_re = '^' ~ sf ~ ' (Enable |Disable )?Arg(?: \\S+)? \\S+: .+$' %}
        {% set sub_re = '^[A-Za-z_][A-Za-z0-9_]*\\.' %}
        {% set ns = namespace(pools={}) %}
        {% for lbl in follower_labels %}
          {% if lbl | regex_search(arg_re) %}
            {% set variant = 'enable' if (lbl | regex_search('^' ~ sf ~ ' Enable Arg'))
                             else ('disable' if (lbl | regex_search('^' ~ sf ~ ' Disable Arg'))
                                   else 'normal') %}
            {% if variant == 'normal' %}
              {% set after_arg = lbl | regex_replace('^' ~ sf ~ ' Arg ', '') %}
            {% else %}
              {% set vw = 'Enable' if variant == 'enable' else 'Disable' %}
              {% set after_arg = lbl | regex_replace('^' ~ sf ~ ' ' ~ vw ~ ' Arg ', '') %}
            {% endif %}
            {% set head = after_arg | regex_replace(':.*$', '') %}
            {% set toks = head.split() %}
            {% if toks | length >= 2 %}
              {% set tag = toks[0] | trim %}
              {% set field_raw = toks[1] | trim %}
            {% else %}
              {% set tag = '' %}
              {% set field_raw = toks[0] | trim %}
            {% endif %}
            {% set raw = lbl | regex_replace('^[^:]+: ', '') | trim %}
            {% if raw | regex_search(sub_re) %}
              {% set parts = raw.split('.') %}
              {% set attr_name = parts[0] %}
              {% set path = parts[1:] %}
              {% set cur_ns = namespace(v=_sensor_attrs.get(attr_name, none)) %}
              {% if attr_name == 'leaders' and path | length > 0
                    and cur_ns.v is not none
                    and (path[0] not in cur_ns.v)
                    and (leader_entity_id | trim) != '' %}
                {% set cur_ns.v = cur_ns.v.get(leader_entity_id, none) %}
              {% endif %}
              {% for seg in path %}
                {% if cur_ns.v is mapping %}
                  {% set cur_ns.v = cur_ns.v.get(seg, none) %}
                {% else %}
                  {% set cur_ns.v = none %}
                {% endif %}
              {% endfor %}
              {% set resolved = (cur_ns.v if cur_ns.v is not none else raw) | string %}
            {% else %}
              {% set resolved = raw %}
            {% endif %}
            {% set pool_key = variant ~ '||' ~ tag %}
            {% set existing = ns.pools.get(pool_key, {}) %}
            {% set ns.pools = dict(ns.pools, **{pool_key: dict(existing, **{field_raw: resolved})}) %}
          {% endif %}
        {% endfor %}
        {{ ns.pools }}
      _has_replacement: >-
        {{ _label_actions | selectattr('replaces_implicit', 'equalto', true) | list | length > 0 }}
  - variables:
      _action_list: >-
        {%- set implicit = [] -%}
        {%- if not _has_replacement -%}
          {%- set implicit = [{
            'kind': 'feature',
            'replaces_implicit': false,
            'variant': 'normal',
            'tag': '',
            'ref': '',
            'implicit': true
          }] -%}
        {%- endif -%}
        {{ _label_actions + implicit }}

  # ─────────────────────────────────────────────────────────────────────
  # Step 3 — Sort the action list: tag asc (no-tag last), then variant
  # (Enable, Normal, Disable).
  # ─────────────────────────────────────────────────────────────────────
  - variables:
      _variant_rank: >-
        {{ {'enable': 0, 'normal': 1, 'disable': 2} }}
      sorted_actions: >-
        {%- set ns = namespace(annotated=[]) -%}
        {%- for it in _action_list -%}
          {%- set tag = it.tag | default('') -%}
          {%- set tag_bucket = 1 if tag == '' else 0 -%}
          {%- set tag_key = tag if tag != '' else '~~' -%}
          {%- set variant_key = _variant_rank.get(it.variant | default('normal'), 1) -%}
          {%- set ns.annotated = ns.annotated + [
            dict(it, **{
              '_tag_bucket': tag_bucket,
              '_tag_key': tag_key,
              '_variant_key': variant_key
            })
          ] -%}
        {%- endfor -%}
        {{ ns.annotated
           | sort(attribute='_variant_key')
           | sort(attribute='_tag_key')
           | sort(attribute='_tag_bucket') }}

  # ─────────────────────────────────────────────────────────────────────
  # Step 4 — Filter by current state.
  # ─────────────────────────────────────────────────────────────────────
  - variables:
      filtered_actions: >-
        {%- set ns = namespace(out=[]) -%}
        {%- for it in sorted_actions -%}
          {%- set v = it.variant | default('normal') -%}
          {%- if v == 'enable' and not (follower_enabled | bool) -%}
          {%- elif v == 'disable' and (follower_enabled | bool) -%}
          {%- else -%}
            {%- set ns.out = ns.out + [it] -%}
          {%- endif -%}
        {%- endfor -%}
        {{ ns.out }}
      _std_fields_base: >-
        {{ {'follower_entity_id': follower_entity_id,
            'feature': feature,
            'leader_feature': feature,
            'leader_entity_id': leader_entity_id,
            'leader_enabled': leader_enabled,
            'scope': scope,
            'scope_id': scope_id,
            'toggle': follower_toggle,
            'error_mode': follower_error_mode} }}

  # ─────────────────────────────────────────────────────────────────────
  # Step 5 — Execute the loop.
  # ─────────────────────────────────────────────────────────────────────
  - repeat:
      for_each: '{{ filtered_actions }}'
      sequence:
      - variables:
          _it: '{{ repeat.item }}'
          _args: >-
            {{ _arg_pools.get(((_it.variant | default('normal')) ~ '||' ~ (_it.tag | default(''))), {}) }}

      - choose:
        # ───────── script kind ─────────
        - conditions:
            - condition: template
              value_template: '{{ _it.kind == "script" }}'
          sequence:
          # Guard: skip + report when ref is empty / None.
          - if:
            - condition: template
              value_template: '{{ (_it.ref | default("") | string | trim) == "" }}'
            then:
            - action: script.labeled_feature_error_mode
              data:
                error_mode: '{{ follower_error_mode }}'
                source: Labeled Feature Follower
                message: >-
                  Empty script ref in action item (variant={{ _it.variant }},
                  tag={{ _it.tag }}) for {{ follower_entity_id }} (feature: {{ feature_name }}).
            - stop: 'Labeled Feature Follower: empty script ref (handled per error_mode).'
          - if:
            - condition: template
              value_template: '{{ _it.ref.startswith("automation.") or _it.ref.startswith("scene.") }}'
            then:
            - action: '{{ _it.ref }}'
              data: {}
              continue_on_error: true
            else:
            # Pass every arg through to the script. HA does not expose
            # script field declarations as state attributes
            # (`state_attr(<script>, 'fields')` is always None), so we
            # can't validate arg names from inside a template.
            # Undeclared fields are silently ignored by the script
            # invocation; typo'd Arg labels will simply not have an
            # effect (rather than raising an Error Mode warning).
            - variables:
                _all_args: '{{ _args or {} }}'
            - choose:
              - conditions:
                  - condition: template
                    value_template: '{{ _all_args | length == 0 }}'
                sequence:
                - action: '{{ _it.ref }}'
                  data: '{{ _std_fields_base }}'
                  continue_on_error: true
              default:
              - action: script.turn_on
                target:
                  entity_id: '{{ _it.ref | trim }}'
                data:
                  variables: '{{ _std_fields_base | combine(_all_args) }}'
                continue_on_error: true

        # ───────── feature kind ─────────
        - conditions:
            - condition: template
              value_template: '{{ _it.kind == "feature" }}'
          sequence:
          - variables:
              _target_feature: >-
                {{ _it.ref if (_it.ref | default('') | trim != '') else feature }}
              _is_self: '{{ _target_feature == feature }}'
              _is_implicit: '{{ _it.implicit | default(false) | bool }}'

          - choose:
              # ── Self + non-implicit -> documented no-op
              - conditions:
                  - condition: template
                    value_template: '{{ _is_self and not _is_implicit }}'
                sequence: []

              # ── Cross-feature -> labeled_feature_generics
              - conditions:
                  - condition: template
                    value_template: '{{ not _is_self }}'
                sequence:
                - action: script.labeled_feature_generics
                  data:
                    feature: '{{ _target_feature }}'
                    exclude_feature: '{{ feature }}'
                    scope: '{{ scope }}'
                    scope_id: '{{ scope_id }}'
                    follower_entity_id: '{{ follower_entity_id }}'
                    leader_entity_id: '{{ leader_entity_id }}'
                    leader_enabled: '{{ follower_enabled }}'
                    toggle: '{{ follower_toggle }}'
                    error_mode: '{{ follower_error_mode }}'
                  continue_on_error: true

            # ── default: self + implicit -> direct entity action ──
            default:
            - variables:
                follower_target_value: >-
                  {% set pfx = scoped_feature + (' Enable: ' if follower_enabled else ' Disable: ') %}
                  {% set match = follower_labels | select('match', '^' + pfx + '.+') | first | default('') %}
                  {% if match == '' %}
                    {% set pfx2 = scoped_feature + ': ' %}
                    {% set match = follower_labels | select('match', '^' + pfx2 + '.+') | first | default('') %}
                  {% endif %}
                  {{ match | regex_replace('^.+: ', '') | trim }}

            # ── Direct-value path (skipped in toggle mode)
            - if:
              - condition: template
                value_template: '{{ follower_target_value != "" and not follower_toggle }}'
              then:
              - condition: template
                value_template: '{{ states(follower_entity_id) != follower_target_value }}'
              - if:
                - condition: template
                  value_template: '{{ follower_domain == "select" }}'
                then:
                - action: select.select_option
                  target:
                    entity_id: '{{ follower_entity_id }}'
                  data:
                    option: '{{ follower_target_value }}'
              - if:
                - condition: template
                  value_template: '{{ follower_domain == "input_select" }}'
                then:
                - action: input_select.select_option
                  target:
                    entity_id: '{{ follower_entity_id }}'
                  data:
                    option: '{{ follower_target_value }}'
              - if:
                - condition: template
                  value_template: '{{ follower_domain == "number" }}'
                then:
                - action: number.set_value
                  target:
                    entity_id: '{{ follower_entity_id }}'
                  data:
                    value: '{{ follower_target_value }}'
              - if:
                - condition: template
                  value_template: '{{ follower_domain == "input_number" }}'
                then:
                - action: input_number.set_value
                  target:
                    entity_id: '{{ follower_entity_id }}'
                  data:
                    value: '{{ follower_target_value }}'
              - if:
                - condition: template
                  value_template: '{{ follower_domain == "text" }}'
                then:
                - action: text.set_value
                  target:
                    entity_id: '{{ follower_entity_id }}'
                  data:
                    value: '{{ follower_target_value }}'
              - if:
                - condition: template
                  value_template: '{{ follower_domain == "input_text" }}'
                then:
                - action: input_text.set_value
                  target:
                    entity_id: '{{ follower_entity_id }}'
                  data:
                    value: '{{ follower_target_value }}'
              - if:
                - condition: template
                  value_template: '{{ follower_domain == "light" }}'
                then:
                - if:
                  - condition: template
                    value_template: '{{ follower_target_value | int(-1) >= 0 }}'
                  then:
                  - action: light.turn_on
                    target:
                      entity_id: '{{ follower_entity_id }}'
                    data:
                      brightness_pct: '{{ [follower_target_value | int(0), 100] | min }}'

            # ── Toggle path
            - if:
              - condition: template
                value_template: '{{ follower_toggle }}'
              then:
              - variables:
                  _toggle_current_on: >-
                    {{ states(follower_entity_id) | lower in
                       ['on', 'true', 'home', 'open', 'detected', 'active', 'unlocked'] }}
                  _toggle_supported_domains: >-
                    {{ ['light', 'switch', 'input_boolean', 'fan', 'cover',
                        'media_player', 'climate', 'humidifier', 'siren', 'remote',
                        'automation', 'script', 'lock'] }}
                  _toggle_unsupported_domains: >-
                    {{ ['select', 'input_select', 'number', 'input_number', 'text',
                        'input_text', 'scene', 'button', 'event', 'sensor',
                        'binary_sensor', 'vacuum'] }}
              - if:
                - condition: template
                  value_template: '{{ follower_domain in _toggle_unsupported_domains }}'
                then:
                - action: script.labeled_feature_error_mode
                  data:
                    error_mode: '{{ follower_error_mode }}'
                    source: Labeled Feature Follower
                    message: >-
                      Toggle not supported for domain {{ follower_domain }} on
                      {{ follower_entity_id }} (feature: {{ feature_name }}).
                - if:
                  - condition: template
                    value_template: '{{ follower_error_mode == "stop" }}'
                  then:
                  - stop: 'Labeled Feature Follower: toggle unsupported for {{ follower_domain }}.'
                    error: true
              - if:
                - condition: template
                  value_template: '{{ follower_domain == "lock" }}'
                then:
                - action: '{{ "lock.unlock" if _toggle_current_on else "lock.lock" }}'
                  target:
                    entity_id: '{{ follower_entity_id }}'
              - if:
                - condition: template
                  value_template: '{{ follower_domain == "media_player" and follower_domain not in _toggle_unsupported_domains }}'
                then:
                - variables:
                    _mp_supported: '{{ state_attr(follower_entity_id, "supported_features") | int(0) }}'
                    _mp_supports_on_off: '{{ _mp_supported | bitwise_and(128) > 0 }}'
                    _mp_supports_mute: '{{ _mp_supported | bitwise_and(4) > 0 }}'
                - if:
                  - condition: template
                    value_template: '{{ _mp_supports_on_off }}'
                  then:
                  - action: media_player.toggle
                    target:
                      entity_id: '{{ follower_entity_id }}'
                  else:
                  - if:
                    - condition: template
                      value_template: '{{ _mp_supports_mute }}'
                    then:
                    - action: media_player.volume_mute
                      target:
                        entity_id: '{{ follower_entity_id }}'
                      data:
                        is_volume_muted: '{{ not (state_attr(follower_entity_id, "is_volume_muted") | bool(false)) }}'
                    else:
                    - action: script.labeled_feature_error_mode
                      data:
                        error_mode: '{{ follower_error_mode }}'
                        source: Labeled Feature Follower
                        message: 'media_player {{ follower_entity_id }} supports neither on/off nor mute toggle (feature: {{ feature_name }}).'
                    - if:
                      - condition: template
                        value_template: '{{ follower_error_mode == "stop" }}'
                      then:
                      - stop: 'Labeled Feature Follower: media_player {{ follower_entity_id }} has neither toggle nor mute.'
                        error: true
              - if:
                - condition: template
                  value_template: '{{ follower_domain in _toggle_supported_domains and follower_domain not in ["lock", "media_player"] }}'
                then:
                - action: homeassistant.toggle
                  target:
                    entity_id: '{{ follower_entity_id }}'

            # ── Domain-default on/off path (no Enable/Disable value, no toggle)
            - if:
              - condition: template
                value_template: '{{ follower_target_value == "" and not follower_toggle and follower_domain == "light" }}'
              then:
              - condition: template
                value_template: '{{ states(follower_entity_id) | lower not in (["on"] if follower_enabled else ["off"]) }}'
              - action: 'light.turn_{{ "on" if follower_enabled else "off" }}'
                target:
                  entity_id: '{{ follower_entity_id }}'
            - if:
              - condition: template
                value_template: '{{ follower_target_value == "" and not follower_toggle and follower_domain in ["switch", "input_boolean"] }}'
              then:
              - condition: template
                value_template: '{{ states(follower_entity_id) | lower not in (["on"] if follower_enabled else ["off"]) }}'
              - action: '{{ follower_domain }}.turn_{{ "on" if follower_enabled else "off" }}'
                target:
                  entity_id: '{{ follower_entity_id }}'
            - if:
              - condition: template
                value_template: '{{ follower_target_value == "" and not follower_toggle and follower_domain == "media_player" }}'
              then:
              - variables:
                  mp_supported: '{{ state_attr(follower_entity_id, "supported_features") | int(0) }}'
                  mp_supports_on_off: '{{ mp_supported | bitwise_and(128) > 0 }}'
                  mp_supports_mute: '{{ mp_supported | bitwise_and(4) > 0 }}'
              - if:
                - condition: template
                  value_template: '{{ mp_supports_on_off }}'
                then:
                - condition: template
                  value_template: >-
                    {{ states(follower_entity_id) | lower not in
                       (['on', 'playing', 'idle', 'paused', 'buffering']
                        if follower_enabled else
                        ['off', 'unavailable', 'standby']) }}
                - action: 'media_player.turn_{{ "on" if follower_enabled else "off" }}'
                  target:
                    entity_id: '{{ follower_entity_id }}'
                else:
                - if:
                  - condition: template
                    value_template: '{{ mp_supports_mute }}'
                  then:
                  - condition: template
                    value_template: '{{ state_attr(follower_entity_id, "is_volume_muted") != (not follower_enabled) }}'
                  - action: media_player.volume_mute
                    target:
                      entity_id: '{{ follower_entity_id }}'
                    data:
                      is_volume_muted: '{{ not follower_enabled }}'
            - if:
              - condition: template
                value_template: >-
                  {{ follower_target_value == '' and not follower_toggle and follower_domain not in
                     ['light', 'switch', 'input_boolean', 'media_player',
                      'number', 'input_number', 'text', 'input_text',
                      'select', 'input_select'] }}
              then:
              - condition: template
                value_template: >-
                  {{ states(follower_entity_id) | lower not in
                     (['on', 'true', 'home', 'open', 'detected', 'active', 'unlocked']
                      if follower_enabled else
                      ['off', 'false', 'away', 'closed', 'clear', 'inactive', 'locked']) }}
              - action: 'homeassistant.turn_{{ "on" if follower_enabled else "off" }}'
                target:
                  entity_id: '{{ follower_entity_id }}'

      # ── Per-iteration error routing ──
      - if:
        - condition: template
          value_template: '{{ error is defined }}'
        then:
        - if:
          - condition: template
            value_template: '{{ follower_error_mode == "log" }}'
          then:
          - action: system_log.write
            data:
              level: error
              message: >-
                Labeled Feature Follower: action error (kind={{ _it.kind }},
                ref={{ _it.ref }}, tag={{ _it.tag }}, variant={{ _it.variant }})
                for {{ follower_entity_id }} (feature: {{ feature_name }}): {{ error }}
        - if:
          - condition: template
            value_template: '{{ follower_error_mode == "alert" }}'
          then:
          - action: script.send_alert
            data:
              alert_severity: high
              alert_title: Labeled Feature Follower Error
              alert_message: >-
                Action error (kind={{ _it.kind }}, ref={{ _it.ref }},
                tag={{ _it.tag }}) for {{ follower_entity_id }}
                (feature: {{ feature_name }}): {{ error }}
        - if:
          - condition: template
            value_template: '{{ follower_error_mode == "stop" }}'
          then:
          - stop: 'Labeled Feature Follower: halted on {{ _it.ref }} (feature: {{ feature_name }})'
            error: true
labeled_feature_sleep_timeout:
  alias: Labeled Feature Sleep Timeout
  description: >
    Sleep-timeout script for the Labeled Feature system. Designed to be
    dispatched via the standard Leader/Follower dispatch loop from any of
    three entry points:

      1. A button-press Leader (`Area Leader: Sleep Timer`) — primary
         trigger; the user explicitly arms the timer.
      2. A `Night` follower wiring (`Area Follower: Night` +
         `Area Night Script: script.labeled_feature_sleep_timeout`) —
         catches the case where Night is toggled off while a fade is in
         flight, with no button press.
      3. A `Media Playing` follower wiring (`Area Follower: Media Playing`
         + `Area Media Playing Script: …`) — same idea, for when the
         user pauses / stops media manually.

    Gate rule (re-evaluated fresh on every dispatch — `leader_enabled`
    from the dispatch loop is intentionally ignored):

        should_run = night_enabled AND media_playing_enabled

    Both values are read directly from
    `sensor.labeled_features_state.features[<feature>][<scope>][<scope_id>].enabled`,
    keyed by the script's `feature_night` and `feature_media_playing`
    fields (defaults: `Night` / `Media Playing`).

    Behavior:

      - should_run == false  → cancel-restore (idempotent: if no snapshot
                               is stored, no-op). Clears the snapshot at
                               the end.
      - should_run == true   → snapshot the media player's current volume
                               (if no snapshot is already stored — so a
                               `mode: restart` mid-fade preserves the
                               original level), then run the full fade:

          1. Wait `sleep_timeout_minutes` (default 15 min)
          2. Halve the volume
          3. Wait 1 min
          4. Mute
          5. Seek back 30 s every 30 s × 20 iterations (~10 min)
          6. Unmute
          7. Restore to snapshot
          8. Clear snapshot

    The media player to act on is resolved from
    `sensor.labeled_features_state.features[<feature_media_playing>][<scope>][<scope_id>].triggering_leader`
    — i.e. whichever entity_id is currently registered as the
    `Media Playing` leader for the dispatched scope. Declare your
    bedroom media player as that leader
    (`Feature Leader`, `Area Leader: Media Playing`,
    `Area Media Playing Enable: playing`) and the script picks it up
    automatically — no `media_player` Arg required on any dispatch.
    Use the optional `media_player` field only to force a different
    target (e.g. for manual test invocations).

    `mode: restart` so the script composes cleanly with rapid re-trigger
    (button mash, Night flip during fade, etc).
  mode: restart
  variables:
    # Surface `original_volumes` as a script state attribute so a
    # `mode: restart` mid-fade can re-read its own previous snapshot in
    # step 0 of `sequence:` below and preserve the original level
    # across the restart.
    original_volumes: {}
  fields:
    media_player:
      name: Media Player (Override)
      description: >
        Optional. When set, overrides the automatic resolution and the
        script targets this entity_id directly. Leave empty (the
        normal case) and the script reads
        `sensor.labeled_features_state.features[<feature_media_playing>][<scope>][<scope_id>].triggering_leader`
        — which is the entity_id of the bedroom media player you
        labeled `Area Leader: Media Playing`.
      required: false
      default: ''
      selector:
        entity:
          domain: media_player
    feature_night:
      name: Night Feature Name
      description: >
        Feature name to read out of
        `sensor.labeled_features_state.features` for the Night gate
        check. Default: `Night`.
      required: false
      default: Night
      selector:
        text: {}
    feature_media_playing:
      name: Media Playing Feature Name
      description: >
        Feature name to read out of
        `sensor.labeled_features_state.features` for the
        media-playing gate check. Default: `Media Playing`.
      required: false
      default: Media Playing
      selector:
        text: {}
    sleep_timeout_minutes:
      name: Sleep Timeout Minutes
      description: How long to wait before beginning the fade-out
        sequence (default 15).
      required: false
      default: 15
      selector:
        number:
          min: 1
          max: 120
    # ── Standard pass-through fields populated by the dispatch loop.
    #    Declared here so the loop's typo-tolerant arg pass-through
    #    actually lands them on this script.
    scope:
      name: Scope
      description: Passed by the leader automation. Used to look up the
        Night / Media Playing feature state in the sensor.
      required: false
      default: area
      selector:
        select:
          options:
            - area
            - floor
            - none
    scope_id:
      name: Scope ID
      description: Passed by the leader automation. The resolved
        area_id / floor_id for the gating sensor lookup.
      required: false
      default: ''
      selector:
        text: {}
    leader_entity_id:
      name: Leader Entity ID
      description: Pass-through; informational only.
      required: false
      default: ''
      selector:
        entity: {}
    follower_entity_id:
      name: Follower Entity ID
      description: Pass-through; informational only.
      required: false
      default: ''
      selector:
        entity: {}
    feature:
      name: Feature
      description: Pass-through; the dispatched feature name
        (`Sleep Timer` / `Night` / `Media Playing` depending on entry
        point).
      required: false
      default: ''
      selector:
        text: {}
    leader_feature:
      name: Leader Feature
      description: Pass-through; same as `feature` in this dispatch
        loop.
      required: false
      default: ''
      selector:
        text: {}
    leader_enabled:
      name: Leader Enabled
      description: Pass-through. Intentionally NOT used as the gate —
        the script re-reads Night and Media Playing fresh from the
        sensor on every dispatch.
      required: false
      default: true
      selector:
        boolean: {}
    toggle:
      name: Toggle
      description: Pass-through; ignored (not meaningful here).
      required: false
      default: false
      selector:
        boolean: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Used for the
        "media_player not set" guard and similar.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
  sequence:
  # ── Step 0: read the previously-stored snapshot off our own state
  #            attribute. On a fresh first call this is {} (the
  #            script just turned 'on' for the first time). On a
  #            mode:restart re-entry mid-fade, the previous run's
  #            snapshot is still here — restart kills the in-flight
  #            sequence without unwinding script-state attributes
  #            populated by the top-level `variables:` step.
  - variables:
      # `state_attr(...) | default({})` does NOT convert `None` to `{}` —
      # `default()` only fires when the value is *undefined*, and `None`
      # is a defined value. That's how `original_volumes` ended up as
      # literal `None` mid-fade, raising
      #   'None' has no attribute 'media_player.<id>'
      # on step-5's `original_volumes[_mp] / 2`. The `or {}` idiom
      # short-circuits `None` (and any other falsy value) to an empty
      # dict, which is what the snapshot logic below actually expects.
      original_volumes: >-
        {{ state_attr('script.labeled_feature_sleep_timeout',
                      'original_volumes') or {} }}

  # ── Step 1: normalize inputs and read the gate signals fresh.
  #            The media player target is resolved from the
  #            `Media Playing` feature's `triggering_leader` — i.e.
  #            whichever entity_id is currently labeled
  #            `Area Leader: Media Playing` in this scope. The
  #            `media_player` field is honored as an override when set.
  # Note: dict-typed assignments use single-quoted scalars rather than
  # `>-` folded literals. HA's template engine resolves both shapes to
  # the same string, but `>-` introduces folded newlines that combine
  # poorly with auto-native deserialization — the same workaround the
  # leaders automation uses for `trigger.to_state.attributes.features`.
  # Each downstream lookup also guards `is mapping` defensively so a
  # legacy snapshot or upstream type drift can't crash the template.
  - variables:
      _err_mode: '{{ (error_mode | default("log") | lower) }}'
      _scope: '{{ (scope | default("area") | lower) }}'
      _scope_id: '{{ scope_id | default("") | string }}'
      _feature_night: '{{ feature_night | default("Night") | trim }}'
      _feature_media_playing: '{{ feature_media_playing | default("Media Playing") | trim }}'
      _features_raw: "{{ state_attr('sensor.labeled_features_state', 'features') | default({}) }}"
  - variables:
      _features: '{{ _features_raw if _features_raw is mapping else {} }}'
  - variables:
      _night_feature_map_raw: '{{ _features.get(_feature_night, {}) }}'
      _media_playing_feature_map_raw: '{{ _features.get(_feature_media_playing, {}) }}'
  - variables:
      _night_feature_map: '{{ _night_feature_map_raw if _night_feature_map_raw is mapping else {} }}'
      _media_playing_feature_map: '{{ _media_playing_feature_map_raw if _media_playing_feature_map_raw is mapping else {} }}'
  - variables:
      _night_scope_map_raw: '{{ _night_feature_map.get(_scope, {}) }}'
      _media_playing_scope_map_raw: '{{ _media_playing_feature_map.get(_scope, {}) }}'
  - variables:
      _night_scope_map: '{{ _night_scope_map_raw if _night_scope_map_raw is mapping else {} }}'
      _media_playing_scope_map: '{{ _media_playing_scope_map_raw if _media_playing_scope_map_raw is mapping else {} }}'
  - variables:
      _night_entry_raw: '{{ _night_scope_map.get(_scope_id, {}) }}'
      _media_playing_entry_raw: '{{ _media_playing_scope_map.get(_scope_id, {}) }}'
  - variables:
      _night_entry: '{{ _night_entry_raw if _night_entry_raw is mapping else {} }}'
      _media_playing_entry: '{{ _media_playing_entry_raw if _media_playing_entry_raw is mapping else {} }}'
  - variables:
      _night_enabled: '{{ _night_entry.get("enabled", false) | bool(false) }}'
      _media_playing_enabled: '{{ _media_playing_entry.get("enabled", false) | bool(false) }}'
      _media_playing_leader: '{{ _media_playing_entry.get("triggering_leader", "") | string | trim }}'
      _media_playing_triple_exists: '{{ _media_playing_entry | length > 0 }}'
  - variables:
      # `_mp` resolution order:
      #   1. explicit `media_player` field (override path)
      #   2. `triggering_leader` from the Media Playing triple — this
      #      is the entity_id of the bedroom media player labeled
      #      `Area Leader: Media Playing`.
      _media_player_override: '{{ media_player | default("") | string | trim }}'
      _mp: '{{ _media_player_override if _media_player_override != "" else _media_playing_leader }}'
  - variables:
      _should_run: '{{ _mp != "" and _night_enabled and _media_playing_enabled }}'

  # ── Step 1b: Media-Playing-when-in-flight guard.
  #            The Media Playing follower wiring exists so that *pausing
  #            mid-fade* runs cancel-restore. But that same wiring would
  #            also re-trigger this script on *Play resuming* after the
  #            user cancelled via Night-off — which would re-arm the
  #            timer and surprise the user.
  #
  #            The rule: Media Playing dispatches are only honored when
  #            a fade is currently in flight (i.e. `original_volumes`
  #            from step 0 is non-empty — that's our "script already
  #            running with state" proxy). Without an in-flight fade,
  #            Media Playing dispatches short-circuit silently.
  #
  #            Sleep Timer (button) and Night (follower) entry points
  #            are unaffected — they always evaluate the gate.
  - variables:
      _entry_point: '{{ (feature | default("") | trim) }}'
      _fade_in_flight: '{{ original_volumes | length > 0 }}'
  - if:
    - condition: template
      value_template: >-
        {{ _entry_point == _feature_media_playing and not _fade_in_flight }}
    then:
    - stop: >-
        Sleep Timeout: Media Playing entry point ignored — no fade in
        flight (entry_point={{ _entry_point }}, in_flight={{ _fade_in_flight }}).

  # ── Step 2: media_player resolution guard.
  #            Routed through the shared Error Mode helper so a
  #            misconfigured Media Playing leader is surfaced
  #            consistently with the rest of the stack.
  - if:
    - condition: template
      value_template: '{{ _mp == "" }}'
    then:
    - action: script.labeled_feature_error_mode
      data:
        error_mode: '{{ _err_mode }}'
        source: Labeled Feature Sleep Timeout
        message: >-
          Sleep Timeout could not resolve a media_player.
          override={{ _media_player_override or '(empty)' }};
          features[{{ _feature_media_playing }}][{{ _scope }}][{{ _scope_id }}]
          triple_exists={{ _media_playing_triple_exists }},
          triggering_leader={{ _media_playing_leader or '(empty)' }}.
          If triple_exists=False, label your media_player
          `(Area|Floor|)Leader: {{ _feature_media_playing }}` and make sure
          its `Enable:` label has fired at least once.
    - if:
      - condition: template
        value_template: '{{ _err_mode == "stop" }}'
      then:
      - stop: 'Labeled Feature Sleep Timeout: cannot resolve media_player.'
        error: true
    - stop: 'Sleep Timeout: cannot resolve media_player (handled per error_mode).'

  # ── Step 3: Cancel-restore branch.
  #            Idempotent — if no snapshot exists this is a no-op.
  #            Always clears the snapshot at the end so the next
  #            fresh run re-snapshots cleanly.
  - if:
    - condition: template
      value_template: '{{ not _should_run }}'
    then:
    - if:
      - condition: template
        value_template: '{{ original_volumes | length > 0 }}'
      then:
      # Restore the snapshot. We use `volume_set` exclusively (no
      # `volume_mute`) because the fade also uses `volume_set: 0`
      # instead of `volume_mute` (see Step 5). So whatever the
      # current volume is — original, halved, or 0 — `volume_set` to
      # the snapshot lands us back at the original level on every
      # integration regardless of whether it advertises
      # SUPPORT_VOLUME_MUTE. Simpler than the capability check and
      # bulletproof against integrations that misadvertise mute
      # support (e.g. some lnxlink / MQTT players).
      - repeat:
          for_each: '{{ original_volumes.keys() | list }}'
          sequence:
          - action: media_player.volume_set
            target:
              entity_id: '{{ repeat.item }}'
            data:
              volume_level: '{{ original_volumes[repeat.item] }}'
            continue_on_error: true
    # Clear the snapshot so the next fresh full-run re-snapshots.
    - variables:
        original_volumes: {}
    - stop: >-
        Sleep Timeout: cancel-restore
        (night={{ _night_enabled }}, playing={{ _media_playing_enabled }}).

  # ── Step 4: Snapshot if empty.
  #            On a `mode: restart` mid-fade this stays non-empty so
  #            the original level is preserved across the restart.
  #
  #            NOTE: `variables:` inside an `if:` / `then:` block is
  #            scoped to that block in HA and does not propagate out
  #            to subsequent top-level steps. That's the second half
  #            of the bug that caused the runtime error — even after
  #            fixing step-0's `default({})` -> `or {}` so we get a
  #            proper empty dict, an `if:`-scoped re-assignment of
  #            `original_volumes` here would not be visible to the
  #            step-5 `media_player.volume_set` template.
  #
  #            The fix is a top-level `variables:` block with an
  #            inline conditional expression — the canonical HA
  #            "set if missing" pattern at sequence scope.
  - variables:
      original_volumes: >-
        {{ original_volumes
           if (original_volumes | length > 0)
           else {_mp: state_attr(_mp, 'volume_level') | float(0.5)} }}

  # ── Step 5: Fade sequence.
  #
  # No `volume_mute` calls anywhere — we use `volume_set: 0` for the
  # "mute" step and `volume_set: <snapshot>` for the restore. This is
  # simpler than capability-checking `SUPPORT_VOLUME_MUTE` and works on
  # every integration regardless of whether it correctly advertises
  # mute support (some MQTT players and lnxlink configs claim to
  # support it but the underlying device rejects the call). The
  # audible result is identical: silent during the seek-back hold,
  # restored to the original level at the end.
  #
  # Seek-back loop: see how `labeled_feature_generics` handles
  # `media_seek_back` (bitwise_and(2) on supported_features → silent
  # fallback to `media_player.media_previous_track`). We do the same
  # here. The loop ticks 20× at 0.5 s — fast enough to keep the player
  # from advancing through the queue during the brief silent hold,
  # not so slow that any seek failure stalls the script.
  - variables:
      _seek_supports: >-
        {{ (state_attr(_mp, 'supported_features') | int(0))
           | bitwise_and(2) > 0 }}
  # 5.1: Wait `sleep_timeout_minutes` before starting the fade.
  - delay:
      minutes: '{{ sleep_timeout_minutes | default(15) | int }}'
  # 5.2: Halve the volume.
  - action: media_player.volume_set
    target:
      entity_id: '{{ _mp }}'
    data:
      volume_level: >-
        {{ (original_volumes[_mp] / 2) | round(2) }}
  - delay:
      minutes: 1
  # 5.3: "Mute" via volume_set: 0 (works on every integration).
  - action: media_player.volume_set
    target:
      entity_id: '{{ _mp }}'
    data:
      volume_level: 0
  - delay:
      minutes: 1
  # 5.4: Seek-back loop — 20 × 0.5 s with 30 s of back-step each
  # iteration. This pins the player's cursor in roughly the same
  # spot during the brief mute hold so the resume doesn't land
  # somewhere unexpected. Matches the generics pattern: silently
  # falls back to `media_previous_track` when SUPPORT_SEEK is clear.
  - repeat:
      count: 20
      sequence:
      - delay:
          milliseconds: 500
      - if:
        - condition: template
          value_template: '{{ _seek_supports }}'
        then:
        - action: media_player.media_seek
          target:
            entity_id: '{{ _mp }}'
          data:
            seek_position: >-
              {{ [state_attr(_mp, 'media_position') | float(0) - 30, 0]
                 | max }}
          continue_on_error: true
        else:
        - action: media_player.media_previous_track
          target:
            entity_id: '{{ _mp }}'
          continue_on_error: true
  # 5.5: Restore the snapshot. This is also what "unmutes" the player
  # when the mute step was `volume_set: 0`. No separate volume_mute
  # call needed.
  - action: media_player.volume_set
    target:
      entity_id: '{{ _mp }}'
    data:
      volume_level: '{{ original_volumes[_mp] }}'

  # ── Step 6: Natural completion — clear snapshot so the next fresh
  #            invocation re-snapshots from the current volume.
  - variables:
      original_volumes: {}
labeled_feature_error_mode:
  alias: Labeled Feature Error Mode
  description: 'Shared helper for the Labeled Feature system''s Error Mode dispatch.
    Handles the silent / log / alert tiers. The `stop` tier is intentionally left
    to the caller: a `stop:` inside this script would only halt this helper, not the
    parent — so callers should follow this call with their own `stop: error: true`
    when `error_mode == "stop"`.

    '
  mode: parallel
  max: 50
  fields:
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
          - silent
          - log
          - alert
          - stop
    message:
      name: Message
      description: Human-readable error message describing what went wrong.
      required: true
      selector:
        text:
          multiline: true
    source:
      name: Source
      description: 'Short label for the calling script, used as a prefix in logs/alerts.
        Examples: ''Labeled Feature Generics'', ''Labeled Feature Somrig''.

        '
      required: false
      default: Labeled Feature
      selector:
        text: {}
    severity:
      name: Severity
      description: Severity for the alert tier (low | medium | high).
      required: false
      default: medium
      selector:
        select:
          custom_value: true
          options:
          - low
          - medium
          - high
  sequence:
  - variables:
      _mode: '{{ (error_mode | default("log") | lower) }}'
      _source: '{{ source | default("Labeled Feature") }}'
      _severity: '{{ severity | default("medium") }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ _mode == "silent" }}'
      sequence: []
    - conditions:
      - condition: template
        value_template: '{{ _mode == "log" }}'
      sequence:
      - action: system_log.write
        data:
          level: warning
          message: '{{ _source }}: {{ message }}'
    - conditions:
      - condition: template
        value_template: '{{ _mode == "alert" }}'
      sequence:
      - action: script.send_alert
        data:
          alert_severity: '{{ _severity }}'
          alert_title: '{{ _source }}'
          alert_message: '{{ message }}'
    - conditions:
      - condition: template
        value_template: '{{ _mode == "stop" }}'
      sequence:
      - action: system_log.write
        data:
          level: error
          message: '{{ _source }}: {{ message }}'
labeled_feature_generics:
  alias: Labeled Feature Generics
  description: >
    Generic feature dispatcher for the Labeled Feature system. Maps a generic
    feature name (Lights Off, Volume Up, Fan On, Night, …) to a domain-specific
    service call against an entity set resolved by label first, then by the
    feature's domain fallback. Honors `<scope-prefix><Feature> Exclude: True`
    labels on candidate entities to opt them out. Supports a `toggle` modifier
    that swaps the action for a domain toggle where it makes sense.

    Per-feature resolution algorithm:
      1. Build scope_entity_set from scope/scope_id (area/floor) or fall back
         to follower_entity_id / leader_entity_id area lookup.
      2. label_targets is the union of two `resolve_provides()` calls
         intersected with scope_entity_set:
           (a) resolve_provides(<Feature>, scope_prefix)
           (b) resolve_provides(<domain_label>, scope_prefix) when the
               feature has a `domain_label` in feature_meta (e.g.
               `Media Player` for media_player-domain features, `Light` for
               light, `Fan` for fan). This is what makes
               `Area Provides: Media Player` opt every player in the area
               into all media-player features without per-feature labels.
         resolve_provides(label, scope_prefix) tries 4 candidates in order
         and returns the first non-empty result:
           1. label                                  (exact, global)
           2. <scope_prefix>Provides: <label>        (scoped if prefixed)
           3. <scope_prefix>Follower: <label>        (scoped if prefixed)
           4. <scope_prefix>Leader: <label>          (scoped if prefixed)
         The exact (step 1) match is never scope-filtered. The scoped
         candidates (2-4) are filtered to scope_entity_set when
         scope_prefix is non-empty.
      3. excluded = entities labeled `<Feature> Exclude: True` OR
         `<scope-prefix><Feature> Exclude: True` (and the same pair for
         <domain_label> if defined).
      4. If (label_targets - excluded) is non-empty → use it.
      5. Else fallback to entities in scope_entity_set whose domain matches
         the feature's default domain, minus excluded.
      6. If still empty and feature has no domain fallback → Error Mode.
      7. Run feature action against final target set.

    See `Label Based Features.md` → "Labeled Feature Generics" for the full
    catalog of supported features.
  mode: parallel
  max: 50
  fields:
    feature:
      name: Feature
      description: 'Generic feature name (case-sensitive). Examples: ''Lights Off'',
        ''Volume Up'', ''Media Pause'', ''Fan On'', ''Night''. ''Set Feature'' is
        a special case that does not dispatch a domain action; it fires the
        `labeled_feature_set` event so `sensor.labeled_features_state` records a
        manual override. See Labeled Feature Generics docs for the full catalog.

        '
      required: true
      selector:
        select:
          custom_value: true
          options:
          - Media Toggle
          - Media Play
          - Media Pause
          - Media Next
          - Media Previous
          - Media Seek Back
          - Media Seek Forward
          - Volume Up
          - Volume Down
          - Lights On
          - Lights Off
          - Lights Up
          - Lights Down
          - Fan On
          - Fan Off
          - Fan Up
          - Fan Down
          - Ads
          - Night
          - Set Feature
    target_feature:
      name: Target Feature
      description: >
        Only used when `feature` is `Set Feature`. The feature whose state to
        write into `sensor.labeled_features_state.features`.
      required: false
      default: ''
      selector:
        text: {}
    enabled:
      name: Enabled
      description: >
        Only used when `feature` is `Set Feature`. The value to record.
      required: false
      default: true
      selector:
        boolean: {}

    scope:
      name: Scope
      description: Scope of the feature (area, floor, or none).
      required: false
      default: area
      selector:
        select:
          options:
          - area
          - floor
          - none
    scope_id:
      name: Scope ID
      description: The resolved area_id or floor_id. Falls back to follower/leader
        entity area.
      required: false
      default: ''
      selector:
        text: {}
    follower_entity_id:
      name: Follower Entity ID
      description: Used for area fallback when scope_id is empty.
      required: false
      default: ''
      selector:
        entity: {}
    leader_entity_id:
      name: Leader Entity ID
      description: Used for area fallback when follower_entity_id is also empty.
      required: false
      default: ''
      selector:
        entity: {}
    leader_enabled:
      name: Leader Enabled
      description: Pass-through from the leader. Not used directly by generics.
      required: false
      default: true
      selector:
        boolean: {}
    toggle:
      name: Toggle
      description: 'When true, swap the per-feature action for a domain toggle where
        it makes sense (light/fan/media toggle). For features where toggle is not
        meaningful (Media Next, Volume Up, Seek, …) this triggers Error Mode handling.

        '
      required: false
      default: false
      selector:
        boolean: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
          - silent
          - log
          - alert
          - stop
    exclude_feature:
      name: Exclude Feature Name
      description: 'Optional. The feature name used to build the Exclude label (`(Area
        |Floor |)<exclude_feature> Exclude: True`). When not supplied, defaults to
        `feature`. Used by mapping scripts (e.g. labeled_feature_somrig) to thread
        the leader''s feature name through dispatched generic calls so Exclude is
        keyed on the leader, not the generic action.

        '
      required: false
      default: ''
      selector:
        text: {}
  sequence:
    # ── Step 0: Set Feature short-circuit ───────────────────────────────────
    # Special-case feature: write directly into
    # `sensor.labeled_features_state.features` by firing the
    # `labeled_feature_set` event. The sensor's trigger-based template
    # listens for that event and records the override; the leader
    # automation then dispatches followers per usual.
    - if:
        - condition: template
          value_template: '{{ (feature | trim) == "Set Feature" }}'
      then:
        - variables:
            _tgt: '{{ target_feature | default("") | trim }}'
            _scp_in: '{{ (scope | default("global") | lower) | trim }}'
            _ena: '{{ (enabled | default(true)) | bool(true) }}'
            _err_mode: '{{ (error_mode | default("log") | lower) }}'
        - if:
            - condition: template
              value_template: '{{ _tgt == "" or _scp_in not in ["area","floor","global"] }}'
          then:
            - action: script.labeled_feature_error_mode
              data:
                error_mode: '{{ _err_mode }}'
                source: Labeled Feature Generics
                message: >-
                  Set Feature called with invalid target_feature ('{{ _tgt }}')
                  or scope ('{{ _scp_in }}'). scope must be one of area/floor/global.
            - if:
                - condition: template
                  value_template: '{{ _err_mode == "stop" }}'
              then:
                - stop: 'Labeled Feature Generics: invalid Set Feature args.'
                  error: true
            - stop: 'Set Feature: invalid args (handled per error_mode).'
        - event: labeled_feature_set
          event_data:
            target_feature: '{{ _tgt }}'
            scope: '{{ _scp_in }}'
            scope_id: '{{ scope_id | default("") | string }}'
            enabled: '{{ _ena }}'
            timestamp: '{{ now().timestamp() }}'
        - stop: 'Set Feature: event dispatched.'

    # ── Step 1: Resolve scope ids and scope entity set ──────────────────────
    - variables:
        _feature: '{{ feature | trim }}'
        _exclude_feature: >-
          {%- set ef = exclude_feature | default('') | trim -%}
          {{ ef if ef != '' else (feature | trim) }}
        _scope: '{{ (scope | default("area") | lower) }}'
        _toggle: '{{ (toggle | default(false)) | bool(false) }}'
        _err_mode: '{{ (error_mode | default("log") | lower) }}'
        _resolved_area_id: >-
          {%- if _scope == 'area' and scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- elif follower_entity_id is defined and follower_entity_id != '' -%}
            {{ area_id(follower_entity_id) | default('') }}
          {%- elif leader_entity_id is defined and leader_entity_id != '' -%}
            {{ area_id(leader_entity_id) | default('') }}
          {%- else -%}{{ '' }}{%- endif -%}

        _resolved_floor_id: >-
          {%- if _scope != 'floor' -%}{{ '' }}
          {%- elif scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- else -%}
            {%- set aid = '' -%}
            {%- if follower_entity_id is defined and follower_entity_id != '' -%}
              {%- set aid = area_id(follower_entity_id) | default('') -%}
            {%- endif -%}
            {%- if aid == '' and leader_entity_id is defined and leader_entity_id != '' -%}
              {%- set aid = area_id(leader_entity_id) | default('') -%}
            {%- endif -%}
            {%- if aid == '' -%}
              {%- set aid = _resolved_area_id -%}
            {%- endif -%}
            {%- set ns = namespace(found='') -%}
            {%- if aid != '' -%}
              {%- for fid in floors() -%}
                {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
              {%- endfor -%}
            {%- endif -%}
            {{ ns.found }}
          {%- endif -%}
    - variables:
        scope_entity_set: >-
          {% if _scope == 'area' and _resolved_area_id != '' %}
            {% set area_ents = area_entities(_resolved_area_id) | list %}
            {% set area_devs = area_devices(_resolved_area_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% elif _scope == 'floor' and _resolved_floor_id != '' %}
            {% set ns = namespace(ents=[]) %}
            {% for a in floor_areas(_resolved_floor_id) %}
              {% set ns.ents = ns.ents + area_entities(a) | list %}
              {% for d in area_devices(a) %}
                {% set ns.ents = ns.ents + device_entities(d) | list %}
              {% endfor %}
            {% endfor %}
            {{ ns.ents | unique | list }}
          {% else %}
            {{ [] }}
          {% endif %}
        scope_prefix: >-
          {{ 'Area ' if _scope == 'area' else ('Floor ' if _scope == 'floor' else '') }}
        exclude_label: '{{ _exclude_feature ~ " Exclude: True" }}'
        scoped_exclude_label: >-
          {{ (('Area ' if _scope == 'area' else
               ('Floor ' if _scope == 'floor' else '')) ~ _exclude_feature) ~ " Exclude: True" }}

    # ── Step 3: Feature metadata (domain fallback + selected action) ────────
    # Pulled from `sensor.labeled_features_state.feature_meta` — the single
    # source of truth for the generic-feature catalog. See the comment block
    # on that attribute in configuration.yaml for the schema. `domain_label`
    # is the human-readable provider grouping; the resolver below unions in
    # `(scope_prefix)Provides: <domain_label>`-style declarations so a single
    # area-level label opts every domain-matching entity in the scope into
    # every feature for that domain.
    - variables:
        feature_meta: >-
          {% set catalog = state_attr('sensor.labeled_features_state', 'feature_meta') | default({}) %}
          {{ catalog.get(_feature, {'domain': '', 'kind': 'unknown', 'domain_label': ''}) }}


    # ── Step 2 (post-meta): Provides resolver — label-based target union ────
    # For each label name (the feature itself, plus the feature's
    # domain_label when defined) we try four candidates in order and use
    # the first non-empty result:
    #   1. <label>                              (exact, never scope-filtered)
    #   2. <scope_prefix>Provides: <label>      (scope-filtered when prefixed)
    #   3. <scope_prefix>Follower: <label>      (scope-filtered when prefixed)
    #   4. <scope_prefix>Leader: <label>        (scope-filtered when prefixed)
    # The results from the two resolver calls are unioned and de-excluded.
    - variables:
        _feature_resolved: >-
          {% set ns = namespace(out=[]) %}
          {% set candidates = [
            _feature,
            scope_prefix ~ 'Provides: ' ~ _feature,
            scope_prefix ~ 'Follower: ' ~ _feature,
            scope_prefix ~ 'Leader: '   ~ _feature
          ] %}
          {% for c in candidates %}
            {% if ns.out | length == 0 %}
              {% set ents = label_entities(c) | list %}
              {% if scope_prefix != '' and c != _feature and scope_entity_set | length > 0 %}
                {% set ents = ents | select('in', scope_entity_set) | list %}
              {% endif %}
              {% if ents | length > 0 %}{% set ns.out = ents %}{% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.out }}
        _domain_label_resolved: >-
          {% set dl = feature_meta.domain_label | default('') %}
          {% if dl == '' %}
            {{ [] }}
          {% else %}
            {% set ns = namespace(out=[]) %}
            {% set candidates = [
              dl,
              scope_prefix ~ 'Provides: ' ~ dl,
              scope_prefix ~ 'Follower: ' ~ dl,
              scope_prefix ~ 'Leader: '   ~ dl
            ] %}
            {% for c in candidates %}
              {% if ns.out | length == 0 %}
                {% set ents = label_entities(c) | list %}
                {% if scope_prefix != '' and c != dl and scope_entity_set | length > 0 %}
                  {% set ents = ents | select('in', scope_entity_set) | list %}
                {% endif %}
                {% if ents | length > 0 %}{% set ns.out = ents %}{% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.out }}
          {% endif %}
        _excluded: >-
          {% set dl = feature_meta.domain_label | default('') %}
          {% set unscoped_f = label_entities(exclude_label) | list %}
          {% set scoped_f = label_entities(scoped_exclude_label) | list %}
          {% set dl_excl = [] %}
          {% if dl != '' %}
            {% set bare_dl = dl ~ ' Exclude: True' %}
            {% set scoped_dl = scope_prefix ~ dl ~ ' Exclude: True' %}
            {% set dl_excl = (label_entities(bare_dl) | list) + (label_entities(scoped_dl) | list) %}
          {% endif %}
          {{ (unscoped_f + scoped_f + dl_excl) | unique | list }}
        label_targets: >-
          {{ (_feature_resolved + _domain_label_resolved)
             | unique
             | reject('in', _excluded)
             | list }}

    # ── Step 4: Resolve final target set (label-first, then domain fallback) ─
    - variables:
        _domain_fallback_raw: >-
          {% set dom = feature_meta.domain %}
          {% if dom != '' and scope_entity_set | length > 0 %}
            {{ scope_entity_set
               | select('match', '^' + dom + '\\.')
               | reject('in', _excluded)
               | list }}
          {% else %}
            {{ [] }}
          {% endif %}
        final_targets: >-
          {% if label_targets | length > 0 %}
            {{ label_targets }}
          {% else %}
            {{ _domain_fallback_raw }}
          {% endif %}

    # ── Step 5: Validate target set ─────────────────────────────────────────
    - if:
        - condition: template
          value_template: '{{ final_targets | length == 0 }}'
      then:
        - action: script.labeled_feature_error_mode
          data:
            error_mode: '{{ _err_mode }}'
            source: Labeled Feature Generics
            message: >-
              No target entities resolved for feature '{{ _feature }}' in
              scope '{{ _scope }}' (scope_id={{ scope_id | default('') }}).
        - if:
            - condition: template
              value_template: '{{ _err_mode == "stop" }}'
          then:
            - stop: >-
                Labeled Feature Generics: no targets for '{{ _feature }}'.
              error: true
        - stop: 'No targets resolved (handled per error_mode).'

    # ── Step 6: Toggle modifier — short-circuit per-domain ──────────────────
    - if:
        - condition: template
          value_template: '{{ _toggle }}'
      then:
        - choose:
            - conditions:
                - condition: template
                  value_template: '{{ feature_meta.domain == "light" }}'
              sequence:
                - action: light.toggle
                  target:
                    entity_id: '{{ final_targets }}'
            - conditions:
                - condition: template
                  value_template: '{{ feature_meta.domain == "fan" }}'
              sequence:
                - action: fan.toggle
                  target:
                    entity_id: '{{ final_targets }}'
            - conditions:
                - condition: template
                  value_template: >-
                    {{ feature_meta.kind in ['media_toggle','media_play','media_pause'] }}
              sequence:
                - action: media_player.media_play_pause
                  target:
                    entity_id: '{{ final_targets }}'
            - conditions:
                - condition: template
                  value_template: '{{ feature_meta.kind in ["ads","night"] }}'
              sequence:
                - action: homeassistant.toggle
                  target:
                    entity_id: '{{ final_targets }}'
          default:
            - action: script.labeled_feature_error_mode
              data:
                error_mode: '{{ _err_mode }}'
                source: Labeled Feature Generics
                message: >-
                  Feature '{{ _feature }}' does not support the toggle modifier.
            - if:
                - condition: template
                  value_template: '{{ _err_mode == "stop" }}'
              then:
                - stop: >-
                    Labeled Feature Generics: invalid toggle for '{{ _feature }}'.
                  error: true
        - stop: 'Toggle path complete.'

    # ── Step 7: Non-toggle dispatch by feature kind ─────────────────────────
    #
    # ── Media target selection ──────────────────────────────────────────────
    # All media-player kinds (transport + volume) collapse `final_targets`
    # down to a single most-recently-active entity using the same algorithm
    # used by media_seek_back / media_seek_forward:
    #   1. currently playing/buffering, most recent last_changed
    #   2. otherwise, most recent last_changed (ignoring unknown/unavailable)
    #   3. fall back to final_targets | first
    # This avoids fan-out across an area's full speaker set (which causes
    # double-press toggles, volume drift on idle players, etc) and instead
    # routes the action to whichever player the user was most recently
    # listening on. The seek branches compute this same `_seek_target`
    # locally because they predate the lift; their logic is identical.
    # NOTE on the templating shape below: HA's `variables:` step serializes
    # each value through its YAML representer, which means TemplateState
    # objects (what you get from `states[eid]` or `states | selectattr(...)`)
    # are repr'd back to strings rather than preserved as objects. So we
    # deliberately keep `_media_candidates` and `_media_playing` as **lists
    # of entity-id strings**, and rank by `(last_changed_iso, eid)` tuples
    # built fresh inside `_media_target` — which is also a plain string.
    - variables:
        _media_kinds: >-
          {{ ['media_toggle','media_play','media_pause','media_next',
              'media_previous','media_seek_back','media_seek_forward',
              'volume_up','volume_down'] }}
        _media_candidates: >-
          {%- set ns = namespace(items=[]) -%}
          {%- if feature_meta.kind in _media_kinds -%}
            {%- for eid in final_targets -%}
              {%- if states(eid) not in ['unknown','unavailable','none'] -%}
                {%- set ns.items = ns.items + [eid] -%}
              {%- endif -%}
            {%- endfor -%}
          {%- endif -%}
          {{ ns.items }}
        _media_playing: >-
          {%- set ns = namespace(items=[]) -%}
          {%- for eid in _media_candidates -%}
            {%- if states(eid) in ['playing','buffering'] -%}
              {%- set ns.items = ns.items + [eid] -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.items }}
        _media_target: >-
          {%- if feature_meta.kind not in _media_kinds -%}{{ '' }}
          {%- else -%}
            {%- set pool = _media_playing if (_media_playing | length > 0) else _media_candidates -%}
            {%- if pool | length > 0 -%}
              {%- set ns = namespace(items=[]) -%}
              {%- for eid in pool -%}
                {%- set lc = states[eid].last_changed -%}
                {%- set ns.items = ns.items + [(lc.isoformat() if lc is not none else '', eid)] -%}
              {%- endfor -%}
              {{ (ns.items | sort(reverse=true) | first)[1] }}
            {%- else -%}
              {{ final_targets | first }}
            {%- endif -%}
          {%- endif -%}
    - choose:
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_toggle" }}'
          sequence:
            - action: media_player.media_play_pause
              target:
                entity_id: '{{ _media_target }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_play" }}'
          sequence:
            - action: media_player.media_play
              target:
                entity_id: '{{ _media_target }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_pause" }}'
          sequence:
            - action: media_player.media_pause
              target:
                entity_id: '{{ _media_target }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_next" }}'
          sequence:
            - action: media_player.media_next_track
              target:
                entity_id: '{{ _media_target }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_previous" }}'
          sequence:
            - action: media_player.media_previous_track
              target:
                entity_id: '{{ _media_target }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_seek_back" }}'
          sequence:
            # Reuses the shared `_media_target` computed above (same
            # most-recently-active algorithm used by every other media-
            # player kind). Check SUPPORT_SEEK (supported_features bit
            # 2). When seek isn't supported we silently fall
            # back to media_previous_track on the same target — gives a
            # sensible behavior on integrations like Music Assistant /
            # Snapcast that don't expose seek.
            - variables:
                _seek_supports: >-
                  {{ (state_attr(_media_target, 'supported_features') | int(0))
                     | bitwise_and(2) > 0 }}
            - choose:
                - conditions:
                    - condition: template
                      value_template: '{{ _seek_supports }}'
                  sequence:
                    - action: media_player.media_seek
                      target:
                        entity_id: '{{ _media_target }}'
                      data:
                        seek_position: >-
                          {{ [state_attr(_media_target, 'media_position')
                               | float(0) - 30, 0] | max }}
              default:
                # Silent fallback: integration doesn't support seek.
                - action: media_player.media_previous_track
                  target:
                    entity_id: '{{ _media_target }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "media_seek_forward" }}'
          sequence:
            # Same target-selection + seek-support logic as media_seek_back;
            # silent fallback to media_next_track when seek isn't supported.
            - variables:
                _seek_supports: >-
                  {{ (state_attr(_media_target, 'supported_features') | int(0))
                     | bitwise_and(2) > 0 }}
            - choose:
                - conditions:
                    - condition: template
                      value_template: '{{ _seek_supports }}'
                  sequence:
                    - action: media_player.media_seek
                      target:
                        entity_id: '{{ _media_target }}'
                      data:
                        seek_position: >-
                          {{ state_attr(_media_target, 'media_position')
                               | float(0) + 30 }}
              default:
                # Silent fallback: integration doesn't support seek.
                - action: media_player.media_next_track
                  target:
                    entity_id: '{{ _media_target }}'
        # ── Stepping kinds: Volume Up/Down, Lights Up/Down ──────────────────
        # These four kinds run in two modes:
        #   - One-shot: caller did not pass `leader_entity_id` (manual
        #     dispatch, or a mapping script that wants a single step).
        #   - Held / repeating: caller passed `leader_entity_id` — typically
        #     a button entity. We loop on a 300 ms cadence (≤ 200 iters /
        #     ~60 s safety cap) until the leader's state changes (the user
        #     releases the button, presses something else, or the button
        #     entity emits a new event).
        #
        # Volume Up / Volume Down use an *accumulator*: we snapshot the
        # starting volume_level once, before the loop, then increment a
        # local `_current_vol` variable by ±0.07 each tick and pass the
        # absolute level to `media_player.volume_set`. We never read
        # state_attr(target, 'volume_level') mid-loop, which would race
        # with state echoes from integrations like lnxlink and cause the
        # value to stall or oscillate.
        #
        # Lights Up / Lights Down use HA's built-in `brightness_step_pct`
        # relative-step on `light.turn_on` — the integration owns the
        # relative arithmetic, so no accumulator is needed; we just re-fire
        # the same call each tick.
        #
        # `_media_target` (volume) and `final_targets` (lights) are
        # resolved once above and reused across every tick, so scope /
        # Provides / Exclude / most-recently-active resolution does not
        # repeat per tick.
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "volume_up" }}'
          sequence:
            - variables:
                _hold_eid: '{{ leader_entity_id | default("") }}'
                _hold_initial: >-
                  {{ states(leader_entity_id) if (leader_entity_id is defined
                     and leader_entity_id != "") else "" }}
                _vol_start: "{{ state_attr(_media_target, 'volume_level') | float(0) }}"
            - if:
                - condition: template
                  value_template: '{{ _hold_eid != "" }}'
              then:
                - repeat:
                    while:
                      - condition: template
                        value_template: '{{ states(_hold_eid) == _hold_initial }}'
                      - condition: template
                        value_template: '{{ repeat.index <= 200 }}'
                    sequence:
                      - variables:
                          _vol_start: "{{ [_vol_start + 0.07, 1.0] | min }}"
                      - action: media_player.volume_set
                        target:
                          entity_id: '{{ _media_target }}'
                        data:
                          volume_level: '{{ _vol_start }}'
                      - wait_template: '{{ states(_hold_eid) != _hold_initial }}'
                        timeout:
                          milliseconds: 300
                        continue_on_timeout: true
              else:
                - action: media_player.volume_set
                  target:
                    entity_id: '{{ _media_target }}'
                  data:
                    volume_level: '{{ [_vol_start + 0.07, 1.0] | min }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "volume_down" }}'
          sequence:
            - variables:
                _hold_eid: '{{ leader_entity_id | default("") }}'
                _hold_initial: >-
                  {{ states(leader_entity_id) if (leader_entity_id is defined
                     and leader_entity_id != "") else "" }}
                _vol_start: "{{ state_attr(_media_target, 'volume_level') | float(0) }}"
            - if:
                - condition: template
                  value_template: '{{ _hold_eid != "" }}'
              then:
                - repeat:
                    while:
                      - condition: template
                        value_template: '{{ states(_hold_eid) == _hold_initial }}'
                      - condition: template
                        value_template: '{{ repeat.index <= 200 }}'
                    sequence:
                      - variables:
                          _vol_start: "{{ [_vol_start - 0.07, 0.0] | max }}"
                      - action: media_player.volume_set
                        target:
                          entity_id: '{{ _media_target }}'
                        data:
                          volume_level: '{{ _vol_start }}'
                      - wait_template: '{{ states(_hold_eid) != _hold_initial }}'
                        timeout:
                          milliseconds: 300
                        continue_on_timeout: true
              else:
                - action: media_player.volume_set
                  target:
                    entity_id: '{{ _media_target }}'
                  data:
                    volume_level: '{{ [_vol_start - 0.07, 0.0] | max }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "light_on" }}'
          sequence:
            - action: light.turn_on
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "light_off" }}'
          sequence:
            - action: light.turn_off
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "light_up" }}'
          sequence:
            - variables:
                _hold_eid: '{{ leader_entity_id | default("") }}'
                _hold_initial: >-
                  {{ states(leader_entity_id) if (leader_entity_id is defined
                     and leader_entity_id != "") else "" }}
            - if:
                - condition: template
                  value_template: '{{ _hold_eid != "" }}'
              then:
                - repeat:
                    while:
                      - condition: template
                        value_template: '{{ states(_hold_eid) == _hold_initial }}'
                      - condition: template
                        value_template: '{{ repeat.index <= 200 }}'
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: '{{ final_targets }}'
                        data:
                          brightness_step_pct: 10
                      - wait_template: '{{ states(_hold_eid) != _hold_initial }}'
                        timeout:
                          milliseconds: 300
                        continue_on_timeout: true
              else:
                - action: light.turn_on
                  target:
                    entity_id: '{{ final_targets }}'
                  data:
                    brightness_step_pct: 10
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "light_down" }}'
          sequence:
            - variables:
                _hold_eid: '{{ leader_entity_id | default("") }}'
                _hold_initial: >-
                  {{ states(leader_entity_id) if (leader_entity_id is defined
                     and leader_entity_id != "") else "" }}
            - if:
                - condition: template
                  value_template: '{{ _hold_eid != "" }}'
              then:
                - repeat:
                    while:
                      - condition: template
                        value_template: '{{ states(_hold_eid) == _hold_initial }}'
                      - condition: template
                        value_template: '{{ repeat.index <= 200 }}'
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: '{{ final_targets }}'
                        data:
                          brightness_step_pct: -10
                      - wait_template: '{{ states(_hold_eid) != _hold_initial }}'
                        timeout:
                          milliseconds: 300
                        continue_on_timeout: true
              else:
                - action: light.turn_on
                  target:
                    entity_id: '{{ final_targets }}'
                  data:
                    brightness_step_pct: -10
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "fan_on" }}'
          sequence:
            - action: fan.turn_on
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "fan_off" }}'
          sequence:
            - action: fan.turn_off
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "fan_up" }}'
          sequence:
            - action: fan.increase_speed
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind == "fan_down" }}'
          sequence:
            - action: fan.decrease_speed
              target:
                entity_id: '{{ final_targets }}'
        - conditions:
            - condition: template
              value_template: '{{ feature_meta.kind in ["ads","night"] }}'
          sequence:
            - action: homeassistant.toggle
              target:
                entity_id: '{{ final_targets }}'
      default:
        - action: script.labeled_feature_error_mode
          data:
            error_mode: '{{ _err_mode }}'
            source: Labeled Feature Generics
            message: "Unknown feature '{{ _feature }}'."
        - if:
            - condition: template
              value_template: '{{ _err_mode == "stop" }}'
          then:
            - stop: "Labeled Feature Generics: unknown feature '{{ _feature }}'."
              error: true
labeled_feature_somrig:
  alias: Labeled Feature Somrig
  description: >
    Maps IKEA Somrig (and other 2-button) device events into one or more calls
    to `script.labeled_feature_generics`. Reads the raw button event from the
    `feature` field (e.g. '1_short_release', '2_double_press'); also accepts
    `dots_N_*` (IKEA E2123) variants by stripping the 'dots_' prefix.

    Only canonical "user did the thing" events are tracked:
      *_short_release, *_double_press, *_long_press
    All other events (initial_press, long_release, etc.) are ignored.

    Contextual state: only `media_playing` (computed by inspecting
    media_player entities in the resolved area) is used to pick between the
    Playing and Not-Playing branches of the mapping table. Night-mode and
    sleep-timeout behavior live as their own generic features (`Night`).

    Event → generic-feature mapping:
      1_short_release  Playing: Lights Off + Media Pause   Not Playing: Lights Off
      2_short_release  Playing: Media Pause                Not Playing: Media Play
      1_double_press   Playing: Media Seek Back            Not Playing: Fan On (toggle:true)
      2_double_press   Playing: Media Seek Forward         Not Playing: Night
      1_long_press     Playing: Volume Up                  Not Playing: Lights Up
      2_long_press     Playing: Volume Down                Not Playing: Ads
  mode: parallel
  max: 50
  fields:
    feature:
      name: Feature (Button Event)
      description: >
        The raw button event string from the button entity, e.g.
        '1_short_release', '2_double_press', '1_long_press', or the
        'dots_'-prefixed variants for IKEA E2123.
      required: true
      selector:
        select:
          custom_value: true
          options:
            - 1_short_release
            - 1_double_press
            - 1_long_press
            - 2_short_release
            - 2_double_press
            - 2_long_press
            - dots_1_short_release
            - dots_1_double_press
            - dots_1_long_press
            - dots_2_short_release
            - dots_2_double_press
            - dots_2_long_press
    follower_entity_id:
      name: Follower Entity ID
      description: Used for area lookup. Passed automatically by labeled_feature_follower.
      required: false
      default: ''
      selector:
        entity: {}
    leader_entity_id:
      name: Leader Entity ID (the button)
      description: Used as fallback for area lookup.
      required: false
      default: ''
      selector:
        entity: {}
    leader_enabled:
      name: Leader Enabled
      description: Pass-through from the leader. Not used directly by the somrig mapping.
      required: false
      default: true
      selector:
        boolean: {}
    leader_feature:
      name: Leader Feature Name
      description: >
        The leader's labeled feature name (e.g. 'Night Buttons'), passed by the
        leader automation alongside `feature`. Used for Exclude resolution:
        entities labeled `(Area |Floor |)<leader_feature> Exclude: True` are
        excluded from both the `media_playing` evaluation and every downstream
        labeled_feature_generics call dispatched from here.
      required: false
      default: ''
      selector:
        text: {}
    toggle:
      name: Toggle
      description: >
        Pass-through toggle flag from the leader. Forwarded to every
        labeled_feature_generics call. The 1_double_press Not-Playing
        branch always overrides this with toggle:true (fan toggle).
      required: false
      default: false
      selector:
        boolean: {}
    scope:
      name: Scope
      description: Scope of the feature (area, floor, or none).
      required: false
      default: area
      selector:
        select:
          options:
            - area
            - floor
            - none
    scope_id:
      name: Scope ID
      description: The resolved area_id or floor_id passed by the automation.
      required: false
      default: ''
      selector:
        text: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
  sequence:
    # ── Step 1: Resolve scope + scope entity set + Exclude set ──────────────
    - variables:
        _scope: '{{ (scope | default("area") | lower) }}'
        _toggle_in: '{{ (toggle | default(false)) | bool(false) }}'
        _err_mode: '{{ (error_mode | default("log") | lower) }}'
        _leader_feature: '{{ leader_feature | default("") | trim }}'
        _resolved_area_id: >-
          {%- if _scope == 'area' and scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- elif follower_entity_id is defined and follower_entity_id != '' -%}
            {{ area_id(follower_entity_id) | default('') }}
          {%- elif leader_entity_id is defined and leader_entity_id != '' -%}
            {{ area_id(leader_entity_id) | default('') }}
          {%- else -%}{{ '' }}{%- endif -%}
        _resolved_floor_id: >-
          {%- if _scope == 'floor' and scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- elif _scope == 'floor' and follower_entity_id is defined and follower_entity_id != '' -%}
            {%- set aid = area_id(follower_entity_id) -%}
            {%- set ns = namespace(found='') -%}
            {%- for fid in floors() -%}
              {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
            {%- endfor -%}{{ ns.found }}
          {%- elif _scope == 'floor' and leader_entity_id is defined and leader_entity_id != '' -%}
            {%- set aid = area_id(leader_entity_id) -%}
            {%- set ns = namespace(found='') -%}
            {%- for fid in floors() -%}
              {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
            {%- endfor -%}{{ ns.found }}
          {%- else -%}{{ '' }}{%- endif -%}
    - variables:
        # Scope entity set (mirrors labeled_feature_generics) — for both the
        # media_playing signal and informational use. We compute it for area
        # and floor; for `none` we fall back to the leader's area.
        scope_entity_set: >-
          {% if _scope == 'area' and _resolved_area_id != '' %}
            {% set area_ents = area_entities(_resolved_area_id) | list %}
            {% set area_devs = area_devices(_resolved_area_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% elif _scope == 'floor' and _resolved_floor_id != '' %}
            {% set ns = namespace(ents=[]) %}
            {% for a in floor_areas(_resolved_floor_id) %}
              {% set ns.ents = ns.ents + area_entities(a) | list %}
              {% for d in area_devices(a) %}
                {% set ns.ents = ns.ents + device_entities(d) | list %}
              {% endfor %}
            {% endfor %}
            {{ ns.ents | unique | list }}
          {% elif _resolved_area_id != '' %}
            {% set area_ents = area_entities(_resolved_area_id) | list %}
            {% set area_devs = area_devices(_resolved_area_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% else %}
            {{ [] }}
          {% endif %}
        # Exclude labels keyed on the leader's feature name. Same shape as in
        # labeled_feature_generics: bare `<feature> Exclude: True` and scoped
        # `(Area |Floor |)<feature> Exclude: True`.
        _exclude_unscoped_label: '{{ _leader_feature ~ " Exclude: True" }}'
        _exclude_scoped_label: >-
          {{ (('Area ' if _scope == 'area' else
               ('Floor ' if _scope == 'floor' else '')) ~ _leader_feature) ~ " Exclude: True" }}
    - variables:
        excluded_entities: >-
          {% if _leader_feature == '' %}
            {{ [] }}
          {% else %}
            {% set unscoped = label_entities(_exclude_unscoped_label) | list %}
            {% set scoped = label_entities(_exclude_scoped_label) | list %}
            {% set all_excl = (unscoped + scoped) | unique | list %}
            {% if scope_entity_set | length > 0 %}
              {{ all_excl | select('in', scope_entity_set) | list }}
            {% else %}
              {{ all_excl }}
            {% endif %}
          {% endif %}
        # Media-player candidates for the `media_playing` evaluation. Uses
        # the same 4-step Provides resolver as labeled_feature_generics with
        # the literal label `Media Player`:
        #   1. exact `Media Player` (global, no scope filter)
        #   2. `<scope_prefix>Provides: Media Player` (scoped)
        #   3. `<scope_prefix>Follower: Media Player` (scoped)
        #   4. `<scope_prefix>Leader: Media Player`   (scoped)
        # First non-empty result is used.  Then unioned with media_player-
        # domain entities in scope_entity_set, minus excluded_entities, to
        # form the final candidate set the playing-state check runs over.
        _scope_prefix_str: >-
          {{ 'Area ' if _scope == 'area' else ('Floor ' if _scope == 'floor' else '') }}
        _media_provider_resolved: >-
          {% set _label = 'Media Player' %}
          {% set ns = namespace(out=[]) %}
          {% set candidates = [
            _label,
            _scope_prefix_str ~ 'Provides: ' ~ _label,
            _scope_prefix_str ~ 'Follower: ' ~ _label,
            _scope_prefix_str ~ 'Leader: '   ~ _label
          ] %}
          {% for c in candidates %}
            {% if ns.out | length == 0 %}
              {% set ents = label_entities(c) | list %}
              {% if _scope_prefix_str != '' and c != _label and scope_entity_set | length > 0 %}
                {% set ents = ents | select('in', scope_entity_set) | list %}
              {% endif %}
              {% if ents | length > 0 %}{% set ns.out = ents %}{% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.out }}
        media_playing: >-
          {% set mp_in_scope = states.media_player
               | rejectattr('entity_id', 'in', excluded_entities)
               | list %}
          {% set mp_in_scope_ids = mp_in_scope | map(attribute='entity_id') | list %}
          {% if scope_entity_set | length > 0 %}
            {% set candidate_ids = (mp_in_scope_ids | select('in', scope_entity_set) | list)
                                   + (_media_provider_resolved | select('in', scope_entity_set) | list) %}
            {{ mp_in_scope
               | selectattr('entity_id', 'in', candidate_ids | unique | list)
               | selectattr('state', 'in', ['playing', 'buffering'])
               | list | count > 0 }}
          {% elif _resolved_area_id != '' %}
            {% set area_ids = area_entities(_resolved_area_id) %}
            {% set candidate_ids = (mp_in_scope_ids | select('in', area_ids) | list)
                                   + (_media_provider_resolved | select('in', area_ids) | list) %}
            {{ mp_in_scope
               | selectattr('entity_id', 'in', candidate_ids | unique | list)
               | selectattr('state', 'in', ['playing', 'buffering'])
               | list | count > 0 }}
          {% else %}
            false
          {% endif %}
        # Strip the dots_ prefix so both device families share the same
        # branches below.
        mapped_event: >-
          {{ (feature | trim) | regex_replace('^dots_', '') }}

    # ── Step 2: Branch by event + media_playing ─────────────────────────────
    - choose:
        # ────────────── 1_short_release ──────────────
        # Always fires both Lights Off (floor scope) and Media Pause
        # (scope: none) regardless of any local media_playing signal —
        # the goal is "single button = quiet the house" and we don't
        # want to depend on a per-area is-anything-playing check
        # (which historically picked up the wrong media_player).
        # The downstream `labeled_feature_generics` Media Pause call
        # resolves its own target across all media players in the
        # house via the standard Provides/Follower chain and
        # dispatches `media_player.media_pause`, which is safely a
        # no-op on players that are already paused/idle.
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "1_short_release" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Lights Off
                exclude_feature: '{{ _leader_feature }}'
                # Lights Off is intentionally forced to the leader's floor
                # so a single button press clears every light on the floor,
                # regardless of which area the button itself lives in.
                scope: floor
                scope_id: '{{ _resolved_floor_id }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'
            - action: script.labeled_feature_generics
              data:
                feature: Media Pause
                exclude_feature: '{{ _leader_feature }}'
                # Media Pause is intentionally forced to scope: none so a
                # single short press pauses every media player in the
                # house — not just the players in the button's area.
                # Provides / Follower resolution still applies; we just
                # don't filter the candidate set by scope. Calling pause
                # on an already-paused player is a no-op, so we always
                # fire (no media_playing branch).
                scope: none
                scope_id: ''
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── 2_short_release ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "2_short_release" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: '{{ "Media Pause" if media_playing else "Media Play" }}'
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── 1_double_press ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "1_double_press" }}'
          sequence:
            - if:
                - condition: template
                  value_template: '{{ media_playing }}'
              then:
                - action: script.labeled_feature_generics
                  data:
                    feature: Media Seek Back
                    exclude_feature: '{{ _leader_feature }}'
                    scope: '{{ _scope }}'
                    scope_id: '{{ scope_id | default("") }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: '{{ _toggle_in }}'
                    error_mode: '{{ _err_mode }}'
              else:
                # Fan toggle: force toggle:true regardless of caller-passed value
                - action: script.labeled_feature_generics
                  data:
                    feature: Fan On
                    exclude_feature: '{{ _leader_feature }}'
                    scope: '{{ _scope }}'
                    scope_id: '{{ scope_id | default("") }}'
                    follower_entity_id: '{{ follower_entity_id | default("") }}'
                    leader_entity_id: '{{ leader_entity_id | default("") }}'
                    leader_enabled: '{{ leader_enabled | default(true) }}'
                    toggle: true
                    error_mode: '{{ _err_mode }}'

        # ────────────── 2_double_press ──────────────
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "2_double_press" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: '{{ "Media Seek Forward" if media_playing else "Night" }}'
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── 1_long_press ──────────────
        # The 300ms repeat-while-held loop now lives inside
        # `labeled_feature_generics` for the stepping kinds
        # (Volume Up/Down, Lights Up/Down). Passing `leader_entity_id`
        # is what opts into the loop — generics watches that entity for
        # state changes and exits when the button releases or fires a
        # new event. If leader_entity_id is empty (manual test call),
        # generics falls back to a single one-shot step automatically.
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "1_long_press" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: '{{ "Volume Up" if media_playing else "Lights Up" }}'
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── 2_long_press ──────────────
        # Playing (Volume Down) uses generics' hold loop (see 1_long_press
        # comment). Not-Playing (Ads) is a toggle and fires once.
        - conditions:
            - condition: template
              value_template: '{{ mapped_event == "2_long_press" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: '{{ "Volume Down" if media_playing else "Ads" }}'
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'
labeled_feature_entities:
  alias: Labeled Feature Entities
  description: >
    Generic MQTT-discovery entity creator and retract helper for the Labeled
    Feature Areas stack. Publishes (or, with `delete: true`, retracts) a
    Home Assistant MQTT discovery payload for a single entity, with optional
    state and attributes seeding controlled by `initialize_mode` /
    `attributes_mode` and a `create_mode` enum.
  mode: parallel
  max: 100
  fields:
    component:
      name: Component
      description: >
        MQTT discovery component. Limited to the set supported by HA's MQTT
        discovery integration; see
        https://www.home-assistant.io/integrations/mqtt/#discovery-topic.
      required: true
      selector:
        select:
          mode: dropdown
          custom_value: false
          options:
            - alarm_control_panel
            - binary_sensor
            - button
            - camera
            - climate
            - cover
            - device_automation
            - device_tracker
            - event
            - fan
            - humidifier
            - image
            - lawn_mower
            - light
            - lock
            - notify
            - number
            - scene
            - select
            - sensor
            - siren
            - switch
            - tag
            - text
            - update
            - vacuum
            - valve
            - water_heater
    object_id:
      name: Object ID
      description: >
        Unique object_id used to build the discovery topic and the entity's
        unique_id (when one isn't supplied explicitly). The resulting HA
        entity_id will be `<component>.<object_id>` unless overridden by the
        device or user.
      required: true
      selector:
        text: {}
    delete:
      name: Delete
      description: >
        When true, publish an empty retained payload to the discovery topic to
        retract the entity. All other fields are ignored when delete is true.
      required: false
      default: false
      selector:
        boolean: {}
    create_mode:
      name: Create Mode
      description: >
        Controls when the discovery config is (re)published.
        `always` (default) publishes every call — safe because retained MQTT
        topics deduplicate. `if_missing` only publishes when the entity does
        not already exist (resolved as `<component>.<object_id>` having a
        state not in unknown/unavailable/none). `never` skips the discovery
        publish entirely — useful for state/attribute-only top-ups against an
        entity that was created on a previous call.
      required: false
      default: always
      selector:
        select:
          mode: dropdown
          options:
            - always
            - if_missing
            - never
    initialize_mode:
      name: Initialize Mode
      description: >
        How to publish the optional `initial_state`. `set_if_missing` (default)
        only publishes when the current state is unknown/unavailable/none.
        `always` publishes every call. `never` skips state publishing.
      required: false
      default: set_if_missing
      selector:
        select:
          mode: dropdown
          options:
            - set_if_missing
            - always
            - never
    attributes_mode:
      name: Attributes Mode
      description: Same semantics as initialize_mode but for `initial_attributes`.
      required: false
      default: set_if_missing
      selector:
        select:
          options:
            - set_if_missing
            - always
            - never
    initial_state:
      name: Initial State
      description: Optional. Payload to publish to the state topic on create.
      required: false
      default: ''
      selector:
        text:
          multiline: true
    initial_attributes:
      name: Initial Attributes
      description: Optional. Dict to publish as JSON to the attributes topic.
      required: false
      default: {}
      selector:
        object: {}
    ha_topic:
      name: HA Discovery Topic Prefix
      description: Defaults to `homeassistant` (matches MQTT's discovery_prefix).
      required: false
      default: homeassistant
      selector:
        text: {}
    device_topic:
      name: Device Topic Base
      description: >
        Optional base topic the entity's state/command topics live under.
        If empty, defaults to `<component>/<object_id>`.
      required: false
      default: ''
      selector:
        text: {}
    name:
      name: Display Name
      description: Friendly entity name (required when delete is false).
      required: false
      default: ''
      selector:
        text: {}
    unique_id:
      name: Unique ID
      description: Overrides the default unique_id (= object_id).
      required: false
      default: ''
      selector:
        text: {}
    device:
      name: Device Block
      description: >
        Dict with at least `identifiers` plus any of `name`, `manufacturer`,
        `model`, `suggested_area`. Combined into the discovery payload's
        `device` field. Required when delete is false.
      required: false
      default: {}
      selector:
        object: {}
    state_topic:
      name: State Topic
      description: Override; defaults to `<device_topic>/state`.
      required: false
      default: ''
      selector:
        text: {}
    command_topic:
      name: Command Topic
      description: Override; defaults to `<device_topic>/set`.
      required: false
      default: ''
      selector:
        text: {}
    availability_topic:
      name: Availability Topic
      required: false
      default: ''
      selector:
        text: {}
    value_template:
      name: Value Template
      required: false
      default: ''
      selector:
        text:
          multiline: true
    command_template:
      name: Command Template
      required: false
      default: ''
      selector:
        text:
          multiline: true
    json_attributes_topic:
      name: JSON Attributes Topic
      required: false
      default: ''
      selector:
        text: {}
    json_attributes_template:
      name: JSON Attributes Template
      required: false
      default: ''
      selector:
        text:
          multiline: true
    payload_on:
      required: false
      default: ''
      selector:
        text: {}
    payload_off:
      required: false
      default: ''
      selector:
        text: {}
    state_on:
      required: false
      default: ''
      selector:
        text: {}
    state_off:
      required: false
      default: ''
      selector:
        text: {}
    payload_press:
      required: false
      default: ''
      selector:
        text: {}
    device_class:
      required: false
      default: ''
      selector:
        text: {}
    unit_of_measurement:
      required: false
      default: ''
      selector:
        text: {}
    state_class:
      required: false
      default: ''
      selector:
        text: {}
    icon:
      required: false
      default: ''
      selector:
        text: {}
    entity_category:
      required: false
      default: ''
      selector:
        text: {}
    suggested_display_precision:
      required: false
      default: ''
      selector:
        text: {}
    expire_after:
      required: false
      default: ''
      selector:
        text: {}
    optimistic:
      required: false
      default: ''
      selector:
        text: {}
    min:
      required: false
      default: ''
      selector:
        text: {}
    max:
      required: false
      default: ''
      selector:
        text: {}
    step:
      required: false
      default: ''
      selector:
        text: {}
    mode:
      required: false
      default: ''
      selector:
        text: {}
    options:
      name: Options
      description: List of strings for select components.
      required: false
      default: []
      selector:
        object: {}
    extra:
      name: Extra Config Fields
      description: >
        Free-form dict merged into the final discovery payload. Use for fields
        not enumerated above (e.g. `name_template`, `qos`, custom keys).
      required: false
      default: {}
      selector:
        object: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
  sequence:
    # ── Step 0: Normalize inputs ────────────────────────────────────────────
    - variables:
        _component: '{{ component | trim }}'
        _object_id: '{{ object_id | trim }}'
        _delete: '{{ (delete | default(false)) | bool(false) }}'
        _err_mode: '{{ (error_mode | default("log") | lower) }}'
        _ha_topic: '{{ (ha_topic | default("homeassistant")) | trim or "homeassistant" }}'
        _device_topic: >-
          {%- set dt = device_topic | default("") | trim -%}
          {{ dt if dt != "" else (_component ~ "/" ~ _object_id) }}
        _initialize_mode: '{{ (initialize_mode | default("set_if_missing") | lower) }}'
        _attributes_mode: '{{ (attributes_mode | default("set_if_missing") | lower) }}'
        _ha_entity_id: '{{ _component ~ "." ~ _object_id }}'
        _discovery_topic: '{{ _ha_topic ~ "/" ~ _component ~ "/" ~ _object_id ~ "/config" }}'

    # ── Step 1: Delete path (publish empty retained payload, return) ────────
    - if:
        - condition: template
          value_template: '{{ _delete }}'
      then:
        - action: mqtt.publish
          data:
            topic: '{{ _discovery_topic }}'
            retain: true
            payload: ''
        - stop: 'labeled_feature_entities: delete dispatched.'

    # ── Step 2: create_mode handling ────────────────────────────────────────
    - variables:
        _create_mode: '{{ (create_mode | default("always") | lower) }}'
        _entity_exists: >-
          {{ states(_ha_entity_id) not in ['unknown', 'unavailable', 'none', None] }}
        _should_publish_config: >-
          {%- if _create_mode == 'never' -%}false
          {%- elif _create_mode == 'if_missing' -%}{{ not _entity_exists }}
          {%- else -%}true
          {%- endif -%}

    # ── Step 3: Validate required fields for non-delete path ───────────────
    - if:
        - condition: template
          value_template: '{{ (name | default("") | trim) == "" or (device | default({}) | length) == 0 }}'
      then:
        - action: script.labeled_feature_error_mode
          data:
            error_mode: '{{ _err_mode }}'
            source: Labeled Feature Entities
            message: >-
              Missing required field(s) for {{ _component }}.{{ _object_id }}:
              name={{ name | default('') }}, device={{ device | default({}) }}.
        - if:
            - condition: template
              value_template: '{{ _err_mode == "stop" }}'
          then:
            - stop: 'labeled_feature_entities: missing required fields.'
              error: true
        - stop: 'labeled_feature_entities: validation failed (handled per error_mode).'

    # ── Step 4: Build the discovery payload ─────────────────────────────────
    - variables:
        _payload_base: >-
          {% set d = {} %}
          {% set d = dict(d, **{'name': name}) %}
          {% set d = dict(d, **{'unique_id': (unique_id | default('') | trim) or _object_id}) %}
          {% set d = dict(d, **{'object_id': _object_id}) %}
          {% set _st = (state_topic | default('') | trim) %}
          {% set _ct = (command_topic | default('') | trim) %}
          {% if _st != '' %}{% set d = dict(d, **{'state_topic': _st}) %}{% endif %}
          {% if _ct != '' %}{% set d = dict(d, **{'command_topic': _ct}) %}{% endif %}
          {% if availability_topic | default('') | trim != '' %}{% set d = dict(d, **{'availability_topic': availability_topic | trim}) %}{% endif %}
          {% if value_template | default('') | trim != '' %}{% set d = dict(d, **{'value_template': value_template}) %}{% endif %}
          {% if command_template | default('') | trim != '' %}{% set d = dict(d, **{'command_template': command_template}) %}{% endif %}
          {% if json_attributes_topic | default('') | trim != '' %}{% set d = dict(d, **{'json_attributes_topic': json_attributes_topic | trim}) %}{% endif %}
          {% if json_attributes_template | default('') | trim != '' %}{% set d = dict(d, **{'json_attributes_template': json_attributes_template}) %}{% endif %}
          {% if payload_on | default('') | trim != '' %}{% set d = dict(d, **{'payload_on': payload_on}) %}{% endif %}
          {% if payload_off | default('') | trim != '' %}{% set d = dict(d, **{'payload_off': payload_off}) %}{% endif %}
          {% if state_on | default('') | trim != '' %}{% set d = dict(d, **{'state_on': state_on}) %}{% endif %}
          {% if state_off | default('') | trim != '' %}{% set d = dict(d, **{'state_off': state_off}) %}{% endif %}
          {% if payload_press | default('') | trim != '' %}{% set d = dict(d, **{'payload_press': payload_press}) %}{% endif %}
          {% if device_class | default('') | trim != '' %}{% set d = dict(d, **{'device_class': device_class | trim}) %}{% endif %}
          {% if unit_of_measurement | default('') | trim != '' %}{% set d = dict(d, **{'unit_of_measurement': unit_of_measurement | trim}) %}{% endif %}
          {% if state_class | default('') | trim != '' %}{% set d = dict(d, **{'state_class': state_class | trim}) %}{% endif %}
          {% if icon | default('') | trim != '' %}{% set d = dict(d, **{'icon': icon | trim}) %}{% endif %}
          {% if entity_category | default('') | trim != '' %}{% set d = dict(d, **{'entity_category': entity_category | trim}) %}{% endif %}
          {% if suggested_display_precision | default('') | trim != '' %}{% set d = dict(d, **{'suggested_display_precision': suggested_display_precision | int(0)}) %}{% endif %}
          {% if expire_after | default('') | trim != '' %}{% set d = dict(d, **{'expire_after': expire_after | int(0)}) %}{% endif %}
          {% if optimistic | default('') | trim != '' %}{% set d = dict(d, **{'optimistic': (optimistic | lower in ['true', '1', 'yes'])}) %}{% endif %}
          {% if min | default('') | trim != '' %}{% set d = dict(d, **{'min': min | float(0)}) %}{% endif %}
          {% if max | default('') | trim != '' %}{% set d = dict(d, **{'max': max | float(0)}) %}{% endif %}
          {% if step | default('') | trim != '' %}{% set d = dict(d, **{'step': step | float(1)}) %}{% endif %}
          {% if mode | default('') | trim != '' %}{% set d = dict(d, **{'mode': mode | trim}) %}{% endif %}
          {% set _opts = options | default([]) %}
          {% if _opts | length > 0 %}{% set d = dict(d, **{'options': _opts}) %}{% endif %}
          {% set d = dict(d, **{'retain': true}) %}
          {% set d = dict(d, **{'device': device}) %}
          {% set _extra = extra | default({}) %}
          {% if _extra | length > 0 %}{% set d = dict(d, **_extra) %}{% endif %}
          {{ d }}

    # ── Step 5: Publish discovery config (gated by create_mode) ─────────────
    - if:
        - condition: template
          value_template: '{{ _should_publish_config }}'
      then:
        - action: mqtt.publish
          data:
            topic: '{{ _discovery_topic }}'
            retain: true
            payload: '{{ _payload_base | to_json }}'

    # ── Step 6: Seed state per initialize_mode ──────────────────────────────
    - variables:
        _has_initial_state: '{{ (initial_state | default("") | string | trim) != "" }}'
        _should_publish_state: >-
          {% if not _has_initial_state %}false
          {% elif _initialize_mode == 'never' %}false
          {% elif _initialize_mode == 'always' %}true
          {% else %}{{ not _entity_exists }}{% endif %}
        _resolved_state_topic: >-
          {{ (state_topic | default('') | trim) or (_device_topic ~ '/state') }}
    - if:
        - condition: template
          value_template: '{{ _should_publish_state }}'
      then:
        - action: mqtt.publish
          data:
            topic: '{{ _resolved_state_topic }}'
            retain: true
            payload: '{{ initial_state }}'

    # ── Step 7: Seed attributes per attributes_mode ────────────────────────
    - variables:
        _has_initial_attrs: '{{ (initial_attributes | default({}) | length) > 0 }}'
        _attrs_existing: >-
          {% set jat = state_attr(_ha_entity_id, 'attribution') %}
          {{ state_attr(_ha_entity_id, 'friendly_name') is not none }}
        _should_publish_attrs: >-
          {% if not _has_initial_attrs %}false
          {% elif _attributes_mode == 'never' %}false
          {% elif _attributes_mode == 'always' %}true
          {% else %}{{ not _entity_exists }}{% endif %}
        _resolved_attrs_topic: >-
          {{ (json_attributes_topic | default('') | trim) or (_device_topic ~ '/attributes') }}
    - if:
        - condition: template
          value_template: '{{ _should_publish_attrs }}'
      then:
        - action: mqtt.publish
          data:
            topic: '{{ _resolved_attrs_topic }}'
            retain: true
            payload: '{{ initial_attributes | to_json }}'


# ============================================================================
# Labeled Feature Area — per-feature dispatcher
# ============================================================================
# Single-feature dispatcher for the Labeled Feature Areas stack. Shaped like
# `labeled_feature_somrig` / `labeled_feature_generics`: a big `choose:` block
# that branches on `feature` and dispatches one or more `labeled_feature_entities`
# calls to create the underlying MQTT discovery entities.
#
# Built-in branches:
#   - Manifest    → sensor.area_manifest_<area_id>
#   - Shoot Zone  → sensor.<scope_id>_vpd  (Antoine-equation VPD value_template)
#   - Root Zone   → number.<scope_id>_tracked_psi
#
# Generic branch (any other Gen: <FeatureName>):
#   - select.<scope_id>_<slug(F)>  with options resolved from:
#       * static_options (already pre-computed in feature_data from
#         `(scope-prefix)Gen Options: <F>: a|b|c` labels)
#       * dynamic entity pool from `(scope-prefix)Gen Option: <F>` labels in scope
#       * minus `(scope-prefix)Gen <F> Exclude: True` labels
labeled_feature_area:
  alias: Labeled Feature Area
  description: >
    Per-feature dispatcher for the Labeled Feature Areas stack. Resolves
    scope, computes the canonical `object_id` for the feature (the
    sensor no longer carries one), builds the appropriate MQTT discovery
    payload (or payloads) and delegates publishing — or retraction, when
    `delete: true` — to `script.labeled_feature_entities`.

    Single source of truth for "feature → component + object_id"
    mapping. Adding a new built-in feature is a one-line edit to the
    matching branch's `_obj` / `_component` defaults; arbitrary features
    fall through to the generic select / component-override branches.
  mode: parallel
  max: 100
  fields:
    feature:
      name: Feature
      description: >
        Feature name as it appears in the
        `(Area |Floor |)Provides: <FeatureName>` label. Examples:
        'Manifest', 'Shoot Zone', 'Root Zone', or any user-declared
        name like 'Audio Mode' / 'Media Player'.
      required: true
      selector:
        text: {}
    scope_id:
      name: Scope ID
      description: The resolved area_id or floor_id for this feature.
      required: true
      selector:
        text: {}
    scope:
      name: Scope
      description: Scope of the feature (area, floor, or none).
      required: false
      default: area
      selector:
        select:
          options:
            - area
            - floor
            - none
    feature_data:
      name: Feature Data
      description: >
        Pre-computed label_data dict from
        `sensor.labeled_feature_areas_state.label_map[<scope_id>||<feature>].label_data`.
        Currently carries `scope`, `scope_id`, `declaring_area_id` and
        `component` (the optional override from
        `Provides <Feature> Component: <comp>` labels, default
        `select`). Object_id, defaults (min/max/step/icon/etc) are
        owned by this script's per-feature branches.
      required: false
      default: {}
      selector:
        object: {}
    delete:
      name: Delete
      description: >
        When true, retract the MQTT discovery topic(s) for this
        feature instead of publishing them. The script computes the
        same canonical `object_id` it would have published, then
        passes it to `script.labeled_feature_entities` with
        `delete: true`. This is how
        `automation.labeled_feature_areas` cleans up after a label
        removal or a `Component:` swap — the sensor no longer carries
        the object_id, so the only place that knows the canonical
        name for retraction is this script.
      required: false
      default: false
      selector:
        boolean: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
  sequence:
    # ── Step 1: Normalize inputs ────────────────────────────────────────────
    - variables:
        _feature: '{{ feature | trim }}'
        _scope: '{{ (scope | default("area") | lower) }}'
        _scope_id: '{{ scope_id | trim }}'
        _fd: '{{ feature_data | default({}) }}'
        _err_mode: '{{ (error_mode | default("log") | lower) }}'
        _safe_scope_id: '{{ _scope_id | replace(" ", "_") | replace("-", "_") | lower }}'
        _delete: '{{ delete | default(false) | bool(false) }}'
        _scope_prefix: >-

          {{ 'Area ' if _scope == 'area' else ('Floor ' if _scope == 'floor' else '') }}
        _declared_area_id: '{{ _fd.get("declared_area_id", "") }}'
        _scope_name: >-
          {%- if _scope == 'area' -%}{{ area_name(_scope_id) | default(_scope_id, true) }}
          {%- elif _scope == 'floor' -%}{{ _scope_id }}
          {%- else -%}{{ area_name(_declared_area_id) | default(_declared_area_id, true) }}
          {%- endif -%}

    # ── Step 2: Resolve scope entity set ────────────────────────────────────
    - variables:
        scope_entity_set: >-
          {% if _scope == 'area' and _scope_id != '' %}
            {% set area_ents = area_entities(_scope_id) | list %}
            {% set area_devs = area_devices(_scope_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% elif _scope == 'floor' and _scope_id != '' %}
            {% set ns = namespace(ents=[]) %}
            {% for a in floor_areas(_scope_id) %}
              {% set ns.ents = ns.ents + area_entities(a) | list %}
              {% for d in area_devices(a) %}
                {% set ns.ents = ns.ents + device_entities(d) | list %}
              {% endfor %}
            {% endfor %}
            {{ ns.ents | unique | list }}
          {% else %}
            {#- scope == 'none' → entire entity pool, no scope filter applied -#}
            {{ states | map(attribute='entity_id') | list }}
          {% endif %}

    # ── Step 3: Branch by feature ───────────────────────────────────────────
    - choose:
        # ────────────────────── Manifest ─────────────────────────────────────
        # Canonical object_id (owned here, not by the sensor):
        #   sensor.area_manifest_<safe_scope_id>
        - conditions:
            - condition: template
              value_template: '{{ _feature == "Manifest" }}'
          sequence:
            - variables:
                _aid: '{{ _scope_id }}'
                _safe_aid: '{{ _safe_scope_id }}'
            - if:
                - condition: template
                  value_template: '{{ _delete }}'
              then:
                - action: script.labeled_feature_entities
                  data:
                    component: sensor
                    object_id: 'area_manifest_{{ _safe_aid }}'
                    delete: true
                    error_mode: '{{ _err_mode }}'
                - stop: 'Manifest retracted.'
            - variables:
                _ent_ids: '{{ area_entities(_aid) | list }}'
                _dev_ids: '{{ area_devices(_aid) | list }}'
                _ent_count: '{{ _ent_ids | length }}'
                _dev_count: '{{ _dev_ids | length }}'
                _aname: '{{ area_name(_aid) | default(_aid, true) }}'
                _label_map: >-
                  {% set ns = namespace(data={}) %}
                  {% for lbl_id in labels() %}
                    {% set match_ents = label_entities(lbl_id) | select('in', _ent_ids) | list %}
                    {% if match_ents | length > 0 %}
                      {% set ns.data = dict(ns.data, **{lbl_id: match_ents}) %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.data }}
            - action: script.labeled_feature_entities
              data:
                component: sensor
                object_id: 'area_manifest_{{ _safe_aid }}'
                name: '{{ _aname }} Area Manifest'
                icon: mdi:format-list-bulleted-square
                device:
                  identifiers: ['area_manifest_{{ _safe_aid }}']
                  name: '{{ _aname }} Area'
                  manufacturer: Home Assistant
                  model: Area Manifest
                  # `suggested_area` accepts area_id (preferred — survives renames)
                  # or area_name. We pass the id. Only honored on first creation.
                  suggested_area: '{{ _aid }}'
                state_topic: 'area_manifests/{{ _safe_aid }}/state'
                json_attributes_topic: 'area_manifests/{{ _safe_aid }}/attributes'
                initialize_mode: always
                attributes_mode: always
                initial_state: '{{ _ent_count }}'
                initial_attributes:
                  area_id: '{{ _aid }}'
                  area_name: '{{ _aname }}'
                  entity_ids: '{{ _ent_ids }}'
                  device_ids: '{{ _dev_ids }}'
                  entity_count: '{{ _ent_count }}'
                  device_count: '{{ _dev_count }}'
                  labels: '{{ _label_map }}'
                error_mode: '{{ _err_mode }}'

        # ────────────────────── Shoot Zone (VPD) ─────────────────────────────
        - conditions:
            - condition: template
              value_template: '{{ _feature == "Shoot Zone" }}'
          sequence:
            - variables:
                _obj: '{{ _safe_scope_id ~ "_vpd" }}'
            - if:
                - condition: template
                  value_template: '{{ _delete }}'
              then:
                - action: script.labeled_feature_entities
                  data:
                    component: sensor
                    object_id: '{{ _obj }}'
                    delete: true
                    error_mode: '{{ _err_mode }}'
                - stop: 'Shoot Zone retracted.'
            - action: script.labeled_feature_entities
              data:
                component: sensor
                object_id: '{{ _obj }}'
                # Friendly name prefixed with scope name so the entity is
                # globally identifiable in pickers / voice / history.
                name: '{{ _scope_name }} VPD'
                icon: '{{ _fd.get("icon", "") }}'
                device_class: '{{ _fd.get("device_class", "pressure") }}'
                unit_of_measurement: '{{ _fd.get("unit_of_measurement", "kPa") }}'
                state_class: measurement
                device:
                  identifiers: ['{{ _safe_scope_id }}']
                  name: '{{ _scope_name }}'
                  manufacturer: Labeled Feature Area
                  model: Shoot Zone
                  # id-keyed (preferred — survives renames). Floor / none
                  # scopes have no area_id of their own; fall back to the
                  # declaring area's id, then to _scope_name as last resort.
                  suggested_area: >-
                    {{ _scope_id if _scope == 'area'
                       else (_declared_area_id if _declared_area_id else _scope_name) }}
                state_topic: 'tracked_area/{{ _safe_scope_id }}/vpd'
                expire_after: '300'
                suggested_display_precision: '2'
                value_template: >-
                  {% set temp_sensors = states.sensor
                       | selectattr('entity_id', 'in', scope_entity_set)
                       | selectattr('attributes.device_class', 'defined')
                       | selectattr('attributes.device_class', 'match', 'temperature')
                       | list %}
                  {% set humidity_sensors = states.sensor
                       | selectattr('entity_id', 'in', scope_entity_set)
                       | selectattr('attributes.device_class', 'defined')
                       | selectattr('attributes.device_class', 'match', 'humidity')
                       | list %}
                  {% if temp_sensors | length > 0 and humidity_sensors | length > 0 %}
                    {% set ns = namespace(celsius_temps=[]) %}
                    {% for sensor in temp_sensors %}
                      {% set temp = sensor.state | float %}
                      {% set unit = sensor.attributes.unit_of_measurement %}
                      {% if unit == '°F' %}{% set celsius_temp = (temp - 32) * 5/9 %}
                      {% else %}{% set celsius_temp = temp %}{% endif %}
                      {% set ns.celsius_temps = ns.celsius_temps + [celsius_temp] %}
                    {% endfor %}
                    {% set avg_temp = ns.celsius_temps | average %}
                    {% set avg_humidity = humidity_sensors
                         | map(attribute='state')
                         | map('float', 0)
                         | average %}
                    {% set svp = 0.61078 * (10 ** ((7.5 * avg_temp) / (237.3 + avg_temp))) %}
                    {% set avp = svp * (avg_humidity / 100) %}
                    {{ (svp - avp) | round(2) }}
                  {% else %}unavailable{% endif %}
                error_mode: '{{ _err_mode }}'

        # ────────────────────── Root Zone (Tracked PSI) ──────────────────────
        - conditions:
            - condition: template
              value_template: '{{ _feature == "Root Zone" }}'
          sequence:
            - variables:
                _obj: '{{ _safe_scope_id ~ "_tracked_psi" }}'
            - if:
                - condition: template
                  value_template: '{{ _delete }}'
              then:
                - action: script.labeled_feature_entities
                  data:
                    component: number
                    object_id: '{{ _obj }}'
                    delete: true
                    error_mode: '{{ _err_mode }}'
                - stop: 'Root Zone retracted.'
            - variables:
                _initial: '{{ _fd.get("initial", "0") | default("0", true) }}'
                _min: '{{ _fd.get("min", "0") | default("0", true) }}'
                _max: '{{ _fd.get("max", "2000") | default("2000", true) }}'
                _step: '{{ _fd.get("step", "0.1") | default("0.1", true) }}'
            - action: script.labeled_feature_entities
              data:
                component: number
                object_id: '{{ _obj }}'
                # Scope-prefixed friendly name for global identifiability.
                name: '{{ _scope_name }} Tracked PSI'
                icon: '{{ _fd.get("icon", "") }}'
                device_class: '{{ _fd.get("device_class", "pressure") }}'
                unit_of_measurement: '{{ _fd.get("unit_of_measurement", "PSI") }}'
                state_class: total_increasing
                device:
                  identifiers: ['{{ _safe_scope_id }}']
                  name: '{{ _scope_name }}'
                  manufacturer: Labeled Feature Area
                  model: Root Zone
                  # id-keyed (preferred — survives renames).
                  suggested_area: >-
                    {{ _scope_id if _scope == 'area'
                       else (_declared_area_id if _declared_area_id else _scope_name) }}
                state_topic: 'tracked_area/{{ _safe_scope_id }}/tracked_psi'
                command_topic: 'tracked_area/{{ _safe_scope_id }}/tracked_psi'
                min: '{{ _min }}'
                max: '{{ _max }}'
                step: '{{ _step }}'
                mode: box
                optimistic: 'true'
                expire_after: '0'
                suggested_display_precision: '2'
                initial_state: '{{ _initial }}'
                initialize_mode: set_if_missing
                error_mode: '{{ _err_mode }}'

        # ────────────────────── Generic Provides: <F> (default → select) ─────
        # Pool resolution uses the same 4-step Provides resolver as
        # labeled_feature_generics:
        #   1. <_feature>                                  (exact, global)
        #   2. <scope_prefix>Provides: <_feature>          (scoped)
        #   3. <scope_prefix>Follower: <_feature>          (scoped)
        #   4. <scope_prefix>Leader: <_feature>            (scoped)
        # First non-empty candidate wins.  Excludes are `<_feature> Exclude: True`
        # and `<scope_prefix><_feature> Exclude: True`.  Per-entity display-label
        # override is `<scope_prefix>Provides Option <_feature>: <Custom>`.
        - conditions:
            - condition: template
              value_template: '{{ _fd.get("component", "select") == "select" }}'
          sequence:
            - variables:
                _fslug: '{{ _feature | lower | replace(" ", "_") | replace("-", "_") }}'
                _obj: '{{ _safe_scope_id ~ "_" ~ _fslug }}'
            - if:
                - condition: template
                  value_template: '{{ _delete }}'
              then:
                - action: script.labeled_feature_entities
                  data:
                    component: select
                    object_id: '{{ _obj }}'
                    delete: true
                    error_mode: '{{ _err_mode }}'
                - stop: 'Generic select retracted.'
            - variables:
                _exclude_label_bare:   '{{ _feature ~ " Exclude: True" }}'
                _exclude_label_scoped: '{{ _scope_prefix ~ _feature ~ " Exclude: True" }}'
                _excluded_ents: >-
                  {{ (label_entities(_exclude_label_bare) | list
                      + label_entities(_exclude_label_scoped) | list)
                     | unique | list }}
                _resolved_pool: >-
                  {% set ns = namespace(out=[]) %}
                  {% set candidates = [
                    _feature,
                    _scope_prefix ~ 'Provides: ' ~ _feature,
                    _scope_prefix ~ 'Follower: ' ~ _feature,
                    _scope_prefix ~ 'Leader: '   ~ _feature
                  ] %}
                  {% for c in candidates %}
                    {% if ns.out | length == 0 %}
                      {% set ents = label_entities(c) | list %}
                      {% if _scope_prefix != '' and c != _feature and scope_entity_set | length > 0 and _scope != 'none' %}
                        {% set ents = ents | select('in', scope_entity_set) | list %}
                      {% endif %}
                      {% if ents | length > 0 %}{% set ns.out = ents %}{% endif %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.out }}
                _opt_ents_in_scope: '{{ _resolved_pool | reject("in", _excluded_ents) | list }}'
            - variables:
                _dynamic_options: >-
                  {% set ns = namespace(items=[]) %}
                  {% for ent in _opt_ents_in_scope %}
                    {% set lbls = labels(ent) | map('label_name') | reject('none') | list %}
                    {#- Per-entity custom dropdown label:
                        `<scope_prefix>Provides Option <_feature>: <Custom>`
                        (with bare unscoped fallback). -#}
                    {% set scoped_pfx = _scope_prefix ~ 'Provides Option ' ~ _feature ~ ': ' %}
                    {% set bare_pfx   = 'Provides Option ' ~ _feature ~ ': ' %}
                    {% set custom_scoped = lbls | select('match', '^' ~ scoped_pfx ~ '.+$') | first | default('') %}
                    {% set custom_bare   = lbls | select('match', '^' ~ bare_pfx ~ '.+$') | first | default('') %}
                    {% set custom = custom_scoped if custom_scoped != '' else custom_bare %}
                    {% set display_label = (custom | regex_replace('^.+: ', '') | trim) if custom != '' else (state_attr(ent, 'friendly_name') or ent) %}
                    {% set ns.items = ns.items + [{'value': ent, 'label': display_label}] %}
                  {% endfor %}
                  {{ ns.items }}
                _static_options: '{{ _fd.get("static_options", []) }}'
                _combined_options: '{{ (_static_options + _dynamic_options) | list }}'
                _options_only_values: '{{ _combined_options | map(attribute="value") | list }}'
                _initial: '{{ _fd.get("initial", "") | default("", true) }}'
            - if:
                - condition: template
                  value_template: '{{ _options_only_values | length == 0 }}'
              then:
                - action: script.labeled_feature_error_mode
                  data:
                    error_mode: '{{ _err_mode }}'
                    source: Labeled Feature Area
                    message: >-
                      No options resolved for select '{{ _feature }}' in scope
                      '{{ _scope }}' (scope_id={{ _scope_id }}).
                - if:
                    - condition: template
                      value_template: '{{ _err_mode == "stop" }}'
                  then:
                    - stop: 'No options resolved.'
                      error: true
                - stop: 'No options resolved (handled per error_mode).'
            - action: script.labeled_feature_entities
              data:
                component: select
                object_id: '{{ _obj }}'
                # Scope-prefixed friendly name for global identifiability.
                name: '{{ _scope_name }} {{ _feature }}'
                icon: '{{ _fd.get("icon", "") }}'
                device:
                  identifiers: ['{{ _safe_scope_id }}_{{ _fslug }}']
                  name: '{{ _scope_name }} {{ _feature }}'
                  manufacturer: Labeled Feature Area
                  model: Generated Select
                  # id-keyed (preferred — survives renames).
                  suggested_area: >-
                    {{ _scope_id if _scope == 'area'
                       else (_declared_area_id if _declared_area_id else _scope_name) }}
                state_topic: 'labeled_feature/areas/{{ _safe_scope_id }}/{{ _fslug }}/state'
                command_topic: 'labeled_feature/areas/{{ _safe_scope_id }}/{{ _fslug }}/set'
                options: '{{ _options_only_values }}'
                initial_state: '{{ _initial if _initial != "" else _options_only_values[0] }}'
                initialize_mode: set_if_missing
                error_mode: '{{ _err_mode }}'

        # ────────────────────── Generic Gen: <F> with Component override ────
        # (e.g. Component: number, Component: switch, Component: sensor)
        - conditions:
            - condition: template
              value_template: '{{ _fd.get("component", "") not in ["", "select"] }}'
          sequence:
            - variables:
                _fslug: '{{ _feature | lower | replace(" ", "_") | replace("-", "_") }}'
                _comp: '{{ _fd.get("component") }}'
                _obj: '{{ _safe_scope_id ~ "_" ~ _fslug }}'
            - if:
                - condition: template
                  value_template: '{{ _delete }}'
              then:
                - action: script.labeled_feature_entities
                  data:
                    component: '{{ _comp }}'
                    object_id: '{{ _obj }}'
                    delete: true
                    error_mode: '{{ _err_mode }}'
                - stop: 'Generic component-override retracted.'
            - variables:
                _initial: '{{ _fd.get("initial", "") | default("", true) }}'
                _min: '{{ _fd.get("min", "0") | default("0", true) }}'
                _max: '{{ _fd.get("max", "100") | default("100", true) }}'
                _step: '{{ _fd.get("step", "1") | default("1", true) }}'
                _unit: '{{ _fd.get("unit_of_measurement", "") }}'
                _dc: '{{ _fd.get("device_class", "") }}'
                _icon: '{{ _fd.get("icon", "") }}'
            - action: script.labeled_feature_entities
              data:
                component: '{{ _comp }}'
                object_id: '{{ _obj }}'
                # Scope-prefixed friendly name for global identifiability.
                name: '{{ _scope_name }} {{ _feature }}'
                icon: '{{ _icon }}'
                device_class: '{{ _dc }}'
                unit_of_measurement: '{{ _unit }}'
                device:
                  identifiers: ['{{ _safe_scope_id }}_{{ _fslug }}']
                  name: '{{ _scope_name }} {{ _feature }}'
                  manufacturer: Labeled Feature Area
                  model: 'Generated {{ _comp }}'
                  # id-keyed (preferred — survives renames).
                  suggested_area: >-
                    {{ _scope_id if _scope == 'area'
                       else (_declared_area_id if _declared_area_id else _scope_name) }}
                state_topic: 'labeled_feature/areas/{{ _safe_scope_id }}/{{ _fslug }}/state'
                command_topic: 'labeled_feature/areas/{{ _safe_scope_id }}/{{ _fslug }}/set'
                min: '{{ _min if _comp == "number" else "" }}'
                max: '{{ _max if _comp == "number" else "" }}'
                step: '{{ _step if _comp == "number" else "" }}'
                mode: '{{ "box" if _comp == "number" else "" }}'
                optimistic: 'true'
                initial_state: '{{ _initial }}'
                initialize_mode: set_if_missing
                error_mode: '{{ _err_mode }}'

      default:
        - action: script.labeled_feature_error_mode
          data:
            error_mode: '{{ _err_mode }}'
            source: Labeled Feature Area
            message: "Unknown feature '{{ _feature }}' in scope '{{ _scope }}' (scope_id={{ _scope_id }})."
        - if:
            - condition: template
              value_template: '{{ _err_mode == "stop" }}'
          then:
            - stop: "Labeled Feature Area: unknown feature '{{ _feature }}'."
              error: true
labeled_feature_styrbar:
  alias: Labeled Feature Styrbar
  description: >
    Maps IKEA STYRBAR (4-button + dimmer wheel) raw event names into calls to
    `script.labeled_feature_generics`. Reads the raw button event from the
    `feature` field (e.g. 'on', 'brightness_move_up', 'arrow_right_click').

    Initial implementation is **lights-only** — the four `arrow_*` events are
    reserved for future use and currently no-op (their `choose:` branches are
    empty stubs so the script does not Error Mode on them). `*_release` and
    `brightness_stop` events are ignored (no `choose:` branch); the hold loop
    inside `labeled_feature_generics` already exits on the leader's state
    change, so the explicit "release" event is not needed.

    Event → generic-feature mapping (all area-scoped):
      on                    Lights On            (one-shot)
      off                   Lights Off           (one-shot)
      brightness_move_up    Lights Up            (hold loop via leader_entity_id)
      brightness_move_down  Lights Down          (hold loop)
      brightness_stop       ignored
      arrow_left_click      TODO
      arrow_left_hold       TODO
      arrow_left_release    ignored
      arrow_right_click     TODO
      arrow_right_hold      TODO
      arrow_right_release   ignored
  mode: parallel
  max: 50
  fields:
    feature:
      name: Feature (Button Event)
      description: >
        The raw button event string from the STYRBAR button entity, e.g.
        'on', 'off', 'brightness_move_up', 'arrow_left_click'.
      required: true
      selector:
        select:
          custom_value: true
          options:
            - 'on'
            - 'off'
            - brightness_move_up
            - brightness_move_down
            - arrow_left_click
            - arrow_left_hold
            - arrow_right_click
            - arrow_right_hold
    follower_entity_id:
      name: Follower Entity ID
      description: Used for area lookup. Passed automatically by labeled_feature_follower.
      required: false
      default: ''
      selector:
        entity: {}
    leader_entity_id:
      name: Leader Entity ID (the button)
      description: >
        Used as fallback for area lookup, and — critically — forwarded to
        `labeled_feature_generics` for the stepping features (Lights Up /
        Lights Down) so the hold-while-held loop runs until the button's
        state changes.
      required: false
      default: ''
      selector:
        entity: {}
    leader_enabled:
      name: Leader Enabled
      description: Pass-through from the leader. Not used directly by the styrbar mapping.
      required: false
      default: true
      selector:
        boolean: {}
    leader_feature:
      name: Leader Feature Name
      description: >
        The leader's labeled feature name (e.g. 'Bedroom Buttons'), passed by
        the leader automation alongside `feature`. Forwarded as
        `exclude_feature` on every downstream `labeled_feature_generics` call
        so that `(Area |Floor |)<leader_feature> Exclude: True` opts entities
        out of every action this script dispatches.
      required: false
      default: ''
      selector:
        text: {}
    toggle:
      name: Toggle
      description: >
        Pass-through toggle flag from the leader. Forwarded to every
        labeled_feature_generics call.
      required: false
      default: false
      selector:
        boolean: {}
    scope:
      name: Scope
      description: Scope of the feature (area, floor, or none).
      required: false
      default: area
      selector:
        select:
          options:
            - area
            - floor
            - none
    scope_id:
      name: Scope ID
      description: The resolved area_id or floor_id passed by the automation.
      required: false
      default: ''
      selector:
        text: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
  sequence:
    # ── Step 1: Resolve normalized inputs and scope ids ─────────────────────
    - variables:
        _scope: '{{ (scope | default("area") | lower) }}'
        _toggle_in: '{{ (toggle | default(false)) | bool(false) }}'
        _err_mode: '{{ (error_mode | default("log") | lower) }}'
        _leader_feature: '{{ leader_feature | default("") | trim }}'
        _event: '{{ (feature | default("") | trim) }}'

    # ── Step 2: Branch by event ─────────────────────────────────────────────
    # All dispatched generic features are area-scoped (lights-only initial
    # implementation). The brightness_move_* branches forward
    # `leader_entity_id` so generics' built-in hold loop runs.
    - choose:
        # ────────────── on ──────────────
        - conditions:
            - condition: template
              value_template: '{{ _event == "on" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Lights On
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── off ──────────────
        - conditions:
            - condition: template
              value_template: '{{ _event == "off" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Lights Off
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── brightness_move_up ──────────────
        # Stepping feature: forwarding leader_entity_id opts into the
        # generics hold loop.
        - conditions:
            - condition: template
              value_template: '{{ _event == "brightness_move_up" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Lights Up
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── brightness_move_down ──────────────
        - conditions:
            - condition: template
              value_template: '{{ _event == "brightness_move_down" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Lights Down
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── arrow_left_click ──────────────
        # TODO: implement (Media Previous / Ads / etc).
        - conditions:
            - condition: template
              value_template: '{{ _event == "arrow_left_click" }}'
          sequence: []

        # ────────────── arrow_left_hold ──────────────
        # TODO: implement (Media Seek Back / Fan Off / etc).
        - conditions:
            - condition: template
              value_template: '{{ _event == "arrow_left_hold" }}'
          sequence: []

        # ────────────── arrow_right_click ──────────────
        # TODO: implement (Media Next / Night / etc).
        - conditions:
            - condition: template
              value_template: '{{ _event == "arrow_right_click" }}'
          sequence: []

        # ────────────── arrow_right_hold ──────────────
        # TODO: implement (Media Seek Forward / Fan On toggle / etc).
        - conditions:
            - condition: template
              value_template: '{{ _event == "arrow_right_hold" }}'
          sequence: []

        # All other events (brightness_stop, *_release, *_initial_press)
        # have no `choose:` branch and fall through silently — no Error
        # Mode is raised because they are expected "noise" events that
        # the script intentionally does not act on.
labeled_feature_symfonisk:
  alias: Labeled Feature Symfonisk
  description: >
    Maps IKEA SYMFONISK Gen 2 Sound Remote raw event names into calls to
    `script.labeled_feature_generics`. Reads the raw button event from the
    `feature` field (e.g. 'toggle', 'track_next', 'volume_up_hold',
    'dots_1_short_release', 'dots_2_double_press').

    Mixes scopes deliberately:
      - The transport buttons (toggle / track_*) target every media player
        in the house (`scope: none`) so the remote works regardless of which
        area it's pressed in.
      - The volume rocker doubles as area light control on short taps
        (`volume_up`/`volume_down` -> Lights On/Off) and switches between
        global volume and area lights on long-hold depending on whether
        media is currently playing in the remote's resolved scope.
      - The two `dots_*` buttons drive user-defined toggle features at the
        scopes the user picked: Screen, TV Input (area), Ads, Accent (area),
        Bright (floor), Night (global).

    Ignored events (no `choose:` branch): `*_initial_press`, `*_long_release`.

    Event → generic-feature mapping:
      toggle                       Media Toggle      (scope: none)
      track_previous               Media Previous    (scope: none)
      track_next                   Media Next        (scope: none)
      volume_up                    Lights On         (area scope, one-shot)
      volume_down                  Lights Off        (area scope, one-shot)
      volume_up_hold   playing     Volume Up         (scope: none, hold loop)
      volume_up_hold   not playing Lights Up         (area scope, hold loop)
      volume_down_hold playing     Volume Down       (scope: none, hold loop)
      volume_down_hold not playing Lights Down       (area scope, hold loop)
      dots_1_short_release         Screen   toggle   (area scope)
      dots_1_double_press          TV Input toggle   (area scope)
      dots_1_long_press            Bright   toggle   (floor scope)
      dots_2_short_release         Ads      toggle   (area scope)
      dots_2_double_press          Night    toggle   (scope: none)
      dots_2_long_press            Accent   toggle   (area scope)
  mode: parallel
  max: 50
  fields:
    feature:
      name: Feature (Button Event)
      description: >
        The raw button event string from the SYMFONISK button entity.
      required: true
      selector:
        select:
          custom_value: true
          options:
            - toggle
            - track_previous
            - track_next
            - volume_up
            - volume_down
            - volume_up_hold
            - volume_down_hold
            - dots_1_short_release
            - dots_1_long_press
            - dots_1_double_press
            - dots_2_short_release
            - dots_2_long_press
            - dots_2_double_press
    follower_entity_id:
      name: Follower Entity ID
      description: Used for area lookup. Passed automatically by labeled_feature_follower.
      required: false
      default: ''
      selector:
        entity: {}
    leader_entity_id:
      name: Leader Entity ID (the button)
      description: >
        Used as fallback for area lookup, and forwarded to
        `labeled_feature_generics` on the *_hold branches so the hold-loop
        runs until the button's state changes.
      required: false
      default: ''
      selector:
        entity: {}
    leader_enabled:
      name: Leader Enabled
      description: Pass-through from the leader. Not used directly by the symfonisk mapping.
      required: false
      default: true
      selector:
        boolean: {}
    leader_feature:
      name: Leader Feature Name
      description: >
        The leader's labeled feature name. Forwarded as `exclude_feature` on
        every downstream `labeled_feature_generics` call.
      required: false
      default: ''
      selector:
        text: {}
    toggle:
      name: Toggle
      description: >
        Pass-through toggle flag from the leader. Forwarded to every
        labeled_feature_generics call **except** the dots_* branches which
        always force `toggle: true` (their semantics are explicitly toggles).
      required: false
      default: false
      selector:
        boolean: {}
    scope:
      name: Scope
      description: Scope of the feature (area, floor, or none).
      required: false
      default: area
      selector:
        select:
          options:
            - area
            - floor
            - none
    scope_id:
      name: Scope ID
      description: The resolved area_id or floor_id passed by the automation.
      required: false
      default: ''
      selector:
        text: {}
    error_mode:
      name: Error Mode
      description: silent | log | alert | stop. Default 'log'.
      required: false
      default: log
      selector:
        select:
          custom_value: true
          options:
            - silent
            - log
            - alert
            - stop
  sequence:
    # ── Step 1: Resolve scope ids and scope entity set ──────────────────────
    # Mirrors labeled_feature_somrig's prologue verbatim because the
    # volume_*_hold branches need the same `media_playing` signal somrig
    # uses for its long-press branches.
    - variables:
        _scope: '{{ (scope | default("area") | lower) }}'
        _toggle_in: '{{ (toggle | default(false)) | bool(false) }}'
        _err_mode: '{{ (error_mode | default("log") | lower) }}'
        _leader_feature: '{{ leader_feature | default("") | trim }}'
        _event: '{{ (feature | default("") | trim) }}'
        _resolved_area_id: >-
          {%- if _scope == 'area' and scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- elif follower_entity_id is defined and follower_entity_id != '' -%}
            {{ area_id(follower_entity_id) | default('') }}
          {%- elif leader_entity_id is defined and leader_entity_id != '' -%}
            {{ area_id(leader_entity_id) | default('') }}
          {%- else -%}{{ '' }}{%- endif -%}
        _resolved_floor_id: >-
          {%- if _scope == 'floor' and scope_id is defined and scope_id != '' -%}
            {{ scope_id }}
          {%- elif _scope == 'floor' and follower_entity_id is defined and follower_entity_id != '' -%}
            {%- set aid = area_id(follower_entity_id) -%}
            {%- set ns = namespace(found='') -%}
            {%- for fid in floors() -%}
              {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
            {%- endfor -%}{{ ns.found }}
          {%- elif _scope == 'floor' and leader_entity_id is defined and leader_entity_id != '' -%}
            {%- set aid = area_id(leader_entity_id) -%}
            {%- set ns = namespace(found='') -%}
            {%- for fid in floors() -%}
              {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
            {%- endfor -%}{{ ns.found }}
          {%- else -%}
            {# For non-floor scopes we still try to derive the floor id so
               that the `dots_1_long_press` Floor Bright branch has a
               scope_id to dispatch with. #}
            {%- set aid = _resolved_area_id -%}
            {%- if aid == '' and follower_entity_id is defined and follower_entity_id != '' -%}
              {%- set aid = area_id(follower_entity_id) | default('') -%}
            {%- endif -%}
            {%- if aid == '' and leader_entity_id is defined and leader_entity_id != '' -%}
              {%- set aid = area_id(leader_entity_id) | default('') -%}
            {%- endif -%}
            {%- set ns = namespace(found='') -%}
            {%- if aid != '' -%}
              {%- for fid in floors() -%}
                {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
              {%- endfor -%}
            {%- endif -%}
            {{ ns.found }}
          {%- endif -%}
    - variables:
        # Scope entity set mirrors labeled_feature_generics — used here only
        # to compute `media_playing` for the volume_*_hold branches.
        scope_entity_set: >-
          {% if _scope == 'area' and _resolved_area_id != '' %}
            {% set area_ents = area_entities(_resolved_area_id) | list %}
            {% set area_devs = area_devices(_resolved_area_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% elif _scope == 'floor' and _resolved_floor_id != '' %}
            {% set ns = namespace(ents=[]) %}
            {% for a in floor_areas(_resolved_floor_id) %}
              {% set ns.ents = ns.ents + area_entities(a) | list %}
              {% for d in area_devices(a) %}
                {% set ns.ents = ns.ents + device_entities(d) | list %}
              {% endfor %}
            {% endfor %}
            {{ ns.ents | unique | list }}
          {% elif _resolved_area_id != '' %}
            {% set area_ents = area_entities(_resolved_area_id) | list %}
            {% set area_devs = area_devices(_resolved_area_id) %}
            {% set ns = namespace(dev_ents=[]) %}
            {% for d in area_devs %}
              {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
            {% endfor %}
            {{ (area_ents + ns.dev_ents) | unique | list }}
          {% else %}
            {{ [] }}
          {% endif %}
        _exclude_unscoped_label: '{{ _leader_feature ~ " Exclude: True" }}'
        _exclude_scoped_label: >-
          {{ (('Area ' if _scope == 'area' else
               ('Floor ' if _scope == 'floor' else '')) ~ _leader_feature) ~ " Exclude: True" }}
    - variables:
        excluded_entities: >-
          {% if _leader_feature == '' %}
            {{ [] }}
          {% else %}
            {% set unscoped = label_entities(_exclude_unscoped_label) | list %}
            {% set scoped = label_entities(_exclude_scoped_label) | list %}
            {% set all_excl = (unscoped + scoped) | unique | list %}
            {% if scope_entity_set | length > 0 %}
              {{ all_excl | select('in', scope_entity_set) | list }}
            {% else %}
              {{ all_excl }}
            {% endif %}
          {% endif %}
        _scope_prefix_str: >-
          {{ 'Area ' if _scope == 'area' else ('Floor ' if _scope == 'floor' else '') }}
        _media_provider_resolved: >-
          {% set _label = 'Media Player' %}
          {% set ns = namespace(out=[]) %}
          {% set candidates = [
            _label,
            _scope_prefix_str ~ 'Provides: ' ~ _label,
            _scope_prefix_str ~ 'Follower: ' ~ _label,
            _scope_prefix_str ~ 'Leader: '   ~ _label
          ] %}
          {% for c in candidates %}
            {% if ns.out | length == 0 %}
              {% set ents = label_entities(c) | list %}
              {% if _scope_prefix_str != '' and c != _label and scope_entity_set | length > 0 %}
                {% set ents = ents | select('in', scope_entity_set) | list %}
              {% endif %}
              {% if ents | length > 0 %}{% set ns.out = ents %}{% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.out }}
        media_playing: >-
          {% set mp_in_scope = states.media_player
               | rejectattr('entity_id', 'in', excluded_entities)
               | list %}
          {% set mp_in_scope_ids = mp_in_scope | map(attribute='entity_id') | list %}
          {% if scope_entity_set | length > 0 %}
            {% set candidate_ids = (mp_in_scope_ids | select('in', scope_entity_set) | list)
                                   + (_media_provider_resolved | select('in', scope_entity_set) | list) %}
            {{ mp_in_scope
               | selectattr('entity_id', 'in', candidate_ids | unique | list)
               | selectattr('state', 'in', ['playing', 'buffering'])
               | list | count > 0 }}
          {% elif _resolved_area_id != '' %}
            {% set area_ids = area_entities(_resolved_area_id) %}
            {% set candidate_ids = (mp_in_scope_ids | select('in', area_ids) | list)
                                   + (_media_provider_resolved | select('in', area_ids) | list) %}
            {{ mp_in_scope
               | selectattr('entity_id', 'in', candidate_ids | unique | list)
               | selectattr('state', 'in', ['playing', 'buffering'])
               | list | count > 0 }}
          {% else %}
            false
          {% endif %}

    # ── Step 2: Branch by event ─────────────────────────────────────────────
    - choose:
        # ────────────── toggle ──────────────
        # Transport buttons force scope: none so the press works
        # regardless of which area the remote is in.
        - conditions:
            - condition: template
              value_template: '{{ _event == "toggle" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Media Toggle
                exclude_feature: '{{ _leader_feature }}'
                scope: none
                scope_id: ''
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── track_previous ──────────────
        - conditions:
            - condition: template
              value_template: '{{ _event == "track_previous" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Media Previous
                exclude_feature: '{{ _leader_feature }}'
                scope: none
                scope_id: ''
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── track_next ──────────────
        - conditions:
            - condition: template
              value_template: '{{ _event == "track_next" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Media Next
                exclude_feature: '{{ _leader_feature }}'
                scope: none
                scope_id: ''
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── volume_up ──────────────
        # Single tap always controls AREA lights, regardless of whether
        # anything is playing. The dedicated *_hold variant is what
        # branches between volume and brightness.
        - conditions:
            - condition: template
              value_template: '{{ _event == "volume_up" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Lights On
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── volume_down ──────────────
        - conditions:
            - condition: template
              value_template: '{{ _event == "volume_down" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Lights Off
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── volume_up_hold ──────────────
        # Playing → global Volume Up (the user wants louder music
        # regardless of which area they're standing in).
        # Not playing → area Lights Up (the user is dimming the room).
        # Forwarding leader_entity_id opts into the generics hold loop.
        - conditions:
            - condition: template
              value_template: '{{ _event == "volume_up_hold" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: '{{ "Volume Up" if media_playing else "Lights Up" }}'
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ "none" if media_playing else _scope }}'
                scope_id: '{{ "" if media_playing else (scope_id | default("")) }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── volume_down_hold ──────────────
        - conditions:
            - condition: template
              value_template: '{{ _event == "volume_down_hold" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: '{{ "Volume Down" if media_playing else "Lights Down" }}'
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ "none" if media_playing else _scope }}'
                scope_id: '{{ "" if media_playing else (scope_id | default("")) }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: '{{ _toggle_in }}'
                error_mode: '{{ _err_mode }}'

        # ────────────── dots_1_short_release ──────────────
        # User-defined Area Screen feature. Resolution happens entirely
        # through `(Area )Follower: Screen` labels on target entities;
        # toggle: true forces the toggle path in generics.
        - conditions:
            - condition: template
              value_template: '{{ _event == "dots_1_short_release" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Screen
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: true
                error_mode: '{{ _err_mode }}'

        # ────────────── dots_1_double_press ──────────────
        # User-defined Area TV Input feature.
        - conditions:
            - condition: template
              value_template: '{{ _event == "dots_1_double_press" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: TV Input
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: true
                error_mode: '{{ _err_mode }}'

        # ────────────── dots_1_long_press ──────────────
        # User-defined Floor Bright feature — explicitly floor-scoped so
        # one press affects the whole floor.
        - conditions:
            - condition: template
              value_template: '{{ _event == "dots_1_long_press" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Bright
                exclude_feature: '{{ _leader_feature }}'
                scope: floor
                scope_id: '{{ _resolved_floor_id }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: true
                error_mode: '{{ _err_mode }}'

        # ────────────── dots_2_short_release ──────────────
        # User-defined Area Ads feature. (Note: `Ads` is also a generic
        # catalog entry — labeled_feature_generics will dispatch
        # `homeassistant.toggle` against entities labeled
        # `(Area )Follower: Ads` thanks to the existing `ads` kind in
        # feature_meta. toggle: true is a no-op for that kind.)
        - conditions:
            - condition: template
              value_template: '{{ _event == "dots_2_short_release" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Ads
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: true
                error_mode: '{{ _err_mode }}'

        # ────────────── dots_2_double_press ──────────────
        # Global Night feature.
        - conditions:
            - condition: template
              value_template: '{{ _event == "dots_2_double_press" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Night
                exclude_feature: '{{ _leader_feature }}'
                scope: none
                scope_id: ''
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: true
                error_mode: '{{ _err_mode }}'

        # ────────────── dots_2_long_press ──────────────
        # User-defined Area Accent feature.
        - conditions:
            - condition: template
              value_template: '{{ _event == "dots_2_long_press" }}'
          sequence:
            - action: script.labeled_feature_generics
              data:
                feature: Accent
                exclude_feature: '{{ _leader_feature }}'
                scope: '{{ _scope }}'
                scope_id: '{{ scope_id | default("") }}'
                follower_entity_id: '{{ follower_entity_id | default("") }}'
                leader_entity_id: '{{ leader_entity_id | default("") }}'
                leader_enabled: '{{ leader_enabled | default(true) }}'
                toggle: true
                error_mode: '{{ _err_mode }}'

        # All other events (*_initial_press, *_long_release) have no
        # `choose:` branch and fall through silently.
