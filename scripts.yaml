      - data:
          topic: '{{ counter_topic }}'
          retain: true
          payload: '{{ location_id | int + 1 }}'
        action: mqtt.publish
      - delay:
          milliseconds: 200
  - data:
      title: Location Sensors Created
      message: 'Created {{ locations_to_create }} location sensor(s). Starting ID:
        {{ current_id }} Ending ID: {{ current_id | int + locations_to_create | int
        - 1 }}'
    action: persistent_notification.create
  alias: 'Sensors: Create Locations'
  description: Dynamically create location monitoring sensors via MQTT discovery
  mode: queued
  max: 10
  fields:
    locations_to_create:
      name: Number of Locations
      description: How many location sensors to create
      default: 1
      selector:
        number:
          min: 1
          max: 100
      required: true
    root_zone:
      name: Root Zone
