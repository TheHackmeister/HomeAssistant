boards_organize_by_labels:
  sequence:
  - action: rest_command.get_board_swimlanes
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_swimlanes
  - variables:
      swimlane_match: '{{ all_swimlanes.content | selectattr(''title'', ''eq'', swimlane_name)
        | list }}

        '
      swimlaneId: '{{ swimlane_match[0]._id if swimlane_match | length > 0 else ''''
        }}

        '
  - if:
    - condition: template
      value_template: '{{ swimlaneId == "" }}'
    then:
    - action: system_log.write
      metadata: {}
      data:
        level: error
        message: 'Could not find swimlane: {{ swimlane_name }}'
    - stop: ''
      enabled: false
  - action: rest_command.get_board_lists
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_lists
  - action: rest_command.get_board
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: board_data
  - variables:
      all_labels: '{{ board_data.content.labels if board_data.content.labels is defined
        else [] }}'
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: swimlane_cards
  - if:
    - condition: template
      value_template: '{{ swimlane_cards.content | count == 0 }}'
    then:
    - action: persistent_notification.create
      metadata: {}
      data:
        message: No cards found in {{ swimlane_name }} swimlane
  - variables:
      list_ids_in_swimlane: '{{ swimlane_cards.content | map(attribute=''listId'')
        | unique | list }}'
      lists_in_swimlane: '{{ all_lists.content | selectattr(''_id'', ''in'', list_ids_in_swimlane)
        | list }}'
  - repeat:
      sequence:
      - action: rest_command.get_card
        metadata: {}
        data:
          boardId: '{{ boardId }}'
          listId: '{{ repeat.item.listId }}'
          cardId: '{{ repeat.item._id }}'
        response_variable: full_card_details
      - variables:
          card_label_ids: '{{ full_card_details.content.get(''labelIds'', []) if full_card_details.content.get(''labelIds'')
            is not none else [] }}'
      - if:
        - condition: template
          value_template: '{{ card_label_ids | length > 0 }}'
        then:
        - variables:
            current_list_match: '{{ all_lists.content | selectattr(''_id'', ''eq'',
              full_card_details.content.listId) | list }}

              '
            current_list_title: '{{ current_list_match[0].title if current_list_match
              | length > 0 else '''' }}

              '
        - repeat:
            sequence:
            - variables:
                label_match: '{{ all_labels | selectattr(''_id'', ''eq'', repeat.item)
                  | list }}

                  '
                label_name: '{{ label_match[0].name if label_match | length > 0 else
                  '''' }}

                  '
            - if:
              - condition: template
                value_template: '{{ label_name != "" }}'
              then:
              - variables:
                  matching_list: '{{ lists_in_swimlane | selectattr(''title'', ''eq'',
                    label_name) | list }}

                    '
                  target_list_id: '{{ matching_list[0]._id if matching_list | length
                    > 0 else '''' }}

                    '
              - if:
                - condition: template
                  value_template: '{{ target_list_id != "" and target_list_id != full_card_details.content.listId
                    }}'
                then:
                - action: system_log.write
                  metadata: {}
                  data:
                    level: info
                    message: Moving card "{{ full_card_details.content.title }}" from
                      "{{ current_list_title }}" to "{{ label_name }}" based on label
                - action: rest_command.move_card_to_swimlane
                  metadata: {}
                  data:
                    cardId: '{{ full_card_details.content._id }}'
                    listId: '{{ full_card_details.content.listId }}'
                    boardId: '{{ boardId }}'
                    swimlaneId: '{{ swimlaneId }}'
                    newListId: '{{ target_list_id }}'
                  response_variable: move_result
            for_each: '{{ card_label_ids }}'
      for_each: '{{ swimlane_cards.content }}'
  alias: 'Boards: Organize Cards by Labels'
  description: Moves cards to lists that match their label names (FIXED - fetches
    full card details)
  fields:
    boardId:
      selector:
        text:
      name: boardId
      description: Board ID
      default: TrfngHQf8PWj9mnqC
      required: false
    swimlane_name:
      selector:
        text:
      name: Swimlane Name
      description: Name of the swimlane to organize
      default: Default
      required: true
boards_update_recurring_tasks:
  sequence:
  - action: rest_command.get_board_swimlanes
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_swimlanes
  - variables:
      from_swimlane_match: '{{ all_swimlanes.content | selectattr(''title'', ''eq'',
        from_swimlane_name) | list }}

        '
      from_swimlaneId: '{{ from_swimlane_match[0]._id if from_swimlane_match | length
        > 0 else '''' }}

        '
  - if:
    - condition: template
      value_template: '{{ from_swimlaneId == "" }}'
    then:
    - action: system_log.write
      metadata: {}
      data:
        level: error
        message: 'Could not find swimlane: {{ from_swimlane_name }}'
    - stop: ''
      enabled: false
  - action: rest_command.get_board_lists
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_lists
  - action: rest_command.get_board
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: board_data
  - variables:
      all_labels: '{{ board_data.content.labels if board_data.content.labels is defined
        else [] }}'
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ from_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: from_cards
  - if:
    - condition: template
      value_template: '{{ from_cards.content | count == 0 }}'
    then:
    - action: persistent_notification.create
      metadata: {}
      data:
        message: No cards found in {{ from_swimlane_name }} swimlane
    - stop: ''
      enabled: false
  - repeat:
      sequence:
      - variables:
          card_list_match: '{{ all_lists.content | selectattr(''_id'', ''eq'', repeat.item.listId)
            | list }}

            '
          card_list_title: '{{ card_list_match[0].title if card_list_match | length
            > 0 else '''' }}

            '
      - if:
        - condition: template
          value_template: '{{ card_list_title == from_list_name }}'
        then:
        - action: rest_command.get_card
          metadata: {}
          data:
            boardId: '{{ boardId }}'
            listId: '{{ repeat.item.listId }}'
            cardId: '{{ repeat.item._id }}'
          response_variable: full_card_details
        - variables:
            card_label_ids: '{{ full_card_details.content.get(''labelIds'', []) if
              full_card_details.content.get(''labelIds'') is not none else [] }}'
        - if:
          - condition: template
            value_template: '{{ card_label_ids | length > 0 }}'
          then:
          - variables:
              card_label_names: "{% set names = namespace(items=[]) %} {% for label_id
                in card_label_ids %}\n  {% set matching = all_labels | selectattr('_id',
                'eq', label_id) | list %}\n  {% if matching | length > 0 %}\n    {%
                set names.items = names.items + [matching[0].name | lower] %}\n  {%
                endif %}\n{% endfor %} {{ names.items }}"
              has_weekly: '{{ ''weekly'' in card_label_names }}'
              has_bi_weekly: '{{ ''bi-weekly'' in card_label_names }}'
              has_monthly: '{{ ''monthly'' in card_label_names }}'
              has_bi_monthly: '{{ ''bi-monthly'' in card_label_names }}'
              has_quarterly: '{{ ''quarterly'' in card_label_names }}'
              has_bi_quarterly: '{{ ''bi-quarterly'' in card_label_names }}'
              has_yearly: '{{ ''yearly'' in card_label_names }}'
              has_bi_yearly: '{{ ''bi-yearly'' in card_label_names }}'
              has_annually: '{{ ''annually'' in card_label_names }}'
          - variables:
              new_due_date: "{% if has_weekly %}\n  {{ (now() + timedelta(weeks=1)).isoformat()
                }}\n{% elif has_bi_weekly %}\n  {{ (now() + timedelta(weeks=2)).isoformat()
                }}\n{% elif has_monthly %}\n  {{ (now() + timedelta(days=30)).isoformat()
                }}\n{% elif has_quarterly %}\n  {{ (now() + timedelta(days=90)).isoformat()
                }}\n{% elif has_yearly %}\n  {{ (now() + timedelta(days=365)).isoformat()
                }}\n{% elif has_bi_monthly %}\n  {{ (now() + timedelta(days=60)).isoformat()
                }}\n{% elif has_bi_quarterly %}\n  {{ (now() + timedelta(days=180)).isoformat()
                }}\n{% elif has_bi_yearly %}\n  {{ (now() + timedelta(days=730)).isoformat()
                }}\n{% elif has_annually %}\n  {% if full_card_details.content.dueAt
                is defined and full_card_details.content.dueAt != None %}\n    {{
                (as_datetime(full_card_details.content.dueAt) + timedelta(days=365)).isoformat()
                }}\n  {% else %}\n    {{ (now() + timedelta(days=365)).isoformat()
                }}\n  {% endif %}\n{% else %}\n  \n{% endif %}\n"
              recurrence_type: "{% if has_weekly %}\n  weekly\n{% elif has_monthly
                %}\n  monthly\n{% elif has_quarterly %}\n  quarterly\n{% elif has_yearly
                %}\n  yearly\n{% elif has_bi_weekly %}\n  bi-weekly\n{% elif has_bi_monthly
                %}\n  bi-monthly\n{% elif has_bi_quarterly %}\n  bi-quarterly\n{%
                elif has_bi_yearly %}\n  bi-yearly\n{% elif has_annually %}\n  annually\n{%
                else %}\n  none\n{% endif %}\n"
          - if:
            - condition: template
              value_template: '{{ recurrence_type != "none" }}'
            then:
            - variables:
                current_due_date: '{{ full_card_details.content.dueAt if full_card_details.content.dueAt
                  is defined else none }}'
                is_past_due: '{{ current_due_date is none or (current_due_date | as_datetime)
                  < now() }}'
            - if:
              - condition: template
                value_template: '{{ is_past_due }}'
              then:
              - action: system_log.write
                metadata: {}
                data:
                  level: info
                  message: 'Updating {{ recurrence_type }} recurring task "{{ repeat.item.title
                    }}" with new due date: {{ new_due_date }}'
              - action: rest_command.update_card_due_date
                metadata: {}
                data:
                  cardId: '{{ full_card_details.content._id }}'
                  listId: '{{ full_card_details.content.listId }}'
                  boardId: '{{ boardId }}'
                  dueAt: '{{ new_due_date }}'
                response_variable: update_result
              else:
              - action: system_log.write
                metadata: {}
                data:
                  level: debug
                  message: Skipping "{{ repeat.item.title }}" - due date {{ current_due_date
                    }} is in the future
      for_each: '{{ from_cards.content }}'
  alias: 'Boards: Update Recurring Tasks'
  description: Updates due dates for recurring tasks based on their labels (FIXED
    - fetches full card details)
  fields:
    boardId:
      selector:
        text:
      name: boardId
      description: Board ID
      default: TrfngHQf8PWj9mnqC
      required: false
    from_swimlane_name:
      selector:
        text:
      name: From Swimlane Name
      description: Swimlane to check for recurring tasks
      default: Today
      required: true
    from_list_name:
      selector:
        text:
      name: From List Name
      description: List to check for recurring tasks
      default: Inbox/Reset
      required: true
