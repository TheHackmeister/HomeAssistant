                }}_alert_low\",\n  \"mode\": \"box\",\n  \"min\": \"0\",\n  \"max\":
                \"10000000\",      \n  \"cmd_t\": \"~/alert_low\",      \n  \"stat_t\":
                \"~/alert_low\",\n  \"retain\": true\n}\n"
            enabled: true
          - action: mqtt.publish
