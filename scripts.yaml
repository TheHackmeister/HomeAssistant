            location_topic ~ \"/active\",\n  \"command_topic\": location_topic ~ \"/active/set\",\n
            \ \"payload_on\": \"true\",\n  \"payload_off\": \"false\",\n  \"state_on\":
            \"true\",\n  \"state_off\": \"false\",\n  \"retain\": true,\n  \"json_attributes_topic\":
            location_topic ~ \"/attributes\",\n  \"device\": {\n    \"identifiers\":
            [device_name],\n    \"name\": 'Location' ~ ' #' ~ location_id,\n    \"manufacturer\":
            \"Curated Forest\",\n    \"suggested_area\": area_name(location_area |
            default(root_zone)),\n    \"model\": \"Location Tracking\"\n  }\n} | to_json
            }}\n"
        action: mqtt.publish
      - data:
