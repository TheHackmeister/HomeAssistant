  icon: mdi:flower
calculated_areas_initalize_helpers:
  sequence:
  - variables:
      ha_topic: homeassistant
      device_topic: area_leaders
      area_leaders_sensor_name: area_leaders_active_count
  - action: mqtt.publish
    data:
      topic: '{{ ha_topic }}/sensor/{{ area_leaders_sensor_name }}/config'
      retain: true
      payload: "{{ \n  { \"~\": device_topic,\n    \"dev\": {\n      \"ids\": [ \"area_leaders\"
        ],\n      \"name\": \"Area Leaders\" ,\n      \"manufacturer\": \"Area Leader
        System\"\n    },\n    \"name\": \"Active Count\",\n    \"uniq_id\": area_leaders_sensor_name,\n
        \   \"object_id\": area_leaders_sensor_name,\n    \"stat_t\": \"calibrated_value/update_every_second\",\n
        \   \"retain\": false,\n    \"state_class\": \"measurement\",\n    \"value_template\":
        \"{% set count = namespace(total=0) %}{% for label in labels() %}{% if label_name(label).startswith('Area
        Leader: ') %}{% for entity_id in label_entities(label) %}{% if states(entity_id)
        in ['on', 'open', 'home', 'active'] %}{% set count.total = count.total +
        1 %}{% endif %}{% endfor %}{% endif %}{% endfor %}{{ count.total }}\"\n  }
        | to_json\n}}\n"
  - repeat:
      sequence:
      - variables:
          area_id: '{{ repeat.item }}'
          area: '{{ area_name(repeat.item) }}'
          ha_topic: homeassistant
          device_topic: tracked_area/{{ area_id }}
      - action: mqtt.publish
        data:
          topic: '{{ ha_topic }}/sensor/{{ area_id }}_vpd/config'
          retain: true
          payload: "{{ \n  { \"~\": device_topic,\n    \"dev\": {\n      \"ids\":
            [ area_id ],\n      \"name\": area ,\n      \"manufacturer\": \"Tracked
            Area\",\n      \"suggested_area\": area\n    },\n    \"name\": \"VPD\",\n
            \   \"device_class\": \"pressure\",\n    \"unit_of_measurement\": \"kPa\",\n
            \   \"uniq_id\": area_id~\"_vpd\",\n    \"object_id\": area_id~\"_vpd\",\n
            \   \"cmd_t\": \"~/calculated_value\",\n    \"stat_t\": \"calibrated_value/update_every_second\",\n
            \   \"retain\": true,\n    \"expire_after\": 60,\n    \"state_class\":
            \"measurement\",\n    \"suggested_display_precision\": \"2\",\n    \"value_template\":
            \"{# Get temperature sensors from area #}\n      {% set temp_sensors =
            states.sensor \n          | selectattr('entity_id', 'in', area_entities('\"~area_id~\"'))
            \n          | selectattr('attributes.device_class', 'defined') \n          |
            selectattr('attributes.device_class', 'match', 'temperature') \n          |
            list %}\n      \n      {# Get humidity sensors from area #}\n      {%
            set humidity_sensors = states.sensor \n          | selectattr('entity_id',
            'in', area_entities('\"~area_id~\"')) \n          | selectattr('attributes.device_class',
            'defined') \n          | selectattr('attributes.device_class', 'match',
            'humidity') \n          | list %}\n      \n      {% if temp_sensors |
            length > 0 and humidity_sensors | length > 0 %}\n        {% set ns = namespace(celsius_temps=[])
            %}\n        {% for sensor in temp_sensors %}\n          {% set temp =
            sensor.state | float %}\n          {% set unit = sensor.attributes.unit_of_measurement
            %}\n          {% if unit == '°F' %}\n            {% set celsius_temp =
            (temp - 32) * 5/9 %}\n          {% else %}\n            {% set celsius_temp
            = temp %}\n          {% endif %}\n          {% set ns.celsius_temps =
            ns.celsius_temps + [celsius_temp] %}\n        {% endfor %}\n        \n
            \       {% set avg_temp = ns.celsius_temps | average %}\n        \n        \n
            \       {% set avg_humidity = humidity_sensors \n            | map(attribute='state')
            \n            | map('float', 0) \n            | average %}\n      \n        {#
            Calculate saturation vapor pressure using Antoine equation #}\n        {%
            set svp = 0.61078 * (10 ** ((7.5 * avg_temp) / (237.3 + avg_temp))) %}\n
            \       \n        {# Calculate actual vapor pressure #}\n        {% set
            avp = svp * (avg_humidity / 100) %}\n      \n        {# Calculate VPD
            in kPa #}\n        {% set vpd = svp - avp %}\n        \n        {{ vpd
            | round(2) }}\n      {% else %}\n        unavailable\n      {% endif %}\n
            \   \"\n  } | to_json\n}}\n"
        enabled: true
      for_each: '{{ label_areas(''Type: Shoot Zone'') }}'
  - repeat:
      sequence:
      - variables:
          area_id: '{{ repeat.item }}'
          area: '{{ area_name(repeat.item) }}'
          ha_topic: homeassistant
          device_topic: tracked_area/{{ area_id }}
      - action: mqtt.publish
        data:
          topic: '{{ ha_topic }}/number/{{ area_id }}_tracked_psi/config'
          retain: true
          payload: "{{ \n  { \"~\": device_topic,\n    \"dev\": {\n      \"ids\":
            [ area_id ],\n      \"name\": area ,\n      \"manufacturer\": \"Tracked
            Area\",\n      \"suggested_area\": area\n    },\n    \"name\": \"Tracked
            PSI\",\n    \"device_class\": \"pressure\",\n    \"unit_of_measurement\":
            \"PSI\",\n    \"uniq_id\": area_id~\"_tracked_psi\",\n    \"object_id\":
            area_id~\"_tracked_psi\",\n    \"retain\": true,\n    \"expire_after\":
            60,\n    \"state_class\": \"total_increasing\",\n    \"cmd_t\": \"~/tracked_psi\",\n
            \   \"stat_t\": \"~/tracked_psi\",\n    \"initial\": 0,\n    \"optimistic\":
            true,\n    \"min\": 0,\n    \"max\": 2000,\n    \"step\": 0.10,\n    \"mode\":
            \"box\",\n    \"suggested_display_precision\": \"2\"\n  } | to_json\n}}\n"
        enabled: true
      - action: mqtt.publish
        data:
          topic: '{{ device_topic~"/tracked_psi" }}'
          retain: true
          payload: '0'
        enabled: false
      for_each: '{{ label_areas(''Type: Root Zone'') }}'
    enabled: true
  alias: 'Area Types: Initalize Helpers'
  description: ''
  icon: mdi:chart-bell-curve-cumulative
  fields: {}
send_alert:
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ alert_severity in [ ''low'', ''medium'', ''high'' ] }} '
      sequence:
      - data:
          title: '{{ alert_title }}'
          message: 'Alert: {{ alert_message }}'
          notification_id: low_alert_{{ alert_title.replace('.', '_').replace(' ',
            '_') }}
        action: persistent_notification.create
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ alert_severity in [ ''high'', ''medium'' ]  }}'
      sequence:
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ alert_message }}'
          title: '{{ alert_title }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ alert_severity in [ ''high'' ]  }}'
      sequence:
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: 'URGENT: {{ alert_message }}'
          title: '{{ alert_title }}'
          data:
            priority: high
            channel: urgent_alerts
      - action: script.high_severity_alert_handler
        data:
          title: '{{ alert_title }}'
          message: '{{ alert_message }}'
        enabled: false
  fields:
    alert_title:
      selector:
        text:
      name: Alert Title
      description: The title to use for the alert.
      default: Change the alert_title
    alert_message:
      selector:
        text:
      name: Alert Message
      description: Alert message to send
      default: Change the alert_message
    alert_severity:
      selector:
        select:
          options:
          - low
          - medium
          - high
      name: Alert Severity
      default: low
  alias: Send Alert
  description: Sends alerts with different notification methods based on severity
    level
init_plant_sensors:
  alias: 'Plant Sensors: Create Plant'
  description: Dynamically create plant monitoring sensors via MQTT discovery
  mode: queued
  max: 10
  fields:
    plants_to_create:
      name: Number of Plants
      description: How many plant sensors to create
      default: 1
      selector:
        number:
          min: 1
          max: 100
    variety:
      name: Plant Variety
      description: Plant variety/type
      default: plant
      selector:
        text:
    source:
      name: Source
      description: Where the plant came from
      selector:
        text:
    started_at:
      name: Started Date/Time
      description: When the plant was planted (defaults to now)
      selector:
        datetime:
    starting_id:
      name: Starting ID Override
      description: Optional override for the starting plant ID number
      selector:
        number:
          min: 0
          max: 10000
  sequence:
  - variables:
      ha_topic: homeassistant
      counter_topic: plants/next_plant_id
      current_id: "{% if starting_id is defined and starting_id is not none %}\n  {{
        starting_id | int }}\n{% elif states('number.next_plant_id') not in ['unknown',
        'unavailable', 'none'] %}\n  {{ states('number.next_plant_id') | int }}\n{%
        else %}\n  0\n{% endif %}\n"
      needs_counter_creation: "{{ states('number.next_plant_id') in ['unknown', 'unavailable',
        'none'] \n    and (starting_id is not defined or starting_id is none) }}\n"
      started_at: '{{ started_at if (started_at is defined and started_at is not none)
        else now().isoformat() }}'
  - if:
    - condition: template
      value_template: '{{ needs_counter_creation }}'
    then:
    - data:
        topic: '{{ ha_topic }}/number/plant_tracking/next_plant_id/config'
        retain: true
        payload: "{\n  \"name\": \"Next Plant ID\",\n  \"unique_id\": \"next_plant_id_counter\",\n
          \ \"object_id\": \"next_plant_id\",\n  \"state_topic\": \"{{ counter_topic
          }}\",\n  \"command_topic\": \"{{ counter_topic }}\",\n  \"min\": 0,\n  \"max\":
          100000,\n  \"step\": 1,\n  \"mode\": \"box\",\n  \"retain\": true,\n  \"device\":
          {\n    \"identifiers\": [\"plant_tracking\"],\n    \"name\": \"Plant Tracking\",\n
          \   \"manufacturer\": \"Curated Forest\"\n  }\n}\n"
      action: mqtt.publish
    - data:
        topic: '{{ counter_topic }}'
        retain: true
        payload: '0'
      action: mqtt.publish
    - delay:
        milliseconds: 500
  - repeat:
      count: '{{ plants_to_create | int }}'
      sequence:
      - variables:
          plant_number: '{{ current_id | int + repeat.index - 1 }}'
          plant_id: '{{ variety | default(''plant'') | lower | replace('' '', ''_'')
            }}_{{ plant_number }}'
          device_name: plant_id_{{ plant_id }}
          plant_topic: plants/{{ plant_id }}
      - data:
          topic: '{{ ha_topic }}/sensor/{{ device_name }}/status/config'
          retain: true
          payload: "{{ {\n  \"name\": \"Growing For\",\n  \"unique_id\": device_name
            ~ \"_grow_days\",\n  \"default_entity_id\": \"sensor.\" ~ device_name,\n
            \ \"state_topic\": \"plants/update_every_hour\",\n  \"value_template\":
            \"{{ ((as_timestamp(now()) - as_timestamp(state_attr('sensor.\" ~ device_name
            ~ \"', 'started_at') | default(now(), true))) / 3600 / 24) | round(1)
            }}\",\n  \"unit_of_measurement\": \"d\",\n  \"device_class\": \"duration\",\n
            \ \"state_class\": \"measurement\",\n  \"json_attributes_topic\": plant_topic
            ~ \"/attributes\",\n  \"device\": {\n    \"identifiers\": [device_name],\n
            \   \"name\": variety | default('Plant') ~ ' #' ~ plant_number,\n    \"manufacturer\":
            \"Curated Forest\",\n    \"model\": \"Plant Tracking\"\n  }\n} | to_json
            }}\n"
        action: mqtt.publish
      - data:
          topic: '{{ plant_topic }}/attributes'
          retain: true
          payload: "{{ {\n  'location_entity_id': '',\n  'record_entity_id': \"sensor.\"
            ~ device_name ~ \"_records\",\n  'plant_id': plant_id,\n  'variety': variety
            | default(''),\n  'source': source | default(''),\n  'started_at': started_at\n}
            | to_json }}\n"
        action: mqtt.publish
      - data:
          topic: '{{ ha_topic }}/sensor/{{ device_name }}_records/status/config'
          retain: true
          payload: "{{ {\n  \"name\": \"Records\",\n  \"unique_id\": device_name ~
            \"_records\",\n  \"default_entity_id\": \"sensor.\" ~ device_name ~ \"_records\",\n
            \ \"state_topic\": plant_topic ~ \"/records_count\",\n  \"command_topic\":
            plant_topic ~ \"/records_count\",\n  \"state_class\": \"measurement\",\n
            \ \"json_attributes_topic\": plant_topic ~ \"/records_attributes\",\n
            \ \"values_template\": \"{{ value | float(0) }}\",\n  \"device\": {\n
            \   \"identifiers\": [device_name],\n    \"name\": variety | default('Plant')
            ~ ' #' ~ plant_number,\n    \"manufacturer\": \"Curated Forest\",\n    \"model\":
            \"Plant Tracking Records\"\n  }\n} | to_json }}\n"
        action: mqtt.publish
      - delay:
          milliseconds: 500
      - if:
        - condition: template
          value_template: '{{ states(''sensor.'' ~ plant_id ~ ''_records'') in [''unknown'',
            ''unavailable'',

            ''none''] }}

            '
        then:
        - data:
            topic: '{{ plant_topic }}/records_attributes'
            retain: true
            payload: "{{ {\n  'record_id': 1,\n  'timestamp': started_at,\n  'quantity':
              1.0,\n  'type': 'Planted',\n  'notes': variety\n} | to_json }}\n"
          action: mqtt.publish
        - data:
            topic: '{{ plant_topic }}/records_count'
            retain: true
            payload: 1
          action: mqtt.publish
      - data:
          topic: '{{ counter_topic }}'
          retain: true
          payload: '{{ plant_number | int + 1 }}'
        action: mqtt.publish
      - delay:
          milliseconds: 200
  - data:
      topic: plants/update_every_hour
      retain: true
      payload: '{{ plants_to_create }}'
    action: mqtt.publish
  - data:
      title: Plant Sensors Created
      message: 'Created {{ plants_to_create }} plant sensor(s). Variety: {{ variety
        | default(''N/A'') }} Starting ID: {{ current_id }} Ending ID: {{ current_id
        | int + plants_to_create | int - 1 }}'
    action: persistent_notification.create
sensors_location_create_location:
  sequence:
  - variables:
      ha_topic: homeassistant
      counter_topic: locations/next_location_id
      current_id: >
        {% if starting_id is defined and starting_id is not none %}
          {{ starting_id | int }}
        {% elif states('number.next_location_id') not in ['unknown', 'unavailable',
        'none'] %}
          {{ states('number.next_location_id') | int }}
        {% else %}
          0
        {% endif %}
      needs_counter_creation: |
        {{ states('number.next_location_id') in ['unknown', 'unavailable', 'none'] 
            and (starting_id is not defined or starting_id is none) }}
  - if:
      - condition: template
        value_template: "{{ needs_counter_creation }}"
    then:
      - data:
          topic: "{{ ha_topic }}/number/location_tracking/next_location_id/config"
          retain: true
          payload: |
            {
              "name": "Next Location ID",
              "unique_id": "next_location_id_counter",
              "object_id": "next_location_id",
              "state_topic": "{{ counter_topic }}",
              "command_topic": "{{ counter_topic }}",
              "min": 0,
              "max": 100000,
              "step": 1,
              "mode": "box",
              "retain": true,
              "device": {
                "identifiers": ["location_tracking"],
                "name": "Location Tracking",
                "manufacturer": "Curated Forest"
              }
            }
        action: mqtt.publish
      - data:
          topic: "{{ counter_topic }}"
          retain: true
          payload: "0"
        action: mqtt.publish
      - delay:
          milliseconds: 500
  - repeat:
      count: "{{ locations_to_create | int }}"
      sequence:
        - variables:
            location_number: "{{ current_id | int + repeat.index - 1 }}"
            location_id: >-
              {{ location_name | default('location') | lower | replace(' ', '_') }}_{{
              location_number }}
            device_name: location_id_{{ location_id }}
            location_topic: locations/{{ location_id }}
        - data:
            topic: "{{ ha_topic }}/switch/{{ device_name }}/usable/config"
            retain: true
            payload: |
              {{ {
                "name": "Usable",
                "unique_id": device_name ~ "_usable",
                "object_id": device_name,
                "state_topic": location_topic ~ "/usable",
                "command_topic": location_topic ~ "/usable/set",
                "payload_on": "true",
                "payload_off": "false",
                "state_on": "true",
                "state_off": "false",
                "retain": true,
                "json_attributes_topic": location_topic ~ "/attributes",
                "device": {
                  "identifiers": [device_name],
                  "name": location_name | default('Location') ~ ' #' ~ location_number,
                  "manufacturer": "Curated Forest",
                  "model": "Location Tracking"
                }
              } | to_json }}
          action: mqtt.publish
        - data:
            topic: "{{ location_topic }}/usable"
            retain: true
            payload: "true"
          action: mqtt.publish
        - data:
            topic: "{{ location_topic }}/attributes"
            retain: true
            payload: |
              {{ {
                'location_id': location_id,
                'location_name': location_name | default(''),
                'root_zone': root_zone | default(''),
                'shoot_zone': shoot_zone | default(''),
                'water_supply': water_supply | default('')
              } | to_json }}
          action: mqtt.publish
        - delay:
            milliseconds: 200
  - data:
      title: Location Sensors Created
      message: >-
        Created {{ locations_to_create }} location sensor(s). Starting ID: {{ current_id }} Ending ID: {{ current_id
        | int + locations_to_create | int - 1 }}
    action: persistent_notification.create
  alias: 'Sensors (Location): Create Location'
  description: Dynamically create location monitoring sensors via MQTT discovery
feature_leader:
  alias: Feature Leader
  mode: parallel
  max: 25
  fields:
    leader_entity_id:
      name: Leader Entity ID
      description: The labeled leader entity that changed state
      required: true
      selector:
        entity: {}
    current_value:
      name: Current Value
      description: The current state value of the leader entity. Defaults to states(leader_entity_id)
        if not passed.
      required: false
      default: ''
      selector:
        text: {}
    previous_value:
      name: Previous Value
      description: The previous state value of the leader entity before the change.
      required: false
      default: ''
      selector:
        text: {}
    scope:
      name: Scope
      description: 'Override scope detection: area, floor, or none'
      required: false
      default: ''
      selector:
        select:
          options:
          - ''
          - area
          - floor
          - none
    area_id_override:
      name: Area ID Override
      description: Explicit area ID, skips label-based area resolution
      required: false
      default: ''
      selector:
        area: {}
    floor_id_override:
      name: Floor ID Override
      description: Explicit floor ID, skips label-based floor resolution
      required: false
      default: ''
      selector:
        floor: {}
  sequence:
  - variables:
labeled_feature_follower:
  alias: Labeled Feature Follower
  mode: parallel
  max: 50
  fields:
    follower_entity_id:
      name: Follower Entity ID
      description: The follower entity to act on
      required: true
      selector:
        entity: {}
    feature:
      name: Feature
      description: The feature name (e.g. 'night', 'screen')
      required: true
      selector:
        text: {}
    leader_entity_id:
      name: Leader Entity ID
      description: The leader that triggered this (optional, for reference)
      required: false
      default: ''
      selector:
        entity: {}
    leader_enabled:
      name: Leader Enabled
      description: Post-evaluated leader enabled boolean, passed from the automation
      required: true
      selector:
        boolean: {}
  sequence:
  - variables:
      feature_name: '{{ feature | lower }}'
      follower_label_names_original: "{{ labels(follower_entity_id)\n   | map('label_name')\n
        \  | reject('none')\n   | list }}\n"
      follower_label_names: "{{ labels(follower_entity_id)\n   | map('label_name')\n
        \  | reject('none')\n   | map('lower')\n   | list }}\n"
      follower_domain: '{{ follower_entity_id.split(''.'')[0] }}'
  - variables:
      follower_inverted: '{{ (feature_name + '' invert: true'') in follower_label_names
        }}

        '
      follower_enabled: '{{ (not leader_enabled) if follower_inverted else leader_enabled
        }}

        '
  - variables:
      follower_only: "{% set only_label = feature_name + ' only: ' %} {% set match
        = follower_label_names\n               | select('match', '^' + only_label
        + '(enable|disable)$')\n               | first | default('') %}\n{{ match
        | regex_replace('^.+: ', '') }}\n"
      follower_before_time: "{% set pfx = feature_name + ' before: ' %} {{ follower_label_names_original\n
        \  | select('match', '(?i)^' + pfx + '.+')\n   | first | default('')\n   |
        regex_replace('(?i)^.+: ', '') }}\n"
      follower_after_time: "{% set pfx = feature_name + ' after: ' %} {{ follower_label_names_original\n
        \  | select('match', '(?i)^' + pfx + '.+')\n   | first | default('')\n   |
        regex_replace('(?i)^.+: ', '') }}\n"
      follower_not_before_time: "{% set pfx = feature_name + ' not before: ' %} {{
        follower_label_names_original\n   | select('match', '(?i)^' + pfx + '.+')\n
        \  | first | default('')\n   | regex_replace('(?i)^.+: ', '') }}\n"
      follower_not_after_time: "{% set pfx = feature_name + ' not after: ' %} {{ follower_label_names_original\n
        \  | select('match', '(?i)^' + pfx + '.+')\n   | first | default('')\n   |
        regex_replace('(?i)^.+: ', '') }}\n"
      follower_time_ok: "{% set now_time = now().strftime('%H:%M') %} {% set ok =
        true %} {% if follower_before_time != '' %}\n  {% set ok = ok and now_time
        < follower_before_time %}\n{% endif %} {% if follower_after_time != '' %}\n
        \ {% set ok = ok and now_time > follower_after_time %}\n{% endif %} {% if
        follower_not_before_time != '' %}\n  {% set ok = ok and now_time >= follower_not_before_time
        %}\n{% endif %} {% if follower_not_after_time != '' %}\n  {% set ok = ok and
        now_time <= follower_not_after_time %}\n{% endif %} {{ ok }}\n"
      follower_should_act: '{% if follower_only == ''enable'' and not leader_enabled
        %} false {% elif follower_only == ''disable'' and leader_enabled %} false
        {% elif not follower_time_ok %} false {% else %} true {% endif %}

        '
  - condition: template
    value_template: '{{ follower_should_act }}'
  - variables:
      follower_enable_select_value: "{% set pfx = feature_name + ' enable select:
        ' %} {{ follower_label_names_original\n   | select('match', '(?i)^' + pfx
        + '.+')\n   | first | default('')\n   | regex_replace('(?i)^.+: ', '') }}\n"
      follower_disable_select_value: "{% set pfx = feature_name + ' disable select:
        ' %} {{ follower_label_names_original\n   | select('match', '(?i)^' + pfx
        + '.+')\n   | first | default('')\n   | regex_replace('(?i)^.+: ', '') }}\n"
      follower_select_target_value: "{% if leader_enabled and follower_enable_select_value
        != '' %}\n  {{ follower_enable_select_value }}\n{% elif not leader_enabled
        and follower_disable_select_value != '' %}\n  {{ follower_disable_select_value
        }}\n{% else %}\n  {{ '' }}\n{% endif %}\n"
      follower_value_label: "{% set pfx = feature_name + (' enable: ' if follower_enabled
        else ' disable: ') %} {% set match = follower_label_names_original\n               |
        select('match', '(?i)^' + pfx + '.+')\n               | first | default('')
        %}\n{{ match | regex_replace('(?i)^.+: ', '') }}\n"
      follower_script: "{% set pfx = feature_name + ' script: ' %} {{ follower_label_names_original\n
        \  | select('match', '(?i)^' + pfx + 'script\\..+')\n   | first | default('')\n
        \  | regex_replace('(?i)^.+: ', '') }}\n"
  - if:
    - condition: template
      value_template: '{{ follower_script != '''' }}'
    then:
    - action: '{{ follower_script }}'
      data:
        follower_entity_id: '{{ follower_entity_id }}'
        feature: '{{ feature }}'
        leader_entity_id: '{{ leader_entity_id }}'
        enabled: '{{ follower_enabled }}'
    else:
    - if:
      - condition: template
        value_template: '{{ follower_select_target_value != '''' }}'
      then:
      - condition: template
        value_template: '{{ states(follower_entity_id) != follower_select_target_value
          }}

          '
      - if:
        - condition: template
          value_template: '{{ follower_domain == ''select'' }}'
        then:
        - action: select.select_option
          data:
            entity_id: '{{ follower_entity_id }}'
            option: '{{ follower_select_target_value }}'
      - if:
        - condition: template
          value_template: '{{ follower_domain == ''input_select'' }}'
        then:
        - action: input_select.select_option
          data:
            entity_id: '{{ follower_entity_id }}'
            option: '{{ follower_select_target_value }}'
      - if:
        - condition: template
          value_template: '{{ follower_domain == ''number'' }}'
        then:
        - action: number.set_value
          data:
            entity_id: '{{ follower_entity_id }}'
            value: '{{ follower_select_target_value }}'
      - if:
        - condition: template
          value_template: '{{ follower_domain == ''input_number'' }}'
        then:
        - action: input_number.set_value
          data:
            entity_id: '{{ follower_entity_id }}'
            value: '{{ follower_select_target_value }}'
      - if:
        - condition: template
          value_template: '{{ follower_domain == ''text'' }}'
        then:
        - action: text.set_value
          data:
            entity_id: '{{ follower_entity_id }}'
            value: '{{ follower_select_target_value }}'
      - if:
        - condition: template
          value_template: '{{ follower_domain == ''input_text'' }}'
        then:
        - action: input_text.set_value
          data:
            entity_id: '{{ follower_entity_id }}'
            value: '{{ follower_select_target_value }}'
      else:
      - if:
        - condition: template
          value_template: '{{ follower_domain == ''light'' }}'
        then:
        - condition: template
          value_template: "{{ states(follower_entity_id) | lower not in\n   (['on']
            if follower_enabled else ['off']) }}\n"
        - action: 'light.turn_{{ ''on'' if follower_enabled else ''off'' }}

            '
          data:
            entity_id: '{{ follower_entity_id }}'
      - if:
        - condition: template
          value_template: '{{ follower_domain in [''switch'', ''input_boolean''] }}

            '
        then:
        - condition: template
          value_template: "{{ states(follower_entity_id) | lower not in\n   (['on']
            if follower_enabled else ['off']) }}\n"
        - action: '{{ follower_domain }}.turn_{{ ''on'' if follower_enabled else ''off''
            }}

            '
          data:
            entity_id: '{{ follower_entity_id }}'
      - if:
        - condition: template
          value_template: '{{ follower_domain == ''media_player'' }}'
        then:
        - variables:
            mp_supported: '{{ state_attr(follower_entity_id, ''supported_features'')
              | int(0) }}

              '
            mp_supports_on_off: '{{ mp_supported | bitwise_and(128) > 0 }}

              '
            mp_supports_mute: '{{ mp_supported | bitwise_and(4) > 0 }}

              '
        - if:
          - condition: template
            value_template: '{{ mp_supports_on_off }}'
          then:
          - condition: template
            value_template: "{{ states(follower_entity_id) | lower not in\n   (['on',
              'playing', 'idle', 'paused', 'buffering']\n    if follower_enabled else
              ['off', 'unavailable', 'standby']) }}\n"
          - action: 'media_player.turn_{{ ''on'' if follower_enabled else ''off''
              }}

              '
            data:
              entity_id: '{{ follower_entity_id }}'
          else:
          - if:
            - condition: template
              value_template: '{{ mp_supports_mute }}'
            then:
            - condition: template
              value_template: "{{ state_attr(follower_entity_id, 'is_volume_muted')\n
                \  != (not follower_enabled) }}\n"
            - action: media_player.volume_mute
              data:
                entity_id: '{{ follower_entity_id }}'
                is_volume_muted: '{{ not follower_enabled }}'
      - if:
        - condition: template
          value_template: "{{ follower_domain not in ['light', 'switch', 'input_boolean',\n
            \  'media_player', 'number', 'input_number', 'text',\n   'input_text',
            'select', 'input_select'] }}\n"
        then:
        - condition: template
          value_template: "{{ states(follower_entity_id) | lower not in\n   (['on',
            'true', 'home', 'open', 'detected', 'active', 'unlocked']\n    if follower_enabled
            else\n    ['off', 'false', 'away', 'closed', 'clear', 'inactive', 'locked'])
            }}\n"
        - action: 'homeassistant.turn_{{ ''on'' if follower_enabled else ''off'' }}

            '
          data:
            entity_id: '{{ follower_entity_id }}'
