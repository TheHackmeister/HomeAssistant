        - action: script.turn_on
          target:
            entity_id: '{{ follower_disable_script | trim }}'
          data:
            variables: >
              {{ _disable_script_std_fields | combine(_disable_script_valid_args) }}
  # 3. Direct value OR Default Script (value wins; default script only if no value found)
  - if:
    - condition: template
      value_template: '{{ follower_target_value != "" }}'
    then:
    - condition: template
      value_template: '{{ states(follower_entity_id) != follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''select'' }}'
      then:
      - action: select.select_option
        target:
          entity_id: '{{ follower_entity_id }}'
        data:
          option: '{{ follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''input_select'' }}'
      then:
      - action: input_select.select_option
        target:
          entity_id: '{{ follower_entity_id }}'
        data:
          option: '{{ follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''number'' }}'
      then:
      - action: number.set_value
        target:
          entity_id: '{{ follower_entity_id }}'
        data:
          value: '{{ follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''input_number'' }}'
      then:
      - action: input_number.set_value
        target:
          entity_id: '{{ follower_entity_id }}'
        data:
          value: '{{ follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''text'' }}'
      then:
      - action: text.set_value
        target:
          entity_id: '{{ follower_entity_id }}'
        data:
          value: '{{ follower_target_value }}'
    - if:
      - condition: template
        value_template: '{{ follower_domain == ''input_text'' }}'
      then:
      - action: input_text.set_value
        target:
          entity_id: '{{ follower_entity_id }}'
        data:
          value: '{{ follower_target_value }}'
    else:
    # 4. Default Script (only when no direct value label was found)
    - if:
      - condition: template
        value_template: '{{ follower_default_script | trim != "" }}'
      then:
        - if:
          - condition: template
            value_template: '{{ follower_default_script.startswith(''automation.'')
              or follower_default_script.startswith(''scene.'') }}'
          then:
          - action: '{{ follower_default_script | trim }}'
            data: {}
          else:
          - choose:
            # No Arg labels: synchronous call preserving continue_on_error / error propagation
            - conditions:
              - condition: template
                value_template: '{{ _default_script_args | length == 0 }}'
              sequence:
              - if:
                - condition: template
                  value_template: '{{ follower_error_mode != ''stop'' }}'
                then:
                - action: '{{ follower_default_script | trim }}'
                  data: >
                    {{ _default_script_std_fields }}
                  continue_on_error: true
                - if:
                  - condition: template
                    value_template: '{{ error is defined }}'
                  then:
                  - if:
                    - condition: template
                      value_template: '{{ follower_error_mode == ''log'' }}'
                    then:
                    - action: system_log.write
                      data:
                        level: error
                        message: 'Labeled Feature Follower: error calling default script
                          {{ follower_default_script }} for {{ follower_entity_id }} (feature:
                          {{ feature_name }}): {{ error }}'
                  - if:
                    - condition: template
                      value_template: '{{ follower_error_mode == ''alert'' }}'
                    then:
                    - action: script.send_alert
                      data:
                        alert_severity: high
                        alert_title: Labeled Feature Script Error
                        alert_message: 'Error calling default script for {{ follower_entity_id
                          }} (feature: {{ feature_name }}): {{ error }}'
                else:
                - action: '{{ follower_default_script | trim }}'
                  data: >
                    {{ _default_script_std_fields }}
            # Arg labels present: async call — 3.1 validate, 3.2 pass std+valid args
