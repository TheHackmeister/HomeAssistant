      metadata: {}
      data:
        level: error
        message: 'Could not find swimlane: {{ swimlane_name }}'
    - stop: ''
  - action: rest_command.get_board_lists
    metadata: {}
    data:
      boardId: '{{ boardId }}'
    response_variable: all_lists
  - action: rest_command.get_cards_from_swimlane
    metadata: {}
    data:
      swimlaneId: '{{ today_swimlaneId }}'
      boardId: '{{ boardId }}'
    response_variable: today_cards
  - if:
    - condition: template
      value_template: '{{ today_cards.content | count == 0 }}'
    then:
    - action: persistent_notification.create
      metadata: {}
      data:
        message: No cards found in {{ swimlane_name }} swimlane
    - stop: ''
  - repeat:
      sequence:
      - variables:
          card_list_match: '{{ all_lists.content | selectattr(''_id'', ''eq'', repeat.item.listId)
            | list }}

            '
          card_list_title: '{{ card_list_match[0].title if card_list_match | length
            > 0 else '''' }}

            '
      - if:
        - condition: template
          value_template: '{{ card_list_title == "Inbox/Reset" }}'
        then:
        - action: rest_command.get_card
          metadata: {}
          data:
            boardId: '{{ boardId }}'
            listId: '{{ repeat.item.listId }}'
            cardId: '{{ repeat.item._id }}'
          response_variable: full_card_details
        - action: system_log.write
          metadata: {}
          data:
            level: info
            message: 'get_card response status: {{ full_card_details.status }}, has
              content: {{ full_card_details.content is defined }}'
        - action: system_log.write
          metadata: {}
          data:
            level: debug
            message: 'Full card response: {{ full_card_details }}'
        - variables:
            card_label_ids: '{{ full_card_details.content.get(''labelIds'', []) if
              full_card_details.content.get(''labelIds'') is not none else [] }}'
        - if:
          - condition: template
            value_template: "{{ card_label_ids | length == 0 and\n   (full_card_details.content.dueAt
              is defined and full_card_details.content.dueAt != None and as_datetime(full_card_details.content.dueAt)
              < now()) }}\n"
          then:
          - action: system_log.write
            metadata: {}
            data:
              level: info
              message: 'Archiving past-due unlabeled card: {{ repeat.item.title }}'
          - action: system_log.write
            metadata: {}
            data:
              level: info
              message: 'Attempting to archive: cardId={{ repeat.item._id }}, listId={{
                repeat.item.listId }}, title={{ repeat.item.title }}'
          - action: system_log.write
            metadata: {}
            data:
              level: info
              message: Full card details - cardId={{ full_card_details.content._id
                }}, listId={{ full_card_details.content.listId }}, swimlaneId={{ full_card_details.content.swimlaneId
                }}
          - action: system_log.write
            metadata: {}
            data:
              level: info
              message: 'Archive URL will be: https://wekan.spencerslab.com/api/boards/{{
                boardId }}/lists/{{ full_card_details.content.listId }}/cards/{{ repeat.item._id
                }}'
          - action: rest_command.archive_card
            metadata: {}
            data:
              cardId: '{{ repeat.item._id }}'
              listId: '{{ full_card_details.content.listId }}'
              boardId: '{{ boardId }}'
            response_variable: archive_result
          - action: system_log.write
            metadata: {}
            data:
              level: info
              message: 'Archive result (with listId in payload): {{ archive_result
                }}'
          else:
          - action: system_log.write
            metadata: {}
            data:
              level: debug
              message: 'Skipping card "{{ repeat.item.title }}": has {{ card_label_ids
                | length }} labels or not past due'
      for_each: '{{ today_cards.content }}'
  alias: 'Boards: Archive Past Unlabeled Tasks'
  description: Archives cards with no labels and past due dates from Today Inbox (FIXED
    - fetches full card details)
  fields:
    boardId:
      selector:
        text:
      name: boardId
      description: Board ID
      default: TrfngHQf8PWj9mnqC
      required: false
    swimlane_name:
      selector:
        text:
      name: Swimlane Name
      description: Name of the swimlane to check
      default: Today
      required: true
