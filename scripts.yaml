  # ── Pre Script chain dispatch (Follower) ───────────────────────────
  # Runs before the existing main flow (script chain / target-value /
  # toggle / direct domain action). Each entry in pre_script_chain is
  # dispatched in order. Errors are routed through
  # `script.labeled_feature_error_mode`. If error_mode == 'stop' on any
  # entry, the main + post phases are skipped via `_phase_pre_failed`.
  - variables:
      _phase_pre_failed: false
      _follower_std_fields_base: >-
        {{ {'follower_entity_id': follower_entity_id,
            'feature': feature,
            'leader_entity_id': leader_entity_id,
            'leader_enabled': leader_enabled,
            'scope': scope,
            'scope_id': scope_id,
            'toggle': (toggle | default(false)),
            'error_mode': follower_error_mode} }}
  - repeat:
      for_each: '{{ pre_script_chain }}'
      sequence:
      - variables:
          _ps_ref: '{{ repeat.item }}'
          _ps_idx: '{{ repeat.index }}'
          _ps_std: '{{ _follower_std_fields_base | combine({"phase": "pre"}) }}'
      - if:
        - condition: template
          value_template: '{{ _ps_ref.startswith("automation.") or _ps_ref.startswith("scene.") }}'
        then:
        - action: '{{ _ps_ref }}'
          data: {}
          continue_on_error: true
        else:
        - action: '{{ _ps_ref }}'
          data: '{{ _ps_std }}'
          continue_on_error: true
      - if:
        - condition: template
          value_template: '{{ error is defined }}'
        then:
        - if:
          - condition: template
            value_template: '{{ follower_error_mode == "log" }}'
          then:
          - action: system_log.write
            data:
              level: error
              message: 'Labeled Feature Follower: Pre Script error {{ _ps_ref }} ({{ follower_entity_id }}, feature: {{ feature_name }}, idx: {{ _ps_idx }}): {{ error }}'
        - if:
          - condition: template
            value_template: '{{ follower_error_mode == "alert" }}'
          then:
          - action: script.send_alert
            data:
              alert_severity: high
              alert_title: Labeled Feature Follower Pre Script Error
              alert_message: 'Pre Script {{ _ps_ref }} (idx {{ _ps_idx }}) error for {{ follower_entity_id }} (feature: {{ feature_name }}): {{ error }}'
        - if:
          - condition: template
            value_template: '{{ follower_error_mode == "stop" }}'
          then:
          - variables:
              _phase_pre_failed: true
          - stop: 'Labeled Feature Follower: Pre Script halted on {{ _ps_ref }} (feature: {{ feature_name }})'
            error: true
  - if:
    - condition: template
      value_template: '{{ not _phase_pre_failed and follower_enable_script | trim != "" and leader_enabled |
        bool }}'
    then:
    - if:
      - condition: template
        value_template: '{{ follower_enable_script.startswith(''automation.'') or
          follower_enable_script.startswith(''scene.'') }}'
      then:
      - action: '{{ follower_enable_script | trim }}'
        data: {}
      else:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ _enable_script_args | length == 0 }}'
          sequence:
          - if:
            - condition: template
              value_template: '{{ follower_error_mode != ''stop'' }}'
            then:
            - action: '{{ follower_enable_script | trim }}'
              data: '{{ _enable_script_std_fields }}

                '
              continue_on_error: true
            - if:
              - condition: template
                value_template: '{{ error is defined }}'
              then:
              - if:
                - condition: template
                  value_template: '{{ follower_error_mode == ''log'' }}'
                then:
                - action: system_log.write
                  data:
                    level: error
                    message: 'Labeled Feature Follower: error calling enable script
                      {{ follower_enable_script }} for {{ follower_entity_id }} (feature:
                      {{ feature_name }}): {{ error }}'
              - if:
                - condition: template
                  value_template: '{{ follower_error_mode == ''alert'' }}'
                then:
                - action: script.send_alert
