      state: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.home_score
        is defined %}{{ states.sensor.nhl_sensor.attributes.home_score }}{%- endif %}'
    - default_entity_id: sensor.house_home_count
      name: 'House: Home Count'
      state: '{{ dict((states.person)|groupby(''state''))[''home'']|count }}'


