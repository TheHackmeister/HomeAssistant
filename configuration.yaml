python_script:

logger:
  logs:
    homeassistant.components.http.ban: warning
sensor:
  - platform: nhl_api
    team_abbrev: col

rest_command:
  healthchecksio:
    url: https://hc-ping.com/89ba143b-b5bc-4074-bf95-b0897ec23102
    method: GET
  get_board_swimlanes:
    url: https://wekan.spencerslab.com/api/boards/{{ boardId }}/swimlanes
    method: GET
    headers:
      Authorization: !secret wekan_api_token

  get_card:
    url: https://wekan.spencerslab.com/api/boards/{{ boardId }}/lists/{{ listId }}/cards/{{ cardId }}
    method: GET
    headers:
      Authorization: !secret wekan_api_token
  
  update_card_due_date:
    url: https://wekan.spencerslab.com/api/boards/{{ boardId }}/lists/{{ listId }}/cards/{{ cardId }}
    method: PUT
    payload: >
      {"dueAt": "{{ dueAt }}"}
    headers:
      Accept: application/json
      Content-Type: application/json
      Authorization: !secret wekan_api_token
  
  get_board:
    url: https://wekan.spencerslab.com/api/boards/{{ boardId }}
    method: GET
    headers:
      Authorization: !secret wekan_api_token
  archive_card:
    url: https://wekan.spencerslab.com/api/boards/{{ boardId }}/lists/{{ listId }}/cards/{{ cardId }}
    method: PUT  
    payload: '{"archive": "true", "listId": "{{ listId }}"}'
    headers:
      Accept: application/json
      Content-Type: application/json
      Authorization: !secret wekan_api_token

  get_cards_from_swimlane:
    url: https://wekan.spencerslab.com/api/boards/{{ boardId }}/swimlanes/{{ swimlaneId }}/cards
    method: GET
    headers: 
      Authorization: !secret wekan_api_token

  get_board_lists:
    url: https://wekan.spencerslab.com/api/boards/{{ boardId }}/lists
    method: GET
    headers:
      Authorization: !secret wekan_api_token

  move_card_to_swimlane:
    url: https://wekan.spencerslab.com/api/boards/{{ boardId }}/lists/{{ listId }}/cards/{{ cardId }}
    method: PUT
    payload: >
      {"swimlaneId": "{{ swimlaneId }}", "listId": "{{ newListId }}"}
    headers:
      Accept: application/json
      Content-Type: application/json
      Authorization: !secret wekan_api_token
shell_command:
  farm_to_manual_mode: 'echo "manual_mode" > /tmp/test.txt'
  farm_to_running_mode: 'echo "running_mode" > /tmp/test.txt'

