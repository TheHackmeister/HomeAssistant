# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:
#debugpy:
#wait: true

zha_toolkit:

# Text to speech
tts:
  - platform: picotts
    service_name: picotts_say
    #base_url: https://home.spencerslab.com
    language: "en-US"
    cache: false
notify:
  - platform: tts
    name: in_the_dining_room
    tts_service: tts.picotts_say
    media_player: media_player.dining_room_audio
  - platform: tts
    name: home_tts
    tts_service: tts.picotts_say
    media_player: media_player.home_tts
template:
  - sensor:
    - name: "Labeled Features State"
      unique_id: labeled_features_state
      state_class: measurement
      unit_of_measurement: leaders
      availability: >
        {{ label_entities('feature_leader') | count > 0 }}
      state: >
        {{ label_entities('feature_leader') | list | count }}
      attributes:
        last_updated_at: >
          {% set entities = expand(label_entities('feature_leader'))
              | sort(attribute='last_changed_timestamp')
              | rejectattr('state', 'in', ['unknown', 'unavailable'])
              | rejectattr('state', 'match', '.*_initial_press$')
              | list %}
          {% if entities | count > 0 %}
            {{ entities | last | attr('last_changed_timestamp') }}
          {% else %}
            {{ 0 }}
          {% endif %}
        leaders: >
          {% set entities = expand(label_entities('feature_leader'))
              | sort(attribute='last_changed_timestamp') %}
          {% set ns = namespace(result={}) %}
          {% for e in entities %}
            {% set cv_raw = e.attributes.event_type | default(e.state) if e.domain == 'event' else e.state %}
            {% set is_skip = cv_raw | regex_search('_initial_press$') or cv_raw | lower in ['unknown', 'unavailable'] %}
            {% set prev_l = this.attributes.get('leaders', {}).get(e.entity_id, {}) %}
            {% set cv = prev_l.get('current_value', cv_raw) if is_skip else cv_raw %}
            {% set cv_ts = prev_l.get('last_changed_timestamp', e.last_changed_timestamp) if is_skip else e.last_changed_timestamp %}
            {% set old_cv_l = prev_l.get('current_value', '') %}
            {% set old_pv_l = prev_l.get('previous_value', '') %}
            {% set prev_cv_l_raw = old_cv_l if cv != old_cv_l else old_pv_l %}
            {% set prev_cv_l = '' if prev_cv_l_raw | regex_search('_initial_press$') or prev_cv_l_raw | lower in ['unknown', 'unavailable'] else prev_cv_l_raw %}
            {% set labels = labels(e.entity_id)
                | map('label_name') | reject('none') | list %}
            {# Pre-check: if ALL features on this entity are direction-gated and none match,
               treat this update as a skip (carry over previous values, don't advance state).
               This mirrors the _initial_press / unknown / unavailable suppression pattern. #}
            {% set dir_ns = namespace(has_dir=false, any_dir_match=false, has_non_dir=false) %}
            {% for lbl in labels %}
              {% set fm = lbl | regex_replace('(?i)^(Area |Floor |)Leader: ', '') %}
              {% if fm != lbl %}
                {% set fn = fm %}
                {% set scope_pfx = 'Area ' if lbl | lower | regex_search('^area leader') else ('Floor ' if lbl | lower | regex_search('^floor leader') else '') %}
                {% set has_inc = (scope_pfx + fn + ' Increasing: True') in labels %}
                {% set has_dec = (scope_pfx + fn + ' Decreasing: True') in labels %}
                {% if has_inc or has_dec %}
                  {% set dir_ns.has_dir = true %}
                  {% set cur_n = cv | float(none) %}
                  {% set prev_n = prev_cv_l | float(none) %}
                  {% set mv = cur_n is not none and prev_n is not none %}
                  {% if (has_inc and mv and cur_n > prev_n) or (has_dec and mv and cur_n < prev_n) %}
                    {% set dir_ns.any_dir_match = true %}
                  {% endif %}
                {% else %}
                  {% set dir_ns.has_non_dir = true %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {# Skip if all features are direction-gated and none matched direction #}
            {% set is_skip = is_skip or (dir_ns.has_dir and not dir_ns.any_dir_match and not dir_ns.has_non_dir) %}
            {# Re-resolve cv/cv_ts after potential direction-based skip #}
            {% set cv = prev_l.get('current_value', cv_raw) if is_skip else cv_raw %}
            {% set cv_ts = prev_l.get('last_changed_timestamp', e.last_changed_timestamp) if is_skip else e.last_changed_timestamp %}
            {% set fns = namespace(features={}) %}
            {% for label in labels %}
              {% set feature_match = label
                  | regex_replace('(?i)^(Area |Floor |)Leader: ', '') %}
              {% if feature_match != label %}
                {% set fname = feature_match %}
                {% set scope = 'area' if label | lower | regex_search('^area leader') else
                               ('floor' if label | lower | regex_search('^floor leader') else 'none') %}
                {% set scope_pfx = 'Area ' if scope == 'area' else ('Floor ' if scope == 'floor' else '') %}
                {% set inc_lbl = (scope_pfx + fname + ' Increasing: True') in labels %}
                {% set dec_lbl = (scope_pfx + fname + ' Decreasing: True') in labels %}
                {% if inc_lbl or dec_lbl %}
                  {# Direction takes precedence over Enable/Disable labels #}
                  {% set cur_n  = cv  | float(none) %}
                  {% set prev_n = prev_cv_l | float(none) %}
                  {% set has_movement = cur_n is not none and prev_n is not none %}
                  {% set is_inc = has_movement and cur_n > prev_n %}
                  {% set is_dec = has_movement and cur_n < prev_n %}
                  {% set base_enabled = (inc_lbl and is_inc) or (dec_lbl and is_dec) %}
                {% else %}
                  {% set en_lbl = labels
                      | select('match', '^' + fname + ' Enable: .+')
                      | first | default('') %}
                  {% set dis_lbl = labels
                      | select('match', '^' + fname + ' Disable: .+')
                      | first | default('') %}
                  {% set en_val = en_lbl | regex_replace('^.+: ', '') %}
                  {% set dis_val = dis_lbl | regex_replace('^.+: ', '') %}
                  {% if en_val != '' or dis_val != '' %}
                    {% set by_en = en_val != '' and e.state == en_val %}
                    {% set by_dis = dis_val != '' and e.state == dis_val %}
                    {% if en_val != '' and dis_val != '' %}
                      {% set base_enabled = by_en and not by_dis %}
                    {% elif en_val != '' %}
                      {% set base_enabled = by_en %}
                    {% else %}
                      {% set base_enabled = not by_dis %}
                    {% endif %}
                  {% else %}
                    {% if e.domain in ['event', 'button'] %}
                      {% set base_enabled = true %}
                    {% else %}
                      {% set base_enabled = e.state | lower in
                          ['on', 'true', 'home', 'open', 'detected', 'active', 'unlocked'] %}
                    {% endif %}
                  {% endif %}
                {% endif %}
                {% set inverted = (fname + ' Invert: true') in labels %}
                {% set final_enabled = (not base_enabled) if inverted else base_enabled %}
                {% set fns.features = dict(fns.features, **{
                  fname: {'enabled': final_enabled, 'scope': scope}
                }) %}
              {% endif %}
            {% endfor %}
            {% set ns.result = dict(ns.result, **{
              e.entity_id: {
                'current_value': cv,
                'previous_value': prev_cv_l,
                'last_changed_timestamp': cv_ts,
                'features': fns.features
              }
            }) %}
          {% endfor %}
          {{ ns.result }}
        features: >
          {% set ns = namespace(result={}) %}
          {% for entity in expand(label_entities('feature_leader'))
              | sort(attribute='last_changed_timestamp') %}
            {% set cv_raw = entity.attributes.event_type | default(entity.state) if entity.domain == 'event' else entity.state %}
            {% set is_skip = cv_raw | regex_search('_initial_press$') or cv_raw | lower in ['unknown', 'unavailable'] %}
            {% set labels  = labels(entity.entity_id)
                | map('label_name') | reject('none') | list %}
            {# Pre-check: if ALL features on this entity are direction-gated and none match,
               treat this update as a skip (carry over previous values, don't advance state).
               This mirrors the _initial_press / unknown / unavailable suppression pattern. #}
            {% set dir_ns = namespace(has_dir=false, any_dir_match=false, has_non_dir=false) %}
            {% for lbl in labels %}
              {% set fm = lbl | regex_replace('(?i)^(Area |Floor |)Leader: ', '') %}
              {% if fm != lbl %}
                {% set fn = fm %}
                {% set scope_pfx = 'Area ' if lbl | lower | regex_search('^area leader') else ('Floor ' if lbl | lower | regex_search('^floor leader') else '') %}
                {% set has_inc = (scope_pfx + fn + ' Increasing: True') in labels %}
                {% set has_dec = (scope_pfx + fn + ' Decreasing: True') in labels %}
                {% if has_inc or has_dec %}
                  {% set dir_ns.has_dir = true %}
                  {% set prev_f_pre = this.attributes.get('features', {}).get(fn, {}) %}
                  {% set cur_val = prev_f_pre.get('value', entity.state) if is_skip else entity.state %}
                  {% set prev_val = prev_f_pre.get('previous_value', '') %}
                  {% set cur_n = cur_val | float(none) %}
                  {% set prev_n = prev_val | float(none) %}
                  {% set mv = cur_n is not none and prev_n is not none %}
                  {% if (has_inc and mv and cur_n > prev_n) or (has_dec and mv and cur_n < prev_n) %}
                    {% set dir_ns.any_dir_match = true %}
                  {% endif %}
                {% else %}
                  {% set dir_ns.has_non_dir = true %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {# Skip if all features are direction-gated and none matched direction #}
            {% set is_skip = is_skip or (dir_ns.has_dir and not dir_ns.any_dir_match and not dir_ns.has_non_dir) %}
            {% for label in labels %}
              {% set feature_match = label
                  | regex_replace('(?i)^(Area |Floor |)Leader: ', '') %}
              {% if feature_match != label %}
                {% set fname = feature_match %}
                {% set prev_f = this.attributes.get('features', {}).get(fname, {}) %}
                {% set scope_pfx = 'Area ' if label | lower | regex_search('^area leader') else ('Floor ' if label | lower | regex_search('^floor leader') else '') %}
                {% set inc_lbl = (scope_pfx + fname + ' Increasing: True') in labels %}
                {% set dec_lbl = (scope_pfx + fname + ' Decreasing: True') in labels %}
                {% if inc_lbl or dec_lbl %}
                  {# Direction takes precedence over Enable/Disable labels #}
                  {% set feat_value_cur = prev_f.get('value', entity.state) if is_skip else entity.state %}
                  {% set feat_value_prev = prev_f.get('previous_value', '') %}
                  {% set cur_n  = feat_value_cur  | float(none) %}
                  {% set prev_n = feat_value_prev | float(none) %}
                  {% set has_movement = cur_n is not none and prev_n is not none %}
                  {% set is_inc = has_movement and cur_n > prev_n %}
                  {% set is_dec = has_movement and cur_n < prev_n %}
                  {% set feat_enabled = (inc_lbl and is_inc) or (dec_lbl and is_dec) %}
                {% else %}
                  {% set en_lbl = labels
                      | select('match', '^' + fname + ' Enable: .+')
                      | first | default('') %}
                  {% set dis_lbl = labels
                      | select('match', '^' + fname + ' Disable: .+')
                      | first | default('') %}
                  {% set en_val  = en_lbl  | regex_replace('^.+: ', '') %}
                  {% set dis_val = dis_lbl | regex_replace('^.+: ', '') %}
                  {% if en_val != '' or dis_val != '' %}
                    {% set by_en  = en_val  != '' and entity.state == en_val %}
                    {% set by_dis = dis_val != '' and entity.state == dis_val %}
                    {% if en_val != '' and dis_val != '' %}
                      {% set feat_enabled = by_en and not by_dis %}
                    {% elif en_val != '' %}
                      {% set feat_enabled = by_en %}
                    {% else %}
                      {% set feat_enabled = not by_dis %}
                    {% endif %}
                  {% else %}
                    {% if entity.domain in ['event', 'button'] %}
                      {% set feat_enabled = true %}
                    {% else %}
                      {% set feat_enabled = entity.state | lower in
                          ['on', 'true', 'home', 'open', 'detected', 'active', 'unlocked'] %}
                    {% endif %}
                  {% endif %}
                {% endif %}
                {% set inverted = (fname + ' Invert: true') in labels %}
                {% set feat_enabled = (not feat_enabled) if inverted else feat_enabled %}
                {% set feat_value = prev_f.get('value', entity.state) if is_skip else entity.state %}
                {% set feat_ts = prev_f.get('timestamp', entity.last_changed_timestamp) if is_skip else entity.last_changed_timestamp %}
                {% set old_val_f = prev_f.get('value', '') %}
                {% set old_pv_f = prev_f.get('previous_value', '') %}
                {% set prev_val_f_raw = old_val_f if feat_value != old_val_f else old_pv_f %}
                {% set prev_val_f = '' if prev_val_f_raw | regex_search('_initial_press$') or prev_val_f_raw | lower in ['unknown', 'unavailable'] else prev_val_f_raw %}
                {% set ns.result = dict(ns.result, **{
                  fname: {
                    'leader_entity_id': entity.entity_id,
                    'value': feat_value,
                    'previous_value': prev_val_f,
                    'enabled': feat_enabled,
                    'timestamp': feat_ts
                  }
                }) %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {{ ns.result }}
 
    - default_entity_id: sensor.house_home_count
      name: 'House: Home Count'
      state: '{{ dict((states.person)|groupby(''state''))[''home'']|count }}'

    # TODO: Need to add labels for ignored entities and remove groups and the package_unavailable_entities.yaml.
    - unit_of_measurement: entities
      default_entity_id: sensor.unavailable_entities
      icon: '{{ ''mdi:check-circle'' if is_state(''sensor.unavailable_entities'',''0'')
        else ''mdi:alert-circle'' }}'
      attributes:
        entities: "{{ states|selectattr('state','in',['unavailable','unknown', 'nan'])|rejectattr('domain','eq','group')\n
          \   |rejectattr('entity_id','in',state_attr('group.ignored_entities','entity_id'))|rejectattr('domain',
          'in', 'button')|rejectattr('domain', 'in', 'event')|map(attribute='entity_id')|list
          }}"
        update_every_minute: '{{ now().minute }}'
      name: Unavailable Entities
      state: "{{ states|selectattr('state','in',['unavailable','unknown', 'nan'])|rejectattr('domain','eq','group')\n
        \ |rejectattr('entity_id','in',state_attr('group.ignored_entities','entity_id'))|rejectattr('domain',
        'in', 'event')|rejectattr('domain', 'in', 'button')|list|count }}"

    - default_entity_id: sensor.away_team
      picture: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.away_logo
        is defined %}{{ states.sensor.nhl_sensor.attributes.away_logo }}{%- endif %}'
      name: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.away_name
        is defined %}{{ states.sensor.nhl_sensor.attributes.away_name }}{%- endif %}'
      state: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.away_score
        is defined %}{{ states.sensor.nhl_sensor.attributes.away_score }}{%- endif %}'
    - default_entity_id: sensor.home_team
      picture: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.home_logo
        is defined %}{{ states.sensor.nhl_sensor.attributes.home_logo }}{%- endif %}'
      name: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.home_name
        is defined %}{{ states.sensor.nhl_sensor.attributes.home_name }}{%- endif %}'
      state: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.home_score
        is defined %}{{ states.sensor.nhl_sensor.attributes.home_score }}{%- endif %}'
    - default_entity_id: sensor.house_home_count
      name: 'House: Home Count'
      state: '{{ dict((states.person)|groupby(''state''))[''home'']|count }}'


  - light:
      - unique_id: scene_night_bathroom_main
        #friendly_name: "Scene Night (Bathroom Main)"
        #value_template: |-
        state: |-
          {% for entity_ids in state_attr('scene.night_bathroom_main', 'entity_id') %}
            {% if is_state(entity_ids, 'on') %}
              {% if loop.index == 1 %}
                true
              {% endif %}
            {% else %}
              false
            {% endif %}
          {% endfor %}
        turn_on:
          action: scene.turn_on
          target:
            entity_id: scene.night_bathroom_main
        turn_off:
          action: homeassistant.turn_off
          target:
            entity_id: "{{ state_attr('scene.night_bathroom_main', 'entity_id') }}"

