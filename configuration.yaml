# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:
#debugpy:
#wait: true

zha_toolkit:

# Text to speech
tts:
  - platform: picotts
    service_name: picotts_say
    #base_url: https://home.spencerslab.com
    language: "en-US"
    cache: false
notify:
  - platform: tts
    name: in_the_dining_room
    tts_service: tts.picotts_say
    media_player: media_player.dining_room_audio
  - platform: tts
    name: home_tts
    tts_service: tts.picotts_say
    media_player: media_player.home_tts
template:
  # ─────────────────────────────────────────────────────────────────────
  # sensor.labeled_feature_areas_state
  #
  # Source of truth for which (scope_id, label) pairs SHOULD have a
  # discovered MQTT entity published. Trigger-based so it re-evaluates
  # only on the registry mutations that can change the answer.
  #
  # State    : count of areas carrying the `feature_leader` label.
  # label_map: flat <scope_id>||<label> → {
  #              scope_id, label, scope, declaring_area_id, component,
  #              label_data: { scope, scope_id, component,
  #                            declaring_area_id }
  #            }
  #            The sensor owns ONLY the `(scope_id, label)` registry and
  #            the optional component hint
  #            (`Provides <Label> Component: <comp>` label; default
  #            `select`). It does NOT compute object_ids and does NOT
  #            know about specific features —
  #            `script.labeled_feature_area` is the single source of
  #            truth for canonical naming (`area_manifest_<scope>`,
  #            `<scope>_vpd`, etc.) and for generic features
  #            (`<component>.<scope>_<feature_slug>`).
  #            `automation.labeled_feature_areas` triggers directly on
  #            this attribute and diffs `from_state` vs `to_state` —
  #            no flattening required in the automation. The diff
  #            compares on `<scope_id>||<label>` plus `component` so a
  #            `Component:` override swap correctly retract+republishes.
  #
  # Built inline from the registry calls so there is no
  # `this.attributes.*` self-reference. (A previous iteration exposed
  # both a nested `scopes` attribute AND a flat `label_map` computed
  # from `this.attributes.scopes`. In HA template-sensor attribute
  # renders, `this` resolves to the entity's PREVIOUS state, so
  # `label_map` lagged `scopes` by one tick — removing a label bumped
  # `last_updated` but `label_map` didn't actually change, so the
  # automation silently missed the mutation. Keeping only `label_map`,
  # built inline, eliminates the trap.)
  #
  # Triggers mirror the registry events that used to fire the
  # automation directly. `homeassistant.start` ensures restored state
  # is reconciled against the live registry on boot.
  # ─────────────────────────────────────────────────────────────────────
  - trigger:
      - trigger: event
        event_type: label_registry_updated
      - trigger: event
        event_type: area_registry_updated
      - trigger: event
        event_type: floor_registry_updated
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Labeled Feature Areas State"
        unique_id: labeled_feature_areas_state
        state_class: measurement
        unit_of_measurement: areas
        state: >
          {{ label_areas('feature_leader') | list | count }}
        attributes:
          # `label_map` is the SINGLE attribute — a flat
          # <scope_id>||<label> → label_data view that the automation
          # diffs directly. Built inline here from the registry calls
          # so there is no `this.attributes.*` self-reference (which
          # would resolve to the entity's previous state in HA template-
          # sensor attribute renders and lag the real value by one tick).
          label_map: >
            {% set ns = namespace(scopes={}) %}
            {# Pass 1: empty scope skeleton for every area gated by
               `feature_leader`. Capture floor_id so Pass 2 can resolve
               `Floor Provides:` declarations. No labels are seeded by
               default — Manifest (and everything else) must be opted in
               explicitly with an `(Area |Floor |)Provides: <Label>`
               label on the area. #}
            {% for aid in label_areas('feature_leader') %}
              {% set fns = namespace(fid='') %}
              {% for fid in floors() %}
                {% if aid in floor_areas(fid) %}{% set fns.fid = fid %}{% endif %}
              {% endfor %}
              {% set ns.scopes = dict(ns.scopes, **{
                aid: {
                  'kind': 'area',
                  'floor_id': fns.fid,
                  'labels': {}
                }
              }) %}
            {% endfor %}
            {# Pass 2: parse each gated area's labels for
               `(Area |Floor |)Provides: <Label>`. Option pools and
               modifiers (Component/Min/Max/…) resolve at dispatch
               time in script.labeled_feature_area. #}
            {% set rns = namespace(scopes=ns.scopes) %}
            {% for aid in label_areas('feature_leader') %}
              {% set this_floor_id = rns.scopes[aid].floor_id %}
              {% set area_lbls = labels(aid) | map('label_name') | reject('none') | list %}
              {% for lbl in area_lbls %}
                {% set m = lbl | regex_replace('^(Area |Floor |)Provides: (.+)$', 'M|\\1|\\2') %}
                {% if m.startswith('M|') %}
                  {% set parts = m.split('|') %}
                  {% set prefix = parts[1] | trim %}
                  {% set lname = parts[2] | trim %}
                  {# Filter modifier labels (`Provides <Feature> Component:
                     <comp>`, `… Min: …`, etc.) so they don't get
                     registered as features in their own right. #}
                  {% set is_modifier = lname | regex_search('^[^:]+ (Component|Min|Max|Step|Unit|Icon|Initial|Static|Mode|Device Class): ') %}
                  {% if lname != '' and not is_modifier %}
                    {% set scope_val = 'area' if prefix == 'Area' else ('floor' if prefix == 'Floor' else 'none') %}
                    {% set scope_id_val = aid if scope_val in ['area', 'none'] else this_floor_id %}
                    {% if scope_id_val != '' %}
                      {# Component hint: comes from a sibling
                         `(Area |Floor |)Provides <Feature> Component: <comp>`
                         label on the same area, default `select`.
                         object_id is NOT computed here — that belongs
                         to `script.labeled_feature_area`. #}
                      {% set scope_prefix = ('Area ' if scope_val == 'area' else ('Floor ' if scope_val == 'floor' else '')) %}
                      {% set comp_override = area_lbls
                          | select('match', '^' ~ scope_prefix ~ 'Provides ' ~ lname ~ ' Component: .+$')
                          | first | default('') | regex_replace('^.+: ', '') | trim %}
                      {% set component = comp_override if comp_override != '' else 'select' %}
                      {% set lentry = {
                        'scope': scope_val,
                        'scope_id': scope_id_val,
                        'component': component,
                        'declaring_area_id': aid
                      } %}
                      {% if scope_id_val not in rns.scopes %}
                        {% set rns.scopes = dict(rns.scopes, **{
                          scope_id_val: {
                            'kind': 'floor',
                            'floor_id': scope_id_val,
                            'labels': {lname: lentry}
                          }
                        }) %}
                      {% else %}
                        {% set existing = rns.scopes[scope_id_val] %}
                        {% if lname not in existing.labels %}
                          {% set new_labels = dict(existing.labels, **{lname: lentry}) %}
                          {% set rns.scopes = dict(rns.scopes, **{scope_id_val: dict(existing, **{'labels': new_labels})}) %}
                        {% endif %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endfor %}
            {# Flatten the intermediate { scope_id: { …, labels: { … } } }
               structure into the public <scope_id>||<label> → label_data
               map the automation consumes. The nested form is only
               needed during construction (Pass 2 dedupes per scope_id);
               we never expose it. #}
            {% set fns = namespace(d={}) %}
            {% for sid, sdat in rns.scopes.items() %}
              {% for lname, ldat in sdat.get('labels', {}).items() %}
                {% set fns.d = dict(fns.d, **{sid ~ '||' ~ lname: {
                  'scope_id': sid,
                  'label': lname,
                  'scope': ldat.get('scope', 'area'),
                  'component': ldat.get('component'),
                  'declaring_area_id': ldat.get('declaring_area_id'),
                  'label_data': ldat
                }}) %}
              {% endfor %}
            {% endfor %}
            {{ fns.d }}

  - sensor:
    - name: "Labeled Features State"
      unique_id: labeled_features_state
      state_class: measurement
      unit_of_measurement: leaders
      availability: >
        {{ label_entities('feature_leader') | count > 0 }}
      state: >
        {{ label_entities('feature_leader') | list | count }}
      attributes:
        # ── feature_meta ────────────────────────────────────────────────
        # Single source of truth for the generic-feature catalog. Each
        # entry is keyed by the canonical Feature Name (matches Follower/
        # Leader labels and labeled_feature_generics' choose: branches)
        # and carries:
        #   - domain: the HA domain used as a fallback target pool when
        #     no explicit Follower/Provides label is found
        #     (e.g. 'media_player', 'light', 'fan'). '' = no fallback.
        #   - kind: the internal action key used by labeled_feature_generics'
        #     choose: block (stable string, never user-facing).
        #   - domain_label: the human-readable provider grouping used by
        #     `Provides: <DomainLabel>` entity-context shorthand. Multiple
        #     features share the same domain_label so that a single
        #     `Area Provides: Media Player` opts an entity into all 9 media
        #     features at once. Empty string = no grouping shorthand.
        # Adding a new domain grouping (e.g. Cover, Climate, Lock, Vacuum)
        # is a one-line edit: add the entries here and the Provides:
        # shorthand starts working everywhere.
        feature_meta: >
          {{ {
            'Media Toggle':       {'domain': 'media_player', 'kind': 'media_toggle',       'domain_label': 'Media Player'},
            'Media Play':         {'domain': 'media_player', 'kind': 'media_play',         'domain_label': 'Media Player'},
            'Media Pause':        {'domain': 'media_player', 'kind': 'media_pause',        'domain_label': 'Media Player'},
            'Media Next':         {'domain': 'media_player', 'kind': 'media_next',         'domain_label': 'Media Player'},
            'Media Previous':     {'domain': 'media_player', 'kind': 'media_previous',     'domain_label': 'Media Player'},
            'Media Seek Back':    {'domain': 'media_player', 'kind': 'media_seek_back',    'domain_label': 'Media Player'},
            'Media Seek Forward': {'domain': 'media_player', 'kind': 'media_seek_forward', 'domain_label': 'Media Player'},
            'Volume Up':          {'domain': 'media_player', 'kind': 'volume_up',          'domain_label': 'Media Player'},
            'Volume Down':        {'domain': 'media_player', 'kind': 'volume_down',        'domain_label': 'Media Player'},
            'Lights On':          {'domain': 'light',        'kind': 'light_on',           'domain_label': 'Light'},
            'Lights Off':         {'domain': 'light',        'kind': 'light_off',          'domain_label': 'Light'},
            'Lights Up':          {'domain': 'light',        'kind': 'light_up',           'domain_label': 'Light'},
            'Lights Down':        {'domain': 'light',        'kind': 'light_down',         'domain_label': 'Light'},
            'Fan On':             {'domain': 'fan',          'kind': 'fan_on',             'domain_label': 'Fan'},
            'Fan Off':            {'domain': 'fan',          'kind': 'fan_off',            'domain_label': 'Fan'},
            'Fan Up':             {'domain': 'fan',          'kind': 'fan_up',             'domain_label': 'Fan'},
            'Fan Down':           {'domain': 'fan',          'kind': 'fan_down',           'domain_label': 'Fan'}
          } }}
        last_updated_at: >

          {% set entities = expand(label_entities('feature_leader'))
              | sort(attribute='last_changed_timestamp')
              | rejectattr('state', 'in', ['unknown', 'unavailable'])
              | rejectattr('state', 'match', '.*_initial_press$')
              | list %}
          {% if entities | count > 0 %}
            {{ entities | last | attr('last_changed_timestamp') }}
          {% else %}
            {{ 0 }}
          {% endif %}
        leaders: >
          {% set entities = expand(label_entities('feature_leader'))
              | sort(attribute='last_changed_timestamp') %}
          {% set ns = namespace(result={}) %}
          {% for e in entities %}
            {% set cv_raw = e.attributes.event_type | default(e.state) if e.domain == 'event' else e.state %}
            {% set is_skip = cv_raw | regex_search('_initial_press$') or cv_raw | lower in ['unknown', 'unavailable'] %}
            {% set prev_l = this.attributes.get('leaders', {}).get(e.entity_id, {}) %}
            {% set cv = prev_l.get('current_value', cv_raw) if is_skip else cv_raw %}
            {% set cv_ts = prev_l.get('last_changed_timestamp', e.last_changed_timestamp) if is_skip else e.last_changed_timestamp %}
            {% set old_cv_l = prev_l.get('current_value', '') %}
            {% set old_pv_l = prev_l.get('previous_value', '') %}
            {% set prev_cv_l_raw = old_cv_l if cv != old_cv_l else old_pv_l %}
            {% set prev_cv_l = '' if prev_cv_l_raw | regex_search('_initial_press$') or prev_cv_l_raw | lower in ['unknown', 'unavailable'] else prev_cv_l_raw %}
            {% set labels = labels(e.entity_id)
                | map('label_name') | reject('none') | list %}
            {% set fns = namespace(features={}) %}
            {% for label in labels %}
              {% set feature_match = label
                  | regex_replace('(?i)^(Area |Floor |)Leader: ', '') %}
              {% if feature_match != label %}
                {% set fname = feature_match %}
                {% set scope = 'area' if label | lower | regex_search('^area leader') else
                               ('floor' if label | lower | regex_search('^floor leader') else 'none') %}
                {% set scope_pfx = 'Area ' if scope == 'area' else ('Floor ' if scope == 'floor' else '') %}
                {% set inc_lbl = (scope_pfx + fname + ' Increasing: True') in labels %}
                {% set dec_lbl = (scope_pfx + fname + ' Decreasing: True') in labels %}
                {% if inc_lbl or dec_lbl %}
                  {# Direction takes precedence over Enable/Disable labels #}
                  {% set cur_n  = cv  | float(none) %}
                  {% set prev_n = prev_cv_l | float(none) %}
                  {% set has_movement = cur_n is not none and prev_n is not none %}
                  {% set is_inc = has_movement and cur_n > prev_n %}
                  {% set is_dec = has_movement and cur_n < prev_n %}
                  {% set base_enabled = (inc_lbl and is_inc) or (dec_lbl and is_dec) %}
                {% else %}
                  {% set en_lbl = labels
                      | select('match', '^' + fname + ' Enable: .+')
                      | first | default('') %}
                  {% set dis_lbl = labels
                      | select('match', '^' + fname + ' Disable: .+')
                      | first | default('') %}
                  {% set en_val = en_lbl | regex_replace('^.+: ', '') %}
                  {% set dis_val = dis_lbl | regex_replace('^.+: ', '') %}
                  {% if en_val != '' or dis_val != '' %}
                    {% set by_en = en_val != '' and e.state == en_val %}
                    {% set by_dis = dis_val != '' and e.state == dis_val %}
                    {% if en_val != '' and dis_val != '' %}
                      {% set base_enabled = by_en and not by_dis %}
                    {% elif en_val != '' %}
                      {% set base_enabled = by_en %}
                    {% else %}
                      {% set base_enabled = not by_dis %}
                    {% endif %}
                  {% else %}
                    {% if e.domain in ['event', 'button'] %}
                      {% set base_enabled = true %}
                    {% else %}
                      {# Default truth function. Two rules ORed together:
                         1. State equals the feature name (case-sensitive).
                            Makes `input_select` / option-style leaders
                            work with just `Leader: <F>` — no Enable/Disable
                            labels required when the option string IS the
                            feature name.
                         2. State is a generic truthy value (on, true, …).
                            Covers boolean leaders. #}
                      {% set base_enabled = (e.state == fname) or
                          (e.state | lower in
                              ['on', 'true', 'home', 'open', 'detected', 'active', 'unlocked']) %}
                    {% endif %}
                  {% endif %}
                {% endif %}
                {% set inverted = (scope_pfx + fname + ' Invert: True') in labels %}
                {% set final_enabled = (not base_enabled) if inverted else base_enabled %}
                {% set fns.features = dict(fns.features, **{
                  fname: {'enabled': final_enabled, 'scope': scope}
                }) %}
              {% endif %}
            {% endfor %}
            {% set ns.result = dict(ns.result, **{
              e.entity_id: {
                'current_value': cv,
                'previous_value': prev_cv_l,
                'last_changed_timestamp': cv_ts,
                'features': fns.features
              }
            }) %}
          {% endfor %}
          {{ ns.result }}
        features: >
          {% set ns = namespace(result={}) %}
          {% for entity in expand(label_entities('feature_leader'))
              | sort(attribute='last_changed_timestamp') %}
            {% set cv_raw = entity.attributes.event_type | default(entity.state) if entity.domain == 'event' else entity.state %}
            {% set is_skip = cv_raw | regex_search('_initial_press$') or cv_raw | lower in ['unknown', 'unavailable'] %}
            {% set labels  = labels(entity.entity_id)
                | map('label_name') | reject('none') | list %}
            {% for label in labels %}
              {% set feature_match = label
                  | regex_replace('(?i)^(Area |Floor |)Leader: ', '') %}
              {% if feature_match != label %}
                {% set fname = feature_match %}
                {% set prev_f = this.attributes.get('features', {}).get(fname, {}) %}
                {% set scope_pfx = 'Area ' if label | lower | regex_search('^area leader') else ('Floor ' if label | lower | regex_search('^floor leader') else '') %}
                {% set inc_lbl = (scope_pfx + fname + ' Increasing: True') in labels %}
                {% set dec_lbl = (scope_pfx + fname + ' Decreasing: True') in labels %}
                {% if inc_lbl or dec_lbl %}
                  {# Direction takes precedence over Enable/Disable labels #}
                  {% set feat_value_cur = prev_f.get('value', entity.state) if is_skip else entity.state %}
                  {% set feat_value_prev = prev_f.get('previous_value', '') %}
                  {% set cur_n  = feat_value_cur  | float(none) %}
                  {% set prev_n = feat_value_prev | float(none) %}
                  {% set has_movement = cur_n is not none and prev_n is not none %}
                  {% set is_inc = has_movement and cur_n > prev_n %}
                  {% set is_dec = has_movement and cur_n < prev_n %}
                  {% set feat_enabled = (inc_lbl and is_inc) or (dec_lbl and is_dec) %}
                {% else %}
                  {% set en_lbl = labels
                      | select('match', '^' + fname + ' Enable: .+')
                      | first | default('') %}
                  {% set dis_lbl = labels
                      | select('match', '^' + fname + ' Disable: .+')
                      | first | default('') %}
                  {% set en_val  = en_lbl  | regex_replace('^.+: ', '') %}
                  {% set dis_val = dis_lbl | regex_replace('^.+: ', '') %}
                  {% if en_val != '' or dis_val != '' %}
                    {% set by_en  = en_val  != '' and entity.state == en_val %}
                    {% set by_dis = dis_val != '' and entity.state == dis_val %}
                    {% if en_val != '' and dis_val != '' %}
                      {% set feat_enabled = by_en and not by_dis %}
                    {% elif en_val != '' %}
                      {% set feat_enabled = by_en %}
                    {% else %}
                      {% set feat_enabled = not by_dis %}
                    {% endif %}
                  {% else %}
                    {% if entity.domain in ['event', 'button'] %}
                      {% set feat_enabled = true %}
                    {% else %}
                      {# Default truth function — see `leaders` attribute
                         above for the rationale. State equals feature
                         name (case-sensitive) OR generic truthy value. #}
                      {% set feat_enabled = (entity.state == fname) or
                          (entity.state | lower in
                              ['on', 'true', 'home', 'open', 'detected', 'active', 'unlocked']) %}
                    {% endif %}
                  {% endif %}
                {% endif %}
                {% set inverted = (scope_pfx + fname + ' Invert: True') in labels %}
                {% set feat_enabled = (not feat_enabled) if inverted else feat_enabled %}
                {% set feat_value = prev_f.get('value', entity.state) if is_skip else entity.state %}
                {% set feat_ts = prev_f.get('timestamp', entity.last_changed_timestamp) if is_skip else entity.last_changed_timestamp %}
                {% set old_val_f = prev_f.get('value', '') %}
                {% set old_pv_f = prev_f.get('previous_value', '') %}
                {% set prev_val_f_raw = old_val_f if feat_value != old_val_f else old_pv_f %}
                {% set prev_val_f = '' if prev_val_f_raw | regex_search('_initial_press$') or prev_val_f_raw | lower in ['unknown', 'unavailable'] else prev_val_f_raw %}
                {% set ns.result = dict(ns.result, **{
                  fname: {
                    'leader_entity_id': entity.entity_id,
                    'value': feat_value,
                    'previous_value': prev_val_f,
                    'enabled': feat_enabled,
                    'timestamp': feat_ts
                  }
                }) %}
              {% endif %}
             {% endfor %}
           {% endfor %}
           {{ ns.result }}

    - default_entity_id: sensor.house_home_count
      name: 'House: Home Count'
      state: '{{ dict((states.person)|groupby(''state''))[''home'']|count }}'

    # TODO: Need to add labels for ignored entities and remove groups and the package_unavailable_entities.yaml.
    - unit_of_measurement: entities
      default_entity_id: sensor.unavailable_entities
      icon: '{{ ''mdi:check-circle'' if is_state(''sensor.unavailable_entities'',''0'')
        else ''mdi:alert-circle'' }}'
      attributes:
        entities: "{{ states|selectattr('state','in',['unavailable','unknown', 'nan'])|rejectattr('domain','eq','group')\n
          \   |rejectattr('entity_id','in',state_attr('group.ignored_entities','entity_id'))|rejectattr('domain',
          'in', 'button')|rejectattr('domain', 'in', 'event')|map(attribute='entity_id')|list
          }}"
        update_every_minute: '{{ now().minute }}'
      name: Unavailable Entities
      state: "{{ states|selectattr('state','in',['unavailable','unknown', 'nan'])|rejectattr('domain','eq','group')\n
        \ |rejectattr('entity_id','in',state_attr('group.ignored_entities','entity_id'))|rejectattr('domain',
        'in', 'event')|rejectattr('domain', 'in', 'button')|list|count }}"

    - default_entity_id: sensor.away_team
      picture: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.away_logo
        is defined %}{{ states.sensor.nhl_sensor.attributes.away_logo }}{%- endif %}'
      name: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.away_name
        is defined %}{{ states.sensor.nhl_sensor.attributes.away_name }}{%- endif %}'
      state: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.away_score
        is defined %}{{ states.sensor.nhl_sensor.attributes.away_score }}{%- endif %}'
    - default_entity_id: sensor.home_team
      picture: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.home_logo
        is defined %}{{ states.sensor.nhl_sensor.attributes.home_logo }}{%- endif %}'
      name: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.home_name
        is defined %}{{ states.sensor.nhl_sensor.attributes.home_name }}{%- endif %}'
      state: '{% if states.sensor.nhl_sensor.attributes is defined and states.sensor.nhl_sensor.attributes.home_score
        is defined %}{{ states.sensor.nhl_sensor.attributes.home_score }}{%- endif %}'
    - default_entity_id: sensor.house_home_count
      name: 'House: Home Count'
      state: '{{ dict((states.person)|groupby(''state''))[''home'']|count }}'


  - light:
      - unique_id: scene_night_bathroom_main
        #friendly_name: "Scene Night (Bathroom Main)"
        #value_template: |-
        state: |-
          {% for entity_ids in state_attr('scene.night_bathroom_main', 'entity_id') %}
            {% if is_state(entity_ids, 'on') %}
              {% if loop.index == 1 %}
                true
              {% endif %}
            {% else %}
              false
            {% endif %}
          {% endfor %}
        turn_on:
          action: scene.turn_on
          target:
            entity_id: scene.night_bathroom_main
        turn_off:
          action: homeassistant.turn_off
          target:
            entity_id: "{{ state_attr('scene.night_bathroom_main', 'entity_id') }}"

http:
  ip_ban_enabled: true
  login_attempts_threshold: 5
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24

#auto_backup:
group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
frontend:
  themes: !include_dir_merge_named themes

# panel_iframe:
