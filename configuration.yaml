#     title: "Router"
#     url: "https://192.168.1.1"
#   mopidy:
#     title: "Audio"
#     url: "https://audio.spencerslab.com/iris/"

homeassistant:
  packages: !include_dir_named packages

recorder:
  db_url: !secret recorder_url
  #purge_keep_days: 7
ltss:
  db_url: !secret ltss_url
  chunk_time_interval: 86400000000
  include:
    domains:
    - sensor
    - binary_sensor
    - number
    - switch
    - light
    - fan
