# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:
#debugpy:
#wait: true

zha_toolkit:

# Text to speech
tts:
  - platform: picotts
    service_name: picotts_say
    #base_url: https://home.spencerslab.com
    language: "en-US"
    cache: false
notify:
  - platform: tts
    name: in_the_dining_room
    tts_service: tts.picotts_say
    media_player: media_player.dining_room_audio
  - platform: tts
    name: home_tts
    tts_service: tts.picotts_say
    media_player: media_player.home_tts
template:
  # ─────────────────────────────────────────────────────────────────────
  # sensor.labeled_feature_areas_state
  #
  # Source of truth for which (scope_id, label) pairs SHOULD have a
  # discovered MQTT entity published. Trigger-based so it re-evaluates
  # only on the registry mutations that can change the answer.
  #
  # State    : count of areas carrying the `feature_leader` label.
  # label_map: flat <scope_id>||<label> → {
  #              scope_id, label, scope, declaring_area_id, component,
  #              label_data: { scope, scope_id, component,
  #                            declaring_area_id }
  #            }
  #            The sensor owns ONLY the `(scope_id, label)` registry and
  #            the optional component hint
  #            (`Provides <Label> Component: <comp>` label; default
  #            `select`). It does NOT compute object_ids and does NOT
  #            know about specific features —
  #            `script.labeled_feature_area` is the single source of
  #            truth for canonical naming (`area_manifest_<scope>`,
  #            `<scope>_vpd`, etc.) and for generic features
  #            (`<component>.<scope>_<feature_slug>`).
  #            `automation.labeled_feature_areas` triggers directly on
  #            this attribute and diffs `from_state` vs `to_state` —
  #            no flattening required in the automation. The diff
  #            compares on `<scope_id>||<label>` plus `component` so a
  #            `Component:` override swap correctly retract+republishes.
  #
  # Built inline from the registry calls so there is no
  # `this.attributes.*` self-reference. (A previous iteration exposed
  # both a nested `scopes` attribute AND a flat `label_map` computed
  # from `this.attributes.scopes`. In HA template-sensor attribute
  # renders, `this` resolves to the entity's PREVIOUS state, so
  # `label_map` lagged `scopes` by one tick — removing a label bumped
  # `last_updated` but `label_map` didn't actually change, so the
  # automation silently missed the mutation. Keeping only `label_map`,
  # built inline, eliminates the trap.)
  #
  # Triggers mirror the registry events that used to fire the
  # automation directly. `homeassistant.start` ensures restored state
  # is reconciled against the live registry on boot.
  # ─────────────────────────────────────────────────────────────────────
  - trigger:
      - trigger: event
        event_type: label_registry_updated
      - trigger: event
        event_type: area_registry_updated
      - trigger: event
        event_type: floor_registry_updated
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Labeled Feature Areas State"
        unique_id: labeled_feature_areas_state
        state_class: measurement
        unit_of_measurement: areas
        state: >
          {{ label_areas('feature_leader') | list | count }}
        attributes:
          # `label_map` is the SINGLE attribute — a flat
          # <scope_id>||<label> → label_data view that the automation
          # diffs directly. Built inline here from the registry calls
          # so there is no `this.attributes.*` self-reference (which
          # would resolve to the entity's previous state in HA template-
          # sensor attribute renders and lag the real value by one tick).
          label_map: >
            {% set ns = namespace(scopes={}) %}
            {# Pass 1: empty scope skeleton for every area gated by
               `feature_leader`. Capture floor_id so Pass 2 can resolve
               `Floor Provides:` declarations. No labels are seeded by
               default — Manifest (and everything else) must be opted in
               explicitly with an `(Area |Floor |)Provides: <Label>`
               label on the area. #}
            {% for aid in label_areas('feature_leader') %}
              {% set fns = namespace(fid='') %}
              {% for fid in floors() %}
                {% if aid in floor_areas(fid) %}{% set fns.fid = fid %}{% endif %}
              {% endfor %}
              {% set ns.scopes = dict(ns.scopes, **{
                aid: {
                  'kind': 'area',
                  'floor_id': fns.fid,
                  'labels': {}
                }
              }) %}
            {% endfor %}
            {# Pass 2: parse each gated area's labels for
               `(Area |Floor |)Provides: <Label>`. Option pools and
               modifiers (Component/Min/Max/…) resolve at dispatch
               time in script.labeled_feature_area. #}
            {% set rns = namespace(scopes=ns.scopes) %}
            {% for aid in label_areas('feature_leader') %}
              {% set this_floor_id = rns.scopes[aid].floor_id %}
              {% set area_lbls = labels(aid) | map('label_name') | reject('none') | list %}
              {% for lbl in area_lbls %}
                {% set m = lbl | regex_replace('^(Area |Floor |)Provides: (.+)$', 'M|\\1|\\2') %}
                {% if m.startswith('M|') %}
                  {% set parts = m.split('|') %}
                  {% set prefix = parts[1] | trim %}
                  {% set lname = parts[2] | trim %}
                  {# Filter modifier labels (`Provides <Feature> Component:
                     <comp>`, `… Min: …`, etc.) so they don't get
                     registered as features in their own right. #}
                  {% set is_modifier = lname | regex_search('^[^:]+ (Component|Min|Max|Step|Unit|Icon|Initial|Static|Mode|Device Class): ') %}
                  {% if lname != '' and not is_modifier %}
                    {% set scope_val = 'area' if prefix == 'Area' else ('floor' if prefix == 'Floor' else 'none') %}
                    {% set scope_id_val = aid if scope_val in ['area', 'none'] else this_floor_id %}
                    {% if scope_id_val != '' %}
                      {# Component hint: comes from a sibling
                         `(Area |Floor |)Provides <Feature> Component: <comp>`
                         label on the same area, default `select`.
                         object_id is NOT computed here — that belongs
                         to `script.labeled_feature_area`. #}
                      {% set scope_prefix = ('Area ' if scope_val == 'area' else ('Floor ' if scope_val == 'floor' else '')) %}
                      {% set comp_override = area_lbls
                          | select('match', '^' ~ scope_prefix ~ 'Provides ' ~ lname ~ ' Component: .+$')
                          | first | default('') | regex_replace('^.+: ', '') | trim %}
                      {% set component = comp_override if comp_override != '' else 'select' %}
                      {% set lentry = {
                        'scope': scope_val,
                        'scope_id': scope_id_val,
                        'component': component,
                        'declaring_area_id': aid
                      } %}
                      {% if scope_id_val not in rns.scopes %}
                        {% set rns.scopes = dict(rns.scopes, **{
                          scope_id_val: {
                            'kind': 'floor',
                            'floor_id': scope_id_val,
                            'labels': {lname: lentry}
                          }
                        }) %}
                      {% else %}
                        {% set existing = rns.scopes[scope_id_val] %}
                        {% if lname not in existing.labels %}
                          {% set new_labels = dict(existing.labels, **{lname: lentry}) %}
                          {% set rns.scopes = dict(rns.scopes, **{scope_id_val: dict(existing, **{'labels': new_labels})}) %}
                        {% endif %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endfor %}
            {# Flatten the intermediate { scope_id: { …, labels: { … } } }
               structure into the public <scope_id>||<label> → label_data
               map the automation consumes. The nested form is only
               needed during construction (Pass 2 dedupes per scope_id);
               we never expose it. #}
            {% set fns = namespace(d={}) %}
            {% for sid, sdat in rns.scopes.items() %}
              {% for lname, ldat in sdat.get('labels', {}).items() %}
                {% set fns.d = dict(fns.d, **{sid ~ '||' ~ lname: {
                  'scope_id': sid,
                  'label': lname,
                  'scope': ldat.get('scope', 'area'),
                  'component': ldat.get('component'),
                  'declaring_area_id': ldat.get('declaring_area_id'),
                  'label_data': ldat
                }}) %}
              {% endfor %}
            {% endfor %}
            {{ fns.d }}

  # ─────────────────────────────────────────────────────────────────────
  # sensor.labeled_features_state  (trigger-based)
  #
  # Re-evaluated on:
  #   * state_changed event for any entity carrying the `feature_leader`
  #     label
  #   * `labeled_feature_set` event — manual override path used by
  #     `script.labeled_feature_generics` (feature: Set Feature) to write
  #     directly into `features` without a backing leader.
  #
  # Attributes:
  #   feature_meta — static catalog (unchanged).
  #   leaders      — per-leader { current_value, previous_value,
  #                  last_changed_timestamp }. Updated for the leader that
  #                  drove this tick; carried through for everyone else.
  #   features     — first-class observable. Nested by
  #                  feature → scope → scope_id → entry.
  #                  Each entry: { enabled, mode, last_changed_timestamp,
  #                               triggering_leader }
  #                  `mode` is read from a label on this sensor:
  #                  `<Scoped F> Mode: Leader|Any|All`
  #                  `last_changed_timestamp` only bumps when `enabled`
  #                  flips. `triggering_leader` is the leader entity_id
  #                  that drove this tick, or '' for manual overrides.
  # ─────────────────────────────────────────────────────────────────────
  - trigger:
      - trigger: event
        event_type: state_changed
        # Filter inside the template (HA event triggers don't accept
        # an entity-id filter directly). We re-render only when the
        # changed entity is currently labeled `feature_leader` or when
        # the previous attributes carried an entry for it (so removals
        # of the label still fire one cleanup tick).
      - trigger: event
        event_type: labeled_feature_set
    # Gate the firehose of `state_changed` events down to ones that
    # could actually affect this sensor's render. We deliberately do
    # NOT reference `this.attributes.*` here — in HA trigger-based
    # template sensors, `this` is undefined during the `conditions:`
    # phase (only bound during the attribute render), so any reference
    # would raise UndefinedError on every event and block triggers
    # entirely.
    #
    # Trade-off: when a user removes the `feature_leader` label from
    # an entity, this gate immediately rejects that entity's
    # subsequent state_changed events. The stale entry in
    # `leaders` / `features` lingers until the next leader-driven
    # tick, at which point the attribute templates' orphan logic
    # walks `this.attributes.*` and drops anything no longer labeled.
    # In practice this is fine — orphans are harmless until the next
    # tick, and another leader changing state is the common case.
    conditions:
      - condition: template
        value_template: >
          {% set evtype = trigger.event.event_type %}
          {% if evtype == 'labeled_feature_set' %}
            true
          {% else %}
            {{ trigger.event.data.entity_id | default('') in label_entities('feature_leader') }}
          {% endif %}
    sensor:
    - name: "Labeled Features State"
      unique_id: labeled_features_state
      state_class: measurement
      unit_of_measurement: leaders
      state: >
        {{ label_entities('feature_leader') | list | count }}
      attributes:
        # ── feature_meta ────────────────────────────────────────────────
        # Single source of truth for the generic-feature catalog. Each
        # entry is keyed by the canonical Feature Name (matches Follower/
        # Leader labels and labeled_feature_generics' choose: branches)
        # and carries:
        #   - domain: the HA domain used as a fallback target pool when
        #     no explicit Follower/Provides label is found
        #     (e.g. 'media_player', 'light', 'fan'). '' = no fallback.
        #   - kind: the internal action key used by labeled_feature_generics'
        #     choose: block (stable string, never user-facing).
        #   - domain_label: the human-readable provider grouping used by
        #     `Provides: <DomainLabel>` entity-context shorthand. Multiple
        #     features share the same domain_label so that a single
        #     `Area Provides: Media Player` opts an entity into all 9 media
        #     features at once. Empty string = no grouping shorthand.
        # Adding a new domain grouping (e.g. Cover, Climate, Lock, Vacuum)
        # is a one-line edit: add the entries here and the Provides:
        # shorthand starts working everywhere.
        feature_meta: >
          {{ {
            'Media Toggle':       {'domain': 'media_player', 'kind': 'media_toggle',       'domain_label': 'Media Player'},
            'Media Play':         {'domain': 'media_player', 'kind': 'media_play',         'domain_label': 'Media Player'},
            'Media Pause':        {'domain': 'media_player', 'kind': 'media_pause',        'domain_label': 'Media Player'},
            'Media Next':         {'domain': 'media_player', 'kind': 'media_next',         'domain_label': 'Media Player'},
            'Media Previous':     {'domain': 'media_player', 'kind': 'media_previous',     'domain_label': 'Media Player'},
            'Media Seek Back':    {'domain': 'media_player', 'kind': 'media_seek_back',    'domain_label': 'Media Player'},
            'Media Seek Forward': {'domain': 'media_player', 'kind': 'media_seek_forward', 'domain_label': 'Media Player'},
            'Volume Up':          {'domain': 'media_player', 'kind': 'volume_up',          'domain_label': 'Media Player'},
            'Volume Down':        {'domain': 'media_player', 'kind': 'volume_down',        'domain_label': 'Media Player'},
            'Lights On':          {'domain': 'light',        'kind': 'light_on',           'domain_label': 'Light'},
            'Lights Off':         {'domain': 'light',        'kind': 'light_off',          'domain_label': 'Light'},
            'Lights Up':          {'domain': 'light',        'kind': 'light_up',           'domain_label': 'Light'},
            'Lights Down':        {'domain': 'light',        'kind': 'light_down',         'domain_label': 'Light'},
            'Fan On':             {'domain': 'fan',          'kind': 'fan_on',             'domain_label': 'Fan'},
            'Fan Off':            {'domain': 'fan',          'kind': 'fan_off',            'domain_label': 'Fan'},
            'Fan Up':             {'domain': 'fan',          'kind': 'fan_up',             'domain_label': 'Fan'},
            'Fan Down':           {'domain': 'fan',          'kind': 'fan_down',           'domain_label': 'Fan'}
          } }}
        # ── leaders ─────────────────────────────────────────────────────
        # Per-leader diagnostic and substitution surface.
        # Only the entity that drove this tick has its entry rebuilt;
        # every other leader's entry is carried through from
        # `this.attributes.leaders` unchanged.
        #
        # `trigger.event.event_type` is `state_changed` for leader-driven
        # ticks (we filter to feature_leader-labeled entities inline) and
        # `labeled_feature_set` for manual override events — the latter
        # does not touch leaders.
        leaders: >
          {% set _all_leaders = label_entities('feature_leader') | list %}
          {% set _evtype = trigger.event.event_type | default('') %}
          {% set _is_state_changed = (_evtype == 'state_changed') %}
          {% set _changed_eid = trigger.event.data.entity_id | default('') if _is_state_changed else '' %}
          {# Defensive: legacy snapshots may have a non-mapping
             carried over from the old schema. Coerce to {} so
             `.items()` is always safe. #}
          {% set _prev_leaders_raw = this.attributes.get('leaders', {}) %}
          {% set _prev_leaders = _prev_leaders_raw if _prev_leaders_raw is mapping else {} %}
          {% set ns = namespace(result={}) %}
          {# Carry every existing entry through, but only for entities
             that still carry the feature_leader label. Orphans drop. #}
          {% for eid, ldat in _prev_leaders.items() %}
            {% if eid in _all_leaders and eid != _changed_eid %}
              {% set ns.result = dict(ns.result, **{eid: ldat}) %}
            {% endif %}
          {% endfor %}
          {# Add entries for any newly-labeled leaders we don't have yet
             (skip the changed one — handled below with full evaluation). #}
          {% for eid in _all_leaders %}
            {% if eid not in ns.result and eid != _changed_eid %}
              {% set st = states(eid) %}
              {% set lct = states[eid].last_changed_timestamp
                            if states[eid] is not none else 0 %}
              {% set ns.result = dict(ns.result, **{eid: {
                'current_value': st,
                'previous_value': '',
                'last_changed_timestamp': lct
              }}) %}
            {% endif %}
          {% endfor %}
          {# Rebuild the changed leader's entry from the trigger payload. #}
          {% if _is_state_changed and _changed_eid in _all_leaders %}
            {% set new_state = trigger.event.data.new_state %}
            {% set cv_raw = new_state.attributes.event_type | default(new_state.state) if (new_state is not none and new_state.entity_id.split('.')[0] == 'event') else (new_state.state if new_state is not none else '') %}
            {% set is_skip = cv_raw | regex_search('_initial_press$') or cv_raw | lower in ['unknown', 'unavailable', 'none'] %}
            {% set prev_l = _prev_leaders.get(_changed_eid, {}) %}
            {% set cv = prev_l.get('current_value', cv_raw) if is_skip else cv_raw %}
            {% set cv_ts = prev_l.get('last_changed_timestamp', (new_state.last_changed.timestamp() if (new_state is not none and new_state.last_changed is not none) else now().timestamp())) if is_skip else (new_state.last_changed.timestamp() if (new_state is not none and new_state.last_changed is not none) else now().timestamp()) %}
            {% set old_cv_l = prev_l.get('current_value', '') %}
            {% set old_pv_l = prev_l.get('previous_value', '') %}
            {% set prev_cv_l_raw = old_cv_l if cv != old_cv_l else old_pv_l %}
            {% set prev_cv_l = '' if (prev_cv_l_raw | regex_search('_initial_press$') or prev_cv_l_raw | lower in ['unknown', 'unavailable', 'none']) else prev_cv_l_raw %}
            {% set ns.result = dict(ns.result, **{_changed_eid: {
              'current_value': cv,
              'previous_value': prev_cv_l,
              'last_changed_timestamp': cv_ts
            }}) %}
          {% endif %}
          {{ ns.result }}

        # ── features ────────────────────────────────────────────────────
        # First-class observable. Nested:
        #   feature → scope → scope_id → {
        #     enabled, mode, last_changed_timestamp, triggering_leader
        #   }
        #
        # On a `state_changed` tick (changed leader):
        #   1. Re-evaluate the changed leader's per-(F, scope, scope_id)
        #      truth value for every feature it leads.
        #   2. For each touched triple, resolve its `mode` from labels on
        #      this sensor entity: `<Scoped F> Mode: Leader|Any|All`.
        #      Default `leader`.
        #   3. Compute new `enabled`:
        #        leader  → the changed leader's value
        #        any/all → fold across every leader mapped to the same
        #                  triple (re-evaluating each from its current
        #                  state). The changed leader's value comes from
        #                  step 1; others are evaluated inline.
        #   4. If new `enabled` differs from previous, bump
        #      `last_changed_timestamp`. Always set `triggering_leader`
        #      to the changed leader's entity_id.
        #   5. Every other triple in `this.attributes.features` is
        #      carried through unchanged, UNLESS no leader maps to it
        #      and it was not sourced via a manual override
        #      (`triggering_leader: ''`) — those drop.
        #
        # On a `labeled_feature_set` tick (manual override):
        #   1. Read target_feature/scope/scope_id/enabled/timestamp from
        #      the event payload.
        #   2. Write features[target_feature][scope][scope_id] = {
        #        enabled, mode (preserve existing or 'leader'),
        #        last_changed_timestamp: timestamp,
        #        triggering_leader: ''
        #      }
        #   3. Carry everything else through unchanged.
        features: >
          {% set _all_leaders = label_entities('feature_leader') | list %}
          {% set _evtype = trigger.event.event_type | default('') %}
          {% set _is_state_changed = (_evtype == 'state_changed') %}
          {% set _is_manual = (_evtype == 'labeled_feature_set') %}
          {% set _changed_eid = trigger.event.data.entity_id | default('') if _is_state_changed else '' %}
          {# Defensive: recorder may carry a legacy schema value
             (string / list) that doesn't expose .items(). Treat any
             non-mapping as empty so we rebuild from scratch. Same
             rationale for inner scopes_map / sids dicts below — we
             guard each .items() call. #}
          {% set _prev_features_raw = this.attributes.get('features', {}) %}
          {% set _prev_features = _prev_features_raw if _prev_features_raw is mapping else {} %}
          {% set _sensor_labels = labels('sensor.labeled_features_state') | map('label_name') | reject('none') | list %}

          {# Mode lookup helper macro replacement: we inline below. #}

          {# Helper inline — evaluate a single leader for a single feature
             label string. Returns the post-Invert enabled value. #}
          {% macro eval_leader(eid, full_label, scope_pfx, fname, cv, prev_cv) %}
            {%- set lbls = labels(eid) | map('label_name') | reject('none') | list -%}
            {%- set st = states(eid) -%}
            {%- set dom = eid.split('.')[0] -%}
            {%- set inc_lbl = (scope_pfx + fname + ' Increasing: True') in lbls -%}
            {%- set dec_lbl = (scope_pfx + fname + ' Decreasing: True') in lbls -%}
            {%- set ns2 = namespace(base=false) -%}
            {%- if inc_lbl or dec_lbl -%}
              {%- set cur_n = cv | float(none) -%}
              {%- set prev_n = prev_cv | float(none) -%}
              {%- set has_mov = cur_n is not none and prev_n is not none -%}
              {%- set is_inc = has_mov and cur_n > prev_n -%}
              {%- set is_dec = has_mov and cur_n < prev_n -%}
              {%- set ns2.base = (inc_lbl and is_inc) or (dec_lbl and is_dec) -%}
            {%- else -%}
              {%- set en_lbl = lbls | select('match', '^' + scope_pfx + fname + ' Enable: .+') | first | default('') -%}
              {%- set dis_lbl = lbls | select('match', '^' + scope_pfx + fname + ' Disable: .+') | first | default('') -%}
              {%- set en_val = en_lbl | regex_replace('^.+: ', '') -%}
              {%- set dis_val = dis_lbl | regex_replace('^.+: ', '') -%}
              {%- if en_val != '' or dis_val != '' -%}
                {%- set by_en = en_val != '' and st == en_val -%}
                {%- set by_dis = dis_val != '' and st == dis_val -%}
                {%- if en_val != '' and dis_val != '' -%}
                  {%- set ns2.base = by_en and not by_dis -%}
                {%- elif en_val != '' -%}
                  {%- set ns2.base = by_en -%}
                {%- else -%}
                  {%- set ns2.base = not by_dis -%}
                {%- endif -%}
              {%- else -%}
                {%- if dom in ['event', 'button'] -%}
                  {%- set ns2.base = true -%}
                {%- else -%}
                  {%- set ns2.base = (st == fname) or (st | lower in ['on','true','home','open','detected','active','unlocked']) -%}
                {%- endif -%}
              {%- endif -%}
            {%- endif -%}
            {%- set inverted = (scope_pfx + fname + ' Invert: True') in lbls -%}
            {{- (not ns2.base) if inverted else ns2.base -}}
          {% endmacro %}

          {# Build mapping: (feature, scope, scope_id) → list of leader entity_ids
             that lead it. Used both for drop semantics and for any/all mode
             folding. We always rebuild this — it's cheap and means we don't
             need a separate persisted index. #}
          {% set tns = namespace(triples={}) %}
          {% for eid in _all_leaders %}
            {% set _aid = area_id(eid) | default('') | trim %}
            {% set _fid = namespace(v='') %}
            {% if _aid != '' %}
              {% for fid in floors() %}
                {% if _aid in floor_areas(fid) %}{% set _fid.v = fid %}{% endif %}
              {% endfor %}
            {% endif %}
            {% for lbl in (labels(eid) | map('label_name') | reject('none') | list) %}
              {% set m = lbl | regex_replace('^(Area |Floor |)Leader: (.+)$', 'M|\\1|\\2') %}
              {% if m.startswith('M|') %}
                {% set parts = m.split('|') %}
                {% set prefix = parts[1] | trim %}
                {% set fname = parts[2] | trim %}
                {% set scope_val = 'area' if prefix == 'Area' else ('floor' if prefix == 'Floor' else 'global') %}
                {% set scope_id_val = _aid if scope_val == 'area' else (_fid.v if scope_val == 'floor' else '') %}
                {% if scope_val == 'area' and scope_id_val == '' %}
                  {# Leader has no area; skip — area scope cannot resolve #}
                {% elif scope_val == 'floor' and scope_id_val == '' %}
                  {# Leader has no floor; skip — floor scope cannot resolve #}
                {% else %}
                  {% set key = fname ~ '||' ~ scope_val ~ '||' ~ scope_id_val %}
                  {% set existing = tns.triples.get(key, []) %}
                  {% if eid not in existing %}
                    {% set tns.triples = dict(tns.triples, **{key: existing + [eid]}) %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
          {% endfor %}

          {# Resolve mode for a given (fname, scope) from labels on this
             sensor. Default 'leader'. #}
          {% set mode_for = namespace(d={}) %}
          {% for key in tns.triples.keys() %}
            {% set k_parts = key.split('||') %}
            {% set fname = k_parts[0] %}
            {% set scope_val = k_parts[1] %}
            {% set scope_pfx = 'Area ' if scope_val == 'area' else ('Floor ' if scope_val == 'floor' else '') %}
            {% set mode_lbl = _sensor_labels | select('match', '^' + scope_pfx + fname + ' Mode: (Leader|Any|All)$') | first | default('') %}
            {% set mv = (mode_lbl | regex_replace('^.+: ', '') | lower) if mode_lbl != '' else 'leader' %}
            {% set mode_for.d = dict(mode_for.d, **{key: mv}) %}
          {% endfor %}

          {# Decide what (feature, scope, scope_id) triples this tick
             should touch. Start with everything that has a leader mapped
             (so orphans drop). On a state_changed tick, also flag triples
             belonging to the changed leader for re-evaluation. On a
             manual tick, no leader triples are touched. #}
          {% set ns = namespace(result={}) %}

          {# Carry through all existing triples that are either:
             (a) still mapped to a leader, OR
             (b) manual overrides (triggering_leader == '')
             Guard each level of `.items()` because legacy snapshots may
             have stringy values stashed in places we expect dicts. #}
          {% for fname, scopes_map in _prev_features.items() %}
            {% set _sm = scopes_map if scopes_map is mapping else {} %}
            {% for scope_val, sids in _sm.items() %}
              {% set _sids = sids if sids is mapping else {} %}
              {% for scope_id_val, entry in _sids.items() %}
                {% set _entry = entry if entry is mapping else {} %}
                {% set key = fname ~ '||' ~ scope_val ~ '||' ~ scope_id_val %}
                {% set has_leader = key in tns.triples %}
                {% set is_manual = (_entry.get('triggering_leader', '') == '') %}
                {% if has_leader or is_manual %}
                  {% set existing_f = ns.result.get(fname, {}) %}
                  {% set existing_s = existing_f.get(scope_val, {}) %}
                  {% set existing_s = dict(existing_s, **{scope_id_val: _entry}) %}
                  {% set existing_f = dict(existing_f, **{scope_val: existing_s}) %}
                  {% set ns.result = dict(ns.result, **{fname: existing_f}) %}
                {% endif %}
              {% endfor %}
            {% endfor %}
          {% endfor %}

          {# Manual override path. #}
          {% if _is_manual %}
            {% set _tgt = trigger.event.data.target_feature | default('') | trim %}
            {% set _scp = trigger.event.data.scope | default('') | lower | trim %}
            {% set _sid = trigger.event.data.scope_id | default('') | string %}
            {% set _ena = trigger.event.data.enabled | default(false) | bool(false) %}
            {% set _ts = trigger.event.data.timestamp | default(now().timestamp()) | float(now().timestamp()) %}
            {% if _tgt != '' and _scp in ['area','floor','global'] %}
              {% set existing_f = ns.result.get(_tgt, {}) %}
              {% set existing_s = existing_f.get(_scp, {}) %}
              {% set prev_entry = existing_s.get(_sid, {}) %}
              {% set _mode = prev_entry.get('mode', 'leader') %}
              {% set new_entry = {
                'enabled': _ena,
                'mode': _mode,
                'last_changed_timestamp': _ts,
                'triggering_leader': ''
              } %}
              {% set existing_s = dict(existing_s, **{_sid: new_entry}) %}
              {% set existing_f = dict(existing_f, **{_scp: existing_s}) %}
              {% set ns.result = dict(ns.result, **{_tgt: existing_f}) %}
            {% endif %}
          {% endif %}

          {# State-changed path. Rebuild every (feature, scope, scope_id)
             triple that the changed leader contributes to. #}
          {% if _is_state_changed and _changed_eid in _all_leaders %}
            {% set new_state = trigger.event.data.new_state %}
            {% set cv_raw = new_state.attributes.event_type | default(new_state.state) if (new_state is not none and new_state.entity_id.split('.')[0] == 'event') else (new_state.state if new_state is not none else '') %}
            {% set is_skip = cv_raw | regex_search('_initial_press$') or cv_raw | lower in ['unknown', 'unavailable', 'none'] %}
            {% if not is_skip %}
              {% set ts = (new_state.last_changed.timestamp() if (new_state is not none and new_state.last_changed is not none) else now().timestamp()) %}
              {% set prev_l = this.attributes.get('leaders', {}).get(_changed_eid, {}) %}
              {% set prev_cv = prev_l.get('current_value', '') %}
              {# Iterate this leader's triples. #}
              {% for key, leaders_list in tns.triples.items() %}
                {% if _changed_eid in leaders_list %}
                  {% set kp = key.split('||') %}
                  {% set fname = kp[0] %}
                  {% set scope_val = kp[1] %}
                  {% set scope_id_val = kp[2] %}
                  {% set scope_pfx = 'Area ' if scope_val == 'area' else ('Floor ' if scope_val == 'floor' else '') %}
                  {% set mode = mode_for.d.get(key, 'leader') %}
                  {# Per-leader truth for the changed leader #}
                  {% set this_truth = eval_leader(_changed_eid, '', scope_pfx, fname, cv_raw, prev_cv) | trim == 'True' %}
                  {% if mode == 'leader' %}
                    {% set new_enabled = this_truth %}
                  {% else %}
                    {# Fold over every leader mapped to this triple. For
                       others, use their current state from `states()` as
                       cv and the (changed leader's previous) doesn't
                       apply — use empty string for prev_cv on others. #}
                    {% set lns = namespace(values=[]) %}
                    {% for other_eid in leaders_list %}
                      {% if other_eid == _changed_eid %}
                        {% set lns.values = lns.values + [this_truth] %}
                      {% else %}
                        {% set other_cv = states(other_eid) %}
                        {% set other_prev = this.attributes.get('leaders', {}).get(other_eid, {}).get('previous_value', '') %}
                        {% set other_truth = eval_leader(other_eid, '', scope_pfx, fname, other_cv, other_prev) | trim == 'True' %}
                        {% set lns.values = lns.values + [other_truth] %}
                      {% endif %}
                    {% endfor %}
                    {% if mode == 'all' %}
                      {% set new_enabled = lns.values | min %}
                    {% else %}
                      {% set new_enabled = lns.values | max %}
                    {% endif %}
                  {% endif %}
                  {% set existing_f = ns.result.get(fname, {}) %}
                  {% set existing_s = existing_f.get(scope_val, {}) %}
                  {% set prev_entry = existing_s.get(scope_id_val, {}) %}
                  {% set prev_enabled = prev_entry.get('enabled', None) %}
                  {% set prev_ts = prev_entry.get('last_changed_timestamp', ts) %}
                  {% set flipped = (prev_enabled is none) or (prev_enabled != new_enabled) %}
                  {% set new_ts = ts if flipped else prev_ts %}
                  {% set new_entry = {
                    'enabled': new_enabled,
                    'mode': mode,
                    'last_changed_timestamp': new_ts,
                    'triggering_leader': _changed_eid
                  } %}
                  {% set existing_s = dict(existing_s, **{scope_id_val: new_entry}) %}
                  {% set existing_f = dict(existing_f, **{scope_val: existing_s}) %}
                  {% set ns.result = dict(ns.result, **{fname: existing_f}) %}
                {% endif %}
              {% endfor %}
            {% endif %}
          {% endif %}

          {{ ns.result }}

