- id: '1776536295923'
  alias: Labeled Feature Leaders
  description: >
    Reacts to `sensor.labeled_features_state.features` and dispatches followers
    for every (feature, scope, scope_id) entry whose `enabled` value flipped.

    Trigger: `state` on `sensor.labeled_features_state`, `attribute: features`.
    The automation diffs `trigger.from_state.attributes.features` against
    `trigger.to_state.attributes.features` and finds every entry whose
    `enabled` value changed.

    For each changed entry the automation:
      1. Identifies the dispatching leader = `entry.triggering_leader`.
         For manual overrides (`triggering_leader == ''`) the leader-label
         parsing is skipped and only the implicit feature dispatch runs.
      2. Applies runtime gates against the triggering leader's labels —
         Only, Between/Not Between, Toggle.
      3. Builds an action list from those labels (kind=script | kind=feature),
         keyed by (variant, tag). Implicit feature item auto-added unless a
         replacement-style `Script` / `Feature` label is present. Legacy
         `<F>: <state_value>` shorthand labels on the leader are translated
         into feature items targeting `<F>` with `leader_enabled=true`.
      4. Sorts by (tag, variant) — no-tag last, Enable→Normal→Disable.
      5. Filters by `enabled` (drops Enable variants when disabled and vice
         versa).
      6. Walks the array in one repeat:. For `script` items: dispatches the
         named script/automation/scene with resolved args. For `feature`
         items: resolves the follower set via the standard `(Area |Floor |)Follower:`
         + `(Area |Floor |)Provides: <DomainLabel>` resolver and calls
         `script.labeled_feature_follower` once per follower.
      7. Errors are routed through the feature's `Error Mode:` label
         (silent / log / alert / stop). `stop` halts only this feature's
         action loop; other features still dispatch.
  triggers:
  - trigger: state
    entity_id: sensor.labeled_features_state
    attribute: features
  conditions: []
  mode: queued
  max: 50
  actions:
  - variables:
      # Defensive: any of these may be non-mapping if the sensor's
      # attributes were carried over from the previous (flat) schema or
      # if something weird happened upstream. Coerce to {} so the diff
      # below is safe to walk.
      _now_features_raw: '{{ trigger.to_state.attributes.features | default({}) }}'
      _prev_features_raw: >-
        {{ (trigger.from_state.attributes.features
            if trigger.from_state is not none else {}) | default({}) }}
      _now_features: '{{ _now_features_raw if _now_features_raw is mapping else {} }}'
      _prev_features: '{{ _prev_features_raw if _prev_features_raw is mapping else {} }}'
      automation_error_mode: >-
        {% set em_label = labels('automation.labeled_feature_leaders')
            | map('label_name') | reject('none')
            | select('match', '(?i)^error mode: .+')
            | first | default('') %}
        {{ em_label | regex_replace('(?i)^error mode: ', '') | default('log', true) }}
  # Build a flat list of changed entries: every (feature, scope, scope_id)
  # whose `enabled` value differs from the previous snapshot (including
  # newly-added entries where the previous value was missing/undefined).
  # Each item carries: feature, scope, scope_id, enabled, triggering_leader,
  # last_changed_timestamp.
  - variables:
      changed_entries: >-
        {% set ns = namespace(items=[]) %}
        {% for fname, scopes_map in _now_features.items() %}
          {% set _sm = scopes_map if scopes_map is mapping else {} %}
          {% for scope_val, sids_map in _sm.items() %}
            {% set _sids = sids_map if sids_map is mapping else {} %}
            {% for scope_id_val, entry in _sids.items() %}
              {% set _entry = entry if entry is mapping else {} %}
              {% set _prev_f = _prev_features.get(fname, {}) %}
              {% set _prev_f = _prev_f if _prev_f is mapping else {} %}
              {% set _prev_s = _prev_f.get(scope_val, {}) %}
              {% set _prev_s = _prev_s if _prev_s is mapping else {} %}
              {% set prev_entry = _prev_s.get(scope_id_val, None) %}
              {% set _prev_entry = prev_entry if (prev_entry is not none and prev_entry is mapping) else none %}
              {% set prev_enabled = _prev_entry.get('enabled') if _prev_entry is not none else none %}
              {% set prev_ts = _prev_entry.get('last_changed_timestamp') if _prev_entry is not none else none %}
              {% set new_enabled = _entry.get('enabled', false) %}
              {% set new_ts = _entry.get('last_changed_timestamp') %}
              {# Dispatch predicate. Three paths into a dispatch:
                 1. First-seed entry (`prev_enabled is none`) — only
                    when the triggering leader's state is real (i.e.
                    not unknown/unavailable/none). This blocks the
                    boot-time noise where a leader's
                    unknown→real-state transition causes the sensor
                    to write its first features-entry, but with
                    `prev_enabled = none` — we'd otherwise dispatch
                    on every leader resolving from unknown on boot.
                    Manual overrides (triggering_leader == '') are
                    always real and always dispatch.
                 2. Genuine flip (`prev_enabled != new_enabled`) —
                    classic case, always dispatches.
                 3. Timestamp-only bump (`prev_ts != new_ts`) — only
                    counts when the triggering leader is a button/
                    event-domain entity. The sensor only bumps
                    timestamp-without-flip for those, so this gate
                    prevents non-button leader re-evaluations from
                    spuriously firing. #}
              {% set _trig = _entry.get('triggering_leader', '') %}
              {% set _trig_dom = (_trig | string).split('.')[0] if _trig else '' %}
              {% set _is_button = _trig_dom in ['event', 'button'] %}
              {% set _leader_state_real = (_trig | trim) == ''
                  or (states(_trig) | string | lower) not in ['unknown', 'unavailable', 'none'] %}
              {% set _is_first_seed = prev_enabled is none %}
              {% if (_is_first_seed and _leader_state_real)
                    or (not _is_first_seed and prev_enabled != new_enabled)
                    or (_is_button and prev_ts is not none and new_ts is not none and prev_ts != new_ts) %}
                {% set ns.items = ns.items + [{
                  'feature': fname,
                  'scope': scope_val,
                  'scope_id': scope_id_val,
                  'enabled': new_enabled,
                  'triggering_leader': _entry.get('triggering_leader', ''),
                  'last_changed_timestamp': _entry.get('last_changed_timestamp', 0),
                }] %}
              {% endif %}
            {% endfor %}
          {% endfor %}
        {% endfor %}
        {{ ns.items | sort(attribute='feature') }}
  - repeat:
      for_each: '{{ changed_entries }}'
      sequence:
      - variables:
          _entry: '{{ repeat.item }}'
          feature_name: '{{ _entry.feature }}'
          resolved_scope: '{{ _entry.scope }}'
          resolved_scope_id: '{{ _entry.scope_id }}'
          leader_enabled: '{{ _entry.enabled }}'
          leader_entity_id: '{{ _entry.triggering_leader }}'
          # Manual overrides have an empty triggering_leader; we skip
          # all leader-label parsing and runtime gates for them and
          # only run the implicit feature dispatch.
          _is_manual_override: '{{ (leader_entity_id | trim) == "" }}'
          all_leader_labels: >-
            {% if (leader_entity_id | trim) != '' %}
              {{ labels(leader_entity_id) | map('label_name') | reject('none') | list }}
            {% else %}
              {{ [] }}
            {% endif %}
          # NOTE: `leader_current_value` is intentionally re-computed in
          # the next `variables:` block — this first definition existed
          # only as a left-over typo (passed an entire dict through
          # `dictsort` and then misused `map('first')`). It's left here
          # as `''` so anything that referenced it in this block before
          # the rebuild gets a safe default instead of a TypeError when
          # the sensor's `leaders` attribute is a mapping (which it
          # always is). Real value resolved in the next step.
          leader_current_value: ''
          # Resolve area/floor ids for downstream resolution. For
          # leader-driven entries we trust the triple's scope/scope_id.
          # For runtime label-prefix resolution we still need
          # resolved_area_id / resolved_floor_id below.
          resolved_area_id: >-
            {%- if resolved_scope == 'area' -%}{{ resolved_scope_id }}
            {%- elif (leader_entity_id | trim) != '' -%}{{ area_id(leader_entity_id) | default('', true) | trim }}
            {%- else -%}{{- '' -}}{%- endif -%}
          resolved_floor_id: >-
            {%- if resolved_scope == 'floor' -%}{{ resolved_scope_id }}
            {%- elif (leader_entity_id | trim) != '' -%}
              {%- set aid = area_id(leader_entity_id) -%}
              {%- set ns = namespace(found='') -%}
              {%- for fid in floors() -%}
                {%- if aid in floor_areas(fid) -%}{%- set ns.found = fid -%}{%- endif -%}
              {%- endfor -%}{{ ns.found }}
            {%- else -%}{{- '' -}}{%- endif -%}
          scoped_feature_leader: '{{ (resolved_scope | capitalize + '' '') if
            resolved_scope in [''area'', ''floor''] else '''' }}{{ feature_name
            }}'
      - variables:
          # leader_current_value: pulled from the sensor's `leaders` map.
          # Used by the legacy `<F>: <state_value>` shorthand parser below.
          # `state_attr(...).get(leader_entity_id, {}).get('current_value', '')`
          # is the straightforward path — no `dictsort | items` chain
          # (which choked on mappings with the "Can only get item pairs
          # from a mapping" TypeError).
          leader_current_value: >-
            {% if (leader_entity_id | trim) != '' %}
              {% set _ldrs = state_attr('sensor.labeled_features_state', 'leaders') | default({}) %}
              {% set _ldrs = _ldrs if _ldrs is mapping else {} %}
              {% set _l = _ldrs.get(leader_entity_id, {}) %}
              {% set _l = _l if _l is mapping else {} %}
              {{ _l.get('current_value', '') | string }}
            {% else %}{{ '' }}{% endif %}
          leader_only: "{% set only_label = scoped_feature_leader + ' Only: ' %}
            {% set match = all_leader_labels
                | select('match', '^' + only_label + '(Enable|Disable)$')
                | first | default('') %}
            {{ match | regex_replace('^.+: ', '') }}"
          leader_between: "{{ all_leader_labels
            | select('match', '^' + scoped_feature_leader + ' Between: .+')
            | map('regex_replace', '^.+: ', '') | list }}"
          leader_not_between: "{{ all_leader_labels
            | select('match', '^' + scoped_feature_leader + ' Not Between: .+')
            | map('regex_replace', '^.+: ', '') | list }}"
          leader_time_ok: '{% set now_time = now().strftime(''%H:%M'') %} {% set
            ns = namespace(ok=true, any_b=false) %} {% for val in leader_between
            %} {% set p = val.split('':'') %} {% set s = p[0]+'':''+p[1] if (p|length==4
            or (p|length==3 and p[2]==''-'')) and p[0]!=''-'' else ''-'' %} {%
            set e = p[2]+'':''+p[3] if p|length==4 else (p[1]+'':''+p[2] if p|length==3
            and p[0]==''-'' else ''-'') %} {% set in_r = ((s==''-'' or now_time>=s)
            and (e==''-'' or now_time<=e)) if (s==''-'' or e==''-'' or s<=e) else
            (now_time>=s or now_time<=e) %} {% if in_r %}{% set ns.any_b = true
            %}{% endif %} {% endfor %} {% if leader_between|length > 0 %}{% set
            ns.ok = ns.any_b %}{% endif %} {% for val in leader_not_between %}
            {% set p = val.split('':'') %} {% set s = p[0]+'':''+p[1] if (p|length==4
            or (p|length==3 and p[2]==''-'')) and p[0]!=''-'' else ''-'' %} {%
            set e = p[2]+'':''+p[3] if p|length==4 else (p[1]+'':''+p[2] if p|length==3
            and p[0]==''-'' else ''-'') %} {% set in_r = ((s==''-'' or now_time>=s)
            and (e==''-'' or now_time<=e)) if (s==''-'' or e==''-'' or s<=e) else
            (now_time>=s or now_time<=e) %} {% if in_r %}{% set ns.ok = false
            %}{% endif %} {% endfor %} {{ ns.ok }}'
          leader_toggle: '{{ (scoped_feature_leader + " Toggle: True") in all_leader_labels }}'
          # leader_should_proceed: runtime gate. Manual overrides bypass
          # all of these (the entry already represents the intended
          # value), so we early-out when there's no triggering leader.
          # Direction labels (Increasing/Decreasing) are already applied
          # in the sensor — we no longer need to filter them here.
          leader_should_proceed: '{% if (leader_entity_id | trim) == "" %} true
            {% elif leader_toggle %} true
            {% elif leader_only == "Enable" and not leader_enabled %} false
            {% elif leader_only == "Disable" and leader_enabled %} false
            {% elif not leader_time_ok %} false
            {% else %} true {% endif %}'
          feature_error_mode: "{% set pfx = scoped_feature_leader + ' Error Mode: ' %}
            {% set match = all_leader_labels
                | select('match', '^' + pfx + '(silent|log|alert|stop)$')
                | first | default('') %}
            {{ match | regex_replace('^.+: ', '') | default(automation_error_mode, true) }}"
          # Script Call Mode — resolved from labels on
          # `sensor.labeled_features_state` (NOT the leader entity).
          # Priority (highest first):
          #   1. `<scope_prefix><F> Script Call Mode: <X>`
          #   2. `<F> Script Call Mode: <X>`
          #   3. `Script Call Mode: <X>`               (sensor-wide default)
          #   4. Hardcoded fallback: Blocking
          # `<X>` ∈ `Blocking | NonBlocking` (case-insensitive match).
          # Affects only the `script.*` dispatch branch below — when
          # NonBlocking, the script is fired via `script.turn_on` so
          # the leader automation's queued iteration doesn't wait for
          # the script to complete. Safe only for scripts whose mode is
          # `parallel` or `restart` (otherwise script.turn_on still
          # blocks). `automation.*` and `scene.*` refs are unaffected.
          feature_script_call_mode: >-
            {% set sensor_labels = labels('sensor.labeled_features_state')
                | map('label_name') | reject('none') | list %}
            {% set scoped_pfx = scoped_feature_leader ~ ' Script Call Mode: ' %}
            {% set bare_pfx = feature_name ~ ' Script Call Mode: ' %}
            {% set global_pfx = 'Script Call Mode: ' %}
            {% set scoped_match = sensor_labels
                | select('match', '^' ~ scoped_pfx ~ '(?i)(blocking|nonblocking)$')
                | first | default('') %}
            {% set bare_match = sensor_labels
                | select('match', '^' ~ bare_pfx ~ '(?i)(blocking|nonblocking)$')
                | first | default('') %}
            {% set global_match = sensor_labels
                | select('match', '^' ~ global_pfx ~ '(?i)(blocking|nonblocking)$')
                | first | default('') %}
            {% set picked = scoped_match if scoped_match != ''
                else (bare_match if bare_match != ''
                else (global_match if global_match != '' else '')) %}
            {% set normalized = (picked | regex_replace('^.+: ', '') | lower) %}
            {{ 'nonblocking' if normalized == 'nonblocking'
                else ('blocking' if normalized == 'blocking' else 'blocking') }}
          leader_feature_overrides: "{% set cv = leader_current_value | trim %}
            {% if cv != '' and (leader_entity_id | trim) != '' %}
              {% set ns = namespace(features=[]) %}
              {% for lbl in all_leader_labels %}
                {% if lbl | regex_search(': ' + cv + '$') %}
                  {% set prefix_raw = lbl | regex_replace(': ' + cv + '$', '') | trim %}
                  {% set prefix = prefix_raw | regex_replace('^(Area |Floor )', '') | trim %}
                  {% if not prefix | regex_search('^(Area |Floor |)Leader')
                        and not prefix | regex_search('^(Area |Floor |)Follower')
                        and not prefix | regex_search('^Feature')
                        and not prefix | regex_search(' (Enable|Disable|Invert|Only|Script|Error Mode)$')
                        and not prefix | regex_search(' (Between|Not Between|Increasing|Decreasing)$')
                        and not prefix | regex_search(' Arg ') %}
                    {% set ns.features = ns.features + [prefix] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ ns.features }}
            {% else %}{{ [] }}{% endif %}"
      - condition: template
        value_template: '{{ leader_should_proceed }}'

      # ─────────────────────────────────────────────────────────────
      # Step 2 — Build the action list from labels (leader entity).
      # Mirrors the follower's parser: regex_search + regex_replace
      # per label to extract variant / extra / kind / tag / ref.
      # Plus the legacy `<F>: <state_value>` shorthand on a leader
      # is also translated into a feature item targeting <F>.
      # ─────────────────────────────────────────────────────────────
      - variables:
          _label_actions: >-
            {% set ns = namespace(items=[]) %}
            {% set sf = scoped_feature_leader %}
            {% set base_re = '^' ~ sf ~ ' (Enable |Disable )?(Extra )?(Script|Feature)( \\S+)?: .+$' %}
            {% for lbl in all_leader_labels %}
              {% if lbl | regex_search(base_re) %}
                {% set variant = 'enable' if (lbl | regex_search('^' ~ sf ~ ' Enable '))
                                 else ('disable' if (lbl | regex_search('^' ~ sf ~ ' Disable '))
                                       else 'normal') %}
                {% set extra = lbl | regex_search('^' ~ sf ~ ' (Enable |Disable )?Extra ') %}
                {% set kind_word = ('script'
                  if (lbl | regex_search('^' ~ sf ~ ' (Enable |Disable )?(Extra )?Script( |:)'))
                  else 'feature') %}
                {% set kw = 'Script' if kind_word == 'script' else 'Feature' %}
                {% set tag_pat = '^' ~ sf ~ ' (Enable |Disable )?(Extra )?' ~ kw ~ ' (\\S+): ' %}
                {% set tag_match = lbl | regex_findall(tag_pat) %}
                {% set tag = '' %}
                {% if tag_match | length > 0 %}
                  {% set first = tag_match[0] %}
                  {% if first is string %}{% set tag = first | trim %}
                  {% else %}{% set tag = first[-1] | trim %}{% endif %}
                {% endif %}
                {% set ref = lbl | regex_replace('^[^:]+: ', '') | trim %}
                {% set ns.items = ns.items + [{
                  'kind': kind_word,
                  'replaces_implicit': (not extra),
                  'variant': variant,
                  'tag': tag,
                  'ref': ref
                }] %}
              {% endif %}
            {% endfor %}
            {{ ns.items }}
          # ── Arg pool keyed by (variant, tag).
          # Substitution syntax:  <attribute>.<dotted.path>
          #   - Must match ^[A-Za-z_][A-Za-z0-9_]*\.
          #   - First segment names a top-level attribute on
          #     sensor.labeled_features_state.
          #   - Walks the remaining segments through nested dicts.
          #   - Empty segment ('..') is a literal empty-string key
          #     (used for global scope's '' scope_id).
          #   - Special case for `leaders`: if the first path
          #     segment is not already a key in `leaders` dict,
          #     splice the triggering leader_entity_id in as the
          #     first key.
          _arg_pools: >-
            {% set _sensor_attrs = states['sensor.labeled_features_state'].attributes
                                   if states['sensor.labeled_features_state'] is not none else {} %}
            {% set sf = scoped_feature_leader %}
            {% set arg_re = '^' ~ sf ~ ' (Enable |Disable )?Arg(?: \\S+)? \\S+: .+$' %}
            {% set sub_re = '^[A-Za-z_][A-Za-z0-9_]*\\.' %}
            {% set ns = namespace(pools={}) %}
            {% for lbl in all_leader_labels %}
              {% if lbl | regex_search(arg_re) %}
                {% set variant = 'enable' if (lbl | regex_search('^' ~ sf ~ ' Enable Arg'))
                                 else ('disable' if (lbl | regex_search('^' ~ sf ~ ' Disable Arg'))
                                       else 'normal') %}
                {% if variant == 'normal' %}
                  {% set after_arg = lbl | regex_replace('^' ~ sf ~ ' Arg ', '') %}
                {% else %}
                  {% set vw = 'Enable' if variant == 'enable' else 'Disable' %}
                  {% set after_arg = lbl | regex_replace('^' ~ sf ~ ' ' ~ vw ~ ' Arg ', '') %}
                {% endif %}
                {% set head = after_arg | regex_replace(':.*$', '') %}
                {% set toks = head.split() %}
                {% if toks | length >= 2 %}
                  {% set tag = toks[0] | trim %}
                  {% set field_raw = toks[1] | trim %}
                {% else %}
                  {% set tag = '' %}
                  {% set field_raw = toks[0] | trim %}
                {% endif %}
                {% set raw = lbl | regex_replace('^[^:]+: ', '') | trim %}
                {% if raw | regex_search(sub_re) %}
                  {% set parts = raw.split('.') %}
                  {% set attr_name = parts[0] %}
                  {% set path = parts[1:] %}
                  {% set cur_ns = namespace(v=_sensor_attrs.get(attr_name, none)) %}
                  {% if attr_name == 'leaders' and path | length > 0
                        and cur_ns.v is not none
                        and (path[0] not in cur_ns.v)
                        and (leader_entity_id | trim) != '' %}
                    {% set cur_ns.v = cur_ns.v.get(leader_entity_id, none) %}
                  {% endif %}
                  {% for seg in path %}
                    {% if cur_ns.v is mapping %}
                      {% set cur_ns.v = cur_ns.v.get(seg, none) %}
                    {% else %}
                      {% set cur_ns.v = none %}
                    {% endif %}
                  {% endfor %}
                  {% set resolved = (cur_ns.v if cur_ns.v is not none else raw) | string %}
                {% else %}
                  {% set resolved = raw %}
                {% endif %}
                {% set pool_key = variant ~ '||' ~ tag %}
                {% set existing = ns.pools.get(pool_key, {}) %}
                {% set ns.pools = dict(ns.pools, **{pool_key: dict(existing, **{field_raw: resolved})}) %}
              {% endif %}
            {% endfor %}
            {{ ns.pools }}
          # Legacy `<F>: <state_value>` shorthand on leaders.
          #
          # NB: filter `ovr == feature_name`. The shorthand items carry
          # `replaces_implicit: true` so they suppress the current
          # feature's implicit dispatch. Without this guard, when one
          # leader carries shorthand labels for *multiple* features
          # (e.g. `Day: Day` and `Night: Night` on input_select.house_mode)
          # the shorthand resolved for the leader's current state would
          # also drop the implicit item on every *other* feature's
          # triple flipping on the same tick — so a Night → Day transition
          # would silently skip dispatching the Night feature with
          # `leader_enabled = false`. The shorthand is conceptually about
          # "when state == X, dispatch feature X", so only the matching
          # feature's iteration should see the shorthand item.
          _shorthand_features: >-
            {% set ns = namespace(items=[]) %}
            {% for ovr in leader_feature_overrides %}
              {% if ovr == feature_name %}
                {% set ovr_toggle = (ovr + ' Toggle: True') in all_leader_labels %}
                {% set ns.items = ns.items + [{
                  'kind': 'feature',
                  'replaces_implicit': true,
                  'variant': 'normal',
                  'tag': '',
                  'ref': ovr,
                  'shorthand': true,
                  'shorthand_toggle': ovr_toggle
                }] %}
              {% endif %}
            {% endfor %}
            {{ ns.items }}
          _has_replacement: >-
            {{ (_label_actions + _shorthand_features)
               | selectattr('replaces_implicit', 'equalto', true)
               | list | length > 0 }}
      - variables:
          _action_list: >-
            {%- set implicit = [] -%}
            {%- if not _has_replacement -%}
              {%- set implicit = [{
                'kind': 'feature',
                'replaces_implicit': false,
                'variant': 'normal',
                'tag': '',
                'ref': '',
                'implicit': true
              }] -%}
            {%- endif -%}
            {{ _label_actions + _shorthand_features + implicit }}

      # ─────────────────────────────────────────────────────────────
      # Step 3 — Sort by (tag, variant). Step 4 — filter by state.
      # ─────────────────────────────────────────────────────────────
      - variables:
          _variant_rank: >-
            {{ {'enable': 0, 'normal': 1, 'disable': 2} }}
          sorted_actions: >-
            {%- set ns = namespace(annotated=[]) -%}
            {%- for it in _action_list -%}
              {%- set tag = it.tag | default('') -%}
              {%- set tag_bucket = 1 if tag == '' else 0 -%}
              {%- set tag_key = tag if tag != '' else '~~' -%}
              {%- set variant_key = _variant_rank.get(it.variant | default('normal'), 1) -%}
              {%- set ns.annotated = ns.annotated + [
                dict(it, **{
                  '_tag_bucket': tag_bucket,
                  '_tag_key': tag_key,
                  '_variant_key': variant_key
                })
              ] -%}
            {%- endfor -%}
            {{ ns.annotated
               | sort(attribute='_variant_key')
               | sort(attribute='_tag_key')
               | sort(attribute='_tag_bucket') }}
          filtered_actions: >-
            {%- set ns = namespace(out=[]) -%}
            {%- for it in sorted_actions -%}
              {%- set v = it.variant | default('normal') -%}
              {%- if v == 'enable' and not (leader_enabled | bool) -%}
              {%- elif v == 'disable' and (leader_enabled | bool) -%}
              {%- else -%}
                {%- set ns.out = ns.out + [it] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.out }}
          _scope_pfx: >-
            {{ 'Area ' if resolved_scope == 'area' else ('Floor ' if resolved_scope == 'floor' else '') }}
          scope_entity_set: >-
            {% if resolved_scope == 'area' and resolved_area_id != '' %}
              {% set area_ents = area_entities(resolved_area_id) | list %}
              {% set area_devs = area_devices(resolved_area_id) %}
              {% set ns = namespace(dev_ents=[]) %}
              {% for d in area_devs %}
                {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
              {% endfor %}
              {{ (area_ents + ns.dev_ents) | unique | list }}
            {% elif resolved_scope == 'floor' and resolved_floor_id != '' %}
              {% set ns = namespace(ents=[]) %}
              {% for a in floor_areas(resolved_floor_id) %}
                {% set ns.ents = ns.ents + area_entities(a) | list %}
                {% for d in area_devices(a) %}
                  {% set ns.ents = ns.ents + device_entities(d) | list %}
                {% endfor %}
              {% endfor %}
              {{ ns.ents | unique | list }}
            {% else %}
              {{ [] }}
            {% endif %}
          _std_fields_base: >-
            {{ {'leader_entity_id': leader_entity_id,
                'feature': feature_name,
                'leader_feature': feature_name,
                'leader_enabled': leader_enabled,
                'scope': resolved_scope,
                'scope_id': resolved_scope_id} }}

      # ─────────────────────────────────────────────────────────────
      # Step 5 — Execute the action loop.
      # ─────────────────────────────────────────────────────────────
      - repeat:
          for_each: '{{ filtered_actions }}'
          sequence:
          - variables:
              _it: '{{ repeat.item }}'
              _args: >-
                {{ _arg_pools.get(((_it.variant | default('normal')) ~ '||' ~ (_it.tag | default(''))), {}) }}

          - choose:
            # ───────── script kind ─────────
            - conditions:
                - condition: template
                  value_template: '{{ _it.kind == "script" }}'
              sequence:
              - if:
                - condition: template
                  value_template: '{{ (_it.ref | default("") | string | trim) == "" }}'
                then:
                - action: script.labeled_feature_error_mode
                  data:
                    error_mode: '{{ feature_error_mode }}'
                    source: Labeled Feature Leaders
                    message: >-
                      Empty script ref in action item (variant={{ _it.variant }},
                      tag={{ _it.tag }}) for {{ leader_entity_id }} (feature: {{ feature_name }}).
                - stop: 'LF Leaders: empty script ref (handled per error_mode).'
              - if:
                - condition: template
                  value_template: '{{ _it.ref.startswith("automation.") or _it.ref.startswith("scene.") }}'
                then:
                # `automation.*` / `scene.*` refs are unaffected by
                # Script Call Mode. `automation.trigger` returns
                # quickly; `scene.turn_on` is inherently fire-and-
                # forget. Both are safe to invoke directly.
                - action: '{{ _it.ref }}'
                  data: {}
                  continue_on_error: true
                else:
                # `script.*` ref. Branch on Script Call Mode:
                #   - blocking (default): invoke directly so the
                #     outer for_each iteration awaits completion.
                #     Preserves current semantics — any downstream
                #     work that depends on the script having finished
                #     keeps working.
                #   - nonblocking: invoke via `script.turn_on`, which
                #     fire-and-forgets when the target script's mode
                #     is `parallel` or `restart`. Required for long-
                #     running scripts (e.g. `labeled_feature_sleep_timeout`
                #     with its 15-minute delay) so they don't block
                #     the leader automation's queued iteration.
                - variables:
                    _all_args: '{{ _args or {} }}'
                - if:
                  - condition: template
                    value_template: '{{ feature_script_call_mode == "nonblocking" }}'
                  then:
                  - action: script.turn_on
                    target:
                      entity_id: '{{ _it.ref | trim }}'
                    data:
                      variables: '{{ _std_fields_base | combine(_all_args | default({})) }}'
                    continue_on_error: true
                  else:
                  - choose:
                    - conditions:
                        - condition: template
                          value_template: '{{ _all_args | length == 0 }}'
                      sequence:
                      - action: '{{ _it.ref }}'
                        data: '{{ _std_fields_base }}'
                        continue_on_error: true
                    default:
                    - action: script.turn_on
                      target:
                        entity_id: '{{ _it.ref | trim }}'
                      data:
                        variables: '{{ _std_fields_base | combine(_all_args) }}'
                      continue_on_error: true

            # ───────── feature kind ─────────
            - conditions:
                - condition: template
                  value_template: '{{ _it.kind == "feature" }}'
              sequence:
              - variables:
                  _target_feature: >-
                    {{ _it.ref if (_it.ref | default('') | trim != '') else feature_name }}
                  _it_toggle: >-
                    {{ _it.shorthand_toggle if (_it.shorthand | default(false)) else leader_toggle }}
                  _follower_label_name: >-
                    {%- if resolved_scope == 'area' -%}Area Follower: {{ _target_feature }}
                    {%- elif resolved_scope == 'floor' -%}Floor Follower: {{ _target_feature }}
                    {%- else -%}Follower: {{ _target_feature }}{%- endif -%}
                  _target_catalog: >-
                    {% set catalog = state_attr('sensor.labeled_features_state', 'feature_meta') | default({}) %}
                    {{ catalog.get(_target_feature, {}) }}
                  _target_domain_label: '{{ _target_catalog.get("domain_label", "") }}'
                  _provides_followers: >-
                    {% if _target_domain_label == '' %}
                      {{ [] }}
                    {% else %}
                      {% set bare_lbl = 'Provides: ' ~ _target_domain_label %}
                      {% set scoped_lbl = _scope_pfx ~ 'Provides: ' ~ _target_domain_label %}
                      {{ ((label_entities(bare_lbl) | list)
                          + (label_entities(scoped_lbl) | list)) | unique | list }}
                    {% endif %}
                  _all_followers: >-
                    {% set all_f = (label_entities(_follower_label_name) | list
                                    + _provides_followers) | unique | list %}
                    {% if scope_entity_set | length > 0 %}
                      {{ all_f | select('in', scope_entity_set) | list }}
                    {% else %}
                      {{ all_f }}
                    {% endif %}

              - repeat:
                  for_each: '{{ _all_followers }}'
                  sequence:
                  - action: script.labeled_feature_follower
                    data:
                      follower_entity_id: '{{ repeat.item }}'
                      feature: '{{ _target_feature }}'
                      leader_entity_id: '{{ leader_entity_id }}'
                      leader_enabled: '{{ leader_enabled }}'
                      toggle: '{{ _it_toggle | default(false) }}'
                      error_mode: '{{ feature_error_mode }}'
                      scope: '{{ resolved_scope }}'
                      scope_id: '{{ resolved_scope_id }}'
                    continue_on_error: true

          # ── Per-iteration error routing ──
          - if:
            - condition: template
              value_template: '{{ error is defined }}'
            then:
            - if:
              - condition: template
                value_template: '{{ feature_error_mode == "log" }}'
              then:
              - action: system_log.write
                data:
                  level: error
                  message: >-
                    Labeled Feature Leaders: action error (kind={{ _it.kind }},
                    ref={{ _it.ref }}, tag={{ _it.tag }}, variant={{ _it.variant }})
                    for {{ leader_entity_id }} (feature: {{ feature_name }}): {{ error }}
            - if:
              - condition: template
                value_template: '{{ feature_error_mode == "alert" }}'
              then:
              - action: script.send_alert
                data:
                  alert_severity: high
                  alert_title: Labeled Feature Leaders Error
                  alert_message: >-
                    Action error (kind={{ _it.kind }}, ref={{ _it.ref }},
                    tag={{ _it.tag }}) for {{ leader_entity_id }}
                    (feature: {{ feature_name }}): {{ error }}
            - if:
              - condition: template
                value_template: '{{ feature_error_mode == "stop" }}'
              then:
              - stop: 'Labeled Feature Leaders: halted on {{ _it.ref }} (feature: {{ feature_name }})'
                error: true
