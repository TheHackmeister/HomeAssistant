- id: '1748107265361'
  alias: 'Water Supply: Error Handling'
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.water_supply_01_sensors_fill_distance
    to: unknown
    id: fill_sensor
  - trigger: numeric_state
    entity_id:
    - number.water_supply_01_sensors_ph_known_calibration_value
    above: 8.5
    id: high_ph
  - trigger: numeric_state
    entity_id:
    - number.water_supply_01_sensors_fill_distance_known_calibration_value
    below: -20
    id: fill_sensor_too_low
  - trigger: numeric_state
    entity_id:
    - number.water_supply_01_sensors_fill_distance_known_calibration_value
    above: 14
    id: fill_sensor_too_high
  - trigger: numeric_state
    entity_id:
    - sensor.water_supply_01_sensors_bus_psi
    above: 110
    id: psi_too_high
  - trigger: numeric_state
    entity_id:
    - sensor.water_supply_01_sensors_bus_psi
    below: -6
    id: psi_unplugged_too_low
  - trigger: numeric_state
    entity_id:
    - sensor.water_supply_01_sensors_bus_psi
    below: 40
    id: psi_too_low
    for:
      hours: 0
      minutes: 30
      seconds: 0
  - trigger: numeric_state
    entity_id:
    - sensor.water_supply_01_psi_derivative
    for:
      hours: 0
      minutes: 0
      seconds: 20
    below: -2
    id: psi_declining
  - alias: When the pump doesn't increase PSI for 10 minutes
    trigger: template
    value_template: "{{ \n        (states | selectattr('entity_id', 'in', area_entities('water_supply_01'))
      | selectattr('entity_id', 'in', label_entities('Nutrient: Water Supply')) |
      map(attribute='state') | list | unique | list | length) != 1 }}"
    for:
      hours: 0
      minutes: 10
      seconds: 0
    id: pump_dry
  - trigger: numeric_state
    entity_id:
    - sensor.water_supply_01_psi_derivative
    below: -500
    id: tank_disconnect
  - trigger: state
    entity_id:
    - input_select.water_supply_01_mode
    from: Volume
    for:
      hours: 0
      minutes: 30
      seconds: 0
    id: out_of_volume_mode
  - trigger: template
    value_template: '{{ states.binary_sensor | selectattr(''attributes.device_class'',
      ''defined'') |  selectattr(''attributes.device_class'', ''match'', ''moisture'')
      |  selectattr(''state'', ''eq'', ''on'') | list | count }}'
    id: any_leak_detected
    enabled: true
  conditions:
  - condition: state
    entity_id: input_select.water_supply_01_mode
    state: Volume
    enabled: false
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - fill_sensor
      sequence:
      - action: input_select.select_option
        metadata: {}
        target:
          entity_id: input_select.water_supply_01_mode
        data:
          option: Idle
      - wait_for_trigger:
        - trigger: state
          entity_id:
          - sensor.water_supply_01_sensors_fill_distance
          from: unknown
        timeout:
          hours: 2
          minutes: 0
          seconds: 0
          milliseconds: 0
      - action: input_select.select_option
        metadata: {}
        target:
          entity_id: input_select.water_supply_01_mode
        data:
          option: Volume
      - variables:
          error_text: Fill Sensor Offline
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
    - conditions:
      - condition: trigger
        id:
        - high_ph
      sequence:
      - variables:
          error_text: High PH
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
    - conditions:
      - condition: trigger
        id:
        - leak_detected
      sequence:
      - variables:
          error_text: Leak Detected!
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
    - conditions:
      - condition: trigger
        id:
        - any_leak_detected
      sequence:
      - variables:
          error_text: "{% set last_changed = states\n | selectattr('entity_id' , 'contains',
            '_leak')\n | sort(attribute='last_changed', reverse=true)\n | first %}\nLeak
            detected at {{ now() }}! <BR> Last triggered sensor: {{ last_changed.entity_id
            }} in {{ area_name(last_changed.entity_id) }}\n"
        enabled: true
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
    - conditions:
      - condition: trigger
        id:
        - fill_sensor_too_low
      sequence:
      - variables:
          error_text: Fill sensor too low
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
    - conditions:
      - condition: trigger
        id:
        - fill_sensor_too_high
      sequence:
      - variables:
          error_text: Fill sensor too high
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
    - conditions:
      - condition: trigger
        id:
        - psi_too_high
      sequence:
      - variables:
          error_text: PSI too high
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
    - conditions:
      - condition: trigger
        id:
        - psi_unplugged_too_low
      sequence:
      - variables:
          error_text: PSI unrealistically too low. Check sensor plugged in?
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
    - conditions:
      - condition: trigger
        id:
        - psi_too_low
      sequence:
      - variables:
          error_text: PSI too low for longer than 30 mins!
        enabled: true
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
    - conditions:
      - condition: trigger
        id:
        - psi_declining
      sequence:
      - variables:
          error_text: "{% set last_changed = states\n | selectattr('entity_id', 'in',
            label_entities('Nutrient: Electrolytes'))\n | sort(attribute='last_changed',
            reverse=true)\n | first %}\nPSI Decling at {{ now() }}. <BR> Last triggered
            RZ: {{ area_name(last_changed.entity_id) }}({{ last_changed.state }})
            at {{ last_changed.last_changed }}\n"
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
        enabled: true
    - conditions:
      - condition: trigger
        id:
        - pump_dry
      sequence:
      - variables:
          error_text: Pump Dry
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
    - conditions:
      - condition: trigger
        id:
        - tank_disconnect
      - condition: state
        entity_id: input_select.water_supply_01_mode
        state: Volume
      sequence:
      - wait_for_trigger:
        - trigger: numeric_state
          entity_id:
          - sensor.water_supply_01_sensors_bus_psi
          for:
            hours: 0
            minutes: 0
            seconds: 3
          below: 40
        timeout:
          hours: 0
          minutes: 0
          seconds: 30
          milliseconds: 0
        continue_on_timeout: false
      - variables:
          error_text: Tank Disconnected
      - data:
          message: '{{ error_text }}'
        action: notify.persistent_notification
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
        enabled: true
      - action: input_select.select_option
        metadata: {}
        data:
          option: Error
        target:
          entity_id: input_select.water_supply_01_mode
        enabled: false
      - wait_for_trigger:
        - trigger: numeric_state
          entity_id:
          - sensor.water_supply_01_psi_derivative
          above: 500
        timeout:
          hours: 0
          minutes: 30
          seconds: 0
          milliseconds: 0
        continue_on_timeout: false
      - action: input_select.select_option
        metadata: {}
        data:
          option: Volume
        target:
          entity_id: input_select.water_supply_01_mode
      - variables:
          error_text: Tank Reconnected
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
        enabled: true
    - conditions:
      - condition: trigger
        id:
        - out_of_volume_mode
      sequence:
      - variables:
          error_text: Out of Volume mode for 30 mins!
        enabled: true
      - action: notify.mobile_app_pixel_6
        metadata: {}
        data:
          message: '{{ error_text }}'
    default:
    - variables:
        error_text: Error notification!
    - action: notify.mobile_app_pixel_6
      metadata: {}
      data:
        message: '{{ error_text }}'
  - data:
      message: '{{ error_text }}'
    action: notify.persistent_notification
  mode: single
