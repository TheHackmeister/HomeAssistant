- id: '1767644744620'
  alias: 'Sensors: Area Manifests trigger'
  description: Updates area manifest sensors when tracked entities change areas or
    on startup
  triggers:
  - trigger: homeassistant
    event: start
    id: startup
  - trigger: event
    event_type: entity_registry_updated
    event_data:
      action: update
    id: registry_update
  conditions:
  - condition: or
    conditions:
    - condition: trigger
      id: startup
    - condition: and
      conditions:
      - condition: trigger
        id: registry_update
      - condition: template
        value_template: "{% set old_area_id = trigger.event.data.changes.area_id %}
          {% set new_area_id = area_id(trigger.event.data.entity_id) %} {% set type_labels
          = labels() | select('match', '^type_') | list %} {% set all_labels = type_labels
          + ['track_area_ids'] %} {% set tracked_areas = all_labels \n   | map('label_entities')
          \n   | sum(start=[]) \n   | map('area_id') \n   | reject('none') \n   |
          unique \n   | list %}\n{{ old_area_id in tracked_areas or new_area_id in
          tracked_areas }}\n"
  actions:
  - if:
    - condition: trigger
      id: startup
    then:
    - delay:
        seconds: 45
  - variables:
      tracked_labels: '{{ (labels() | select(''match'', ''^type_'') | list + [''track_area_ids''])
        | unique | list }}'
      areas: "{% set ns = namespace(areas=[]) %} {% for label in tracked_labels %}\n
        \ {% for area in label_areas(label) %}\n    {% if area not in ns.areas %}\n
        \     {% set ns.areas = ns.areas + [area] %}\n    {% endif %}\n  {% endfor
        %}\n{% endfor %} {{ ns.areas }}"
  - repeat:
      for_each: '{{ areas }}'
      sequence:
      - variables:
          current_area: '{{ repeat.item }}'
          entities_in_area: '{{ area_entities(current_area) | list }}'
          devices_in_area: "{% set ns = namespace(devices=[]) %} {% for entity_id
            in area_entities(current_area) %}\n  {% set d_id = device_id(entity_id)
            %}\n  {% if d_id and d_id not in ns.devices %}\n    {% set ns.devices
            = ns.devices + [d_id] %}\n  {% endif %}\n{% endfor %} {{ ns.devices }}\n"
          current_area_name: '{{ area_name(current_area) }}'
      - action: script.sensors_area_manifests
        data:
          area_id: '{{ current_area }}'
          area_name: '{{ current_area_name }}'
          entity_ids: '{{ entities_in_area }}'
          device_ids: '{{ devices_in_area }}'
  mode: restart
- id: '1767665604733'
  alias: Alert2 Actionable - pH
  description: ''
  triggers:
