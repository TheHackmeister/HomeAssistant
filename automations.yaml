- id: 'labeled_feature_areas'
  alias: Labeled Feature Areas
  description: >
    Reacts to changes in `sensor.labeled_feature_areas_state.label_map`
    (the flat `<scope_id>||<label>` → label_data map computed in
    configuration.yaml's trigger-based template sensor) and dispatches
    creates / deletes via `script.labeled_feature_area` and
    `script.labeled_feature_entities`.

    All label parsing, scope resolution, component-default selection,
    object_id computation, and floor dedup live in the sensor —
    `label_map` is built directly from the registry calls (no
    `this.attributes.*` self-reference) so we can rely on HA's native
    state-change machinery for the diff:
    `trigger.from_state.attributes.label_map` is the previous snapshot,
    `trigger.to_state.attributes.label_map` is the new one. Removes
    fire first so renames / component swaps retract the stale topic
    before the new one publishes.

    Restart behavior: trigger-based template sensors restore state +
    attributes from the recorder, so on boot `from_state` already has
    the prior `label_map`. If the sensor's value actually changed
    during downtime (e.g. labels removed while HA was off) the diff
    catches it. If it didn't change, no work is needed — retained MQTT
    discovery topics already hold the entities.
  triggers:
    - trigger: state
      entity_id: sensor.labeled_feature_areas_state
      attribute: label_map
  mode: queued
  max: 50
  actions:
    # All registry parsing / flattening lives in the sensor. We only
    # diff snapshots here.
    - variables:
        automation_error_mode: >-
          {% set em_label = labels('automation.labeled_feature_areas')
              | map('label_name') | reject('none')
              | select('match', '(?i)^error mode: .+')
              | first | default('') %}
          {{ em_label | regex_replace('(?i)^error mode: ', '') | default('log', true) }}
        _now_map: '{{ trigger.to_state.attributes.label_map | default({}, true) }}'
        _prev_map: >-
          {{ (trigger.from_state.attributes.label_map
              if trigger.from_state is not none else {}) | default({}, true) }}
        # `_is_start` is true when there is no prior snapshot to diff
        # against (sensor was never populated, e.g. brand new install or
        # cleared recorder). On a normal HA restart the trigger-based
        # template sensor restores its attributes from history, so we
        # *will* have a prior `label_map` and can diff normally. The
        # short-circuit below only fires in the genuinely-no-history case.
        _is_start: >-
          {{ trigger.from_state is none
             or (trigger.from_state.attributes.label_map | default({}, true)) | length == 0 }}
    # Diff key is `<scope_id>||<label>` (the map key); we also
    # compare on `component` so a `Provides <Feature> Component:`
    # override swap surfaces as remove-old-then-add-new and the
    # stale discovery topic gets retracted before the new one
    # publishes. We deliberately do NOT compare on `object_id` —
    # the sensor no longer emits one; canonical naming lives in
    # `script.labeled_feature_area`, which is responsible for
    # computing the correct object_id on both add and delete.
    - variables:
        _added: >-
          {% if _is_start %}
          {{ _now_map.values() | list }}
          {% else %}
          {% set ns = namespace(items=[]) %}
          {% for k, v in _now_map.items() %}
            {% if k not in _prev_map
                or _prev_map[k].component != v.component %}
              {% set ns.items = ns.items + [v] %}
            {% endif %}
          {% endfor %}
          {{ ns.items }}
          {% endif %}
        _removed: >-
          {% if _is_start %}
          {{ [] }}
          {% else %}
          {% set ns = namespace(items=[]) %}
          {% for k, v in _prev_map.items() %}
            {% if k not in _now_map
                or _now_map[k].component != v.component %}
              {% set ns.items = ns.items + [v] %}
            {% endif %}
          {% endfor %}
          {{ ns.items }}
          {% endif %}
    # Removes first so renames / component swaps retract the stale topic before
    # the new one publishes. We delegate to `script.labeled_feature_area`
    # (with `delete: true`) instead of calling
    # `script.labeled_feature_entities` directly so the script's per-
    # feature branch can compute the canonical `object_id` to retract —
    # the sensor doesn't emit one anymore.
    - repeat:
        for_each: '{{ _removed }}'
        sequence:
          - action: script.labeled_feature_area
            data:
              feature: '{{ repeat.item.label }}'
              scope_id: '{{ repeat.item.scope_id }}'
              scope: '{{ repeat.item.scope }}'
              feature_data: '{{ repeat.item.label_data }}'
              delete: true
              error_mode: '{{ automation_error_mode }}'
            continue_on_error: true
          - if:
              - condition: template
                value_template: '{{ error is defined }}'
            then:
              - if:
                  - condition: template
                    value_template: '{{ automation_error_mode == "log" }}'
                then:
                  - action: system_log.write
                    data:
                      level: error
                      message: >-
                        Labeled Feature Areas: error retracting
                        {{ repeat.item.label }} for {{ repeat.item.scope_id }}:
                        {{ error }}
              - if:
                  - condition: template
                    value_template: '{{ automation_error_mode == "alert" }}'
                then:
                  - action: script.send_alert
                    data:
                      alert_severity: high
                      alert_title: Labeled Feature Areas Error
                      alert_message: >-
                        Error retracting {{ repeat.item.label }} for
                        {{ repeat.item.scope_id }}: {{ error }}
              - if:
                  - condition: template
                    value_template: '{{ automation_error_mode == "stop" }}'
                then:
                  - stop: >-
                      Labeled Feature Areas: error retracting
                      {{ repeat.item.label }} for {{ repeat.item.scope_id }}
                    error: true
    - repeat:
        for_each: '{{ _added }}'
        sequence:
          # `feature` / `feature_data` parameter names on
          # `script.labeled_feature_area` are unchanged for backward
          # compatibility — the script and downstream callers still
          # speak in "feature" terms. The sensor publishes the value
          # under `label`/`label_data`; we map them here.
          - action: script.labeled_feature_area
            data:
              feature: '{{ repeat.item.label }}'
              scope_id: '{{ repeat.item.scope_id }}'
              scope: '{{ repeat.item.scope }}'
              feature_data: '{{ repeat.item.label_data }}'
              error_mode: '{{ automation_error_mode }}'
            continue_on_error: true
          - if:
              - condition: template
                value_template: '{{ error is defined }}'
            then:
              - if:
                  - condition: template
                    value_template: '{{ automation_error_mode == "log" }}'
                then:
                  - action: system_log.write
                    data:
                      level: error
                      message: >-
                        Labeled Feature Areas: error creating
                        {{ repeat.item.label }} for {{ repeat.item.scope_id }}:
                        {{ error }}
              - if:
                  - condition: template
                    value_template: '{{ automation_error_mode == "alert" }}'
                then:
                  - action: script.send_alert
                    data:
                      alert_severity: high
                      alert_title: Labeled Feature Areas Error
                      alert_message: >-
                        Error creating {{ repeat.item.label }} for
                        {{ repeat.item.scope_id }}: {{ error }}
              - if:
                  - condition: template
                    value_template: '{{ automation_error_mode == "stop" }}'
                then:
                  - stop: >-
                      Labeled Feature Areas: error creating
                      {{ repeat.item.label }} for {{ repeat.item.scope_id }}
                    error: true
