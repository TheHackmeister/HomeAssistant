    trigger: event
  actions:
  - variables:
      action_snooze: '{{ ''SNOOZE_'' ~ context.id }}'
      action_increase: '{{ ''INCREASE_'' ~ context.id }}'
      action_decrease: '{{ ''DECREASE_'' ~ context.id }}'
      c: '{{ context }}'
  - data:
      title: "\U0001F6A8 {{ trigger.event.data.domain }} alert"
      message: '{{ trigger.event.data.domain }} is {{ states(trigger.event.data.name)
        }} on {{ trigger.event.data.name }}'
      data:
        tag: garage-alert
        actions:
        - action: '{{ action_snooze }}'
          title: Snooze 30min
        - action: '{{ action_increase }}'
          title: Increase
        - action: '{{ action_decrease }}'
          title: Decrease
    action: notify.mobile_app_pixel_6
  - wait_for_trigger:
    - event_type: mobile_app_notification_action
      event_data:
        action: '{{ action_snooze }}'
      trigger: event
    - event_type: mobile_app_notification_action
      event_data:
        action: '{{ action_increase }}'
      trigger: event
    - event_type: mobile_app_notification_action
      event_data:
