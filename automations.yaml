- id: '1720676200768'
  alias: 'Climate Mode: Super'
  description: ''
  trigger:
  - platform: state
    entity_id:
    - input_select.climate_mode
    to: Super Cool
  - platform: state
    entity_id:
    - input_select.climate_mode
    to: Super Heat
  - platform: time
    at: '19:00:00'
  condition:
  - condition: and
    conditions:
    - condition: state
      entity_id: input_select.house_mode
      state: Day
    - condition: or
      conditions:
      - condition: state
        entity_id: input_select.climate_mode
        state: Super Heat
      - condition: state
        entity_id: input_select.climate_mode
        state: Super Cool
  action:
  - if:
    - condition: or
      conditions:
      - condition: state
        entity_id: input_select.climate_mode_providing
        state: Heat
      - condition: state
        entity_id: input_select.climate_mode_providing
        state: Both
    then:
    - service: climate.set_temperature
      data_template:
        temperature: '{{ states.input_number.climate_mode_heating_super.state }}'
      target:
        area_id: living_room
  - if:
    - condition: or
      conditions:
      - condition: state
        entity_id: input_select.climate_mode_providing
        state: Cool
      - condition: state
        entity_id: input_select.climate_mode_providing
        state: Both
    then:
    - service: climate.set_temperature
      data_template:
        temperature: '{{ states.input_number.climate_mode_cooling_super.state }}'
      target:
        area_id: living_room
  mode: single
