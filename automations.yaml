- id: '1776536295923'
  alias: Labeled Feature Leaders
  description: 'Evaluates leader labels for each changed Feature Leader entity and
    calls the labeled_feature_follower script once per follower with the post-evaluated
    leader_enabled boolean.

    '
  triggers:
  - trigger: state
    entity_id: sensor.labeled_features_state
    attribute: leaders
  conditions: []
  mode: queued
  max: 50
  actions:
  - variables:
      cutoff: '{{ trigger.from_state.attributes.last_updated_at | float(0) }}

        '
      changed_entities: "{{ expand(label_entities('feature_leader'))\n   | selectattr('last_changed_timestamp',
        '>', cutoff)\n   | map(attribute='entity_id')\n   | list }}\n"
      automation_error_mode: "{% set em_label = labels('automation.labeled_feature_leaders')\n
        \  | map('label_name') | reject('none')\n   | select('match', '(?i)^error
        mode: .+')\n   | first | default('') %} {{ em_label | regex_replace('(?i)^error
        mode: ', '') | default('log', true) }}\n"
  - repeat:
      for_each: '{{ changed_entities }}'
      sequence:
      - variables:
          leader_entity_id: '{{ repeat.item }}'
          all_leader_labels: "{{ labels(leader_entity_id)\n   | map('label_name')\n
            \  | reject('none')\n   | list }}\n"
          leader_features: '{{ trigger.to_state.attributes.leaders.get(leader_entity_id,
            {}).get(''features'', {}) }}

            '
          leader_current_value: '{{ trigger.to_state.attributes.leaders.get(leader_entity_id,
            {}).get(''current_value'', '''') }}

            '
          leader_previous_value: '{{ trigger.to_state.attributes.leaders.get(leader_entity_id,
            {}).get(''previous_value'', '''') }}

            '
      - repeat:
          for_each: '{{ leader_features | list }}'
          sequence:
          - variables:
              feature_name: '{{ repeat.item }}'
              leader_enabled: '{{ leader_features[repeat.item].enabled }}'
              resolved_scope: '{{ leader_features[repeat.item].scope }}'
              resolved_area_id: '{{ area_id(leader_entity_id) | default("", true)
                | trim }}'
              resolved_floor_id: '{%- if resolved_scope == ''floor'' -%} {%- set aid
                = area_id(leader_entity_id) -%} {%- set ns = namespace(found='''')
                -%} {%- for fid in floors() -%} {%- if aid in floor_areas(fid) -%}{%-
                set ns.found = fid -%}{%- endif -%} {%- endfor -%}{{- ns.found -}}
                {%- endif -%}'
              resolved_scope_id: '{%- if resolved_scope == ''area'' -%}{{- resolved_area_id
                | trim -}}{%- elif resolved_scope == ''floor'' -%}{{- resolved_floor_id
                | trim -}}{%- endif -%}'
              scoped_feature_leader: '{{ (resolved_scope | capitalize + '' '') if
                resolved_scope in [''area'', ''floor''] else '''' }}{{ feature_name
                }}'
              leader_only: "{% set only_label = scoped_feature_leader + ' Only: '
                %} {% set match = all_leader_labels\n               | select('match',
                '^' + only_label + '(Enable|Disable)$')\n               | first |
                default('') %}\n{{ match | regex_replace('^.+: ', '') }}\n"
              leader_between: "{{ all_leader_labels\n   | select('match', '^' + scoped_feature_leader
                + ' Between: .+')\n   | map('regex_replace', '^.+: ', '')\n   | list
                }}\n"
              leader_not_between: "{{ all_leader_labels\n   | select('match', '^'
                + scoped_feature_leader + ' Not Between: .+')\n   | map('regex_replace',
                '^.+: ', '')\n   | list }}\n"
              leader_time_ok: '{% set now_time = now().strftime(''%H:%M'') %} {% set
                ns = namespace(ok=true, any_b=false) %} {% for val in leader_between
                %} {% set p = val.split('':'') %} {% set s = p[0]+'':''+p[1] if (p|length==4
                or (p|length==3 and p[2]==''-'')) and p[0]!=''-'' else ''-'' %} {%
                set e = p[2]+'':''+p[3] if p|length==4 else (p[1]+'':''+p[2] if p|length==3
                and p[0]==''-'' else ''-'') %} {% set in_r = ((s==''-'' or now_time>=s)
                and (e==''-'' or now_time<=e)) if (s==''-'' or e==''-'' or s<=e) else
                (now_time>=s or now_time<=e) %} {% if in_r %}{% set ns.any_b = true
                %}{% endif %} {% endfor %} {% if leader_between|length > 0 %}{% set
                ns.ok = ns.any_b %}{% endif %} {% for val in leader_not_between %}
                {% set p = val.split('':'') %} {% set s = p[0]+'':''+p[1] if (p|length==4
                or (p|length==3 and p[2]==''-'')) and p[0]!=''-'' else ''-'' %} {%
                set e = p[2]+'':''+p[3] if p|length==4 else (p[1]+'':''+p[2] if p|length==3
                and p[0]==''-'' else ''-'') %} {% set in_r = ((s==''-'' or now_time>=s)
                and (e==''-'' or now_time<=e)) if (s==''-'' or e==''-'' or s<=e) else
                (now_time>=s or now_time<=e) %} {% if in_r %}{% set ns.ok = false
                %}{% endif %} {% endfor %} {{ ns.ok }}

                '
              leader_toggle: '{{ (scoped_feature_leader + '' Toggle: True'') in all_leader_labels
                }}

                '
              leader_should_proceed: '{% if leader_toggle %} true {% elif leader_only
                == ''enable'' and not leader_enabled %} false {% elif leader_only
                == ''disable'' and leader_enabled %} false {% elif not leader_time_ok
                %} false {% elif not leader_enabled and ((scoped_feature_leader +
                '' Increasing: True'') in all_leader_labels or (scoped_feature_leader
                + '' Decreasing: True'') in all_leader_labels) %} false {% else %}
                true {% endif %}

                '
              feature_error_mode: "{% set pfx = scoped_feature_leader + ' Error Mode:
                ' %}\n   {% set match = all_leader_labels\n     | select('match',
                '^' + pfx + '(silent|log|alert|stop)$')\n     | first | default('')
                %}\n  {{ match | regex_replace('^.+: ', '') | default(automation_error_mode,
                true) }}\n"
              leader_feature_overrides: "{% set cv = leader_current_value | trim %}
                {% if cv != '' %}\n  {% set ns = namespace(features=[]) %}\n  {% for
                lbl in all_leader_labels %}\n    {% if lbl | regex_search(': ' + cv
                + '$') %}\n      {% set prefix_raw = lbl | regex_replace(': ' + cv
                + '$', '') | trim %}\n      {% set prefix = prefix_raw | regex_replace('^(Area
                |Floor )', '') | trim %}\n      {% if not prefix | regex_search('^(Area
                |Floor |)Leader')\n            and not prefix | regex_search('^(Area
                |Floor |)Follower')\n            and not prefix | regex_search('^Feature')\n
                \           and not prefix | regex_search(' (Enable|Disable|Invert|Only|Script|Error
                Mode)$')\n            and not prefix | regex_search(' (Between|Not
                Between|Increasing|Decreasing)$')\n            and not prefix | regex_search('
                Arg ') %}\n        {% set ns.features = ns.features + [prefix] %}\n
                \     {% endif %}\n    {% endif %}\n  {% endfor %}\n  {{ ns.features
                }}\n{% else %}\n  {{ [] }}\n{% endif %}"
          - condition: template
            value_template: '{{ leader_should_proceed }}'
          - variables:
              leader_script: "{%- if leader_enabled | bool -%}\n  {%- set pfx = scoped_feature_leader
                + ' Enable Script: ' -%}\n  {%- set s = all_leader_labels | select('match',
                '^' + pfx + '.+')\n      | first | default('') | regex_replace('^.+:
                ', '') | trim -%}\n  {%- if s == '' -%}\n    {%- set pfx = scoped_feature_leader
                + ' Script: ' -%}\n    {%- set s = all_leader_labels | select('match',
                '^' + pfx + '.+')\n        | first | default('') | regex_replace('^.+:
                ', '') | trim -%}\n  {%- endif -%}\n  {{- s -}}\n{%- else -%}\n  {%-
                set pfx = scoped_feature_leader + ' Disable Script: ' -%}\n  {%- set
                s = all_leader_labels | select('match', '^' + pfx + '.+')\n      |
                first | default('') | regex_replace('^.+: ', '') | trim -%}\n  {%-
                if s == '' -%}\n    {%- set pfx = scoped_feature_leader + ' Script:
                ' -%}\n    {%- set s = all_leader_labels | select('match', '^' + pfx
                + '.+')\n        | first | default('') | regex_replace('^.+: ', '')
                | trim -%}\n  {%- endif -%}\n  {{- s -}}\n{%- endif -%}"
              leader_script_args: '{% set ns = namespace(d={}) %} {% set lf_l = state_attr(''sensor.labeled_features_state'',
                ''leaders'') | default({}) %} {% set lf_f = state_attr(''sensor.labeled_features_state'',
                ''features'') | default({}) %} {% for lbl in all_leader_labels %}
                {% if lbl | regex_search(''^'' + scoped_feature_leader + '' Arg [^:]+:'')
                %} {% set field = lbl | regex_replace(''^.+ Arg ([^:]+): .*$'', ''\\1'')
                | trim %} {% set raw = lbl | regex_replace(''^[^:]+: '', '''') | trim
                %} {% if raw | regex_search(''^\[[^\]]+\]\.\[[^\]]+\]\.\[[^\]]+\]$'')
                %} {% set root = raw | regex_replace(''^\[([^\]]+)\].*$'', ''\\1'')
                %} {% set key = raw | regex_replace(''^\[[^\]]+\]\.\[([^\]]+)\].*$'',
                ''\\1'') %} {% set fld = raw | regex_replace(''^.*\.\[([^\]]+)\]$'',
                ''\\1'') %} {% if root == ''features'' %}{% set rk = feature_name
                if key == ''feature_name'' else key %}{% set ns.d = dict(ns.d, **{field:
                lf_f.get(rk, {}).get(fld, raw) | string}) %} {% elif root == ''leaders''
                %}{% set rk = leader_entity_id if key == ''feature_leader'' else key
                %}{% set ns.d = dict(ns.d, **{field: lf_l.get(rk, {}).get(fld, raw)
                | string}) %} {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{%
                endif %} {% else %}{% set ns.d = dict(ns.d, **{field: raw}) %}{% endif
                %} {% endif %}{% endfor %}{{ ns.d }}'
          - if:
            - condition: template
              value_template: '{{ leader_script != "" and leader_feature_overrides
                | length == 0 }}'
            then:
            - if:
              - condition: template
                value_template: "{{ leader_script.startswith('automation.')\n   or
                  leader_script.startswith('scene.') }}"
              then:
              - action: '{{ leader_script }}'
                data: {}
              else:
              - choose:
                - conditions:
                  - condition: template
                    value_template: '{{ leader_script_args | length == 0 }}'
                  sequence:
                  - if:
                    - condition: template
                      value_template: '{{ feature_error_mode != "stop" }}'
                    then:
                    - action: '{{ leader_script }}'
                      data: '{{ {''leader_entity_id'': leader_entity_id, ''feature'':
                        feature_name, ''leader_feature'': feature_name, ''leader_enabled'':
                        leader_enabled, ''scope'': resolved_scope, ''scope_id'': resolved_scope_id}
                        }}

                        '
                      continue_on_error: true
                    - if:
                      - condition: template
                        value_template: '{{ error is defined }}'
                      then:
                      - if:
                        - condition: template
                          value_template: '{{ feature_error_mode == "log" }}'
                        then:
                        - action: system_log.write
                          data:
                            level: error
                            message: 'LF Leaders: leader script error {{ leader_script
                              }} ({{ leader_entity_id }}, feature: {{ feature_name
                              }}): {{ error }}'
                      - if:
                        - condition: template
                          value_template: '{{ feature_error_mode == "alert" }}'
                        then:
                        - action: script.send_alert
                          data:
                            alert_severity: high
                            alert_title: Labeled Feature Leader Script Error
                            alert_message: 'Leader script error for {{ leader_entity_id
                              }} (feature: {{ feature_name }}): {{ error }}'
                    else:
                    - action: '{{ leader_script }}'
                      data: '{{ {''leader_entity_id'': leader_entity_id, ''feature'':
                        feature_name, ''leader_feature'': feature_name, ''leader_enabled'':
                        leader_enabled, ''scope'': resolved_scope, ''scope_id'': resolved_scope_id}
                        }}

                        '
                default:
                - action: script.turn_on
                  target:
                    entity_id: '{{ leader_script }}'
                  data:
                    variables: >
                      {{ {'leader_entity_id': leader_entity_id, 'feature': feature_name, 'leader_enabled': leader_enabled, 'scope': resolved_scope, 'scope_id': resolved_scope_id} | combine(leader_script_args) | combine({'leader_feature': feature_name}) }}
          - variables:
              follower_label_name: >-

                {%- if resolved_scope == 'area' -%}Area Follower: {{ feature_name }}{%- elif resolved_scope == 'floor' -%}Floor Follower: {{ feature_name }}{%- else -%}Follower: {{ feature_name }}{%- endif -%}
              scope_entity_set: >-
                {% if resolved_scope == 'area' %}
                  {% set area_ents = area_entities(resolved_area_id) | list %}
                  {% set area_devs = area_devices(resolved_area_id) %}
                  {% set ns = namespace(dev_ents=[]) %}
                  {% for d in area_devs %}
                    {% set ns.dev_ents = ns.dev_ents + device_entities(d) | list %}
                  {% endfor %}
                  {{ (area_ents + ns.dev_ents) | unique | list }}
                {% elif resolved_scope == 'floor' %}
                  {% set floor_area_list = floor_areas(resolved_floor_id) %}
                  {% set ns = namespace(ents=[]) %}
                  {% for a in floor_area_list %}
                    {% set area_ents = area_entities(a) | list %}
                    {% set area_devs = area_devices(a) %}
                    {% for d in area_devs %}
                      {% set ns.ents = ns.ents + device_entities(d) | list %}
                    {% endfor %}
                    {% set ns.ents = ns.ents + area_ents %}
                  {% endfor %}
                  {{ ns.ents | unique | list }}
                {% else %}
                  {{ [] }}
                {% endif %}
              _scope_pfx: >-
                {{ 'Area ' if resolved_scope == 'area' else ('Floor ' if resolved_scope == 'floor' else '') }}
              # Provider grouping (domain_label) for this feature comes from
              # `sensor.labeled_features_state.feature_meta` — the single
              # source of truth shared with `script.labeled_feature_generics`.
              # Empty string here means the feature has no domain-level
              # Provides shorthand and we only resolve the feature name itself.
              _feature_domain_label: >-
                {% set catalog = state_attr('sensor.labeled_features_state', 'feature_meta') | default({}) %}
                {{ catalog.get(feature_name, {}).get('domain_label', '') }}
              # Provides-followers: union of bare and scope-prefixed Provides
              # labels for the feature's domain_label (if defined). With the
                # entity-context `<scope_pfx>Provides: <DomainLabel>` shorthand
                # a single label opts an entity into every feature for that
                # domain — see Label Based Features.md → "Provides: <Domain>".
              _provides_followers: >-
                {% if _feature_domain_label == '' %}
                  {{ [] }}
                {% else %}
                  {% set bare_lbl = 'Provides: ' ~ _feature_domain_label %}
                  {% set scoped_lbl = _scope_pfx ~ 'Provides: ' ~ _feature_domain_label %}
                  {{ ((label_entities(bare_lbl) | list)
                      + (label_entities(scoped_lbl) | list)) | unique | list }}
                {% endif %}

              followers: >-
                {% set all_f = (label_entities(follower_label_name) | list
                                + _provides_followers) | unique | list %}
                {% if scope_entity_set | length > 0 %}
                  {{ all_f | select('in', scope_entity_set) | list }}
                {% else %}
                  {{ all_f }}
                {% endif %}
              dispatch_list: >-
                {% set ns = namespace(items=[]) %}
                {% if leader_feature_overrides | length > 0 %}
                  {% for ovr in leader_feature_overrides | sort %}
                    {% set inverted = (ovr + ' Invert: True') in all_leader_labels %}
                    {% set eff_en = false if inverted else true %}
                    {% set ovr_toggle = (ovr + ' Toggle: True') in all_leader_labels %}
                    {% set ovr_lbl = 'Area Follower: ' + ovr if resolved_scope == 'area' else ('Floor Follower: ' + ovr if resolved_scope == 'floor' else 'Follower: ' + ovr) %}
                    {# Per-override provider union — same single-source-of-truth
                       lookup as the main block, but keyed on the override
                       feature name instead of the leader's feature_name. #}
                    {% set ovr_catalog = state_attr('sensor.labeled_features_state', 'feature_meta') | default({}) %}
                    {% set ovr_domain_label = ovr_catalog.get(ovr, {}).get('domain_label', '') %}
                    {% set ovr_provides_ents = [] %}
                    {% if ovr_domain_label != '' %}
                      {% set bare_lbl = 'Provides: ' ~ ovr_domain_label %}
                      {% set scoped_lbl = _scope_pfx ~ 'Provides: ' ~ ovr_domain_label %}
                      {% set ovr_provides_ents = ((label_entities(bare_lbl) | list)
                                                  + (label_entities(scoped_lbl) | list)) | unique | list %}
                    {% endif %}
                    {% set all_ovr_f = (label_entities(ovr_lbl) | list
                                        + ovr_provides_ents) | unique | list %}
                    {% set ovr_followers = all_ovr_f | select('in', scope_entity_set) | list if scope_entity_set | length > 0 else all_ovr_f %}

                    {% for f in ovr_followers %}
                      {% set ns.items = ns.items + [{'f': f, 'feat': ovr, 'en': eff_en, 'toggle': ovr_toggle}] %}
                    {% endfor %}
                  {% endfor %}
                {% else %}
                  {% for f in followers %}
                    {% set ns.items = ns.items + [{'f': f, 'feat': feature_name, 'en': leader_enabled, 'toggle': leader_toggle}] %}
                  {% endfor %}
                {% endif %}
                {{ ns.items }}
          - repeat:
              for_each: '{{ dispatch_list }}'
              sequence:
              - action: script.labeled_feature_follower
                data:
                  follower_entity_id: '{{ repeat.item.f }}'
                  feature: '{{ repeat.item.feat }}'
                  leader_entity_id: '{{ leader_entity_id }}'
                  leader_enabled: '{{ repeat.item.en }}'
                  toggle: '{{ repeat.item.toggle | default(false) }}'
                  error_mode: '{{ feature_error_mode }}'
                  scope: '{{ resolved_scope }}'
                  scope_id: '{{ resolved_scope_id }}'
                continue_on_error: true
              - if:
                - condition: template
                  value_template: '{{ error is defined }}'
                then:
                - if:
                  - condition: template
                    value_template: '{{ feature_error_mode == ''stop'' }}'
                  then:
                  - stop: 'Labeled Feature Leaders: error on follower {{ repeat.item.f
                      }} (feature: {{ repeat.item.feat }}): {{ error }}'
                    error: true
                - if:
                  - condition: template
                    value_template: '{{ feature_error_mode == ''log'' }}'
                  then:
                  - action: system_log.write
                    data:
                      level: error
                      message: 'Labeled Feature Leaders: error calling follower for
                        {{ repeat.item.f }} (feature: {{ repeat.item.feat }}): {{
                        error }}'
                - if:
                  - condition: template
                    value_template: '{{ feature_error_mode == ''alert'' }}'
                  then:
                  - action: script.send_alert
                    data:
                      alert_severity: high
                      alert_title: Labeled Feature Leaders Error
                      alert_message: 'Error calling follower for {{ repeat.item.f
                        }} (feature: {{ repeat.item.feat }}): {{ error }}'
- id: sleep_timeout_cancel_restore
  alias: Sleep Timeout Cancel Restore
  description: 'Restores media player volumes when labeled_feature_sleep_timeout is
    cancelled externally before completing. Triggered when the script goes from on
    to off while script.labeled_feature_sleep_timeout still had a non-empty original_volumes
    attribute (read from trigger.from_state.attributes.original_volumes). Unmutes
    players first since cancellation may have occurred after the mute step.

    '
  triggers:
  - trigger: state
    entity_id: script.labeled_feature_sleep_timeout
    from: 'on'
    to: 'off'
  conditions:
  - condition: template
    value_template: '{{ trigger.from_state.attributes.original_volumes | default({})
      | length > 0 }}'
  actions:
  - variables:
      stored_volumes: '{{ trigger.from_state.attributes.original_volumes | default({})
        }}'
  - action: media_player.volume_mute
    target:
      entity_id: '{{ stored_volumes.keys() | list }}'
    data:
      is_volume_muted: false
    continue_on_error: true
  - repeat:
      for_each: '{{ stored_volumes.keys() | list }}'
      sequence:
      - action: media_player.volume_set
        target:
          entity_id: '{{ repeat.item }}'
        data:
          volume_level: '{{ stored_volumes[repeat.item] }}'
        continue_on_error: true
  mode: single
