- id: '1757899089642'
  alias: Alerting
  description: ''
  triggers:
  - trigger: time_pattern
    hours: '*'
    minutes: '*'
    seconds: '0'
    enabled: true
  conditions: []
  actions:
  - repeat:
      for_each: '{%- set alert_entities = states | selectattr(''entity_id'', ''match'',
        ''.*_calibrated_value$'') | map(attribute=''entity_id'') | list -%} {{ alert_entities
        }}'
      sequence:
      - variables:
          alert_entity: '{{ repeat.item }}'
          check_minutes_entity: '{{ alert_entity.replace(''_calibrated_value'', ''_alert_check_minutes'').replace(''sensor.'',
            ''number.'') }}'
          alert_low_entity: '{{ alert_entity.replace(''_calibrated_value'', ''_alert_low'').replace(''sensor.'',
            ''number.'') }}'
          alert_high_entity: '{{ alert_entity.replace(''_calibrated_value'', ''_alert_high'').replace(''sensor.'',
            ''number.'') }}'
      - condition: template
        value_template: "{%- set check_minutes = states(check_minutes_entity) | int(0)
          -%} {%- if check_minutes > 0 -%}\n  {{ (now().minute % check_minutes) ==
          0 }}\n{%- else -%}\n  false\n{%- endif -%}"
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ states(alert_entity) in [''unknown'', ''unavailable'']
              }}'
          sequence:
          - action: script.send_alert
            metadata: {}
            data:
              alert_message: "Sensor {{ alert_entity.replace('sensor.', '').replace('_',
                ' ').title() }}  is\n  {{ states(alert_entity) }}"
              alert_severity: medium
              alert_title: Sensor Unavailable Alert
      - choose:
        - conditions:
          - condition: template
            value_template: "{%- set check_minutes = states(check_minutes_entity)
              | int(0) -%} {%- set last_updated = state_attr(alert_entity, 'last_updated')
              -%} {%- if last_updated and check_minutes > 0 -%}\n  {{ (now() - last_updated).total_seconds()
              / 60 > check_minutes }}\n{%- else -%}\n  false\n{%- endif -%}"
          sequence:
          - action: script.send_alert
            metadata: {}
            data:
              alert_message: Sensor {{ alert_entity.replace('sensor.', '').replace('_',
                ' ').title() }}    hasn't updated in {{ ((now() - state_attr(calibrated_value_entity,   'last_updated')).total_seconds()
                / 60) | round(1) }} minutes
              alert_severity: medium
              alert_title: Stale Sensor Alert
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ states(alert_entity) not in [''unknown'', ''unavailable'']
              }}'
          - condition: template
            value_template: "{%- set check_minutes = states(check_minutes_entity)
              | int(0) -%} {%- set last_updated = state_attr(alert_entity, 'last_updated')
              -%} {%- if last_updated and check_minutes > 0 -%}\n  {{ (now() - last_updated).total_seconds()
              / 60 <= check_minutes }}\n{%- else -%}\n  true\n{%- endif -%}"
          - condition: template
            value_template: '{%- set calibrated_val = states(alert_entity) | float
              -%} {%- set alert_threshold = states(alert_low_entity) | float -%} {{
              calibrated_val < alert_threshold }}'
          sequence:
          - condition: template
            value_template: "{%- set check_minutes = states(check_minutes_entity)
              | int(0) -%} \n{%- set alert_threshold = states(alert_entity) | float
              -%} \n{%- set time_ago = now() - timedelta(minutes=check_minutes) -%}
              \n{%- set historical_states = state_attr(alert_entity, 'history') -%}
              \n{%- if historical_states -%}\n  {%- set past_value = states.sensor[alert_entity.split('.')[1]].last_updated
              -%}\n  {%- set past_state = states(alert_entity, time_ago) | float -%}\n
              \ {{ past_state < alert_threshold }}\n{%- else -%}\n  {%- set past_state
              = states(alert_entity, time_ago) | float -%}\n  {{ past_state < alert_threshold
              }}\n{%- endif -%}"
            enabled: true
          - action: script.send_alert
            metadata: {}
            data:
              alert_title: ' Persistent Low Value Alert'
              alert_message: 'Alert: {{ alert_entity.replace(''sensor.'', '''').replace(''_'',
                '' '').title() }}  is   {{ states(alert_entity) }} which has been
                below threshold of {{   states(alert_low_entity) }}  for at least
                {{ states(check_minutes_entity) }} minutes.'
              alert_severity: medium
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ states(alert_entity) not in [''unknown'', ''unavailable'']
              }}'
          - condition: template
            value_template: "{%- set check_minutes = states(check_minutes_entity)
              | int(0) -%} {%- set last_updated = state_attr(alert_entity, 'last_updated')
              -%} {%- if last_updated and check_minutes > 0 -%}\n  {{ (now() - last_updated).total_seconds()
              / 60 <= check_minutes }}\n{%- else -%}\n  true\n{%- endif -%}"
          - condition: template
            value_template: '{%- set calibrated_val = states(alert_entity) | float
              -%} {%- set alert_threshold = states(alert_high_entity) | float -%}
              {{ calibrated_val > alert_threshold }}'
          sequence:
          - condition: template
            value_template: "{%- set check_minutes = states(check_minutes_entity)
              | int(0) -%} {%- set alert_threshold = states(alert_entity) | float
              -%} {%- set time_ago = now() - timedelta(minutes=check_minutes) -%}
              {%- set historical_states = state_attr(alert_entity, 'history') -%}
              {%- if historical_states -%}\n  {%- set past_value = states.sensor[alert_entity.split('.')[1]].last_updated
              -%}\n  {%- set past_state = states(alert_entity, time_ago) | float -%}\n
              \ {{ past_state > alert_threshold }}\n{%- else -%}\n  {%- set past_state
              = states(alert_entity, time_ago) | float -%}\n  {{ past_state > alert_threshold
              }}\n{%- endif -%}"
          - action: script.send_alert
            metadata: {}
            data:
              alert_title: ' Persistent High Value Alert'
              alert_message: 'Alert: {{ alert_entity.replace(''sensor.'', '''').replace(''_'',
                '' '').title() }}  is   {{ states(alert_entity) }} which has been
                above threshold of {{   states(alert_high_entity) }}  for at least
                {{ states(check_minutes_entity) }} minutes.'
              alert_severity: medium
  mode: single
- id: '1760739835655'
  alias: Area Leader Device Control (Dep)
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.area_leaders_active_count
  conditions: []
  actions:
  - variables:
      leader_entity: "{% set ns = namespace(entity='', time=None) %} {% for label
        in labels() %}\n  {% if label_name(label).startswith('Area Leader: ') %}\n
        \   {% for entity_id in label_entities(label) %}\n      {% set last_changed
        = states[entity_id].last_changed %}\n      {% if ns.time is none or last_changed
        > ns.time %}\n        {% set ns.entity = entity_id %}\n        {% set ns.time
        = last_changed %}\n      {% endif %}\n    {% endfor %}\n  {% endif %}\n{%
        endfor %} {{ ns.entity }}\n"
      leader_state: '{{ states(leader_entity) }}'
      leader_area: '{{ area_id(leader_entity) }}'
      device_class: "{% set ns = namespace(class='') %} {% for label in labels() %}\n
        \ {% if label_name(label).startswith('Area Leader: ') and leader_entity in
        label_entities(label) %}\n    {% set ns.class = label_name(label).replace('Area
        Leader: ', '') %}\n  {% endif %}\n{% endfor %} {{ ns.class }}\n"
      target_entities: "{% set class = device_class %} {% set area = leader_area %}
        {{ states[class] \n   | selectattr('entity_id', 'in', area_entities(area))\n
        \  | map(attribute='entity_id')\n   | reject('eq', leader_entity)\n   | list
        }}\n"
  - condition: template
    value_template: '{{ target_entities | length > 0 }}'
    enabled: false
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ leader_state in [''on'', ''open'', ''home'', ''active'']
          }}'
      sequence:
      - target:
          entity_id: '{{ target_entities }}'
        action: homeassistant.turn_on
    - conditions:
      - condition: template
        value_template: '{{ leader_state in [''off'', ''closed'', ''away'', ''inactive'']
          }}'
      sequence:
      - target:
          entity_id: '{{ target_entities }}'
        action: homeassistant.turn_off
  mode: queued
  max: 10
- id: '1767644744620'
  alias: 'Sensors: Area Manifests trigger'
  description: Updates area manifest sensors when tracked entities change areas or
    on startup
  triggers:
  - trigger: homeassistant
    event: start
    id: startup
  - trigger: event
    event_type: entity_registry_updated
    event_data:
      action: update
    id: registry_update
  conditions:
  - condition: or
    conditions:
    - condition: trigger
      id: startup
    - condition: and
      conditions:
      - condition: trigger
        id: registry_update
      - condition: template
        value_template: "{% set old_area_id = trigger.event.data.changes.area_id %}
          {% set new_area_id = area_id(trigger.event.data.entity_id) %} {% set type_labels
          = labels() | select('match', '^type_') | list %} {% set all_labels = type_labels
          + ['track_area_ids'] %} {% set tracked_areas = all_labels \n   | map('label_entities')
          \n   | sum(start=[]) \n   | map('area_id') \n   | reject('none') \n   |
          unique \n   | list %}\n{{ old_area_id in tracked_areas or new_area_id in
          tracked_areas }}\n"
  actions:
  - if:
    - condition: trigger
      id: startup
    then:
    - delay:
        seconds: 45
  - variables:
      tracked_labels: '{{ (labels() | select(''match'', ''^type_'') | list + [''track_area_ids''])
        | unique | list }}'
      areas: "{% set ns = namespace(areas=[]) %} {% for label in tracked_labels %}\n
        \ {% for area in label_areas(label) %}\n    {% if area not in ns.areas %}\n
        \     {% set ns.areas = ns.areas + [area] %}\n    {% endif %}\n  {% endfor
        %}\n{% endfor %} {{ ns.areas }}"
  - repeat:
      for_each: '{{ areas }}'
      sequence:
      - variables:
          current_area: '{{ repeat.item }}'
          entities_in_area: '{{ area_entities(current_area) | list }}'
          devices_in_area: "{% set ns = namespace(devices=[]) %} {% for entity_id
            in area_entities(current_area) %}\n  {% set d_id = device_id(entity_id)
            %}\n  {% if d_id and d_id not in ns.devices %}\n    {% set ns.devices
            = ns.devices + [d_id] %}\n  {% endif %}\n{% endfor %} {{ ns.devices }}\n"
          current_area_name: '{{ area_name(current_area) }}'
      - action: script.sensors_area_manifests
        data:
          area_id: '{{ current_area }}'
          area_name: '{{ current_area_name }}'
          entity_ids: '{{ entities_in_area }}'
          device_ids: '{{ devices_in_area }}'
  mode: restart
- id: '1767665604733'
  alias: Alert2 Actionable - pH
  description: ''
  triggers:
  - event_type: alert2_alert_on
    trigger: event
  actions:
  - variables:
      action_snooze: '{{ ''SNOOZE_'' ~ context.id }}'
      action_increase: '{{ ''INCREASE_'' ~ context.id }}'
      action_decrease: '{{ ''DECREASE_'' ~ context.id }}'
      c: '{{ context }}'
  - data:
      title: "\U0001F6A8 {{ trigger.event.data.domain }} alert"
      message: '{{ trigger.event.data.domain }} is {{ states(trigger.event.data.name)
        }} on {{ trigger.event.data.name }}'
      data:
        tag: garage-alert
        actions:
        - action: '{{ action_snooze }}'
          title: Snooze 30min
        - action: '{{ action_increase }}'
          title: Increase
        - action: '{{ action_decrease }}'
          title: Decrease
    action: notify.mobile_app_pixel_6
  - wait_for_trigger:
    - event_type: mobile_app_notification_action
      event_data:
        action: '{{ action_snooze }}'
      trigger: event
    - event_type: mobile_app_notification_action
      event_data:
        action: '{{ action_increase }}'
      trigger: event
    - event_type: mobile_app_notification_action
      event_data:
        action: '{{ action_decrease }}'
      trigger: event
    timeout: 01:00:00
    continue_on_timeout: true
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ wait.trigger.event.data.action == action_snooze }}'
      sequence:
      - data:
          snooze_until: '{{ now() + timedelta(minutes=30) }}'
          target:
            '[object Object]':
        action: alert2.notification_control
    - conditions:
      - condition: template
        value_template: '{{ wait.trigger.event.data.action == action_increase }}'
      sequence:
      - variables:
          control_entities: '{% set sensor_area = area_id(trigger.event.data.name)
            %} {% set sensor_label_name = labels(trigger.event.data.name) | select(''match'',
            ''sensor_'') | first | label_name | replace(''Sensor:'', ''Control:'')
            %} {% set control_label_id = label_id(sensor_label_name) %} {{ label_entities(control_label_id)
            | select(''in'', area_entities(sensor_area)) | list }}

            '
      - repeat:
          for_each: '{{ control_entities }}'
          sequence:
          - action: number.set_value
            metadata: {}
            data:
              value: '{{ states(repeat.item) | float  + states(repeat.item | regex_replace(''_dose_.*'',
                ''_dose_step'')) | float }}'
            target:
              entity_id: '{{ repeat.item }}'
    - conditions:
      - condition: template
        value_template: '{{ wait.trigger.event.data.action == action_decrease }}'
      sequence:
      - variables:
          control_entities: '{% set sensor_area = area_id(trigger.event.data.name)
            %} {% set sensor_label_name = labels(trigger.event.data.name) | select(''match'',
            ''sensor_'') | first | label_name | replace(''Sensor:'', ''Control:'')
            %} {% set control_label_id = label_id(sensor_label_name) %} {{ label_entities(control_label_id)
            | select(''in'', area_entities(sensor_area)) | list }}

            '
      - repeat:
          for_each: '{{ control_entities }}'
          sequence:
          - action: number.set_value
            metadata: {}
            data:
              value: '{{ states(repeat.item) | float  - states(repeat.item | regex_replace(''_dose_.*'',
                ''_dose_step'')) | float }}'
            target:
              entity_id: '{{ repeat.item }}'
  - action: notify.mobile_app_pixel_6
    data: {}
    enabled: false
  mode: parallel
  max: 10
