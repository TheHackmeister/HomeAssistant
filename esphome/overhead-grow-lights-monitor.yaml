substitutions:
  name: overhead-grow-lights-monitor
  friendly_name: Overhead Grow Lights Monitor
  light_restore_mode: ALWAYS_ON
packages:
  Athom_Technology.Mini_Relay_V2: github://athom-tech/esp32-configs/athom-mini-relay-v2.yaml
esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  
api:
  encryption:
    key: !secret overhead-grow-lights-monitor-encryption


wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password
  domain: .spencerslab.com

light:
  - id: !extend mini_relay
    internal: true
    