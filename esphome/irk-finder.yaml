---
substitutions:
  device_name: irk-finder
  friendly_name: IRK Finder
  ble_name: "IRK Finder"
  api_key: !secret irk-finder-encryption
  ota_password: !secret irk-finder-ota
  esp32_variant: esp32         # Any ESP32 variant (esp32, esp32c3, esp32c6, esp32s3, etc.)
  esp32_board: m5stamp-pico

packages:
  device:
    url: https://github.com/DerekSeaman/irk-capture
    ref: main
    file: ESPHome Devices/irk-capture-base.yaml
    refresh: always

esphome:
  name: irk-finder
  friendly_name: irk-finder

esp32:
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret irk-finder-encryption

ota:
  - platform: esphome
    password: !secret irk-finder-ota

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password
